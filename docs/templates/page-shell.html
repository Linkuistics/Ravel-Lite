<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>{{PAGE_TITLE}} — {{PROJECT_NAME}} — {{SITE_NAME}}</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="icon" type="image/svg+xml" href="{{LOGO_HREF}}">
  <link rel="stylesheet" href="{{CSS_HREF}}">
</head>
<body>
  <nav class="nav">
    <div class="container">
      <a href="{{HOME_HREF}}" class="nav-brand">
        <img src="{{LOGO_HREF}}" alt="{{SITE_NAME}} logo" width="64" height="64">
        <span class="nav-brand-text">
          <span class="nav-brand-name">{{SITE_NAME}}</span>
          <span class="nav-brand-tagline">{{SITE_TAGLINE}}</span>
        </span>
      </a>
      <ul class="nav-links">
        <li><a href="{{BACK_LINK_HREF}}">&#8592; {{BACK_LINK_TEXT}}</a></li>
        <li><span class="nav-badge" style="display:inline-block;">Collaborator</span></li>
      </ul>
    </div>
  </nav>

  <section style="padding-top: 120px;">
    <div class="container">
      <div class="prose">
        <h1>{{PAGE_TITLE}}</h1>
{{BODY}}
{{CHAPTER_NAV}}
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">
      <p class="footer-copyright">&copy; 2026 {{SITE_NAME}}. All rights reserved.</p>
    </div>
  </footer>

</html>
