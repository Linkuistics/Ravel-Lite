body: |
  ### Session 65 (2026-04-27T04:09:43Z) — Add repo and website URLs to --help output

  - Implemented `after_help` in the top-level clap `#[command(...)]` block to surface
    the source repo (`https://github.com/Linkuistics/Ravel-Lite`) and docs site
    (`https://www.linkuistics.com/projects/ravel-lite/`) in `ravel-lite --help`.
  - Added a `const AFTER_HELP: &str` literal in `src/main.rs` rather than composing
    separate `REPO_URL`/`WEBSITE_URL` constants (the latter caused clippy dead-code
    warnings under `[lints.rust] warnings = "deny"`).
  - Added snapshot-style test `top_level_help_shows_repo_and_website_urls` in
    `tests/cli.rs` using the same `env!("CARGO_BIN_EXE_ravel-lite")` harness as existing
    CLI tests; no new test infrastructure required.
  - All CI gates (cargo test, cargo clippy --lib --all-targets) passed clean.
  - The GitHub Actions CI workflow task was deleted from the backlog (out of scope for
    this cycle).
  - What this suggests next: the two remaining substantial feature tasks
    (embedded-defaults switch and lua/mlua config replacement) are each their own full
    work cycle; neither should be bundled into a tail of a smaller task.
