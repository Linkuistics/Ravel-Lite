body: |
  ### Session 122 (2026-05-02T09:52:56Z) — Wire focus-objections drain and serves-intent defeat cascade into GitCommitTriage

  - **Attempted:** Implement the three runner-side phase-boundary mechanics named in the task: drain `focus-objections.yaml` at triage entry, run the serves-intent defeat cascade on backlog items when `intents.yaml` is present, and verify cycle-aligned baseline filenames. The fourth bullet (commit-target routing) was explicitly deferred to the `two-stream-commits` task that owns it.
  - **What worked:**
    - `consume_focus_objections(plan_dir)` wraps `delete_focus_objections` with phase-scoped error context and is called at the top of `GitCommitTriage` before `write_phase`/`git_commit_plan`. Idempotent; two hermetic tests cover present-file removal and absent-file no-op.
    - New `src/defeat_cascade.rs` implements `run_defeat_cascade`: reads `intents.yaml` and `backlog.yaml`, builds typed `IntentStore`/`BacklogStore`, invokes `knowledge_graph::cascade_serves_intent`, and mirrors `status`/`defeated_by` flips back onto on-disk `BacklogEntry` records while preserving v1 extension fields (`category`, `dependencies`, `results`, etc.). Disk write is conditional on at least one cascade hit. Seven hermetic tests: intent-defeated propagation, no-op byte-identity, satisfied-as-terminal, extension-field preservation, partial-serves protection, and both missing-file error paths.
    - `cascade_defeated_items` gates on `intents_path(plan_dir).exists()` — v1 plans (including the dogfood plan) are pure no-ops; v2 plans pick up the cascade in the same triage commit. One hermetic test confirms the gate.
    - `intents_path` re-exported from `src/state/intents/mod.rs` so `phase_loop` can presence-check without reaching into `yaml_io::`.
    - Baseline filenames were already correct from the cycle-reorder predecessor — no code change needed there.
    - All 943 lib tests pass (+10 new vs. 933 baseline). `./scripts/check.sh` clippy-clean.
  - **What didn't / was deferred:** Commit-target routing inside `apply_commits_spec` (grouping by `target: ComponentRef`, per-worktree application, abort-before-context-record ordering) remains in the `two-stream-commits` task. No full phase-loop integration test with a live git repo was added; unit-level coverage of `consume_focus_objections` and `delete_focus_objections` gives equivalent contract coverage for now.
  - **What this suggests next:** `two-stream-commits-target-worktrees-first-context-record-last` is now unblocked — its scope is now cleanly separable from the phase-boundary mechanics landed here. Phase prompts will need a note about `CASCADE` log lines once the v1→v2 migrator ships; that is already tracked in `phase-prompt-updates-for-triage-first-cycle-shape`.
