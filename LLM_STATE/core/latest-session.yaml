  ### Session 142 (2026-05-04T02:37:08Z) — Add ravel-lite sync verb for cross-plan merging

  - **What was attempted:** Implement `ravel-lite sync <plan> --from <other-plan>` per the architecture-next.md spec. The verb merges each shared target's plan branch from `--from` into the destination plan's worktrees; targets unique to `--from` are auto-mounted first.
  - **What worked:** Full implementation shipped in `src/sync.rs` (~631 LoC, 13 unit tests). Wired through `src/lib.rs` (one `pub mod sync;`) and `src/main.rs` (after-help constant, `Sync` variant on `Commands`, dispatch arm). `cargo build` clean, `cargo test --lib` 1012/1012 pass, clippy clean. The "remove direct-mode target types" scope item was a no-op — the source had already shed that code.
  - **What this suggests trying next:** Findings inbox (`architecture-next.md` §"Findings inbox") is the next natural leaf — it and sync together complete the cross-plan visibility story, reducing unknowns before the keystone migrator. `--format json` for the sync report is also small scope (~50 LoC) when the other verbs' JSON envelopes are being standardised.
  - **Key learnings:** The shared-source-repo trick (both plans' worktrees share the same source repo's `.git`) means no special branch-lookup machinery is needed — `ravel-lite/<other-plan>/main` is visible from any worktree off the same source. Same-context guard is the right call: cross-context merges that "just happen to work" because the source repos resolve identically would be silent coupling that's hard to audit later.
