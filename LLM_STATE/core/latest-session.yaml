body: |
  ### Session 111 (2026-05-01T06:10:41Z) — Implement git worktree mount for targets

  - Implemented `ravel-lite targets mount <plan-dir> <repo>:<component>` end-to-end.
  - Created `src/state/targets/mount.rs` (~250 lines) with the `mount_target` function: resolves the repo slug against `repos.yaml`, detects the default branch starting point via `git symbolic-ref --short refs/remotes/origin/HEAD` (falls back to `HEAD` for fixture repos without a remote), creates the worktree via `git worktree add -b ravel-lite/<plan>/main`, reads component `path_segments` from `.atlas/components.yaml`, and persists a `Target` row to `targets.yaml`.
  - Idempotency: a second mount with the same `(repo, component)` pair returns the existing row unchanged; a second component in the same repo reuses the worktree without calling `git worktree add` again.
  - Wired the subcommand into `src/main.rs`: `TargetsCommands::Mount` dispatches to `mount_target`; extracted `parse_target_reference` helper to split the `<repo>:<component>` format with both-parts-non-empty validation.
  - Added `.gitignore` scaffolding to `src/create.rs`: `scaffold_plan_dir` now writes a `.gitignore` that excludes `.worktrees/` so worktree directories are never accidentally committed.
  - Tests cover: unknown repo slug, no `local_path`, two components sharing one worktree, idempotent remount, and the full happy path (worktree on correct branch + `targets.yaml` row persisted).
  - What this suggests next: `drain-target-requests-yaml-at-phase-boundaries` is now unblocked (it depends on this task); `wire-mounted-worktrees-into-claude-pi-add-dir` is also unblocked.
