body: |
  ### Session 133 (2026-05-03T11:50:21Z) — Extend CLI verb drift guard to all embedded prompts

  - Expanded `phase_prompts_reference_only_live_cli_verbs` in `tests/phase_prompts_cli_resolution.rs` to iterate `embedded_entries_with_prefix("")` instead of walking `defaults/phases/` from disk. The broader scan now covers `create-plan.md`, `survey.md`, `discover-stage2.md`, and all pi prompt files in addition to phase prompts.
  - The expansion immediately caught a parser false-positive in `defaults/create-plan.md` line 4: the phrase "ravel-lite v2 plan at" was parsed as a verb chain because all tokens are kebab-case. Fixed by rephrasing to "populate a new plan at `{{PLAN}}`" — semantically equivalent since the next sentence establishes the tool name explicitly.
  - Pi prompt files (`defaults/agents/pi/prompts/`, `defaults/agents/pi/subagents/`) contain zero `ravel-lite` invocations, so they pass trivially; the task brief's expectation that they would have content was wrong.
  - `cargo test --workspace`, `cargo test --test phase_prompts_cli_resolution`, and `./scripts/check.sh` (clippy) all passed clean.
  - The kebab-case parser remains fragile: any prose containing `ravel-lite <kebab> <kebab> <kebab>` will trigger a false-positive. One incident is not enough to design against; this is noted as a follow-up concern if more occurrences appear.
