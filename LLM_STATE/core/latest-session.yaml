body: |
  ### Session 91 (2026-04-29T02:55:06Z) â€” Migrate memory.yaml to TMS item shape

  - Migrated the `memory.yaml` schema from the legacy flat `{id, title, body}` format to TMS-shaped `Item<MemoryEntryKind>` from the knowledge-graph substrate. The new on-disk `MemoryEntry` wraps `Item<MemoryEntryKind>` with one extension: an optional `attribution` field for component promotion at plan finish.
  - Updated every layer that touches memory entries: `schema.rs` (new types), `verbs.rs` (all CRUD paths, plus a new `run_set_status` with validated transitions), `parse_md.rs` (markdown parser lifts `title`â†’`claim`, `body`â†’`Justification::Rationale`), `yaml_io.rs` (schema_version mismatch check on read), `migrate.rs` (field references), `dream.rs` and `phase_summary.rs` (word-count and drift-detection logic), `create.rs`, `main.rs`, and `survey/discover.rs`.
  - Extended the `memory add` CLI with `--authored-at`, `--authored-in`, and `--attribution` flags; added a new `set-status` subcommand routing through `MemoryStatus::transitions()`.
  - Migrated the live `LLM_STATE/core/memory.yaml` file to the new format (large on-disk churn: ~2200 lines changed).
  - All existing tests updated; new tests added for schema-version mismatch, `attribution` round-trip, and `MemoryFile` default invariants.
  - `schema_version` is now a required top-level field; `read_memory` rejects any file where it is missing or unexpected.
