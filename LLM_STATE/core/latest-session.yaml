body: |
  ### Session 129 (2026-05-02T14:08:31Z) — Two-stream commit routing in apply_commits_spec

  - Implemented per-entry target routing in `apply_commits_spec` (`src/git.rs`): each `CommitSpec` entry's optional `target: ComponentRef` now resolves to a mounted worktree via `targets.yaml`; entries without a target fall back to `project_dir` (v1 behaviour preserved).
  - Updated `apply_parsed_spec` signature to accept `plan_dir` alongside `project_dir`; routing cwd is selected per entry before `unstage_subtree`, `git add`, `diff --cached`, and `git commit` calls.
  - Updated the doc comment on `apply_commits_spec` to replace the old "ignores target" note with the two-stream contract and the failure-atomicity guarantee.
  - Added 4 new tests covering: single routed entry, mixed routed+unrouted entries preserving spec order, two distinct targets routing independently, and partial-failure bail leaving context unchanged.
  - All 19 pre-existing `git::tests` pass unchanged; `cargo test --workspace` green (974 lib + integration tests); clippy `-D warnings` clean.
  - The `target` field's wire shape was already supported in the YAML schema and reader, so v1 prompts (no `target:`) continue to work as before.
  - `phase-prompt-updates-for-triage-first-cycle-shape` is now unblocked (its dependency `two-stream-commits-target-worktrees-first-context-record-last` is done).
