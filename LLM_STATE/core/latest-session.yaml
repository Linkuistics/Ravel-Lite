body: |
  ### Session 93 (2026-04-29T05:00:15Z) — Triage architecture-next backlog and block show-verb task

  - **What was attempted:** Work session opened targeting the `add-ravel-lite-show-verb-for-embedded-fixed-memory-content` task, which would add a `ravel-lite show <path>` verb for reaching embedded fixed-memory content from phase prompts.

  - **What worked:** The task was fully investigated — `src/init.rs`, `src/main.rs`, `defaults/phases/work.md`, `defaults/phases/reflect.md`, `defaults/phases/dream.md`, and `src/prompt.rs` were all inspected. The blocking design constraint was surfaced and documented: `ravel-lite show` backed only by `init::require_embedded` cannot serve user-extensible `fixed-memory/` overlays, creating the same silent-failure bug the task was meant to fix. The task was blocked with a clear rationale and a concrete path forward (layered disk-first then embedded lookup, tied to the v2 init scaffolding task). Seventeen new architecture-next backlog entries were authored — covering intents.yaml, TMS wiring, phase-cycle redesign, KG inspection, graph-RAG catalog, sync/migrate/curate verbs, and worktree/target mechanics. The memory.yaml was significantly compacted (large line reduction, removing stale or superseded entries).

  - **What didn't work:** No source code was modified this session. The show-verb implementation was correctly deferred rather than forced through with an incomplete design.

  - **What this suggests trying next:** The show-verb task unblocks once the v2 context layout (`ravel-lite init` scaffolding) settles where user-owned `fixed-memory/` lives and what the lookup order is. The 17 new architecture-next tasks are ready for triage prioritisation next cycle.

  - **Key learnings:** The `init::require_embedded` / disk-overlay tension is structural — any verb that serves embedded content must decide its layering upfront or it re-introduces silent failures. The right model mirrors `compose_prompt` (plan-level override on top of embedded base).
