  ### Session 124 (2026-05-02T11:26:21Z) — Settle fixed-memory CLI design, add cli-tool-design guide

  - Attempted to design and plan the `ravel-lite fixed-memory list` / `fixed-memory show <slug>` verbs, unblocking the stalled task `add-ravel-lite-show-verb-for-embedded-fixed-memory-content`.
  - Settled the full CLI design: layered overlay semantics (embedded + user file at `<config-dir>/fixed-memory/<slug>.md`), bare-slug identifier shape, addendum delimiter for the both-sources case, `--format yaml|json|markdown` parity for `list`, and an error with available-slugs remediation for unknown slugs on `show`.
  - Wrote `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md` — the approved spec covering architecture, data flow, phase-prompt sweep targets (work.md lines 33–51, reflect.md lines 18/84, dream.md lines 9/22), allowlist entries, error handling, schema appendix, test plan, and out-of-scope items.
  - Wrote `defaults/fixed-memory/cli-tool-design.md` — a new fixed-memory entry providing LLM-agent CLI design guidance (structured output, help examples, actionable errors, flag vocabulary, exit codes, audit checklist, anti-patterns). This becomes a first-class embedded resource for the fixed-memory set and is the audit reference for the new CLI audit task.
  - Flipped `add-ravel-lite-show-verb-for-embedded-fixed-memory-content` from `blocked` to `done` with a superseded results block: the original thin-wrapper shape is replaced by the layered overlay design shipped in the spec.
  - Added two new backlog tasks: `implement-fixed-memory-cli-overlay-and-sweep-phase-prompts` (implementation of the spec, not_started, no deps) and `cli-audit-and-refactor-against-cli-tool-design-md` (broader CLI audit driven by the new guide, not_started, deliberately deferred until in-flight architecture-next work settles).
  - No source code was written this session; the deliverable is the design doc and guide, not the implementation.

  ## What this suggests next

  - Pick up `implement-fixed-memory-cli-overlay-and-sweep-phase-prompts` next work cycle; the spec is ready to implement against.
  - The cli-tool-design.md guide will be visible to the work LLM via `ravel-lite fixed-memory show cli-tool-design` once the implementation lands; in the meantime it is accessible as an embedded file.
