  ### Session 103 (2026-04-30T02:12:08Z) — Add install-hooks.sh and wire pre-push gate

  - Attempted: add a `scripts/install-hooks.sh` script to make it easy for developers to install the pre-push hook that runs `scripts/check.sh`.
  - What worked: `install-hooks.sh` was created with idempotent, safe semantics — detects an already-installed hook, refuses to overwrite a foreign hook to protect local customisations, embeds a marker comment so re-runs are no-ops. `README.md` gained a "Developing" section documenting the hook installation. `scripts/check.sh` had its manual `git hook` instructions updated to reference `install-hooks.sh`.
  - What didn't: nothing — the scope was narrow and completed cleanly.
  - What this suggests trying next: the pre-push hook infrastructure is in place; future work could expand `scripts/check.sh` to include `cargo test` or `cargo fmt --check` as the gating policy grows.
