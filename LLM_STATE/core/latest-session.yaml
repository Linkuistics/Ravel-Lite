body: |
  ### Session 54 (2026-04-25T07:25:36Z) — Wire per-phase baseline-SHA capture

  - **What was attempted:** Wire `reflect-baseline`, `dream-baseline`, and `triage-baseline` SHA files so downstream LLM phases can call `state phase-summary render --baseline $(cat <phase>-baseline)` instead of re-transcribing edits. The `work-baseline` path was already wired; this session extended the pattern to the three remaining phases.
  - **What worked:** Full implementation delivered. `git_save_work_baseline` generalised to `git_save_baseline(plan_dir, filename)` in `src/git.rs`. Three new follow-on save-baseline commits wired in `src/phase_loop.rs::handle_script_phase`: `GitCommitWork` → `reflect-baseline`, `GitCommitReflect` → `dream-baseline` or `triage-baseline` (branched on `should_dream`), `GitCommitDream` → `triage-baseline`. `GitCommitTriage` continues to write `work-baseline` via the same generalised helper. A naming collision was discovered and resolved: the legacy `dream-baseline` file held the dream-trigger word count, which conflicts with the new SHA-file convention. It was renamed to `dream-word-count` across `src/dream.rs`, `src/create.rs`, `src/state/phase.rs`, `tests/dream.rs`, and `defaults/create-plan.md`. A one-shot migration was added to `seed_dream_word_count_if_missing`: if `dream-word-count` is missing and `dream-baseline` parses as a usize, copy the value and delete the legacy file. Three new tests added (585 total, was 582): `seed_migrates_legacy_dream_baseline_to_dream_word_count`, `seed_does_not_migrate_sha_shaped_dream_baseline` in `src/dream.rs`, and `set_phase_migrates_legacy_dream_baseline_word_count_file` in `src/state/phase.rs`. Migration confirmed end-to-end against `LLM_STATE/core`: legacy `dream-baseline` (5357) was moved to `dream-word-count`.
  - **What this suggests next:** `update-triage-reflect-dream-prompts-to-invoke-state-phase-summary-render` is now fully unblocked. Each phase prompt's `## Output format` block can be replaced with a single `ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline)` directive.
  - **Key learnings:** The task description's baseline-assignment mapping was inverted by one cycle hop — the implementation used the correct renderer mapping (each `<phase>-baseline` holds the SHA from when `<phase>` started, written by the preceding `git-commit-` step). The in-line `if skip_dream` branching for `next_baseline` in `GitCommitReflect` was kept in-line rather than extracted to a helper because the `write_phase` side-effect locality would be lost; revisit when a third caller appears.
