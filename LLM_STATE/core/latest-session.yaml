body: |
  ### Session 46 (2026-04-24T10:10:37Z) — Ship backlog lint-dependencies CLI verb

  - Implemented `ravel-lite state backlog lint-dependencies <PLAN_DIR>` as a new read-only CLI verb that reports drift between prose task-id mentions in task descriptions and the structured `dependencies:` field.
  - New module `src/state/backlog/lint_dependencies.rs` with pure `lint_dependencies(&BacklogFile) -> LintReport` function and `run_lint_dependencies` CLI runner. Byte-scan whole-word matching for task id slugs (`[a-zA-Z0-9_-]` chars; any other byte is a boundary).
  - Public types `TaskDrift` and `LintReport` are serde-derived for YAML/JSON output matching the audit brief spec.
  - Clap wiring added to `src/main.rs`: `BacklogCommands::LintDependencies { plan_dir, format }` with `--format` defaulting to yaml.
  - Module exports threaded through `src/state/backlog/mod.rs`.
  - Updated `defaults/phases/triage.md`: added a **Preflight** directive at the top of "Local triage" instructing the LLM to run the linter; removed the old "Keep the `dependencies` field in sync with the prose" paragraph that instructed the LLM to rescan prose manually. The linter output is advisory, not authoritative — triage still uses `set-dependencies` to reconcile.
  - 11 unit tests shipped, all passing, covering matching/non-matching prose, structured-is-authoritative invariant, empty backlog, and malformed id edge cases.
  - Task `add-backlog-lint-dependencies-cli-verb` completed and marked `done` with full results block.
