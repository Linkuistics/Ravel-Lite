body: |
  ### Session 110 (2026-05-01T05:16:40Z) — Add targets.yaml data layer and CRUD verbs

  - Implemented the `targets.yaml` runtime-state module as the data layer for architecture-next's per-repo plan branches and dynamic worktree mounts.
  - New `src/state/targets/` module (4-file pattern: `schema.rs`, `yaml_io.rs`, `verbs.rs`, `mod.rs`) matching the established pattern from `intents`, `backlog`, and `memory`. `Target` schema captures `repo_slug`, `component_id`, `working_root`, `branch`, and `path_segments`. `TargetsFile` wraps with `schema_version = 1`.
  - `yaml_io.rs` uses the "missing = empty" policy (same as `findings`) rather than "missing = error" (like `intents`) because `targets.yaml` is born at first worktree mount, not at plan creation.
  - `verbs.rs` implements `run_list`, `run_show`, `run_add`, `run_remove`; identity is the `(repo_slug, component_id)` pair addressed via `<repo>:<component>` notation. `run_add` rejects duplicates and empty required fields; `run_remove` errors on absent targets.
  - CLI wired in `src/main.rs`: `StateCommands::Targets` + `TargetsCommands` enum + `dispatch_targets` + `parse_targets_format`. `TARGETS_FILENAME` constant added to `src/state/filenames.rs`.
  - 21 new tests covering schema round-trip, yaml_io missing-file policy, atomic rename, reference parsing, and all verb error paths. 808 total tests pass; clippy clean.
  - Task marked blocked (not done): the data layer landed; worktree mounting (`git worktree add`, branch creation, default-branch detection) and `target-requests.yaml` consumption remain open and should be split into focused follow-up tasks in the next triage.
  - No accidental edits found; all changed files are intentional.
