body: |
  ### Session 120 (2026-05-02T08:33:42Z) — Reorder phase cycle to triage-first, eliminate in-cycle dream

  - Implemented the `phase-cycle-reorder-to-triage-first-eliminate-in-cycle-dream` task end-to-end: new cycle order is `triage → work → analyse-work → reflect`, closed by `git-commit-reflect` instead of `git-commit-triage`.
  - Removed the in-cycle dream phase entirely: `LlmPhase::Dream` and `ScriptPhase::GitCommitDream` deleted from `src/types.rs`; all dream-gating logic (`should_dream`, `seed_dream_word_count_if_missing`, `update_dream_word_count`, `headroom`) removed from `src/phase_loop.rs`.
  - Added `ScriptPhase::GitCommitAnalyseWork` (sits between analyse-work and reflect; applies `commits.yaml` for the source-tree changes work made, then writes `reflect-baseline`). Repositioned `GitCommitWork` to sit between work and analyse-work (commits in-flight plan-state from the work agent, writes `analyse-work-baseline`).
  - Repositioned `GitCommitTriage` to open the cycle: commits triage's plan-state mutations, writes `work-baseline`, advances to Work. `GitCommitReflect` now closes the cycle: writes `triage-baseline`, advances to Triage.
  - `SharedConfig` parameter removed from `phase_loop` and `run_single_plan` (the `headroom` field was the only consumer in that path; dream gate is gone).
  - `src/create.rs`: new plans now scaffold with `phase.md = "triage"` (was `"work"`).
  - `src/state/phase.rs`: `VALID_PHASES` updated to new cycle order; old `dream`/`git-commit-dream` removed, new `git-commit-analyse-work` added.
  - Tests updated throughout: `SharedConfig` removed from all test setups; `ContractMockAgent` writes `git-commit-analyse-work` after analyse-work; two-cycle contract tests (`phase_contract_round_trip_writes_expected_files`, `handoff_marker_in_analyse_work_is_promoted_by_triage`, `handoff_marker_in_analyse_work_is_archived_by_triage`) now invoke `phase_loop` twice; `tests/dream.rs` dropped the `git_commit_reflect_seeds_dream_word_count_when_missing` test (no longer applicable).
  - What worked: the restructure was clean — removing `headroom` as a parameter eliminated a source of implicit coupling; moving the cycle boundary to `git-commit-reflect` makes the "end of cycle" semantically clearer. Tests pass.
  - What this suggests next: the phase-boundary-mechanics task (draining `target-requests.yaml` and `focus-objections.yaml` at triage entry, defeat cascade, etc.) is now the structural follow-on.
