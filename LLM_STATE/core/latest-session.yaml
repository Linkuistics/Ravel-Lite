body: |
  ### Session 69 (2026-04-27T09:48:00Z) — Fix path normalisation, remove redundant --add-dir, add v1→v2 config migration

  - **Attempted:** Three tasks from the backlog: (1) fix double-slash paths from trailing-slash config dirs, (2) remove redundant `--add-dir <plan_dir>` from interactive work-phase spawn, (3) implement v1→v2 migration that rewrites legacy materialised YAML defaults to the Lua surface and prunes dead files/dirs.
  - **What worked:**
    - Path normalisation fix landed in `src/config.rs::select_config_dir` — `candidate.components().collect::<PathBuf>()` strips trailing separators at the single normalisation point before any path reaches the rest of the system. Regression test added (`trailing_slash_in_candidate_is_normalised_away`). All 614 existing tests passed.
    - `--add-dir <plan_dir>` removed from `invoke_interactive` in `src/agent/claude_code.rs`. The plan dir is always a descendant of the cwd claude launches in; the flag added no permission and on a fresh machine could trigger an unseen trust-grant modal that hangs the work phase after the banner. Inline comment records the reasoning to prevent reflex re-addition.
    - `src/migrate_v1_to_v2.rs` (new file, ~600 lines including tests) implements the migration: detects legacy layout by intersecting embedded-defaults paths with what's actually on disk, translates merged `config.yaml` + `config.local.yaml` + per-agent `config.yaml` / `tokens.yaml` into a `config.lua` with version marker, then deletes the legacy files and prunes newly-empty dirs. Crash recovery is safe: writes happen before deletes, so a crash between the two leaves legacy files on disk and the next call completes cleanup. Seven unit tests covering: empty dir no-op, already-v2 no-op, full v1 translation + deletion + dir prune, idempotency, crash recovery, existing-lua marker append, user-owned file blocks dir prune, deep-merge logic, `lua_quote` escaping.
    - Migration wired into `src/config_lua.rs::resolve` as the first-touch call before any config layer is read. Module exported from `src/lib.rs`.
  - **What this suggests next:**
    - The colleague's hang diagnosis is the next priority: the `--add-dir` removal is the leading hypothesis; the new `--debug` PTY capture task (`capture-full-claude-stdio-under-a-pty-in-debug-log-for-tui-hang-diagnosis`) is the durable fallback for offline diagnosis.
    - The reference doc task (`reference-config-and-prompts-docs`) can now be authored against observed reality — migration behaviour, Lua API, and two-layer config model are all settled.
    - Other path-as-string surfaces (`plan_dir`, `project_dir`) are derived from filesystem walks rather than user-set env vars so trailing slashes are unlikely, but a one-line sweep is cheap insurance.
