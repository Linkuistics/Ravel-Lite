  ### Session 147 (2026-05-04T10:04:28Z) — Pagination flags for list verbs and findings-inbox reference docs

  - **What was attempted:** Two independent tasks: (1) add `--limit N` and `--all` pagination flags to the four unbounded list verbs (`state memory list`, `state backlog list`, `state intents list`, `findings list`); (2) replace all `subagent-dispatch.yaml` references with `findings.yaml` / findings-inbox documentation across the seven AsciiDoc reference and tutorial source files.
  - **What worked:** Both tasks completed fully. The pagination task produced a new shared module `src/cli/list_limits.rs` with `ListLimits`, `ListEnvelope<T>`, and `apply()` / `truncation_summary_line()` helpers; 17 unit tests and 6 integration tests (in `tests/state_memory.rs` and `tests/state_backlog.rs`) all pass TDD-style. The docs task rewrote the `subagent-dispatch.yaml` section in `cross-plan-files.adoc` to document the actual `FindingsFile` / `FindingEntry` schema, updated the phase-cycle, concepts, state-files, index, and tutorial source files, and regenerated all HTML fragments under `website/`.
  - **What this suggests next:** `atlas list-components`, `atlas list-repos`, `atlas summary`, and `repo list` still emit unbounded output — they use distinct output shapes and need per-verb default decisions before pagination can be wired the same way. `state session-log list` already has a `--keep N` flag with different semantics; adding `--all` and the envelope there requires a per-verb decision. The docs still carry prose drift around the `dream` phase (described as in-cycle; memory says it is now out-of-cycle with `curate` as the cross-context replacement) — that is a separate follow-on. The `related-components.yaml` section in `cross-plan-files.adoc` still mentions `state projects add` and `<config-dir>/projects.yaml`; the sibling task `update-tutorial-and-reference-docs-for-repos-yaml-cutover` owns that.
  - **Key learnings:** The `ListEnvelope<T>` backward-compat design — using `#[serde(skip_serializing_if = "Option::is_none")]` on the three truncation fields — means untruncated output serialises identically to the existing `*File` shape, so no consumer needs to be updated for the common case. The `state backlog list --format markdown` case deliberately ignores the pagination flags (the full grouped table is always human-consumption), pinned by an integration test.
