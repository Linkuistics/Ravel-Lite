  ### Session 86 (2026-04-28T13:03:58Z) — Block show-verb task on extensibility design constraint

  - Attempted to implement `ravel-lite show <embedded-path>` that would print embedded fixed-memory content via `init::require_embedded`.
  - During work-phase planning, a design constraint surfaced: `fixed-memory/` must remain user-extensible (users can add `coding-style-<lang>.md` for languages not in the shipped set). A thin wrapper over `require_embedded` serves only the compile-time embed set, which would re-introduce the silent-failure bug for user-added files.
  - No code was written. Task was moved to `blocked` with a detailed results block explaining the layered disk-overlay approach needed before implementation.
  - The layered approach (disk lookup first, embedded fallback, deterministic error) mirrors the existing `compose_prompt` layering for phase prompts.
  - The decision to defer was also driven by interaction with the `ravel-lite init v2` task: the new `<context>/` layout would determine where user-owned `fixed-memory/` lives, and deciding that directory now would either pre-empt v2 or be re-litigated under it.
  - What this suggests next: settle `fixed-memory/` extensibility model as part of the v2 init scaffolding task, specifying lookup order, then unblock this task.
