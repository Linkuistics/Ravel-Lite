  ### Session 117 (2026-05-01T12:51:13Z) — Move commits.yaml schema to state module with optional ComponentRef target

  - Implemented `src/state/commits/` module with the established `schema.rs` / `yaml_io.rs` / `verbs.rs` split, adding an optional typed `target: ComponentRef` field to `CommitSpec`. Moved inline struct definitions out of `src/git.rs` into the new module. Wired read-only `list` and `show` CLI verbs in `src/main.rs`.
  - All 1048 workspace tests passed after the refactor; 20 new unit tests cover round-tripping, v1 wire-shape parsing, permissive schema_version handling, atomic write, idempotent delete, and CLI bounds checking.
  - The `target` field is reserved for the two-stream-commits routing layer — `apply_commits_spec` currently ignores it. The `phase-boundary-mechanics-...` task is now unblocked on its `commits-yaml-v2` dependency. The `phase-cycle-reorder-to-triage-first-eliminate-in-cycle-dream` task (no-deps) is the other unblocked frontier item.
  - Key pattern confirmed: `ComponentRef` already implements `Serialize`/`Deserialize` against its stringified form, so `Option<ComponentRef>` slots into the wire shape with no runtime `validate_*` helper — the typed-API memory principle validated in practice.
