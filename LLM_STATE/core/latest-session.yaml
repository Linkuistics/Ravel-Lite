  ### Session 84 (2026-04-28T12:28:27Z) — Scaffold knowledge-graph crate with TMS+KG substrate

  - **What was attempted:** Scaffold the `knowledge-graph` workspace crate at `crates/knowledge-graph/` per the `knowledge-graph-crate-scaffold-tms-kg-substrate` task. Root `Cargo.toml` converted into a workspace (retaining `ravel-lite` at the root).
  - **What worked:** Full scaffold shipped in one cycle. All five substrate modules completed: `item` (generic `Item` with YAML serde and `DefeatedBy` serialisation), `justification` (six-kind enum with externally-tagged serde), `store` (`Store` over `IndexMap` with `defeat`/`supersede` cascade APIs and YAML round-trip), `algorithms` (`GraphView` + `shortest_path`, `bfs_subgraph`, `scc`, `topo_sort`, `articulation_points`), and `datalog` (two smoke rules via `ascent!` macro: `orphaned` and `suspect`). 23 inline tests added; full workspace test run green (621 existing + 23 new). No collateral damage to existing build targets, binaries, or tests.
  - **What didn't / open scope:** `blocked_by` cascade deferred (it's kind-specific extension data, not a justification edge — threading it through would re-couple the substrate to ravel-lite plan vocabulary). Per-kind status-transition validation deferred (pending concrete kind registrations from the wiring task). `ascent` pinned at 0.6 (0.8 current); upgrade is a clean follow-on. No runtime rule-registry yet — each consumer will have its own `ascent!` program.
  - **What this suggests trying next:** `knowledge-graph: wire plan KG kinds (intent, backlog, memory, finding)` — domain wrappers over the generic `Item`, plus the deferred `blocked_by` cascade and per-kind status validation.
  - **Key learnings:** `ascent` 0.6's macro-generated struct-with-Vec-fields API is clean for two-rule smoke programs. Articulation-points required a hand-rolled low-link DFS (~50 lines) because `petgraph` 0.6 doesn't expose one on its stable surface; keep this in mind when picking algorithm dependencies at crate-scaffold time.
