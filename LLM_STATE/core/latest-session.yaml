  ### Session 25 (2026-04-23T06:23:28Z) — Component ontology v2 design document

  - **What was attempted:** Research and design of a richer inter-component relationship ontology to replace the two-edge (`sibling`/`parent-of`) model in the `discover` pipeline. Deliverable was a written design doc only — no implementation.
  - **What worked:** Delivered `docs/component-ontology.md` as a reference-grade canonical spec (868 lines). Reframed "related projects" as "related components" (unit-agnostic: projects, crates, services, subsystems, specs). Anchored the vocabulary in SPDX 3.0.1's `RelationshipType × LifecycleScopeType` factoring. Eliminated the v1→v2 migrator entirely by recognising that `related-projects.yaml` is a generated artifact (delete-and-regenerate is the upgrade path). Staged implementation as four linear backlog tasks with explicit dependency chains.
  - **What to try next:** Pick up `implement-ontology-v2-types-and-defaults-ontology-yaml-additive` (additive, no renames, pure foundation work). Before starting, user should review the §6 kind list against concrete portfolio examples to prune kinds without real evidence.
  - **Key learnings:** SPDX 3.0.1 was a strong anchor — validated the kind × lifecycle factoring and provided alignment vocabulary. Generated artifacts don't need migrators. Three orthogonal axes (kind × lifecycle × direction) give sufficient expressiveness without requiring hyperedges or numeric confidence.

