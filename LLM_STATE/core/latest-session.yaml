  ### Session 128 (2026-05-02T13:41:26Z) — Add resolve_target_worktree to complete phase-boundary-mechanics task

  - **What was attempted:** Implement the phase-boundary mechanics for the `phase-boundary-mechanics-worktree-mount-drain-at-triage-work` task — specifically the `resolve_target_worktree` function that translates a `ComponentRef` into an on-disk worktree path using `targets.yaml`.
  - **What worked:** The mount/drain layer was already fully in place (`mount_target`, `drain_target_requests`, phase_loop wiring). The only gap was the resolver. Added `resolve_target_worktree(plan_dir: &Path, target: &ComponentRef) -> Result<PathBuf>` in `src/state/targets/yaml_io.rs`, exported from `state::targets`. The function reads `targets.yaml`, matches on `(repo_slug, component_id)`, and returns `plan_dir.join(working_root)`. Error message names the missing ref and points at `target-requests.yaml` for remediation. Four unit tests cover the happy path, missing component, absent file, and shared-worktree discrimination. All 1097 workspace tests pass.
  - **What didn't work / surprises:** The `triage→work` wording in the task description is slightly misleading — drain runs at every phase boundary (loop-top in `phase_loop::phase_loop`), not only at the triage→work transition. That's correct per architecture-next §Phase boundaries; no relocation was needed.
  - **What this suggests next:** `two-stream-commits-target-worktrees-first-context-record-last` is now unblocked. Its `apply_commits_spec` rewrite calls `resolve_target_worktree(plan_dir, &commit.target)` to chdir before staging each commit group.
  - **Key learnings:** `cargo test --workspace --quiet` truncates to ~4 binary summaries and hides the full tally; use `cargo test --workspace` (without `--quiet`) for authoritative pass/fail counts.
