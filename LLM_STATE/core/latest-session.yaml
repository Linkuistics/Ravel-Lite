  ### Session 121 (2026-05-02T09:07:16Z) — Document and test restart-not-resume contract for scratch-file read paths

  - Audited all four scratch-file read paths (`commits.yaml`, `target-requests.yaml`, `focus-objections.yaml`, `this-cycle-focus.yaml`) against the architecture-next §Recovery from interrupted cycles contract.
  - All four read functions already had the correct behavior: absent file → safe empty default, malformed file → loud error with filename citation. No production code changes were needed.
  - Added "Restart-not-resume contract" doc comment paragraphs to all four `read_*` functions explaining the absent vs. malformed semantics, the no-panic guarantee, and the rationale for each file's choice (silent fallback at caller for `commits.yaml`; loud error for the other three to preserve LLM-authored data).
  - Added `read_bails_on_malformed_yaml` unit tests to `target_requests/yaml_io.rs`, `focus_objections/yaml_io.rs`, and `this_cycle_focus/yaml_io.rs`. (`commits/yaml_io.rs` already had this test.) Each test writes garbage YAML, calls `read_*`, and asserts the error message cites the filename.
  - Verification: `cargo test --workspace` passes 933 tests; `./scripts/check.sh` is clippy-clean. All four `read_bails_on_malformed_yaml` tests pass.
  - What this suggests next: when `phase-boundary-mechanics` wires `read_focus_objections` and `read_this_cycle_focus` into the triage entry path, the contract documented here is the prescription for those callers. A phase_loop-level integration test asserting "cycle restarts at triage with empty scratch files" becomes meaningful at that point.
