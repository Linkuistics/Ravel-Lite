  ### Session 56 (2026-04-25T09:39:58Z) — Drop id column from backlog render; restore intent labels in headless-phase prompts

  - Attempted two tasks in the same work phase: dropping the id column from the markdown backlog renderer, and restoring intent-label richness in the headless-phase prompt templates.
  - Both tasks completed successfully. The original `fix-triage-step-3-wording` task was subsumed by the larger intent-label task and closed with a results block.
  - No regressions; all 585 lib tests and integration groups passed.
  - The `id` column removal resolved inconsistent TUI rendering (the docs section was falling back to a per-row list layout because id strings bloated table width past the consumer's threshold). Remaining width pressure is in the `deps` cell for tasks with many long dep ids — a follow-up task could ellipsis-trim dep ids in display.
  - The intent-label fix revealed that the upstream regression (ce240f9) was purely at the prompt layer: `format_result_text` in `src/format.rs` already understood every intent label; the prompts had simply stopped asking the LLM to emit them. The fix adds a two-part Output format contract to triage, reflect, and dream: narrative preamble (with intent labels) + verbatim renderer output.

  Key learnings:
  - The id-column removal required changing unit test assertions from id-bracketed patterns (`| n |`, `| root |`) to title-bracketed ones (`| N |`, `| Root |`) — the test data used single-letter titles that matched the ids, so no fixture data changed.
  - The dream prompt's `[OVERLAPPING]`/`[VERBOSE]`/`[AWKWARD]` labels use a two-line continuation form (`→`) that the renderer's `CONTINUATION_RE` already handles; "any leading whitespace" before `→` is accepted, so the prompt was simplified.
