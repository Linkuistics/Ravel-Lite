body: |
  ### Session 135 (2026-05-03T13:22:35Z) — Tag bail/anyhow call sites with typed ErrorCode; add examples to every leaf verb help

  - Introduced `src/cli/error_context.rs`: `CodedError` struct, `error_code_of()` recovery function, `ResultExt::with_code()` extension trait, and `bail_with!` macro. Together these tag anyhow errors with a typed `ErrorCode` so exit category and JSON envelope `code` field propagate from every classified call site instead of falling through to `ErrorCode::Internal`.
  - Updated `src/main.rs` `run()` to replace the hardcoded `ErrorCode::Internal` fallback with `error_code_of(&err)` — typed codes now flow end-to-end from call site to exit code and JSON envelope.
  - Tagged all stringly-typed `bail!`/`anyhow!` call sites in `dispatch()`, `dispatch_fixed_memory()`, `dispatch_phase_summary()`, `dispatch_backlog()`, `parse_target_reference()`, `resolve_body()`, `run_phase_loop()`, and the multi-plan survey path with appropriate `ErrorCode` values (`InvalidInput`, `NotFound`, `IoError`).
  - Added `after_help` example blocks (≈640 lines of constants in `src/main.rs`) covering every leaf verb across init, run, survey, capabilities, repo, fixed-memory, atlas, state/backlog, state/memory, state/intents, state/targets, state/target-requests, state/commits, state/this-cycle-focus, state/focus-objections, findings, plan, state/session-log, related-components, and discover-proposals families. Examples use `LLM_STATE/core` as the canonical plan-dir placeholder throughout.
  - Added 4 integration tests in `tests/cli.rs`: exit-code checks for `InvalidInput` and `NotFound` error paths, example-block presence check across 14 representative leaf verbs, and a JSON envelope test asserting the typed `code` field round-trips.
  - Decided against implementing the `llm-instructions` verb (task: `cli-evaluate-and-decide-on-llm-instructions-verb-ship-or-wontfix`) — the audit determined no implementation was warranted.
  - All four tasks flipped to `done`; three follow-on tasks added: `--limit`/`--all` flags for list verbs, visible alias annotations, and a sweep of inner-verb error sites (state/atlas/repos/discover).
