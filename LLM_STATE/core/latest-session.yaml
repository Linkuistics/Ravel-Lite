  - **What to try next:** The reference pages listed in the new backlog tasks (`reference-concepts-page-*`, `reference-phase-cycle-page-*`, etc.) are the natural continuation. Each page has a corresponding stub file already in place.
  - **Key learnings:** The pre-existing `latest-session.md` highlight rule in `src/format.rs` does not match the actual file produced by Ravel-Lite (`latest-session.yaml`), so the "Writing session log" label has never fired. Added a fix task to the backlog.
