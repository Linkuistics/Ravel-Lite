- id: fix-latest-session-yaml-highlight-rule-extension-in-format-rs
  title: Fix latest-session.yaml highlight rule extension in format.rs
  category: core
  status: not_started
  dependencies: []
  description: |
    Fix the `latest-session.md` highlight rule in `src/format.rs` — the pattern `latest-session\.md$` has never matched because Ravel-Lite writes `latest-session.yaml`. Change to `latest-session\.yaml$` so the "Writing session log" TUI label actually fires during analyse-work.

    ## Problem

    `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` contains:

    ```rust
    HighlightRule { pattern: Regex::new(r"latest-session\.md$").unwrap(), label: "Writing session log" },
    ```

    But `ravel-lite state session-log set-latest` writes to `LLM_STATE/core/latest-session.yaml` (confirmed by `ls LLM_STATE/core/latest-session*`). The `.md` extension was written when the file was `.md`; a later rename to `.yaml` wasn't reflected here.

    ## Fix

    ```rust
    HighlightRule { pattern: Regex::new(r"latest-session\.yaml$").unwrap(), label: "Writing session log" },
    ```

    One-line change in `src/format.rs`.

    ## Verification

    - `cargo test --quiet` passes.
    - Manual analyse-work run shows "Writing session log" label.
