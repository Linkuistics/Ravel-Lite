tasks:
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
- id: run-chapter-04-05-capture-against-live-vm-and-fold-output-into-tutorial-prose
  title: Run chapter 04-05 capture against live VM and fold output into tutorial prose
  category: docs
  status: not_started
  dependencies: []
  description: |
    Run `scripts/capture/ravel-lite-tutorial.sh` against a live TestAnyware VM to capture chapter 04-05 screenshots and transcripts, then fold the captured output into the tutorial prose.

    ## Why

    The script side (scenario_run, --from/--vm-id/--keep-vm flags) is implemented and committed. Chapters 04 and 05 still contain illustrative placeholders. This task completes the second half: live run + prose fold.

    ## Prerequisite

    `scripts/capture/ravel-lite-tutorial.sh` script changes must be installed on the TestAnyware machine (i.e., the capture binary must reflect the current HEAD). A fresh TestAnyware VM is required.

    ## Steps

    1. Run the full capture top-to-bottom with `--keep-vm` to complete chapters 01-03 and land the work baseline:
       ```
       scripts/capture/ravel-lite-tutorial.sh --keep-vm
       ```
       Note the printed VM ID for the next step.

    2. Iterate chapter 04-05 captures cheaply:
       ```
       scripts/capture/ravel-lite-tutorial.sh --vm-id <id> --from chapter04
       ```
       Inspect `docs/captures/ravel-lite-tutorial/screens/04-*.png` and transcripts in `transcripts/04-*.txt` and `transcripts/05-*.txt`.

    3. Tune `scripts/capture/responses/04-task-choice.txt` if the seeded backlog task name differs from "the distributed-systems entries". Re-run with `--from chapter04` to iterate.

    4. Replace illustrative `[source,text]` blocks in `docs/tutorial/04-the-first-cycle.adoc` and `05-further-cycles.adoc` with verbatim transcripts from:
       - `04-git-log-post-cycle.txt`
       - `04-session-log-latest.txt`
       - `05-memory-after-reflect.txt`
       - `05-backlog-after-triage.txt`

    5. Decide whether to embed selected TUI banner screenshots inline (chapter 03 doesn't embed images; TUI banners may be worth showing visually).

    6. Re-render with `scripts/render-docs.sh` and spot-check HTML.

    ## Done when

    Chapters 04 and 05 use verbatim captured screenshots/transcripts and the rendered HTML passes a visual spot-check.
