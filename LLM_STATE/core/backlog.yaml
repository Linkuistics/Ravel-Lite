  dependencies: []
  description: |
    Write the phase cycle reference page: every phase in the work â†’ analyse-work â†’ git-commit-work â†’ reflect â†’ git-commit-reflect â†’ [dream?] â†’ dream â†’ git-commit-dream â†’ triage â†’ git-commit-triage cycle, with each phase's input/output contract, the dream-trigger condition, the triage subagent dispatch mechanism, and the per-phase git-commit audit trail.

    ## Scope

    - File: `docs/reference/phase-cycle.adoc`
    - Per phase, document: what files it reads, what files it writes, what decisions it makes, when it transitions, and how it's invoked (interactive vs headless).
    - **Dream trigger**: word-count threshold (baseline + headroom), where the baseline is captured (`save-work-baseline` etc.), what happens on trigger.
    - **Triage dispatch**: how cross-plan propagation works (peer-project relationships from `related-components.yaml`, subagent dispatch via `subagent-dispatch.yaml`).
    - **Git-commit-* phases**: per-phase audit trail commits, what each commit captures, the `commits.yaml` mechanism that drives them.
