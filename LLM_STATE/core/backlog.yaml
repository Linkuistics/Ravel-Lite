- id: migration-m5-consume-atlas-via-atlas-index
  title: 'Migration M5: consume Atlas via atlas-index'
  category: migration
  status: not_started
  dependencies:
  - migration-m2-switch-to-atlas-contracts-component-ontology-crate
  description: |
    **Priority: MEDIUM.** Completes the migration; single `related-components.yaml` in the ecosystem. Gates Atlas v1 success criterion 5.

    **Design reference:** §9.4 M5 (in Atlas's design doc).

    ## Scope

    ### Depend on atlas-index

    - Add `atlas-index = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }` to Cargo.toml. Pin the same rev used for `component-ontology` in M2 (both crates live in the same workspace). Use a local path dep during dev, matching the convention noted in M2.

    ### Refactor projects.rs

    - `ProjectsCatalog` becomes a thin wrapper over Atlas's `ComponentsFile`.
    - `find_by_name(name)` searches `atlas_index::ComponentsFile.components` by `id`.
    - Only *internal* components are valid plan targets — external components (from `external-components.yaml`) are rejected with a helpful error per the earlier decision.
    - Existing callers' API preserved as much as possible; public signatures remain backward-compatible where practical (change the import paths but keep the verbs).

    ### Stage 1/2 prompt copies — resolution of the open question

    Three options for where Ravel-Lite reads Atlas's prompts from once they live in the private Atlas repo:

    1. **Add prompts to `atlas-contracts`** — simplest for Ravel-Lite; exposes Atlas prompt IP publicly.
    2. **Ravel-Lite keeps its own prompt copies** — Ravel-Lite stays prompt-independent. Reintroduces drift risk.
    3. **Env-var / path-based lookup** — no prompts of its own; requires a sibling Atlas checkout via `ATLAS_PROMPTS_DIR` or similar.

    Decide during this task. **Default recommendation: option 2.** Rationale: prompts are the heart of Atlas's IP; publishing them via `atlas-contracts` contradicts the "public data-formats, private computational parts" split that motivated the extraction. Ravel-Lite's Stage-1/2 prompts are lighter than Atlas's discover-* prompts and can diverge intentionally.

    If option 2 is picked, this section collapses to "leave `defaults/discover-stage1.md` and `defaults/discover-stage2.md` alone" and the exit criterion below changes accordingly.

    ### CLI surface

    - `ravel-lite state related-components ...` remains as a thin pass-through — the CLI is kept but internally routes through `atlas-index` verbs.
    - `ravel-lite state projects ...` similarly — the verbs still exist but operate on Atlas-produced `components.yaml` via `atlas-index`.
    - Existing tests for these CLI surfaces continue to pass.

    ### Tests

    - End-to-end test: run a discover loop on Ravel-Lite itself using Atlas-produced YAMLs as the project catalog. Verify Stage 1/Stage 2 outputs are identical (modulo the project→component rename) to pre-migration outputs.
    - Compatibility: a user who already has a `projects.yaml` at the old path receives a clear migration error directing them to run Atlas.

    ## Out of scope

    - Atlas-side changes.
    - Performance optimisation.

    ## Exit criteria

    - A single `related-components.yaml` exists in the ecosystem — Ravel-Lite no longer writes its own.
    - Test suite passes end to end.
    - `ravel-lite run` on any plan directory can discover and use components produced by Atlas without any hand-authored `projects.yaml`.
    - The Stage-1/2 prompt question is answered and the chosen option's sub-steps are applied.

    ## Provenance

    Moved from Atlas's backlog (id `ravel-lite-migration-m5-consume-atlas-via-atlas-index`) on 2026-04-28. Atlas's `verify-atlas-v1-success-criteria-end-to-end` task previously listed this as a structural dependency; that dep is now tracked as prose because cross-plan dep ids aren't supported.
  results: |
    ## Outcome: blocked, replaced by a fresh task

    Not started; the brief is incompatible with `docs/architecture-next.md`,
    which is the canonical design doc for the next architecture (memory:
    "Architecture redesign in docs/architecture-next.md"). Mechanical
    execution of M5 as written would lock in a shape we'd have to undo
    during the architecture-next migration.

    ## The conflict

    | Concern | M5 brief | architecture-next.md |
    |---|---|---|
    | Top-level user index | `<config>/components.yaml` (single Atlas-produced file) | `<context>/repos.yaml` + per-repo `<repo>/.atlas/components.yaml` (catalog computed as union; no aggregate) — §"What this replaces" line 917 |
    | What replaces `projects.yaml` | Wrap by `atlas-index::ComponentsFile` | Replace by a new `repos.yaml` schema (human-curated repo registry) |
    | Concept of a "project" | Per-monorepo component | Per-repo registry entry (component-as-unit-of-work, repo-as-physical-shell) |
    | `ProjectEntry::path` | `path_segments` (multiple, repo-relative, requires picking a root) | `local_path` on the repo entry (single absolute path; same shape as today) |
    | `state projects add/remove/rename` CLI | "Thin pass-through" through atlas-index — but atlas-index has no `add` (components are discovered, not authored) | Replaced by `state repos add/remove/list` (already implemented in `src/repos.rs`; init seeds an empty `repos.yaml`) |
    | Stage 1/2 prompts | Brief defers the question; default recommendation: keep our copies | Whole discover loop is replaced by graph-RAG via `ravel-lite atlas <q>` (§"What this replaces" line 923) — prompts on a deletion track, not a "keep" track |

    ## What's already on the ground

    - `src/repos.rs` (325 lines) is fully implemented: `ReposRegistry`,
      `RepoEntry { url, local_path }`, schema_version 1, `try_add` /
      `save_atomic` / `load_or_empty`, plus full unit tests.
    - `ravel-lite state repos {list, add, remove}` CLI verbs are wired in
      `main.rs` (lines 886/895/899).
    - `init.rs` already seeds an empty `repos.yaml` for new contexts.
    - What's missing is the **cutover**: every consumer of
      `ProjectsCatalog` (`related_components.rs`, `discover/{stage1,mod,
      apply}.rs`, `state/discover_proposals/verbs.rs`,
      `main.rs::ensure_in_catalog_interactive`) still reads `projects.yaml`.

    ## Replaced by

    New backlog task: **"Cut over projects.yaml → repos.yaml
    (architecture-next migration)"**. Scopes the actual cutover work that
    the M5 brief was *trying* to describe, but in the shape settled by
    architecture-next.md.

    ## Provenance

    This task was provenance-imported from Atlas's backlog on 2026-04-28.
    The M5 brief there was authored before the architecture-next decisions
    on 2026-04-28 ("projects.yaml → repos.yaml") were settled in
    Ravel-Lite. Atlas should be told that Ravel-Lite is doing the cutover
    under a different shape than its M5 anticipated.
- id: cut-over-projects-yaml-repos-yaml-architecture-next-migration
  title: Cut over projects.yaml → repos.yaml (architecture-next migration)
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    **Priority: HIGH** — unblocks every architecture-next task that
    depends on the new repo/component model (targets-and-worktrees,
    ravel-lite create v2, phase cycle triage-first, etc.). Replaces
    `migration-m5-consume-atlas-via-atlas-index`, whose brief was
    incompatible with the architecture-next direction.

    **Design reference:** `docs/architecture-next.md` §"The repo
    registry" (line 135), §"What this replaces or removes" (line 917).

    ## Background

    `src/repos.rs` already implements the full `repos.yaml` schema and
    exposes `state repos {add,remove,list}` CLI verbs (`main.rs` lines
    886/895/899); `init.rs:177` seeds an empty `repos.yaml` for new
    contexts. **The schema and CLI surface are done.** What's missing is
    the **cutover**: every consumer of `ProjectsCatalog` still reads
    `projects.yaml` and treats name → path as the authoritative resolver.

    ## Scope

    ### Cutover

    - Delete `src/projects.rs` after migrating every caller. The replaced
      surface is:
      - `ProjectsCatalog::find_by_name(name)` → `ReposRegistry::get(slug)`
      - `ProjectEntry { name, path }` → `(repo_slug, RepoEntry { url,
        local_path })`. `local_path` is `Option<PathBuf>` — callers that
        require a working tree (discovery pipeline, plan-project
        derivation) should fall back to `<context>/.cache/repos/<slug>/`
        per architecture-next §"The repo registry" line 153–156.
      - `ensure_in_catalog_interactive` (currently called from `main.rs`
        around line 1361 when `ravel-lite run` first encounters a plan in
        a non-catalogued project) → either repurpose for `repos.yaml`
        auto-add, or remove and require explicit `state repos add` first.
        Pick one and explain in results.
    - Update the consumers:
      - `src/related_components.rs` — `require_component_known` validates
        against `ReposRegistry` slugs.
      - `src/discover/{mod,stage1,apply}.rs` — iterate `RepoEntry` (with
        a fallback for missing `local_path`).
      - `src/state/discover_proposals/verbs.rs` — same component-name
        validation swap.
      - `src/main.rs` — ensure_in_catalog flow + the doc-comments that
        mention `projects.yaml`.
    - Remove the `state projects {list,add,remove,rename}` CLI subcommands
      from `main.rs`. They become a single deprecation alias that prints
      a migration message pointing at `state repos`.

    ### Migration error

    When `<context>/projects.yaml` exists but `<context>/repos.yaml` is
    empty, surface a clear actionable error from any verb that would
    previously have read `projects.yaml`:

    ```
    projects.yaml is no longer supported. The per-context repo registry
    moved to repos.yaml in the architecture-next migration. Migrate by
    running:

      ravel-lite state repos add --name <slug> --url <git-url> [--local-path <path>]

    for each entry in your existing projects.yaml, then delete the old
    file. See docs/architecture-next.md §"The repo registry".
    ```

    Keep this message in **one** place (a `migrate_projects_yaml_error`
    helper) so the wording stays consistent.

    ### Tests

    - Existing `src/projects.rs` tests are deleted along with the file.
    - `tests/state_related_components.rs` — replace projects-catalog seed
      with repos-registry seed; assertions about validation errors update
      to mention `repos`.
    - New test: `legacy_projects_yaml_present_emits_migration_error` —
      scaffold a config dir with only `projects.yaml`, run any consumer
      verb, assert the migration message.
    - Existing `src/repos.rs` unit tests stay green (schema unchanged).

    ## Out of scope

    - Reading per-repo `.atlas/components.yaml` (Atlas catalog
      integration). That's a separate task aligned with the graph-RAG
      CLI / per-repo catalog work in architecture-next §"Knowledge
      substrate" — components-within-repos isn't a Ravel-Lite distinction
      yet.
    - Worktree mounting / `Target` abstraction (tracked separately as
      `targets-and-worktrees-per-repo-plan-branches-and-dynamic-mounts`).
    - Discovery-loop replacement by graph-RAG (separate
      architecture-next task).

    ## Exit criteria

    - `src/projects.rs` deleted; `pub mod projects;` removed from
      `src/lib.rs`.
    - Every former `ProjectsCatalog` consumer compiles and tests pass.
    - `state projects` CLI verb is gone; replaced by deprecation alias
      pointing at `state repos`.
    - Running any state verb against a config dir that has only the
      legacy `projects.yaml` produces the migration error verbatim from
      the helper.
    - `cargo test --workspace` clean.

    ## Provenance

    Written 2026-04-28 to replace
    `migration-m5-consume-atlas-via-atlas-index`. The replaced task's
    brief assumed a 1:1 wrap of `ProjectsCatalog` over Atlas's
    `ComponentsFile`; architecture-next.md (settled 2026-04-28) replaces
    `projects.yaml` with `repos.yaml` instead — a different concept, not
    a wrap. Reasoning preserved in the replaced task's `Results:` block.
