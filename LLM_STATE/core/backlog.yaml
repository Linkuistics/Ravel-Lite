tasks:
- id: wire-orchestrator-baseline-capture-for-reflect-dream-triage-phases
  title: Wire orchestrator baseline capture for reflect/dream/triage phases
  category: core
  status: done
  dependencies: []
  description: |
    Wire orchestrator baseline capture for reflect, dream, and triage phases so `state phase-summary render` can be called with a meaningful `--baseline` SHA.

    ## What

    Today the orchestrator writes `work-baseline` (used by analyse-work) and `dream-baseline` (for compaction-trigger tracking). There is no `reflect-baseline` or `triage-baseline`. Each `git-commit-<phase>` script phase should write `<next-phase>-baseline` with the HEAD SHA it just committed, so the following LLM phase can call:

        ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline)

    and emit the result verbatim instead of re-transcribing its own edits.

    ## Settled design

    - Pattern: each `git-commit-<phase>` script already runs `git_save_work_baseline` at the tail end; add analogous `write_baseline(plan_dir, "<next-phase>-baseline", new_head_sha)` calls in:
      - `git-commit-work` → writes `triage-baseline`
      - `git-commit-triage` → writes `reflect-baseline`
      - `git-commit-reflect` → writes `dream-baseline` (already exists — just check it matches the pattern)
      - `git-commit-dream` → writes `work-baseline` (already exists as `git_save_work_baseline`)
    - File format: plain text, one SHA, no trailing newline, same as `work-baseline` today.
    - `src/git.rs` already has `git_save_work_baseline`; generalise to `git_save_baseline(plan_dir, filename, sha)` or duplicate the tiny function — up to implementer.

    ## Reference examples

    - `src/git.rs`: `git_save_work_baseline` (current baseline-write pattern, ~5 lines)
    - `scripts/git-commit-work` (or wherever `git_save_work_baseline` is called)
    - `LLM_STATE/core/work-baseline` (file format)
    - Phase-summary task results: "Wire orchestrator baselines for reflect/dream/triage" section

    ## Dependencies

    None blocking. Should land before the prompt-update task below, though prompt updates can work with `--baseline ""` (first-cycle-safe) while this is pending.

    ## Next task after this one

    Update triage/reflect/dream `## Output format` prompt blocks to invoke `state phase-summary render` verbatim (subsumes `triage-should-not-emit-the-no-dispatch-label-in-its-output`).
  results: |
    Wired baseline-SHA capture for the reflect, dream, and triage phases so each phase has a `<phase>-baseline` file holding the post-prior-commit SHA that `state phase-summary render --baseline` can consume.

    ## Shape delivered

    - **`git_save_baseline(plan_dir, filename)`** in `src/git.rs` — generalises the previous single-purpose `git_save_work_baseline`. Captures HEAD via `git rev-parse` and writes it to `<plan_dir>/<filename>` with the same trim-no-trailing-newline shape.
    - **Three new save-baseline follow-on commits** in `src/phase_loop.rs::handle_script_phase`:
      - `GitCommitWork` → writes `reflect-baseline` (post-work-commit SHA), then `save-reflect-baseline` commit
      - `GitCommitReflect` → writes either `dream-baseline` (dream-trigger branch) or `triage-baseline` (skip-dream branch), then `save-<next>-baseline` commit
      - `GitCommitDream` → writes `triage-baseline`, then `save-triage-baseline` commit
      - `GitCommitTriage` continues to write `work-baseline` via the same generalised helper (no semantic change to it)
    - **Each follow-on commit mirrors the existing `save-work-baseline` pattern**: capture HEAD → write file → separate commit. Amending the prior commit would orphan the SHA the file just captured.

    ## Naming-collision resolution

    The task description reused `dream-baseline` for the new SHA file, but that filename was already claimed by the dream-trigger word-count file (`src/dream.rs`). To match the `work-baseline` / `reflect-baseline` / `triage-baseline` SHA convention, the word-count file was renamed:

    - `dream-baseline` → `dream-word-count` for the word-count baseline
    - `dream-baseline` (as filename) is now exclusively the dream-phase SHA file

    Functions renamed in lockstep: `seed_dream_baseline_if_missing` → `seed_dream_word_count_if_missing`, `update_dream_baseline` → `update_dream_word_count`.

    ## Migration path for in-flight plans

    `seed_dream_word_count_if_missing` includes a one-shot migration: if `dream-word-count` is missing AND `dream-baseline` exists AND parses as `usize`, copy the value to `dream-word-count` and delete the legacy file. SHA-shaped content (non-parseable as usize) is left intact so the migration is idempotent in steady state.

    The migration triggers from three layers (plan creation, every `state set-phase`, `GitCommitReflect`), so an upgraded plan in any phase will migrate before the trigger logic reads `dream-word-count`. End-to-end smoke against `LLM_STATE/core` confirmed: pre-migration `dream-baseline` (5357) was migrated to `dream-word-count` after the first `state set-phase` invocation; legacy file removed.

    ## Task-description discrepancy noted

    The backlog description's mapping of which `git-commit-<phase>` writes which baseline was inverted by one cycle hop relative to the actual phase loop. The implementation uses the renderer-correct mapping: each `<phase>-baseline` holds the SHA from when `<phase>` started, written by the `git-commit-` step that immediately precedes `<phase>`. Captured in the work-phase chat for the prompt-update task that depends on this.

    ## Verification

    - **Full library suite: 585 tests passing** (was 582 — three new tests added).
    - **Three new dream-module tests**: `seed_migrates_legacy_dream_baseline_to_dream_word_count`, `seed_does_not_migrate_sha_shaped_dream_baseline`, plus `set_phase_migrates_legacy_dream_baseline_word_count_file` in `state/phase.rs`.
    - **All renamed call-sites compile and pass**: `tests/dream.rs` (integration test pinning `GitCommitReflect` seeding), `src/state/phase.rs` (set-phase seeding), `src/create.rs` (scaffold).
    - **End-to-end smoke**: ran `cargo run -- state set-phase LLM_STATE/core work` against the pre-existing plan dir; the legacy `dream-baseline` (word-count `5357`) was correctly migrated to `dream-word-count`; legacy file removed; no spurious files created.
    - **`git status` confirms clean intent**: only the expected source/test/doc edits and the plan-state migration (`dream-baseline` → `dream-word-count`) appear in the dirty tree.

    ## Per-cycle commit count change

    Each cycle now lands 2-3 additional `save-<phase>-baseline` commits beyond the prior layout:

    - skip-dream cycle: was `reflect → triage → save-work-baseline` (3 commits); now `work-commits → save-reflect-baseline → reflect → save-triage-baseline → triage → save-work-baseline` (5 commits + work spec commits).
    - with-dream cycle: was `reflect → dream → triage → save-work-baseline` (4); now `work-commits → save-reflect-baseline → reflect → save-dream-baseline → dream → save-triage-baseline → triage → save-work-baseline` (7 commits + work spec commits).

    This is the cost of the deterministic phase-summary surface — the consuming task can now render exact diffs for triage/reflect/dream output instead of having the LLM transcribe its own edits. Worth the noise.

    ## Design notes worth preserving

    - **Generalised function over wrapper**. Considered keeping `git_save_work_baseline` as a thin wrapper around `git_save_baseline(_, "work-baseline")` for call-site clarity. Chose direct uniform invocation across all four call sites instead — the string literal is self-documenting and removes one level of indirection. Coding-style guideline "consistent naming patterns" reinforces this choice.
    - **Migration tested both ways**. The two new dream-module unit tests cover the affirmative migration (`dream-baseline` parses as usize → migrate) and the negative case (`dream-baseline` is SHA-shaped → don't touch it, fall through to seeding `dream-word-count` to "0"). The negative case matters because once the new code has run a cycle on a plan, `dream-baseline` may legitimately hold a SHA written by `git-commit-reflect`'s dream branch.
    - **`GitCommitReflect`'s next-baseline branching is in-line, not extracted**. The `if skip_dream { ... "triage-baseline" } else { ... "dream-baseline" }` block is six lines; extracting it into a helper would lose the `write_phase` side-effect locality. The pattern stays in-line until a third caller forces extraction.

    ## What this suggests next

    The dependent task `update-triage-reflect-dream-prompts-to-invoke-state-phase-summary-render` is now fully unblocked. Each phase prompt can replace its `## Output format` block with:

        ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline)

    Reading the file each phase already expects the orchestrator to provide. First-cycle case is handled (renderer accepts `--baseline ""` per `phase_summary.rs`).
- id: update-triage-reflect-dream-prompts-to-invoke-state-phase-summary-render
  title: Update triage/reflect/dream prompts to invoke state phase-summary render
  category: core
  status: not_started
  dependencies:
  - wire-orchestrator-baseline-capture-for-reflect-dream-triage-phases
  description: |
    Replace the `## Output format` blocks in triage, reflect, and dream prompts with a single directive to run `state phase-summary render` and emit its output verbatim.

    ## What

    Each of `defaults/phases/triage.md`, `defaults/phases/reflect.md`, and `defaults/phases/dream.md` currently contains an `## Output format` block instructing the LLM to transcribe its own edits into labelled summary lines. This is mechanical re-transcription — precisely the anti-pattern that `state phase-summary render` was built to replace.

    Replacement text (exact wording, adjust `{{PLAN}}` template vars):

        After your narrative preamble, run:

            ravel-lite state phase-summary render {{PLAN}} --phase <phase> \
                --baseline $(cat {{PLAN}}/<phase>-baseline 2>/dev/null || echo "")

        and emit its output verbatim. Do not add, remove, or reorder lines.

    ## Settled design

    - The `--baseline ""` fallback (via `|| echo ""`) is first-cycle-safe: phase-summary render treats empty baseline as "no prior state" and reports only additions.
    - Intent-required labels (`[PROMOTED]`, `[IMPRECISE]`, `[OVERLAPPING]`, etc.) are deliberately NOT emitted by the CLI; the LLM's narrative preamble (which every phase prompt already preserves) is the right home for those. The replacement does not change the preamble instructions.
    - Subsumes the sibling task `triage-should-not-emit-the-no-dispatch-label-in-its-output` — once the `## Output format` block is replaced, `[NO DISPATCH]` simply won't appear.

    ## Reference examples

    - `defaults/phases/triage.md`: locate the `## Output format` block (approx lines 120–137 per the task brief)
    - `defaults/phases/reflect.md`: locate `## Output format` (approx lines 58–71)
    - `defaults/phases/dream.md`: locate `## Output format` (approx lines 47–67)
    - `defaults/phases/work.md` step 1: the already-landed pattern for backlog render — mirrors exactly what this task does for phase-summary

    ## Dependencies

    - `wire-orchestrator-baseline-capture-for-reflect-dream-triage-phases` — baseline files must exist before prompts can reliably `cat` them. Prompts still work without baselines (empty fallback), but landing baseline wiring first produces cleaner output from day one.
- id: fix-stale-references-in-llm-work-audit-md-2-9-and-git-rs-32-doc-comment
  title: Fix stale references in llm-work-audit.md §2.9 and git.rs:32 doc-comment
  category: core
  status: not_started
  dependencies: []
  description: |
    Fix two stale references surfaced by the sync-docs cycle.

    ## What

    1. **`docs/analysis/llm-work-audit.md §2.9`** ("analyse-work: commit partitioning helper") describes a proposed `commit-work partition` verb using the framing "the LLM no longer partitions" — but under the current `commits.yaml` flow the LLM still authors the partition structure (paths alongside messages). Reframe §2.9 as "extract partition structure from LLM-authored `commits.yaml` into a Rust-generated preview" rather than "introduce partitioning".

    2. **`src/git.rs:32` doc comment** still reads "Stage plan directory and commit with the message from commit-message.md". `commit-message.md` is deleted; the function now applies `commits.yaml` via `apply_commits_spec`. Update the comment to reference the current mechanism.

    ## Why

    Both are low-cost, high-clarity fixes. The §2.9 framing misdirects any reader considering whether commit partitioning is already done. The `git.rs:32` comment will mislead anyone reading the commit path for the first time.

    ## Scope

    - Edit the one prose paragraph in `docs/analysis/llm-work-audit.md §2.9`.
    - Update the doc comment on `commit_plan_state_dir` (or the relevant function) in `src/git.rs:32`.
    - No code changes; docs + comment only.

    ## Verification

    Confirm the updated doc matches `src/git.rs::apply_commits_spec` behaviour and the current `analyse-work.md` step 9 description.
