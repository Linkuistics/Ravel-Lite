tasks:
- id: add-minimal-github-actions-ci-workflow-build-test-clippy
  title: 'Add minimal GitHub Actions CI workflow: build, test, clippy'
  category: infra
  status: not_started
  dependencies: []
  description: |
    Add a minimal `.github/workflows/ci.yml` that runs on every push and pull request targeting `main`, exercising the three gates: `cargo build`, `cargo test --quiet`, and `cargo clippy --lib --all-targets`.

    ## Why

    `Cargo.toml` already declares `[lints.rust] warnings = "deny"`, which makes `cargo clippy` strict for any developer who runs it locally. But nothing forces a developer to run it before pushing. The `fix-clippy` cycle surfaced this gap: the first GitHub Actions workflow closes the automatic enforcement loop without requiring any changes to the manifest-level strictness settings.

    ## Scope

    - One file: `.github/workflows/ci.yml`
    - Triggers: `push` and `pull_request` on `main`
    - Steps: checkout → `actions/cache` for `~/.cargo` and `target/` → `cargo build` → `cargo test --quiet` → `cargo clippy --lib --all-targets`
    - No matrix (single `ubuntu-latest` runner is sufficient for enforcement; the binary is cross-compiled for release separately via cargo-dist)
    - Rust toolchain: `stable`; pin to a channel, not a specific version

    ## Decisions already made

    - No `--no-deps` on clippy; all-targets is the right scope.
    - The `[lints.rust] warnings = "deny"` manifest setting already propagates `-D warnings` to clippy lint evaluation, so no extra flags are needed in the workflow body.
    - `cargo-dist` will supply its own release workflow via `cargo dist generate`; this CI workflow is strictly for correctness gating on every commit, not for release automation.

    ## Verification

    - Workflow runs green on a test push to a branch.
    - A deliberate clippy violation introduced on a branch causes the workflow to fail.
    - Merge to main only after the workflow passes.
- id: cut-first-manual-release-end-to-end
  title: Cut first manual release end-to-end
  category: infra
  status: done
  dependencies: []
  description: |
    Cut the first manual release end-to-end using the scripts landed in the homebrew pivot:
    `cargo release patch --execute && git push --follow-tags && ./scripts/release-build.sh && ./scripts/release-publish.sh`.

    ## Why

    The release pipeline scripts (`scripts/release-build.sh`, `scripts/release-publish.sh`, `scripts/templates/ravel-lite.rb.tmpl`) are committed and `bash -n` clean, but the end-to-end flow has never been executed. The `Linkuistics/homebrew-taps` repo already exists. The first run is needed to:
    - Surface any choreography friction (zigbuild flags, formula substitution edge cases, `gh release create` auth, tap push)
    - Publish the Homebrew formula so `brew install linkuistics/taps/ravel-lite` works
    - Unblock smoke-testing of `scripts/capture/ravel-lite-tutorial.sh` (which calls `brew install` inside a TestAnyware VM)

    ## Scope

    1. Run `cargo release patch --execute` on a clean `main` (bumps version in `Cargo.toml`, commits, tags).
    2. `git push --follow-tags` to push commit + tag.
    3. `./scripts/release-build.sh` — produces four tarballs and a rendered `ravel-lite.rb` formula in `target/dist/`.
    4. `./scripts/release-publish.sh` — creates the GitHub Release and commits the formula to the sibling `homebrew-taps` clone.
    5. On a clean Homebrew prefix: `brew install linkuistics/taps/ravel-lite && ravel-lite --version` matches the tag.

    ## Known risks on first run

    - `testanyware vm list --format json` inside the capture script is unvalidated — not relevant here, but unblocking this release is a prerequisite for that smoke test.
    - `release-publish.sh` expects a sibling `~/Development/homebrew-taps` clone; override via `RAVEL_TAP_DIR` if needed.

    ## Verification

    - GitHub Release page shows four tarballs + checksum file.
    - `brew install linkuistics/taps/ravel-lite` completes on a clean machine.
    - `ravel-lite --version` output matches the pushed tag.
  results: |
    First manual release executed end-to-end. Tag `v1.0.2`. GitHub
    Release: https://github.com/Linkuistics/Ravel-Lite/releases/tag/v1.0.2.
    Formula pushed to `Linkuistics/homebrew-taps@790e7a4`.

    ## What was done

    1. Pushed 24 backlog commits to `origin/main` (no release-related
       commits among them — just orchestrator iteration).
    2. Installed the README's "one-time" prerequisites that were absent on
       the dev box: `brew install zig` (0.16.0), `cargo install
       cargo-zigbuild` (0.22.3), `rustup target add x86_64-apple-darwin
       aarch64-unknown-linux-gnu x86_64-unknown-linux-gnu`. Only
       `aarch64-apple-darwin` was already present.
    3. `cargo release patch --execute --no-confirm` → `Cargo.toml` 1.0.1 →
       1.0.2, commit `78f0d9c chore: release v1.0.2`, tag `v1.0.2`.
       `release.toml`'s `push = false` kept this local-only.
    4. `git push origin main --follow-tags` — release commit + tag landed
       on origin.
    5. `./scripts/release-build.sh` — built four tarballs in
       `target/dist/` (1.4–1.7 MB each), rendered `ravel-lite.rb` from the
       template with version + four checksums substituted. Linux targets
       built via `cargo zigbuild` with glibc pinned at 2.17. Total wall
       time ≈ 90s.
    6. Inspected the rendered formula: no `@TOKEN@` leftovers, all four
       `sha256` lines match the tarball checksums.
    7. Native-arch binary smoke test: extracted
       `ravel-lite-v1.0.2-aarch64-apple-darwin.tar.xz` and ran
       `--version` → `ravel-lite 1.0.2 (v1.0.2, built 2026-04-27T02:50:32Z)`.
    8. `./scripts/release-publish.sh` — created GitHub Release `v1.0.2`
       with all four tarballs uploaded; copied formula to
       `~/Development/homebrew-taps/Formula/ravel-lite.rb`, committed
       (`ravel-lite v1.0.2`, sha `790e7a4`), pushed.
    9. End-user smoke test: `brew update && brew install
       linkuistics/taps/ravel-lite` → `/opt/homebrew/Cellar/ravel-lite/1.0.2`.
       `/opt/homebrew/bin/ravel-lite --version` → `ravel-lite 1.0.2
       (v1.0.2, built 2026-04-27T02:50:32Z)`. Tag matches the running
       binary.
    10. `brew test linkuistics/taps/ravel-lite` ran the formula's
        `assert_match "ravel-lite"` against `--version` → pass.

    ## What worked

    - The `release.toml` choice to leave `push = false` was correct on
      first run — the local commit+tag was inspectable before any remote
      side-effect.
    - `release-build.sh`'s gate on `git describe --exact-match HEAD`
      caught nothing (HEAD was tagged) but is the right load-bearing
      check; without it, drift between tarballs and tag would be silent.
    - The literal `@TOKEN@` + `sed`-substitution template is trivially
      auditable — easier than a Liquid/handlebars renderer.
    - `cargo zigbuild --target <triple>.2.17` cross-compiled both Linux
      targets from macOS without docker/QEMU. Glibc pin works as
      documented.
    - `gh release create` accepted the tag without us pre-pushing it (we
      pushed anyway, per documented flow).

    ## What didn't work / friction

    - The README's "one-time setup" was accurate but had never been
      executed on this machine — three rustup targets and two binaries
      missing. `release-build.sh` would have failed on first
      cross-compile. Pre-flight on prereqs (machine bootstrap) is not
      surfaced anywhere automated.
    - The orphan tags `v1.0.0` and `v1.0.1` exist on origin from a prior
      cargo-dist attempt with no GitHub Releases attached. Left in place
      per direction; they remain visible in `git tag` and on the
      GitHub /tags page but produce no `gh release list` rows.
    - Minor: `cargo-zigbuild` does not respond to `--version`; the
      README's verification habit (`tool --version`) doesn't apply here.
      Use `cargo zigbuild --help` instead.

    ## What this suggests next

    - **Unblocks `write-tutorial-walk-through`**: the dependency on
      `cut-first-manual-release-end-to-end` is now satisfied. The
      tutorial can describe `brew install linkuistics/taps/ravel-lite`
      as the canonical install path.
    - **Smoke-testing `scripts/capture/ravel-lite-tutorial.sh`** inside a
      TestAnyware VM is now possible — the `brew install` in that script
      has a real formula to fetch.
    - **Consider a `scripts/release-doctor.sh`** (or just an upfront
      check inside `release-build.sh`) that verifies the four prereqs
      (`zig`, `cargo-zigbuild`, three rustup targets, `gh auth status`)
      and emits a punch-list if any are missing. Would have saved one
      failed run had this not been the first attempt.
    - **Orphan tag cleanup** is deferred. If `v1.0.0`/`v1.0.1` start
      showing up confusingly in `gh release list` UIs or release-notes
      generators, delete them from origin (`git push origin :refs/tags/v1.0.0`
      etc.). Not blocking anything today.
    - **Subsequent releases** should be straightforward: clean tree →
      `cargo release patch --execute` → `git push --follow-tags` →
      `./scripts/release-build.sh` → inspect → `./scripts/release-publish.sh`.
      No bootstrap needed now that prereqs are installed.
