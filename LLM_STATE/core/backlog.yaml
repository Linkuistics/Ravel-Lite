tasks:
- id: add-commits-yaml-highlight-rule-to-analysework-phase
  title: Add commits.yaml highlight rule to AnalyseWork phase
  category: core
  status: done
  dependencies: []
  description: |
    Add a `HighlightRule` for `commits.yaml` to `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` in `src/format.rs` so that the TUI shows progress feedback when the analyse-work phase writes its commit spec.

    ## What

    `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` currently has only one rule:

    ```rust
    HighlightRule { pattern: Regex::new(r"latest-session\.md$").unwrap(), label: "Writing session log" },
    ```

    The other major file write in analyse-work — `commits.yaml` — has no matching rule, so no progress label appears in the TUI when that write happens. Adding:

    ```rust
    HighlightRule { pattern: Regex::new(r"commits\.yaml$").unwrap(), label: "Writing commit spec" },
    ```

    would give the user visible feedback for both of analyse-work's primary outputs.

    ## Why

    The `commit-message.md` removal session (`remove-dead-commit-message-md-branch-from-git-commit-plan`) deleted the old highlight rule alongside the dead branch. The `commits.yaml` mechanism that replaced it has no corresponding rule. This is a minor UX gap — the TUI goes silent during the commit-spec write even though it takes a non-trivial amount of time for large sessions.

    ## Scope

    - Add the `commits.yaml` `HighlightRule` to `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` at `src/format.rs`.
    - No other changes required; the highlight infrastructure is already in place.

    ## Verification

    - `cargo test --quiet` passes.
    - Manual run of analyse-work phase shows "Writing commit spec" label in TUI when `commits.yaml` is being written.
  results: |
    Added the `commits.yaml` `HighlightRule` to `PHASE_HIGHLIGHTS[LlmPhase::AnalyseWork]` in `src/format.rs`, mirroring the existing `latest-session.md` rule's shape (anchored regex, "Writing …" label parallel to the existing entry).

    ## What worked

    - Drop-in addition to the existing `vec![…]` literal — the highlight infrastructure (iteration, dedup via `shown_highlights`, span styling) already handles arbitrary numbers of rules, so this is purely a data-table extension.
    - All 50 tests pass (`cargo test --quiet`); `cargo clippy --lib --all-targets` is clean.
    - The two AnalyseWork rules use mutually exclusive filenames (`latest-session.md` vs `commits.yaml`), so iteration order doesn't matter for correctness — first match wins.

    ## Not in scope (deliberate)

    - The pre-existing `latest-session.md` rule still references `.md`, but the actual file Ravel-Lite produces is `latest-session.yaml` (per memory notes that catalogue plan-state file paths). That extension mismatch is a separate bug — the rule never fires today, so the AnalyseWork phase TUI shows no progress feedback at all currently. Worth a follow-up task: either rename the rule's pattern to match reality, or confirm the file actually is `.md` and update the memory note. Did NOT change here because the task description only asked for the `commits.yaml` addition.

    ## Suggests next

    - Verify the `latest-session.md` regex actually matches a real write path during analyse-work. If the file is `.yaml`, fix the rule (one-character change) so the existing label fires and pair the two writes visibly.
    - Consider whether the highlight-rule mechanism deserves a small unit test per rule (currently only `memory.md` for Reflect is tested in `format_tool_call_highlight_memory`). Adding rule-by-rule tests would be cheap insurance against future regex regressions.
- id: fix-clippy-unnecessary-sort-by-in-render-rs-and-enforce-clean-clippy-in-ci
  title: Fix clippy unnecessary_sort_by in render.rs and enforce clean clippy in CI
  category: core
  status: done
  dependencies: []
  description: |
    Fix the pre-existing clippy `unnecessary_sort_by` warning at `src/state/backlog/render.rs:95` and add `cargo clippy --lib -- -D warnings` to the CI check (or pre-commit hook) so future violations surface immediately.

    ## What

    `cargo clippy --lib` on `main` warns at `src/state/backlog/render.rs:95`:

    ```
    warning: use of `sort_by` with a comparison function that can be replaced with `sort_by_key`
      --> src/state/backlog/render.rs:95:N
       |
       |     .sort_by(|a, b| a.something.cmp(&b.something))
       |                                                         ^ help: try: `.sort_by_key(|k| k.something)`
    ```

    The fix is a one-line mechanical replacement: `sort_by(|a, b| a.x.cmp(&b.x))` → `sort_by_key(|k| k.x)`.

    ## Why

    The `add-snapshot-test` cycle surfaced this as a pre-existing warning. It was out of scope for that task (unrelated to the snapshot test) but is worth addressing so `cargo clippy -- -D warnings` can be added to CI without noise. A clean clippy baseline makes future violations visible the moment they land rather than accumulating into a backlog.

    ## Scope

    1. Fix the `unnecessary_sort_by` at `src/state/backlog/render.rs:95`.
    2. Run `cargo clippy --lib -- -D warnings`; if other pre-existing warnings surface, fix them in the same commit (do not suppress with `#[allow(...)]` unless there is a documented reason).
    3. Add `cargo clippy --lib -- -D warnings` to whatever CI script / Makefile target runs checks.

    ## Verification

    - `cargo clippy --lib -- -D warnings` exits 0.
    - `cargo test --quiet` passes with no regressions.
  results: |
    Fixed the `unnecessary_sort_by` lint at `src/state/backlog/render.rs:95` by replacing `sort_by(|a, b| a.to_lowercase().cmp(&b.to_lowercase()))` with `sort_by_key(|a| a.to_lowercase())`. `cargo clippy --lib --all-targets` is clean; all tests still pass.

    ## What worked

    - Mechanical one-line fix matching clippy's own suggested rewrite.
    - Both forms recompute the lowercase string per comparison — `sort_by_key` is not a perf change, just an idiom change. The category-name input is small enough that `sort_by_cached_key` would be over-engineering.

    ## Discovery: CI step is already partially in place

    The task asked me to add `cargo clippy --lib -- -D warnings` to "whatever CI script / Makefile target runs checks." Investigation:

    - There is no `.github/workflows/`, no `Justfile`, no `Makefile`, no `scripts/check.sh`. Quality enforcement is run-locally-and-trust-the-developer.
    - However, `Cargo.toml` already declares `[lints.rust] warnings = "deny"`. Because clippy emits its lints through rustc's lint infrastructure, the `-D warnings` derived from this manifest setting denies clippy lints too — this is exactly why the original `unnecessary_sort_by` surfaced as an `error:` (not a `warning:`) when I ran `cargo clippy --lib`. So the strict-clippy behaviour is already in effect for any developer who runs `cargo clippy`.
    - The remaining gap is *behavioural*: nobody is *forced* to run `cargo clippy` before commit. Closing that gap means introducing CI infrastructure (a GitHub Actions workflow) or a pre-commit hook — neither exists today, both are bigger commitments than this task scoped for.

    I did not add CI infrastructure on my own initiative because:
    1. Spinning up the first GitHub Actions workflow is a project-level decision (cache strategy, matrix, what else gets gated) that warrants its own task.
    2. The manifest setting already makes `cargo clippy --lib` strict locally, which is the meaningful enforcement for developers.

    ## Suggests next

    - **Promote to a separate backlog task**: "Add minimal GitHub Actions CI: cargo build, cargo test, cargo clippy --lib --all-targets". This is the natural follow-up that closes the *automatic* enforcement gap. Scope: one `.github/workflows/ci.yml`, runs on push and PR, uses the existing manifest-level `warnings = "deny"` so the workflow body stays trivial.
    - Consider also adding `[lints.clippy] all = "warn"` (or similar) to `Cargo.toml` to opt in to broader clippy categories than the default. Currently clippy only catches its default set; opting into `pedantic` or specific extra groups would surface more issues earlier.
