tasks:
- id: add-ravel-lite-show-verb-for-embedded-fixed-memory-content
  title: Add ravel-lite show verb for embedded fixed-memory content
  category: architecture-next
  status: blocked
  blocked_reason: 'Design open: needs user-extensibility/disk-overlay decision before implementation; discussion deferred indefinitely'
  dependencies: []
  description: |
    Add a `ravel-lite show <embedded-path>` verb that prints embedded content via `init::require_embedded`, and sweep phase prompts that use `Read({{ORCHESTRATOR}}/fixed-memory/...)` to use `Bash(ravel-lite show ...)` instead.

    Problem: `defaults/fixed-memory/*.md` are referenced by phase prompts (e.g. `Read {{ORCHESTRATOR}}/fixed-memory/...`) but `ravel-lite init` no longer materialises those files to disk (see `src/init.rs:130`). The LLM is instructed to read files that do not exist, causing silent failures.

    Scope:
    - Add `ravel-lite show <embedded-path>` subcommand. `<embedded-path>` is a relative path within the embedded asset bundle (e.g. `fixed-memory/norms.md`). Command prints the content to stdout and exits 0, or exits non-zero with a clear message if the path is not found.
    - Implementation: thin wrapper over `init::require_embedded(path)` — that function already returns `&'static str` from the compile-time embed.
    - Sweep `defaults/phases/*.md` and any other prompt templates for `Read({{ORCHESTRATOR}}/fixed-memory/...)` occurrences; replace with `Bash(ravel-lite show fixed-memory/<name>)`.

    Reference examples:
    - `src/init.rs` — `require_embedded` is defined here; the embed catalogue is already known at compile time.
    - `defaults/phases/` — the prompt files that reference fixed-memory paths.

    No new dependencies. Self-contained once `ravel-lite show` is wired into `src/main.rs`.
  results: |
    ## Results

    Task moved to `blocked` before any code was written. The trigger was a
    design constraint surfaced during work-phase planning: `fixed-memory/`
    must remain **user-extensible**, but the proposed `ravel-lite show
    <embedded-path>` verb is a thin wrapper over `init::require_embedded`
    and therefore serves *only* the compile-time embed set.

    A user adding their own `coding-style-<lang>.md` (e.g. for a language
    the shipped set doesn't cover) would either:
    - be silently ignored by `show` (re-introducing the same
      silent-failure bug this task was meant to fix), or
    - need a separate read path, splitting the "single source of truth"
      the embedded set is meant to provide.

    The right shape is probably layered:
    1. `show <relative-path>` first looks for `<config-dir>/<relative-path>`
       on disk and serves it if present.
    2. Falls back to `init::require_embedded(<relative-path>)`.
    3. Errors with a deterministic message if neither path resolves.

    That mirrors the existing `compose_prompt` layering for phase prompts
    (plan-level `prompt-<phase>.md` override on top of embedded base) and
    would let the phase-prompt sweep proceed without sacrificing
    user-extensibility.

    The decision was deferred because:

    - The disk-overlay layer interacts with `ravel-lite init v2: context
      layout scaffolding` (separate backlog task) — that task introduces
      the new `<context>/` layout where user-owned `fixed-memory/` would
      presumably live, so deciding the directory now would either
      pre-empt v2 or be re-litigated under it.
    - The `architecture-next` redesign track may reshape what counts as
      "user-owned" prompt material vs "shipped reference material",
      which changes the right merge semantics.

    ### What this suggests next

    - Settle the `fixed-memory/` extensibility model as part of the v2
      init scaffolding task, then unblock this task with the agreed
      layering. Specifically: where does user-owned `fixed-memory/` live
      under `<context>/` v2, and what is the lookup order?
    - The phase-prompt sweep (the second half of this task's scope) is
      conditional on the verb existing in its final form, so it stays
      bundled here rather than being split out.
    - The drift-guard test
      (`every_file_under_defaults_is_registered_in_embedded_files`) is
      unchanged by this deferral — the embed set still ships the current
      `fixed-memory/*.md` files; only the *reach mechanism* from the LLM
      side is undecided.

    ### Files inspected (no edits made)

    - `src/init.rs` — `require_embedded` and the `EMBEDDED_FILES`
      registry; the natural backing for any future `show` verb.
    - `src/main.rs` — clap structure where a new `Show` subcommand would
      land alongside `Init`, `Run`, `Create`, etc.
    - `defaults/phases/work.md`, `defaults/phases/reflect.md`,
      `defaults/phases/dream.md` — the three prompts that currently
      reference `{{ORCHESTRATOR}}/fixed-memory/...` and would have been
      swept to `Bash(ravel-lite show ...)` once the verb existed.
    - `src/prompt.rs` — confirmed token substitution is the only
      composition layer; no other reach path exists today.
- id: migration-m2-switch-to-atlas-contracts-component-ontology-crate
  title: 'Migration M2: switch to atlas-contracts component-ontology crate'
  category: migration
  status: done
  dependencies: []
  description: |
    **Priority: MEDIUM.** Unblocks M4 and M5.

    **Design reference:** §9.4 M2 (in Atlas's design doc).

    ## Scope

    - In the root `Cargo.toml`, add a `[workspace.dependencies]` entry (or plain `[dependencies]` if Ravel-Lite is single-crate):
      ```toml
      component-ontology = { git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>" }
      ```
      Pin by commit sha. The canonical repo is `linkuistics/atlas-contracts` (a public Cargo workspace hosting Atlas's data-format / vocabulary crates).

      **Dev convention:** Atlas itself consumes `component-ontology` and `atlas-index` as **local path deps** during development (`path = "../atlas-contracts/crates/component-ontology"`, with a sibling checkout at `~/Development/atlas-contracts/`). Match that convention for Ravel-Lite during dev; flip to `git+rev` at publish time.
    - Replace every `use crate::ontology::...` or `use ravel_lite::ontology::...` with `use component_ontology::...`.
    - Delete `src/ontology/` entirely.
    - Keep `defaults/ontology.yaml` for now — the canonical file is shipped by `component-ontology` via `include_str!`, but removing the local copy is M4.
    - Run the full test suite; fix any breakage from the import path change.
    - Commit as a single PR.

    ### Tests

    - Existing tests (targeting the ontology drift assertion, edge validation, etc.) continue to pass.
    - Compatibility test: load an existing `related-components.yaml` produced pre-M2 and verify it parses bit-identical.

    ## Out of scope

    - Removing `defaults/ontology.yaml` (M4).
    - Refactoring `src/projects.rs` (M5).
    - Any behavioural change — this is purely a dep-source switch.

    ## Exit criteria

    - Compiles and all tests pass with `component-ontology` sourced from `linkuistics/atlas-contracts`.
    - `src/ontology/` is gone.
    - A commit titled "Switch component-ontology to atlas-contracts dep" linking to the `atlas-contracts` commit it pins.

    ## Prerequisite

    Ravel-Lite must be quiescent when this lands. Per the Atlas-side note `m2-migration-is-pure-import-path-swap`, the public surface of `component-ontology` at SHA `337c54368eb1393f2c3f8839a5e9042ce72cf964` matches `src/ontology/mod.rs` 1:1, so the migration itself is mechanical — the only real obstacle is in-flight refactors.

    ## Provenance

    Moved from Atlas's backlog (id `ravel-lite-migration-m2-switch-to-atlas-component-ontology-crate`) on 2026-04-28. Rationale: the work happens here; Atlas is the upstream dependency. The cross-project relationship is captured in Atlas's `related-components.yaml` via the `depends-on / build` edge.
  results: |
    ## What was done

    - Added `component-ontology` as a local-path workspace dep
      (`path = "../atlas-contracts/crates/component-ontology"`) in
      `Cargo.toml`, matching Atlas's dev convention. Publish-time flip to
      `git+rev` is documented inline.
    - Removed `pub mod ontology;` from `src/lib.rs` and deleted
      `src/ontology/` entirely (cli.rs, defaults.rs, mod.rs, schema.rs,
      yaml_io.rs).
    - Rewrote every `crate::ontology::…` and `ravel_lite::ontology::…`
      import to `component_ontology::…`. Touched: `src/main.rs`,
      `src/related_components.rs`, `src/discover/schema.rs`,
      `src/discover/stage2.rs`, `src/discover/apply.rs`,
      `src/state/discover_proposals/verbs.rs`, `src/projects.rs` (test
      module). Public re-exports from `crate::related_components`
      (`EdgeKind`, `LifecycleScope`) preserved verbatim — host adapter
      callers see no API change.
    - Kept `defaults/ontology.yaml` in place per M2 scope. The
      `EmbeddedFile { path: "ontology.yaml", … }` registration in
      `src/init.rs:86` is unchanged. Removal is M4.
    - Added compatibility test
      `pre_m2_related_components_yaml_round_trips_bit_identical` in
      `src/related_components.rs`. Embeds a representative pre-M2
      `related-components.yaml` fixture, parses it via the new dep,
      re-serialises, and asserts byte-for-byte equality with the input.

    ## What worked

    - The swap was genuinely mechanical: `diff -r src/ontology/
      atlas-contracts/crates/component-ontology/src/` showed only
      doc-comment phrasing and `include_str!` path differences. Public API
      surface is bijective.
    - Build went green on the first `cargo check`; no signature drift.
    - Full workspace test suite (700+ tests across lib + 17 integration
      files) still passes — no regressions.
    - The new compat test passes, confirming the on-disk YAML shape is
      preserved through the new dep.

    ## What didn't / surprises

    - Nothing notable. The crate at `~/Development/atlas-contracts/`
      (rev `6dab6c2`, current main) has the same ontology API as the SHA
      noted in the brief (`337c543`) — only a website-bootstrap commit
      intervened.

    ## What this suggests next

    - M4 (deps cleared) and M5 (deps cleared) are now unblocked.
    - At publish time, swap the path dep for
      `git = "https://github.com/linkuistics/atlas-contracts", rev = "<sha>"`
      pinning to whatever rev `defaults/ontology.yaml` was last verified
      against.
- id: knowledge-graph-wire-plan-kg-kinds-intent-backlog-memory-finding
  title: 'knowledge-graph: wire plan KG kinds (intent, backlog, memory, finding)'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Register ravel-lite's plan-side TMS kinds in the `knowledge-graph` crate and migrate the existing plan state files to TMS item shape.

    Reference: `docs/architecture-next.md` §Plan as a knowledge graph, §Item shape, §Status vocabularies, §CLI surface for queries.

    Scope:
    - Register kinds: `intent`, `backlog-item`, `memory-entry`, `finding`.
    - Status vocabularies per §Status vocabularies.
    - Convert `backlog.yaml` schema to TMS item shape — each item gets explicit justifications (`serves-intent` for parents, `external` for issue links) and structured status. Preserve current behaviour during conversion.
    - Convert `memory.yaml` schema to TMS item shape with justifications (`code-anchor`, `rationale`).
