tasks:
- id: add-ravel-lite-show-verb-for-embedded-fixed-memory-content
  title: Add ravel-lite show verb for embedded fixed-memory content
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Add a `ravel-lite show <embedded-path>` verb that prints embedded content via `init::require_embedded`, and sweep phase prompts that use `Read({{ORCHESTRATOR}}/fixed-memory/...)` to use `Bash(ravel-lite show ...)` instead.

    Problem: `defaults/fixed-memory/*.md` are referenced by phase prompts (e.g. `Read {{ORCHESTRATOR}}/fixed-memory/...`) but `ravel-lite init` no longer materialises those files to disk (see `src/init.rs:130`). The LLM is instructed to read files that do not exist, causing silent failures.

    Scope:
    - Add `ravel-lite show <embedded-path>` subcommand. `<embedded-path>` is a relative path within the embedded asset bundle (e.g. `fixed-memory/norms.md`). Command prints the content to stdout and exits 0, or exits non-zero with a clear message if the path is not found.
    - Implementation: thin wrapper over `init::require_embedded(path)` — that function already returns `&'static str` from the compile-time embed.
    - Sweep `defaults/phases/*.md` and any other prompt templates for `Read({{ORCHESTRATOR}}/fixed-memory/...)` occurrences; replace with `Bash(ravel-lite show fixed-memory/<name>)`.

    Reference examples:
    - `src/init.rs` — `require_embedded` is defined here; the embed catalogue is already known at compile time.
    - `defaults/phases/` — the prompt files that reference fixed-memory paths.

    No new dependencies. Self-contained once `ravel-lite show` is wired into `src/main.rs`.
- id: ravel-lite-init-v2-context-layout-scaffolding-git-identity-path-optional-init
  title: 'ravel-lite init v2: context layout scaffolding, git identity, path-optional init'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Stand up the full v2 `<ravel-context>/` directory layout via `ravel-lite init` (no path arg required) and give the context its own git identity.

    Picks up deliverables (4), (5), (6) deferred from the `ravel-context-new-layout-and-repos-yaml-registry` session. The `repos.yaml` registry landed in that session; this task wires up everything around it.

    Scope:
    - `ravel-lite init [--config <path>]` scaffolds the full v2 layout under the resolved context root:
      - `config.yaml`, `config.local.yaml` (gitignored)
      - `repos.yaml` (empty registry)
      - `findings.yaml`
      - `agents/`, `phases/`, `fixed-memory/`, `plans/` dirs
    - `git init` inside `<context>/` so the context has its own git identity independent of any target repo.
    - Path-optional `init`: precedence `--config` > `$RAVEL_LITE_CONFIG` > `~/.config/ravel-lite/` (XDG on Linux, same path on macOS — the open question about macOS-specific dirs settled in favour of a uniform XDG path; see the blocked task `default-config-location-to-config-ravel-lite-on-both-linux-and-macos-and-make-init-path-optional` for prior prose).
    - This task subsumes the blocked `default-config-location` task; when this lands, that task can be deleted.

    Reference: `docs/architecture-next.md` §Layout, §The repo registry (for the git-identity paragraph).

    Dependencies:
    - `ravel-context-new-layout-and-repos-yaml-registry` (done — repos.yaml read/write is already in place)
    - `default-config-location-to-config-ravel-lite-on-both-linux-and-macos-and-make-init-path-optional` (blocked — subsume and delete when this lands)

    Design note: `src/init.rs` currently materialises a v1 layout; the scaffold call there (`init::require_embedded` path) is the right hook to extend. Keep existing v1 scaffolding under a version guard if a migration path is needed, or behind a feature flag that triage can decide on.
- id: knowledge-graph-wire-plan-kg-kinds-intent-backlog-memory-finding
  title: 'knowledge-graph: wire plan KG kinds (intent, backlog, memory, finding)'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Register ravel-lite's plan-side TMS kinds in the `knowledge-graph` crate and migrate the existing plan state files to TMS item shape.

    Reference: `docs/architecture-next.md` §Plan as a knowledge graph, §Item shape, §Status vocabularies, §CLI surface for queries.

    Scope:
    - Register kinds: `intent`, `backlog-item`, `memory-entry`, `finding`.
    - Status vocabularies per §Status vocabularies.
    - Convert `backlog.yaml` schema to TMS item shape — each item gets explicit justifications (`serves-intent` for parents, `external` for issue links) and structured status. Preserve current behaviour during conversion.
    - Convert `memory.yaml` schema to TMS item shape with justifications (`code-anchor`, `rationale`).
    - Add `intents.yaml` schema; `phase.md` becomes a rendered overview from the structured `intents.yaml`, not the canonical source.
    - Add `ravel-lite plan <subcommand>` for plan KG inspection (small surface for v2.0).

    Coordination: legacy plan migration (separate task) calls into the conversion routines defined here. The dogfood case is `LLM_STATE/core` itself.
- id: ascent-upgrade-bump-knowledge-graph-crate-from-0-6-to-0-8
  title: 'ascent upgrade: bump knowledge-graph crate from 0.6 to 0.8'
  category: architecture-next
  status: not_started
