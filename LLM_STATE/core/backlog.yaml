- id: reference-configuration-and-prompt-file-formats-config-yaml-local-yaml-overlays-embedded-defaults-token-substitution-per-phase-prompts
  title: 'Reference: configuration and prompt-file formats (config.yaml, .local.yaml overlays, embedded defaults, token substitution, per-phase prompts)'
  category: docs
  status: blocked
  blocked_reason: superseded by lua-config redesign; replaced by rewrite-config-and-prompts-reference-page-for-lua-api
  dependencies: []
  description: |
    Write the configuration and prompt-file reference page: how `config.yaml` and `*.local.yaml` overlays compose (deep-merge semantics), where embedded defaults sit, how token substitution works in prompts, and how to customise per-phase prompts.

    ## Scope

    - File: `docs/reference/config-and-prompts.adoc`

    ### Configuration

    - Project-level `config.yaml`: every field with type, semantics, defaults.
    - `*.local.yaml` overlay rules: the `load_with_optional_overlay<T>()` deep-merge in `src/config.rs`. Scalar collisions go to overlay; map collisions recurse. A `models.work: ""` overlay blanks only that key without losing siblings.
    - Environment variables: `RAVEL_LITE_CONFIG`, the `--config` flag, `--dangerous`. Precedence (flag wins over env var wins over default).

    ### Embedded defaults

    - Where they live in the binary (`defaults/` at build time), how `init` materialises them onto disk.
    - The `every_file_under_defaults_is_registered_in_embedded_files` drift-detection test that guards `init.rs` — adding any file under `defaults/` without registering it fails the test.

    ### Token substitution in prompts

    - The `substitute_tokens` canonical path: every prompt-loading route must funnel through this function (no ad-hoc `str::replace`).
    - The hard-error guard regex for unresolved tokens.
    - The `shipped_pi_prompts_have_no_dangling_tokens` test guarantee that asserts no on-disk pi prompt file contains an unresolved token.

    ### Per-phase prompts

    - Where prompts live: `defaults/agents/claude/`, `defaults/agents/pi/`.
    - Subagent definitions: `defaults/agents/pi/subagents/` (brainstorming, tdd, writing-plans).
    - The contract between prompt and binary: which tokens the binary substitutes, which it doesn't.

    ## Style

    Friendly prose, schema/example blocks, minimal lists, no emoji.

    ## Verification

    - Page builds and renders.
    - Schema and behaviour cross-checked against `src/config.rs`, `src/init.rs`, the prompt substitution code, and the on-disk `defaults/` tree.
    - Examples of `.local.yaml` overlays demonstrate the deep-merge behaviour explicitly.
- id: reference-cli-lifecycle-commands-run-create-init-version-global-flags
  title: 'Reference: CLI lifecycle commands (run, create, init, version, global flags)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the CLI reference page for lifecycle commands: `ravel-lite run`, `create`, `init` (+ `--force`), `version` (+ `--version`), and the global flags that apply to every command (`--config`, `RAVEL_LITE_CONFIG`, `--dangerous`).

    ## Scope

    - File: `docs/reference/cli-lifecycle.adoc`
    - Per command: invocation, flags (with defaults), what it does, what it writes, side effects, exit codes, gotchas.

    ### Commands

    - **`run`**: the main loop entry point. How phase resumption works (reads `phase.md` to decide where to start). What it reads to decide what to do. How it spawns agent subprocesses. Failure modes.
    - **`create`**: plan creation. Bootstrapping flow (initial backlog, memory placeholder, phase set to work). Required arguments. How it interacts with `state projects`.
