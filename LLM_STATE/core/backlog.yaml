tasks:
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
- id: implement-fixed-memory-cli-overlay-and-sweep-phase-prompts
  title: Implement fixed-memory CLI overlay and sweep phase prompts
  category: architecture-next
  status: done
  dependencies: []
  description: |
    Implement the `ravel-lite fixed-memory list` and `ravel-lite fixed-memory show <slug>` verbs per the spec at `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md`.

    ## Scope

    - New module `src/fixed_memory.rs` with `discover`, `compose`, `extract_description`, and a kind-local `OutputFormat` enum.
    - Two new clap subcommands under `Commands::FixedMemory`: `List` and `Show`.
    - Layered overlay semantics: when both an embedded entry and a user file at `<config-dir>/fixed-memory/<slug>.md` exist, `show` emits embedded content + addendum delimiter (`\n---\n\n## User addendum (takes precedence over the above)\n\n`) + user content. Embedded-only and user-only cases emit content unchanged.
    - Phase prompt sweep:
      - `defaults/phases/work.md` lines 33-51: replace `Read({{ORCHESTRATOR}}/fixed-memory/coding-style*.md)` prose with instruction to first run `ravel-lite fixed-memory list` (so user-overlay slugs are visible) then `ravel-lite fixed-memory show <slug>`.
      - `defaults/phases/reflect.md` lines 18, 84: swap `{{ORCHESTRATOR}}/fixed-memory/memory-style.md` for `Bash(ravel-lite fixed-memory show memory-style)`.
      - `defaults/phases/dream.md` lines 9, 22: same swap as reflect.
    - Allowlist: add `Bash(ravel-lite fixed-memory:*)` to per-phase allowlists wherever `CREATE_ALLOWED_TOOLS`-style constants live (model on `src/create.rs:40`).

    ## Tests

    - Unit tests in `src/fixed_memory.rs`: `extract_description` (H1, no H1, leading whitespace), `discover` (mixed embedded/user/both), `compose` (all three resolution cases, addendum delimiter appears verbatim for "both").
    - Integration tests in `tests/`: `list` against a temp config dir with mixed entries (yaml/json/markdown rendering); `show` for each of the three resolution cases; unknown slug exits non-zero with stderr containing "Available slugs:".
    - Existing drift-guard `every_file_under_defaults_is_registered_in_embedded_files` and `shipped_pi_prompts_have_no_dangling_tokens` must still pass.

    ## Verification

    - `./scripts/check.sh` clean (`cargo clippy --all-targets --workspace -- -D warnings`).
    - `cargo test` passes including new tests.
    - Manual smoke: against a populated config dir, exercise `list` and `show` for embedded-only, user-only, and both-sources slugs.

    ## Reference

    Full design: `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md`. Supersedes the now-`done` task `add-ravel-lite-show-verb-for-embedded-fixed-memory-content`.
  results: |
    ## What was done

    Implemented `ravel-lite fixed-memory list|show` per spec at
    `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md`, swept the three
    phase prompts that referenced the broken `{{ORCHESTRATOR}}/fixed-memory/...`
    reads, and added unit + integration test coverage.

    ### Files added
    - `src/fixed_memory.rs` — `discover`, `compose`, `extract_description`,
      `render_list`, `OutputFormat`, `EntrySources`, `ShowError`, +
      `ADDENDUM_DELIMITER` constant matching the spec verbatim.
    - `tests/fixed_memory_cli.rs` — 9 end-to-end tests against the binary
      covering all three resolution cases (`embedded`, `user`, `both`),
      every output format (`yaml`, `json`, `markdown`), invalid `--format`,
      and the unknown-slug error path.

    ### Files modified
    - `src/lib.rs` — registered `pub mod fixed_memory`.
    - `src/main.rs` — added `Commands::FixedMemory`, `FixedMemoryCommands`
      enum (`List`, `Show`), `dispatch_fixed_memory`, and
      `parse_fixed_memory_format`.
    - `defaults/phases/work.md` — replaced lines 33-51 of the coding-style
      block with a `ravel-lite fixed-memory list` + `show <slug>` flow that
      also surfaces user-overlay slugs (fixed the latent bug where a user's
      `coding-style-haskell.md` was hard-invisible).
    - `defaults/phases/reflect.md` lines 18 + 84 — swapped the
      `memory-style.md` reads for `fixed-memory show memory-style`.
    - `defaults/phases/dream.md` lines 9 + 22 — same swap.

    ## What worked

    - **Compile clean on first attempt.** The per-kind `OutputFormat` +
      `parse_*_format` pattern transferred verbatim from
      `state::intents::OutputFormat`.
    - **All 18 unit tests + 9 integration tests pass.**
    - **`scripts/check.sh` clean.** Zero clippy warnings under
      `--all-targets --workspace -- -D warnings`.
    - **Full `cargo test` suite green** — 966 unit tests + every integration
      suite (drift-guard tests included). The
      `every_file_under_defaults_is_registered_in_embedded_files` and
      `shipped_pi_prompts_have_no_dangling_tokens` guards continue to pass.
    - **End-to-end smoke test against the real config dir** at
      `/Users/antony/Development/ravel-lite-config/`: `list` emits all 9
      embedded slugs with descriptions; `show <embedded>` emits content;
      `show bogus` exits 1 with stderr naming the available slugs and the
      remediation verb.

    ## What didn't work — and what I did about it

    ### Allowlist task: no per-phase constants exist for work/reflect/dream

    The spec said: "Add `Bash(ravel-lite fixed-memory:*)` to whatever
    per-phase allowlist constants govern the work, reflect, and dream
    phases. The implementation step locates the constants
    (`CREATE_ALLOWED_TOOLS` in `src/create.rs:40` is the existing pattern)."

    Investigation: `src/create.rs:40` is the **only** Bash-allowlist string
    constant under `src/agent/` or anywhere a phase prompt's spawn flows.
    The actual phase-loop allowlist mechanism is
    `--dangerously-skip-permissions`, applied to every headless phase per
    `src/agent/claude_code.rs:73,214` when the per-phase `dangerous: true`
    param is set (which `force_dangerous` in `src/main.rs:24-35` always
    sets for triage/work/analyse-work/reflect). The interactive work-phase
    spawn at `src/agent/claude_code.rs:179-225` doesn't pass
    `--allowed-tools` at all — it inherits the user's machine-level
    `settings.json`.

    So there are no per-phase allowlist constants to update for
    work/reflect/dream. Adding `Bash(ravel-lite fixed-memory:*)` to
    `CREATE_ALLOWED_TOOLS` would be incorrect on two counts: (1) the
    create-plan prompt does not currently invoke fixed-memory verbs, so
    the addition would be aspirational, and (2) `CREATE_ALLOWED_TOOLS` is
    the create-flow's allowlist, not a work/reflect/dream one.

    The disposition: leave the allowlists alone. The drift between the
    spec's assumption and the actual code is captured here. If a future
    shipped settings.json or per-phase allowlist constant lands, this
    addition becomes a one-line edit at that point.

    ## What this suggests next

    - **Supersede the blocked `add-ravel-lite-show-verb-for-embedded-fixed-memory-content`
      task.** The spec's §"Blocked-task disposition" calls this out. The
      triage phase should mark that task `done` with a results body
      pointing at this work, since the layered overlay shape shipped here
      is the v2 of what that task was reaching for (and the embedded-only
      shape it originally proposed is explicitly *not* what we want).
    - **The `cli-audit-and-refactor-against-cli-tool-design-md` task is now
      unblocked** — it depends on this one. It will, among other things,
      consolidate the now-12 per-kind `OutputFormat` enums into a shared
      type. The new `fixed_memory::OutputFormat` is a deliberate copy of
      the existing pattern so the audit's scope of work doesn't shift
      underneath it.
    - **Future shipped allowlists.** If any work in
      `architecture-next` lands a settings.json overlay or a per-phase
      allowlist constant for headless phases, that work should add
      `Bash(ravel-lite fixed-memory:*)` at the same time — phase prompts
      authored after this task assume the verbs are reachable.
    - **The "empty H1 = description omitted from list" behaviour** is
      spec-faithful but can surprise an LLM scanning `list` output for a
      user-only slug. Worth keeping an eye on whether any user overlay
      ends up authored without an H1; the JSON test at
      `tests/fixed_memory_cli.rs::list_records_both_sources_for_overlapping_slug`
      exercises only the `description: present` path. Trivial follow-up
      if it bites.
- id: cycle-reorder-triage-first-phase-sequence
  title: 'Cycle reorder: triage-first phase sequence'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Reorder the plan cycle so triage runs first (before work) rather than last (after reflect). This is the prerequisite structural change for the triage-first architecture: triage writes `this-cycle-focus.yaml`, which work consumes; the old end-of-cycle triage placement is removed.

    ## Why

    The v1 cycle order is: work → analyse-work → reflect → triage. The architecture-next design flips this to: triage → work → analyse-work → reflect, so triage can set focus before work starts. Without this reorder, `this-cycle-focus.yaml` has no stable write point and the phase-boundary-mechanics task has no coherent entry condition to wire.

    ## Scope

    - Reorder the phase sequence in `src/phase_loop.rs` so triage precedes work.
    - Update `run_single_plan` and `run_multi_plan` inter-cycle transitions accordingly.
    - Update `ScriptPhase` handlers: `GitCommitTriage` moves to the start of the cycle; `GitCommitReflect` closes it.
    - Confirm `phase_contract_round_trip_writes_expected_files` test still passes with updated cycle order.
    - Confirm `git_commit_triage_leaves_plan_tree_clean_at_user_prompt` still holds.

    ## References

    - `docs/architecture-next.md` §Cycle reorder
    - `src/phase_loop.rs` — phase transition table
    - `src/run.rs` — `run_single_plan` inter-cycle prompt
- id: phase-boundary-mechanics-worktree-mount-drain-at-triage-work
  title: 'Phase-boundary mechanics: worktree mount/drain at triage→work'
  category: architecture-next
  status: not_started
  dependencies:
  - cycle-reorder-triage-first-phase-sequence
  description: |
    Implement the phase-boundary mechanics that mount/unmount target worktrees and drain `target-requests.yaml` at phase transitions, so the two-stream-commits task has a concrete worktree-resolution layer to build on.

    ## Why

    `two-stream-commits` groups commits by `target: ComponentRef` and applies each group in the target's worktree. That requires (a) a mounted worktree per target, (b) a resolver from `ComponentRef` → worktree path, and (c) the `target-requests.yaml` drain that populates `targets.yaml`. Without these mechanics in place, `apply_commits_spec` has no worktree layer to route into.

    ## Scope

    - Drain `target-requests.yaml` at the triage→work phase boundary: read pending requests, resolve each `ComponentRef` against registered repos, mount a `ravel-lite/<plan>/main` worktree per new target, append to `targets.yaml`, then clear the requests file.
    - Expose a `resolve_target_worktree(plan_dir, target: &ComponentRef) -> PathBuf` function that `apply_commits_spec` will use.
    - Unmount worktrees at plan finish (out of scope here; noted for the `plan-finish` task).
    - Tests: draining a request mounts the worktree and writes `targets.yaml`; a second drain of the same ref is idempotent.

    ## Dependencies

    Depends on `cycle-reorder` establishing the triage-first phase boundary at which the drain fires.

    ## References

    - `docs/architecture-next.md` §Target worktrees, §Phase boundaries
    - `src/phase_loop.rs` — `ScriptPhase::GitCommitTriage` handler where drain fires
    - `src/state/target_requests/` — existing read/write layer
    - `src/state/targets/` — `targets.yaml` write layer
- id: two-stream-commits-target-worktrees-first-context-record-last
  title: 'Two-stream commits: target worktrees first, context record last'
  category: architecture-next
  status: not_started
  dependencies:
  - phase-boundary-mechanics-worktree-mount-drain-at-triage-work
  description: |
    Implement the two-stream commit ordering: apply target-worktree commits first, then commit plan-state (context) changes. A target failure must not leave the context recording false-positive progress.

    ## Why

    Currently `GitCommitWork` applies `commits.yaml` and then commits the plan dir in a single sequence without worktree separation. The architecture-next design separates:

    1. **Work commits**: applied in each mounted target's worktree on `ravel-lite/<plan>/main`.
    2. **Context commit**: the plan-state commit (`run-plan: <phase> (<plan>)`) in the ravel context repo.

    Targets first so a target commit failure stops before the context record claims the work landed. Without this ordering, a partial failure produces a context record that overstates progress.

    ## Scope

    - In `apply_commits_spec` (currently `src/git.rs` or new `src/state/commits/`): group commits by their `target: ComponentRef`; apply each group in the target's worktree (resolved via `targets.yaml` + mounted worktrees). Unrouted commits (no `target:` field) fall back to the plan root, preserving v1 behaviour.
    - After all target commits land, run the context-record commit (`git_commit_plan`).
    - Propagate failure: if any target commit fails, abort before the context commit and surface the error.
    - Update `GitCommitWork` handler to delegate to the new two-stream apply path.
    - Tests: commit with two targets asserts target commits precede context commit; failure in second target leaves first committed but context unchanged.

    ## Dependencies

    Depends on phase-boundary-mechanics (which wires the new commit-apply path into the phase loop).

    ## References

    - `docs/architecture-next.md` §Commits (two streams)
    - `src/git.rs::apply_commits_spec` — current implementation
    - `src/phase_loop.rs` — `ScriptPhase::GitCommitWork` handler
- id: migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  title: 'Migrate: ravel-lite migrate for v1 to v2 cutover'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Implement the `ravel-lite migrate <old-plan-path>` verb that cuts a v1 `<project>/LLM_STATE/<plan>` plan over to v2's `<context>/plans/<plan>` model. Hard cutover: the v2 binary refuses to run on unmigrated v1 plans.

    Reference: `docs/architecture-next.md` §Migration sketch, §Settled decisions (cutover policy + backfill).

    Scope (per the 7-step sketch):
    1. Register repos: ensure each project hosting an existing plan is in the new context's `repos.yaml` (URL + local_path).
    2. Run Atlas: index each registered repo so `.atlas/components.yaml` exists. Plans cannot start without this.
    3. Move plan state: copy `<project>/LLM_STATE/<plan>/` → `<context>/plans/<plan>/`. Rename `memory.md` to `legacy_memory.md`; new `memory.yaml` starts mostly empty.
    4. Extract intent (one-shot LLM): the migrate-intent headless phase reads `phase.md` + recent backlog and emits `intents.yaml` with best-effort intents; backlog items get `serves-intent` justifications (or `legacy: true` if unattributable).
    5. Mint targets (one-shot LLM): a headless pass against the project's components.yaml proposes initial `targets.yaml`; user reviews.
    6. Mount worktrees: initialise worktrees from the project's current main per the new mount mechanics.
    7. Backfill memory (one-shot LLM): pass over `legacy_memory.md` produces a `memory.yaml` with `status: legacy` entries. User curates in their own time.

    Verification: dogfood by migrating `LLM_STATE/core` (this very plan) as the canonical test case before the v2.0 release.
- id: plan-finish-pr-merge-with-memory-promotion-and-archive
  title: 'Plan finish: pr/merge with memory promotion and archive'
  category: architecture-next
  status: not_started
  dependencies:
  - phase-boundary-mechanics-worktree-mount-drain-at-triage-work
  description: |
    Implement plan completion: promote plan memory into component memory, ship code + memory together via PR or local fast-forward, archive the plan dir.

    Reference: `docs/architecture-next.md` §`ravel-lite finish <plan>`, §Promotion at plan finish, §Archive, §Continuous attribution.

    Scope:
    - `ravel-lite finish <plan> [--pr | --merge] [--yes]`. Default `--pr`.
    - Completion criterion: every intent has `status: satisfied | defeated | superseded`. Backlog drainage alone does not qualify.
    - `promote` headless phase reads plan memory + intents + targets + catalog (via atlas CLI); emits `promotion-spec.yaml` grouping promotions by satisfied/defeated intent: `{ intent_id, entries: [{ entry_id, target_component }] }`.
    - Runner applies spec mechanically: append entries to `<component-path>/.atlas/memory.yaml`. `cross-root` entries go to `<context>/cross-root-memory.yaml` (or edge-attached when atlas-contracts provides slot — open question).
    - "Highest-level component within a git root" rule: walk the `parent` chain in `components.yaml`, land at lowest common ancestor for entries spanning multiple components in one repo.
    - Confirm-before-commit on promotion-spec by default; `--yes` skips for non-interactive workflows.
    - `--pr`: push each target's plan branch and open a PR per target repo; plan dir stays in `plans/` until all PRs land then moves to `archive/`.
    - `--merge`: fast-forward each target's main onto plan branch locally, delete plan branches, remove worktrees, archive.
    - Archive: `<context>/archive/<plan>/` retains `phase.md`, `intents.yaml`, `backlog.yaml`, post-promotion `memory.yaml`. Worktrees are removed.

    Continuous attribution is enforced upstream in reflect (entries carry target component when authored). Promotion at finish only groups; no fresh attribution reasoning.
- id: curate-standalone-truth-maintenance-replaces-dream-phase
  title: 'Curate: standalone truth maintenance, replaces dream phase'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Add `ravel-lite curate` as a standalone, context-wide truth-maintenance pass over every active plan's memory and every component memory in every registered repo. Replaces the v1 in-cycle dream phase, which is removed entirely.

    Reference: `docs/architecture-next.md` §Curate (unbounded TMS, separate process), §What this replaces or removes.

    Scope:
    - `ravel-lite curate` is invoked by the user on demand (not in plan cycle). Plan execution never blocks on curate.
    - Validate every memory entry against current code: code-anchor SHA checks at scale, rationale entries surfaced for LLM re-evaluation, contradiction detection across entries.
    - Output: `curate-report.yaml` of discrepancies, grouped by component and severity. User reviews and acts (defeat, supersede, edit) — curate proposes, user disposes.
    - Operates on both plan memory (`<plan>/memory.yaml` for active plans) and component memory (`<repo>/<component>/.atlas/memory.yaml`).
    - Remove the v1 `dream` phase entirely from the cycle.

    Coordination: relies on plan KG wiring for the structured memory schema and on the knowledge-graph crate for the cascade primitives.
- id: sync-ravel-lite-sync-plan-from-other-plan
  title: 'Sync: ravel-lite sync plan from other-plan'
  category: architecture-next
  status: not_started
  dependencies:
  - phase-boundary-mechanics-worktree-mount-drain-at-triage-work
  description: |
    Add explicit cross-plan visibility for solo devs running multiple plans in parallel. Replaces the v1 "direct mode" target types from earlier drafts.

    Reference: `docs/architecture-next.md` §`ravel-lite sync <plan> --from <other-plan>`, §What this replaces or removes.

    Scope:
    - `ravel-lite sync <plan> --from <other-plan>`.
    - For each shared target between the two plans: run `git merge <other>'s plan branch` in `<plan>`'s worktree on `<plan>`'s branch.
    - Targets unique to `<other>` are mounted into `<plan>` first.
    - Conflicts surface in the worktree for the user to resolve manually.
    - Worktree isolation is preserved by default; visibility is on-demand and audited via merge commits.
    - Remove the "direct mode" target types entirely from the v1 codebase.

    Out of scope: any auto-sync or rebase-on-main semantics — plan branches stay isolated against main per design.
- id: update-tutorial-and-reference-docs-for-repos-yaml-cutover
  title: Update tutorial and reference docs for repos.yaml cutover
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Re-record and update the published tutorial and reference docs to replace retired `state projects` verbs with the new `repo add/list/remove` CLI shape.

    **Problem being solved:** `docs/tutorial/01-install-and-config.adoc`, `docs/tutorial/02-the-project.adoc`, `docs/reference/cli-state.adoc`, `docs/reference/cross-plan-files.adoc`, and capture transcripts under `docs/captures/ravel-lite-tutorial/transcripts/` all reference the retired `state projects` verbs and `projects.yaml`. Anyone following the published tutorial hits the deprecation alias and bounces.

    **Settled decisions from session 89:**
    - The deprecation alias (`state projects <anything>` → prints migration message, exits non-zero) is intentional and permanent. Don't remove it; just stop documenting the old verbs.
    - The new CLI shape is `ravel-lite repo {add,list,remove}` (top-level, singular, not `state repos`). Reference: `src/main.rs` — the `Repo` top-level subcommand.
    - `projects.yaml` is fully retired. The resolver is now `<config-dir>/repos.yaml` managed via `ravel-lite repo`. Reference: `src/repos.rs`.
    - Capture transcripts at `docs/captures/ravel-lite-tutorial/transcripts/{01-projects-list-empty,02-projects-add,02-projects-list-populated}.txt` must be re-recorded (not hand-edited) to stay coherent with the prose. The re-capture script is `scripts/capture/ravel-lite-tutorial.sh` run against a TestAnyware VM.

    **Dependencies:** Defer until further architecture-next tasks stabilise (especially `targets-and-worktrees` and `ravel-lite create v2`) to avoid double-recapturing the tutorial once more changes land. Only block on this if the tutorial is being actively promoted to new users.

    **Scope:**
    1. Update prose in `docs/tutorial/` and `docs/reference/` to use `repo add/list/remove` vocabulary.
    2. Re-run `scripts/capture/ravel-lite-tutorial.sh` against a VM and replace the three stale transcript files.
    3. Verify no remaining references to `state projects` in docs (grep: `state projects`).
- id: state-intents-render-overview-regenerate-phase-md-from-intents-task-counts
  title: 'state intents render-overview: regenerate phase.md from intents + task counts'
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  description: |
    Add `state intents render-overview` verb that reads `intents.yaml` + active task counts from `backlog.yaml` and writes a structured overview to `phase.md`. Wire into `run_set_phase` so phase.md regenerates on every phase transition.

    **Why this is its own task:** The done `introduce-intents-yaml-and-state-intents-crud-verbs` task deferred this explicitly with the rationale: the render-overview verb separates "compute the overview" from "write the phase file", and reading `backlog.yaml` for task counts during `set-phase` would fail on the current plan (legacy v1 wire shape). The verb should land after the migrator ships and a new binary deploys.

    **Settled design (from intents task results):**
    - `state intents render-overview <plan-dir>` reads `intents.yaml` (active intents) + `backlog.yaml` (active/blocked task counts) and writes a structured `phase.md` overview: intent summary, active counts, housekeeping metadata.
    - `run_set_phase` calls this verb (or its equivalent logic) on every LLM phase transition so `phase.md` is always coherent with current intents + backlog state.
    - `phase.md` transitions from a hand-authored intent-source document (v1) to a machine-generated overview (v2). It is never the canonical intent source; that role moves to `intents.yaml`.
    - The factoring mirrors `compose_prompt` layering: compute separately, write separately.

    **Scope:**
    1. Add `StateCommands::Intents` → `IntentsCommands::RenderOverview` verb in `src/main.rs`.
    2. Implementation reads `read_intents`, `read_backlog`, injects active intent claims + task counts into a Markdown template, writes to `phase.md`.
    3. Update `run_set_phase` to call the render logic after phase file write.
    4. Tests: rendered output includes intent claims, task counts match backlog, phase transitions leave `phase.md` non-empty and structured.

    **Gating constraint:** Must wait until the v1→v2 migrator ships and a new binary deploys — `read_backlog` on `LLM_STATE/core/backlog.yaml` today hits the legacy v1 wire shape and would fail. See `LLM_STATE-shape-frozen` memory entry.
- id: phase-prompt-updates-for-triage-first-cycle-shape
  title: Phase prompt updates for triage-first cycle shape
  category: architecture-next
  status: not_started
  dependencies:
  - two-stream-commits-target-worktrees-first-context-record-last
  description: |
    Update all four phase prompts for the triage-first cycle shape: triage writes `this-cycle-focus.yaml`, work consumes it, analyse-work writes `commits.yaml` with optional `target:` field, reflect closes the cycle. Remove `dream.md` from the in-cycle path.

    ## Why

    The phase prompts (`defaults/phases/triage.md`, `work.md`, `analyse-work.md`, `reflect.md`) were written for the old end-of-cycle-triage shape. After the cycle-reorder, two-stream-commits, and phase-boundary-mechanics tasks land, the prompts need to instruct the LLM to use the new mechanics:

    - **triage.md**: write `this-cycle-focus.yaml` (via `state this-cycle-focus set`); read and drain `focus-objections.yaml` from the prior cycle; new baseline file names.
    - **work.md**: read `this-cycle-focus.yaml` at entry; may write `focus-objections.yaml` (via `state focus-objections add-*` verbs) when a target is wrong, skippable, or premature.
    - **analyse-work.md**: write `commits.yaml` with optional `target: ComponentRef` per commit.
    - **reflect.md**: close the cycle; no longer triggers dream.
    - **dream.md**: update to reflect that it is now only invoked by `ravel-lite curate`, not the plan cycle.

    ## Scope

    1. Update `defaults/phases/triage.md` §Output format with new cycle order and `this-cycle-focus` / `focus-objections` verb examples.
    2. Update `defaults/phases/work.md` to read `this-cycle-focus.yaml` on entry and document `focus-objections` write path.
    3. Update `defaults/phases/analyse-work.md` step 9: `commits.yaml` now supports optional `target:` field.
    4. Update `defaults/phases/reflect.md` to reflect no post-reflect dream in the cycle.
    5. Update `defaults/phases/dream.md` to note standalone-only invocation.
    6. Run drift-guard test (`every_file_under_defaults_is_registered_in_embedded_files`) to confirm no stale embed registrations.
    7. `shipped_pi_prompts_have_no_dangling_tokens` must pass.

    ## Dependencies

    Depends on two-stream-commits (the full new mechanics must be in place before the prompts describe them as active). Also depends on cycle-reorder and phase-boundary-mechanics transitively via two-stream-commits.

    ## References

    - `defaults/phases/` — phase prompt files
    - `src/init.rs` — drift sentinel for `state phase-summary render` substring
    - `src/prompt.rs` — `substitute_tokens` path all prompts go through
- id: cli-audit-and-refactor-against-cli-tool-design-md
  title: CLI audit and refactor against cli-tool-design.md
  category: architecture-next
  status: not_started
  dependencies:
  - implement-fixed-memory-cli-overlay-and-sweep-phase-prompts
  description: |
    Audit and refactor the existing CLI surface against the guidance in `defaults/fixed-memory/cli-tool-design.md`. Each item below maps to an audit-checklist line; the goal is to bring the tree to a uniform standard before the v2 binary deploys.

    ## Scope (driven by cli-tool-design.md §§1-10)

    1. **`--format json` parity** (§1, §4) — every data-producing verb supports `--format yaml|json` with a stable schema. Currently uneven: `repo list` is YAML-only, `atlas list-components` and `atlas summary` are text-only, etc.
    2. **Stable, documented JSON schemas** — every JSON output carries a top-level `schema_version` and a stable shape; document each verb's schema (a `ravel-lite schema <command>` verb per §"Optional but valuable" is one shape).
    3. **Help text examples** (§2) — every subcommand's `--help` includes ≥2 concrete invocation examples. Currently most blocks document args/flags but show no examples.
    4. **Actionable error messages with stable codes** (§3) — every error names a remediation; in `--format json` mode, errors carry a stable `code` field (e.g., `AUTH_REQUIRED`, `NOT_FOUND`).
    5. **Exit-code categories** (§8) — move from anyhow's 0/1 to documented 0/1/2/3/4/5/6 (success / generic failure / usage error / not found / forbidden / conflict / rate-limited). Define a small `ExitCategory` enum that anyhow-style errors map to.
    6. **`OutputFormat` consolidation** — currently 11+ near-identical per-kind enums (`backlog::OutputFormat`, `memory::OutputFormat`, `intents::OutputFormat`, etc.) each with their own `parse_*_format` wrapper in `src/main.rs`. Consolidate to a single shared enum + parse fn.
    7. **Optional discoverability surfaces** — `ravel-lite capabilities` (§"Optional but valuable"), `ravel-lite schema <command>`, possibly `ravel-lite llm-instructions`. Pure additions; ship the high-leverage ones.
    8. **Audit-checklist sweep** — walk the full audit-checklist in cli-tool-design.md §"Audit checklist" and capture remaining findings as inline TODOs that become subtasks if substantial.

    ## Why deferred

    - The fixed-memory verbs from `implement-fixed-memory-cli-overlay-and-sweep-phase-prompts` adhere to existing patterns (YAML-default, kind-local `OutputFormat`) so they don't pre-empt this audit's design choices.
    - The audit is most valuable in one focused pass after in-flight architecture-next feature work settles, so the surface it audits is stable.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` — the guidance document.
    - `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md` §"Audit posture" and §"Out of scope" — the scoping decision that captured this task.
