tasks:
- id: triage-should-not-emit-the-no-dispatch-label-in-its-output
  title: Triage should not emit the 'NO DISPATCH' label in its output
  category: core
  status: not_started
  dependencies: []
  description: |
    The triage phase currently surfaces a `NO DISPATCH` (or similar) marker in
    its rendered output when it has no cross-plan subagent dispatches to make.
    This label is noise — it adds nothing for the user and clutters the
    phase's visible output.

    Scope:

    - Locate the emission site (likely `defaults/phases/triage.md` or the
      downstream renderer that assembles the phase's output / session-log
      entry).
    - Remove the label. If it currently serves any downstream parser, teach
      the parser to infer "no dispatch" from the absence of dispatch records
      rather than from a sentinel string.
    - Verify by running a triage phase on a plan with no cross-plan edges
      and confirming the label is gone from the phase output and from the
      recorded session-log entry.
- id: add-backlog-repair-stale-statuses-cli-verb
  title: Add 'backlog repair-stale-statuses' CLI verb
  category: core
  status: not_started
  dependencies: []
  description: |
    Extract analyse-work's stale-status safety-net into `ravel-lite state backlog repair-stale-statuses`.

    ## What

    Add a new CLI verb that walks `backlog.yaml` and flips stale task statuses:
    - `in_progress` tasks whose `results` field is non-empty → flip to `done`
    - `blocked` tasks whose blocking condition is resolved (all named dependencies now `done`) → flip to `not_started` (unblock)

    Output a diff of what changed (YAML or text). `--dry-run` mode reports proposed changes without applying them.

    ## Why

    Analyse-work §5 currently contains an explicit prose instruction: "safety-net: mark completed tasks as done". The prompt itself says "this is a post-condition check, not a judgement call". It is a pure mechanical scan — every iteration the LLM walks the full backlog looking for status drift. Moving it to Rust removes this cost from the most-expensive phase invocation.

    ## Verb shape (from audit §2.6)

    ```
    ravel-lite state backlog repair-stale-statuses <PLAN_DIR>
      [--dry-run]         # report without writing
      [--format yaml|text]
    ```

    Output (YAML):
    ```yaml
    repairs:
      - task_id: foo
        old_status: in_progress
        new_status: done
        reason: results_non_empty
      - task_id: bar
        old_status: blocked
        new_status: not_started
        reason: dependencies_satisfied
    ```

    Exit code: 0 if no repairs needed, 1 if repairs were applied (to allow scripting).

    ## Prompt change

    Remove §5 "safety-net" section from `defaults/phases/analyse-work.md`. Replace with a one-liner: "Before staging commits, run `ravel-lite state backlog repair-stale-statuses <PLAN_DIR>` and include any repairs in the commit."

    ## Unit tests

    - Task with non-empty results + `in_progress` → repaired to `done`
    - Task with non-empty results + `not_started` → NOT changed (only `in_progress` drifts this way)
    - Task with `blocked` status + all deps done → repaired to `not_started`
    - Task with `blocked` status + some deps still pending → NOT changed
    - `--dry-run` reports repairs without writing
    - Empty backlog → empty output, exit 0
- id: inject-unblocked-blocked-received-survey-counts-from-rust
  title: Inject unblocked/blocked/received survey counts from Rust
  category: core
  status: not_started
  dependencies: []
  description: |
    Inject `unblocked`/`blocked`/`received` survey counts from Rust rather than LLM derivation.

    ## What

    Mirror the existing `inject_task_counts` / `collect_task_counts` pattern to overwrite `PlanRow.unblocked`, `PlanRow.blocked`, and `PlanRow.received` with Rust-computed values. These three fields require a full-backlog dependency traversal that the LLM currently performs every survey invocation.

    ## Why

    Survey is the most-frequently-run LLM invocation in multi-plan mode. The `unblocked`/`blocked` counts require knowing which tasks have all dependencies satisfied (unblocked) vs pending blocked tasks. This is a pure graph query over `backlog.yaml`. `received` tracks tasks that transitioned to done/in-progress this cycle — derivable from the session log. Moving all three to Rust injection eliminates repeated LLM computation, reduces survey prompt size, and guarantees count accuracy.

    ## Implementation shape (from audit §2.4)

    In `src/state/backlog/schema.rs` (or nearby):
    - Add `fn count_unblocked(tasks: &[Task]) -> usize` — tasks whose structured `dependencies` are all in `done` status
    - Add `fn count_blocked(tasks: &[Task]) -> usize` — tasks whose `status == blocked`
    - For `received`: compare current backlog state against `latest-session.yaml` baseline; count tasks that moved into `in_progress` or `done` this cycle

    In `src/survey/schema.rs`:
    - Extend `inject_task_counts` (or add `inject_plan_row_counts`) to also set `unblocked`, `blocked`, `received` on `PlanRow`

    In `defaults/survey.md` and `defaults/survey-incremental.md`:
    - Extend the "forbidden fields" comment (currently covers `task_counts`) to also cover `unblocked`, `blocked`, `received`
    - Note that these are now pre-filled; LLM should leave them as-is

    ## Migration

    `PlanRow` currently has both `task_counts: Option<TaskCounts>` (Rust-injected) and `unblocked`/`blocked`/`received` (LLM-inferred). Once Rust injection is wired, the LLM-inferred fields become redundant. Keep the fields in the struct for schema compat but stop presenting them as LLM-emittable. Eventually they can be removed when no downstream consumer reads the raw `unblocked` field.

    ## Unit tests

    - `count_unblocked` returns 0 when all tasks have incomplete deps
    - `count_unblocked` returns correct count when some deps satisfied
    - `received` is 0 when no tasks transitioned this cycle
    - `received` increments per transitioned task
- id: add-backlog-render-cli-verb-for-deterministic-markdown-table-output
  title: Add 'backlog render' CLI verb for deterministic markdown-table output
  category: core
  status: not_started
  dependencies: []
  description: |
    Extract backlog-table rendering into a CLI verb so phase output is deterministic.

    ## What

    Add a CLI verb that renders `backlog.yaml` as a human-readable markdown
    table, with stable column choices, grouping, and ordering. The verb
    becomes the single source of truth for how the backlog is shown to the
    user in phase output (work, triage) and anywhere else a human-facing
    summary appears.

    Proposed surface — either a new verb or an extension of the existing
    list verb:

    ```
    ravel-lite state backlog list <PLAN_DIR> --format markdown
    # or
    ravel-lite state backlog render <PLAN_DIR> [--group-by category|status] [--show-deps]
    ```

    Output (markdown): one section per category (or per status, with
    `--group-by status`); columns `id | title | status | deps`. Stable
    row ordering: by `not_started` → `in_progress` → `blocked` → `done`,
    then by dependency topology so that roots appear before leaves.

    ## Why

    The work-phase prompt currently instructs the LLM to "display a summary
    of the current backlog". Every run re-invents the presentation:
    column choices, whether to show dependencies inline, grouping
    (by category vs status vs priority), whether to fold `done` tasks,
    what to omit. Result: inconsistent UX across cycles and wasted tokens
    rewriting the same view logic.

    `ravel-lite state backlog list` already emits deterministic YAML. The
    variability lives in the *re-presentation* step — purely mechanical
    formatting work. Moving it to Rust removes that variability, saves
    tokens, and gives the project one canonical backlog view that can
    evolve under version control rather than per-run LLM taste.

    This is the same family as the three other LLM-work audit extractions
    (`lint-dependencies`, `repair-stale-statuses`, `inject-…-counts`),
    but addresses presentation rather than computation. The principle is
    the same: "Never do in an LLM what you can do in code".

    ## Prompt changes

    Update `defaults/phases/work.md` (and any other phase that currently
    instructs the LLM to render a backlog summary — check triage and the
    survey prompts): replace the "display a summary" instruction with a
    one-liner directing the LLM to run the new CLI and reproduce its
    output verbatim.

    Example replacement:

    > Run `ravel-lite state backlog list <PLAN_DIR> --format markdown` and
    > emit its output directly. Do not reformat or reorder.

    ## Unit tests

    - Empty backlog → a minimal empty-state rendering (no panic, no empty
      tables)
    - Tasks across all four statuses → rows ordered `not_started` →
      `in_progress` → `blocked` → `done`
    - Tasks with dependency chains → roots render before leaves within
      their status group
    - `--group-by category` vs `--group-by status` produce the expected
      sections
    - Long task titles and multi-line descriptions → table cells stay
      single-line (truncate or elide body; never break the table)

    ## Notes / scope

    - Column choices are a matter of taste; picking them in Rust bakes
      them in, but they remain trivial to change in one place. Prefer a
      small, opinionated default over a flag-heavy surface.
    - If other phases render backlog summaries for slightly different
      purposes, consider one verb with modes (`--mode work | triage |
      survey`) rather than several near-duplicate verbs.
    - Related standing memory: "Never do in an LLM what you can do in
      code". Presentation is mechanical; this extraction fits squarely
      within that rule.
- id: analyse-work-better-analysis-split-commits-by-hunk-better-messages
  title: 'Analyse-work: better analysis, split commits by hunk, better messages'
  category: core
  status: not_started
  dependencies: []
  description: |
    Analyse-work currently produces low-information commit messages —
    `run-plan: triage (core)` is a typical example, which is both misleading
    (it is the analyse-work phase committing on behalf of the previous
    phase, not "running" triage) and uninformative (it says nothing about
    what actually changed).

    Goal: make analyse-work produce commit records that genuinely describe
    what the previous phase accomplished, drawing on all the evidence the
    orchestrator has at commit time — `git diff` / `git status`,
    `latest-session.yaml`, the Results block the work phase wrote, and the
    backlog transition — and split the commit into multiple commits (using
    `git add -p` / hunks where necessary) when the diff spans clearly
    independent concerns.

    Scope — three threads, each dependent on the next:

    1. **Inputs to analyse-work.** Audit what analyse-work currently
       consumes. At minimum it should see: the full diff (already does),
       the `latest-session.yaml` Results block written by the work phase,
       the backlog transition (task id + status change), and the phase
       that just finished. If any of these is not already wired into the
       analyse-work prompt, wire it in (deterministically, via the Rust
       side that assembles prompt inputs — not via the LLM reading files).

    2. **Multi-commit splitting.** Today analyse-work produces a single
       commit per phase. Teach it to split when the diff spans clearly
       independent concerns (e.g. a backlog edit plus a source-file fix
       plus a docs update). Mechanism: either (a) the LLM emits a
       sequence of commit specs (message + pathspec or hunk spec) and
       Rust applies them, or (b) a deterministic pre-step partitions the
       diff by path / hunk and the LLM writes one message per partition.
       Prefer (b) where the partition is obvious (path-based); reserve
       (a) for cases where the LLM genuinely needs to reason about
       which hunks belong together. Use `git add -p` / patch application
       where hunk-level granularity is required.

    3. **Message quality.** Commit messages should describe *what
       changed* and *why*, drawn from the Results block and the diff,
       not the phase name. The phase prefix (`run-plan: <phase>
       (<plan>)`) is the audit-trail wrapper — keep it, but require a
       meaningful body. Concretely: a one-line summary that reads like
       a human-authored commit (imperative mood, names the actual
       change), followed by a body that cites the task id and briefly
       explains the motivation from the Results block.

    Verification: run a full work → analyse-work cycle that includes both
    source changes and LLM_STATE/ changes; confirm the resulting commit(s)
    partition the diff sensibly and carry informative messages.

    Related standing memory: "Never do in an LLM what you can do in code"
    — path-based partitioning is mechanical and should live in Rust; the
    LLM's job is the prose.
