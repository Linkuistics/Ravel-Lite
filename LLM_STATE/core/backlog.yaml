- id: add-phase-summary-render-cli-verb-for-deterministic-triage-reflect-summaries
  title: Add phase-summary render CLI verb for deterministic triage/reflect summaries
  category: core
  status: not_started
  dependencies: []
  description: |
    Add `state phase-summary render` CLI verb for deterministic phase operation summaries.

    ## What

    Add a CLI verb that renders the operation-summary block emitted at the end of the **triage** and **reflect** phases deterministically, from the ground truth of what actually happened — not from what the LLM remembers doing.

    Proposed surface:

    ```
    ravel-lite state phase-summary render <PLAN_DIR> --phase triage|reflect
        [--baseline <sha>]   # git sha holding the phase-start snapshot
        [--format text|yaml]
    ```

    The verb computes the difference between the baseline snapshot of `backlog.yaml` / `memory.yaml` (captured at phase start) and the current working-tree state, then emits the labelled lines the phase prompts currently ask the LLM to produce:

    Triage:

    ```
    [DONE] <task title> — …
    [NEW] <task title> — …
    [PROMOTED] <hand-off title> — from <completed task title>
    [ARCHIVED] <hand-off title> — to memory, from <completed task title>
    [BLOCKER] <task title> — extracted from <parent task>
    [REPRIORITISED] <task title> — <old → new>
    [OBSOLETE] <task title> — <why no longer relevant>
    [DISPATCH] <kind>: <target path> — <summary>
    ```

    Reflect:

    ```
    [NEW] <heading> — <body one-liner>
    [IMPRECISE] <heading> — <body one-liner>
    [STALE] <heading> — <body one-liner>
    [OBSOLETE] <heading> — <body one-liner>
    ```

    For labels where the reason is ambient (REPRIORITISED, NEW, OBSOLETE), derive it from the diff itself (before/after position; new id; deleted id). For labels that carry intent the diff can't recover (`[PROMOTED]` vs just `[NEW]`, `[BLOCKER]` vs `[NEW]`, `[IMPRECISE]` vs `[STALE]` for memory edits), the LLM still has to tag the operation — see "Intent tagging" below.

    ## Why

    Two adjacent phase prompts (`triage.md` §output-format, `reflect.md` §output-format) currently contain explicit label lists that the LLM is asked to produce after finishing its work. These are pure re-presentations of mutations that the state CLIs already recorded — the LLM is essentially re-transcribing its own tool calls. This costs tokens every triage and every reflect run, varies slightly across cycles, and duplicates information the filesystem already holds.

    Exactly the same pattern as task `add-backlog-render-cli-verb-for-deterministic-markdown-table-output`: presentation variability extracted to a canonical Rust renderer. Also subsumes `triage-should-not-emit-the-no-dispatch-label-in-its-output` — the `[NO DISPATCH]` sentinel goes away naturally when a renderer simply emits nothing for an empty dispatch list.

    ## Intent tagging

    Some labels carry intent that a pure structural diff can't recover:

    - `[PROMOTED]` / `[ARCHIVED]` vs plain `[NEW]` (triage)
    - `[BLOCKER]` extracted from a parent task vs plain `[NEW]`
    - `[IMPRECISE]` vs `[STALE]` for a memory body update

    Options:

    1. Add an optional `--intent <label>` flag to the mutating verbs (`state backlog add --intent promoted`, `state memory set-body --intent imprecise`) that annotates the transition in a sidecar `ops.log.yaml` the renderer consumes. Falls back to structural labels when unset.
    2. Keep intent tagging out of Rust entirely: the renderer emits only labels recoverable from the diff (`[NEW]`, `[OBSOLETE]`, `[REPRIORITISED]`, `[STALE]`), and the phase prompts no longer ask for the richer labels at all. Simpler, but loses the promoted/archived distinction.

    Pick (1) if the richer labels are actually consumed anywhere; pick (2) if they exist only for human readability of the phase output.

    ## Prompt changes

    - `defaults/phases/triage.md`: delete the `## Output format` block (lines ~120-137). Replace with: "After completing all mutations, run `ravel-lite state phase-summary render {{PLAN}} --phase triage` and emit its output verbatim."
    - `defaults/phases/reflect.md`: same treatment for the `## Output format` block (lines ~58-71).

    ## Unit tests

    - Triage with only `[NEW]` additions → emits one `[NEW]` line per added task, in topological/priority order, nothing else.
    - Triage with a reorder → emits `[REPRIORITISED]` with `<old index → new index>` or equivalent stable ordinal representation.
    - Triage with zero mutations → emits nothing (no `[NO DISPATCH]`, no "no changes" line — silence is the answer).
    - Reflect with a memory body update → emits `[STALE]` (default for body-only changes) unless `--intent imprecise` was passed.
    - Empty baseline vs non-empty current → handled without panic (first-cycle case).

    ## Related tasks

    - Task `add-backlog-render-cli-verb-for-deterministic-markdown-table-output` — sibling extraction for backlog-table rendering. Same philosophy, different surface.
    - Task `triage-should-not-emit-the-no-dispatch-label-in-its-output` — subsumed by this task. Close with a cross-reference if this one lands first.
    - Standing memory: "Never do in an LLM what you can do in code".
