    ## Likely remaining checklist items

    - **List default limits**. Confirm or add: `state backlog list`,
      `state memory list`, etc. cap rows by default with `--limit N`
      and `--all` overrides.
    - **TTY-detection / no-color in pipes**. Confirm: no ANSI bytes
      reach JSON/YAML output. Skim helpers in `format.rs` (TUI
      styling) and confirm they don't leak into headless verb paths.
    - **Verb/noun ordering consistency**. cli-tool-design.md §5 is
