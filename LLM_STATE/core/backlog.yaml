tasks:
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
- id: reconcile-architecture-md-drift-and-cut-v1-0-4-release
  title: Reconcile architecture.md drift and cut v1.0.4 release
  category: release
  status: done
  dependencies: []
  description: |
    Pre-architecture-next groundwork: bring `docs/architecture.md` back in
    line with current code reality, then cut a clean v1.0.4 release as the
    baseline the architecture-next migration will diff against.

    ## Scope

    1. Mechanical render-sync check — confirm `website/docs/*.html` and
       `website/tutorials/*.html` are in sync with their `.adoc` sources.
    2. Audit `docs/architecture.md` and `docs/component-ontology.md` against
       current source tree; fix drifted content.
    3. Spot-check the recently-rewritten `docs/reference/*.adoc` and
       `docs/tutorial/*.adoc` for stale state-file shapes / CLI surface.
    4. Sanity-check `README.md` release flow.
    5. Cut v1.0.4 via the README-documented flow:
       `cargo release patch --execute` → `git push origin main --follow-tags`
       → `./scripts/release-build.sh` → `./scripts/release-publish.sh`.

    ## Why

    The user is about to start the architecture-next migration (the redesign
    captured in `docs/architecture-next.md`). That migration will be driven
    by the *current* version of ravel-lite, so v1.0.4 is the clean
    starting-point release: the binary that will manage the changes that
    reshape itself.
  results: |
    ## Outcome

    Both parts shipped in this single work cycle.

    ### Part A — Doc audit

    `docs/architecture.md` was the only doc with material drift; everything
    else was already current. Single commit `052b92b` reconciles it
    (+194/-64 lines):

    - **Plan directory layout** — state files are now `backlog.yaml`,
      `memory.yaml`, `session-log.yaml`, `latest-session.yaml`; added all
      five per-phase baseline files (`work-baseline`, `reflect-baseline`,
      `triage-baseline`, `dream-baseline`, `dream-word-count`).
    - **Project root rule** — replaced the stale "walk up to `.git`" claim
      with the actual `<plan>/../..` path math, matching `git.rs:325`
      (`project_root_for_plan`) and `README.md`.
    - **Source tree** — added the 6+ files added since v1.0.3:
      `src/agent/pty_capture.rs`, `src/config_lua.rs`, `src/debug_log.rs`,
      `src/phase_summary.rs`, `src/backlog_transitions.rs`,
      `src/migrate_v1_to_v2.rs`, `src/state/filenames.rs`, plus the new
      `state/backlog/{lint_dependencies,render,repair_stale_statuses}.rs`.
    - **Configuration section** — replaced the retired `*.local.yaml`
      overlay model with the actual layered Lua resolver. The Lua API
      description was corrected for arity (`set_model(phase, name)` for
      active agent, `set_model_for(agent, phase, name)` for explicit
      targeting; full surface includes `set_agent`, `set_headroom`,
      `set_token`, `append_prompt`, plus the writable `ravel.config`
      table).
    - **CLI section** — added `state` (with all 9 subcommands),
      `survey-format`, `version`; updated `run` for multi-plan mode and
      `--survey-state`.
    - **Principles** — softened the over-stated "no CLI flags" claim
      since `--dangerous` and survey's `--model` exist.
    - **Cleanups** — residual `memory.md` / `backlog.md` references in
      the ClaudeCodeAgent description and the viewport example were
      flipped to `.yaml`.

    Verified clean for the rest:

    - `./scripts/render-docs.sh` produced no diff — `website/docs/*.html`
      and `website/tutorials/*.html` were already in sync with their
      `.adoc` sources.
    - `docs/component-ontology.md` matches `defaults/ontology.yaml` (17
      kinds × correct lifecycles × evidence grades).
    - Reference docs cover the current CLI surface
      (`cli-lifecycle.adoc` → init/create/run/version,
      `cli-state.adoc` → all 9 state subcommands,
      `cli-survey.adoc` → survey + survey-format).
    - `README.md` was already updated to describe the new docs pipeline
      (commit `24086b6` retired `build-docs.sh`/`manifest.txt` etc.).
    - `cargo check` clean.

    ### Part B — v1.0.4 release

    `docs/architecture.md` committed first (`052b92b`), then standard
    release flow per `README.md`:

    1. `cargo release patch --execute` → `6e56c82` (`chore: release v1.0.4`)
       + tag `v1.0.4`, with `Cargo.toml` and `Cargo.lock` version bumps.
       `release.toml` keeps `publish = false` (not a crates.io crate) and
       `push = false` (local inspection before remote side-effect).
    2. `git push origin main --follow-tags` → 73 commits + tag pushed to
       `Linkuistics/Ravel-Lite`.
    3. `./scripts/release-build.sh` → 4 cross-target tarballs (~1.6–1.9 MB
       each) + rendered Homebrew formula in `target/dist/`. SHA256s
       captured in the formula.
    4. `./scripts/release-publish.sh` → GitHub Release v1.0.4 created with
       all 4 tarballs uploaded; formula committed to
       `Linkuistics/homebrew-taps` (`c300a16`) and pushed.

    Live URLs:

    - https://github.com/Linkuistics/Ravel-Lite/releases/tag/v1.0.4
    - `brew install linkuistics/taps/ravel-lite` now installs v1.0.4

    ## What worked

    - The README's release flow worked end-to-end without modification.
      Every prerequisite check in `release-build.sh`'s release-doctor
      passed (zig 0.16.0, cargo-zigbuild, rustup targets, gh auth).
    - Build is fast (~12 s per target × 4 targets); Linux glibc floor 2.17
      preserved.
    - `cargo-release` correctly skipped `cargo publish` (per `release.toml`)
      and left the push as a separate manual step, so the commit + tag could
      be inspected locally before any remote side-effect.

    ## What didn't

    Nothing failed. One small process note:

    - The Lua API description in my first pass had the wrong arity for
      `set_model` (3-arg form) — caught and corrected by checking
      `config_lua.rs:195/224/307`. Future audit work should grep for
      `set_function`/`set` registrations rather than relying on the
      module-level doc-comment to enumerate the API.

    ## Suggests next

    - The next work cycle (or, more accurately, the next *several* cycles)
      is the architecture-next migration as captured in
      `docs/architecture-next.md`. v1.0.4 is now the baseline that will
      manage that migration.
    - The blocked PTY-capture task (`add-pty-capture-debug-path-to-pi-rs-...`)
      is a small wiring job and remains correctly deferred — pi-side TUI
      debugging still hasn't surfaced as a need.
- id: default-config-location-to-config-ravel-lite-on-both-linux-and-macos-and-make-init-path-optional
  title: Default config location to ~/.config/ravel-lite on both Linux and macOS, and make init path optional
  category: ux
  status: not_started
  dependencies: []
  description: |
    Two small UX changes that travel together:

    1. Use `~/.config/ravel-lite/` as the default config-directory location
       on **both** Linux and macOS (and any platform with `$HOME`),
       replacing the current `dirs::config_dir()` lookup which on macOS
       resolves to `~/Library/Application Support/ravel-lite/`.
    2. Make the `<dir>` argument to `ravel-lite init` optional. When
       omitted, init scaffolds at the default location above.

    ## Why

    `dirs::config_dir()` follows platform conventions (Apple's "Application
    Support" on macOS, XDG on Linux), but ravel-lite is a developer tool
    where users routinely move between Linux and macOS workstations and
    expect the config to live in the same place. The platform split makes
    shell aliases, dotfile sync (chezmoi/yadm/stow), and copy-paste
    instructions in tutorials painful.

    The new default — XDG-uniform `~/.config/ravel-lite/` everywhere — is
    also what every other developer tool that's primarily edited by hand
    (neovim, helix, wezterm, ghostty) does on macOS. The platform-native
    location is right for GUI app data, wrong for hand-edited config.

    Making `init` path-optional is the obvious paired change: with a
    predictable default location, the friendly first-run experience is
    `ravel-lite init` followed by `ravel-lite create my-plan` — no path
    argument needed.

    ## Scope

    ### Code

    - `src/config.rs::resolve_config_dir` — replace the `dirs::config_dir()`
      branch with `dirs::home_dir().map(|h| h.join(".config/ravel-lite"))`.
      Keep `--config` and `RAVEL_LITE_CONFIG` precedence unchanged.
    - `src/main.rs` — make the `dir` argument on the `init` subcommand
      optional. When absent, resolve the same default as
      `resolve_config_dir` (extract the default to a shared helper so the
      init path and the run path can't drift).
    - `src/init.rs` — accept the resolved default path and create parent
      directories on the way down (mkdir -p) since `~/.config/` may not
      exist on a fresh macOS account.
    - Update tests covering config discovery and init defaulting.

    ### Docs

    - `README.md` — first-run section, if it mentions the config location.
    - `docs/architecture.md` — "Config discovery" section currently says
      "Default location: `<dirs::config_dir()>/ravel-lite/`"; update to the
      new uniform path.
    - `docs/reference/cli-lifecycle.adoc` — `init` subcommand description
      needs to document the optional dir + default path.
    - `docs/reference/config-and-prompts.adoc` — config discovery section.
    - `docs/tutorial/01-install-and-config.adoc` — first-time setup steps.

    ## Out of scope

    - A migration helper for users who already have a config at the old
      macOS location. Document the move in the release notes; users can
      symlink or copy. Adding a migrator is more code and risk than this
      change deserves.
    - Any change to `RAVEL_LITE_CONFIG` semantics or precedence.
    - Windows behaviour. `dirs::config_dir()` returns `%APPDATA%` on
      Windows; ravel-lite is not currently distributed for Windows so the
      question is moot. If/when it ships there, revisit.

    ## Sequencing

    This is post-architecture-next work. The architecture-next migration
    reshapes the entire config / project / plan model (new
    `<ravel-context>/` root, etc.), and any work on the v1 default
    location is wasted effort until that lands. Park this until the
    migration is complete, then address it before the next release.
