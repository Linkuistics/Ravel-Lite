tasks:
- id: migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  title: 'Migrate: ravel-lite migrate for v1 to v2 cutover'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Implement the `ravel-lite migrate <old-plan-path>` verb that cuts a v1 `<project>/LLM_STATE/<plan>` plan over to v2's `<context>/plans/<plan>` model. Hard cutover: the v2 binary refuses to run on unmigrated v1 plans.

    Reference: `docs/architecture-next.md` §Migration sketch, §Settled decisions (cutover policy + backfill).

    Scope (per the 7-step sketch):
    1. Register repos: ensure each project hosting an existing plan is in the new context's `repos.yaml` (URL + local_path).
    2. Run Atlas: index each registered repo so `.atlas/components.yaml` exists. Plans cannot start without this.
    3. Move plan state: copy `<project>/LLM_STATE/<plan>/` → `<context>/plans/<plan>/`. Rename `memory.md` to `legacy_memory.md`; new `memory.yaml` starts mostly empty.
    4. Extract intent (one-shot LLM): the migrate-intent headless phase reads `phase.md` + recent backlog and emits `intents.yaml` with best-effort intents; backlog items get `serves-intent` justifications (or `legacy: true` if unattributable).
    5. Mint targets (one-shot LLM): a headless pass against the project's components.yaml proposes initial `targets.yaml`; user reviews.
    6. Mount worktrees: initialise worktrees from the project's current main per the new mount mechanics.
    7. Backfill memory (one-shot LLM): pass over `legacy_memory.md` produces a `memory.yaml` with `status: legacy` entries. User curates in their own time.

    Verification: dogfood by migrating `LLM_STATE/core` (this very plan) as the canonical test case before the v2.0 release.
- id: plan-finish-pr-merge-with-memory-promotion-and-archive
  title: 'Plan finish: pr/merge with memory promotion and archive'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Implement plan completion: promote plan memory into component memory, ship code + memory together via PR or local fast-forward, archive the plan dir.

    Reference: `docs/architecture-next.md` §`ravel-lite finish <plan>`, §Promotion at plan finish, §Archive, §Continuous attribution.

    Scope:
    - `ravel-lite finish <plan> [--pr | --merge] [--yes]`. Default `--pr`.
    - Completion criterion: every intent has `status: satisfied | defeated | superseded`. Backlog drainage alone does not qualify.
    - `promote` headless phase reads plan memory + intents + targets + catalog (via atlas CLI); emits `promotion-spec.yaml` grouping promotions by satisfied/defeated intent: `{ intent_id, entries: [{ entry_id, target_component }] }`.
    - Runner applies spec mechanically: append entries to `<component-path>/.atlas/memory.yaml`. `cross-root` entries go to `<context>/cross-root-memory.yaml` (or edge-attached when atlas-contracts provides slot — open question).
    - "Highest-level component within a git root" rule: walk the `parent` chain in `components.yaml`, land at lowest common ancestor for entries spanning multiple components in one repo.
    - Confirm-before-commit on promotion-spec by default; `--yes` skips for non-interactive workflows.
    - `--pr`: push each target's plan branch and open a PR per target repo; plan dir stays in `plans/` until all PRs land then moves to `archive/`.
    - `--merge`: fast-forward each target's main onto plan branch locally, delete plan branches, remove worktrees, archive.
    - Archive: `<context>/archive/<plan>/` retains `phase.md`, `intents.yaml`, `backlog.yaml`, post-promotion `memory.yaml`. Worktrees are removed.

    Continuous attribution is enforced upstream in reflect (entries carry target component when authored). Promotion at finish only groups; no fresh attribution reasoning.
- id: curate-standalone-truth-maintenance-replaces-dream-phase
  title: 'Curate: standalone truth maintenance, replaces dream phase'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Add `ravel-lite curate` as a standalone, context-wide truth-maintenance pass over every active plan's memory and every component memory in every registered repo. Replaces the v1 in-cycle dream phase, which is removed entirely.

    Reference: `docs/architecture-next.md` §Curate (unbounded TMS, separate process), §What this replaces or removes.

    Scope:
    - `ravel-lite curate` is invoked by the user on demand (not in plan cycle). Plan execution never blocks on curate.
    - Validate every memory entry against current code: code-anchor SHA checks at scale, rationale entries surfaced for LLM re-evaluation, contradiction detection across entries.
    - Output: `curate-report.yaml` of discrepancies, grouped by component and severity. User reviews and acts (defeat, supersede, edit) — curate proposes, user disposes.
    - Operates on both plan memory (`<plan>/memory.yaml` for active plans) and component memory (`<repo>/<component>/.atlas/memory.yaml`).
    - Remove the v1 `dream` phase entirely from the cycle.

    Coordination: relies on plan KG wiring for the structured memory schema and on the knowledge-graph crate for the cascade primitives.
- id: sync-ravel-lite-sync-plan-from-other-plan
  title: 'Sync: ravel-lite sync plan from other-plan'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Add explicit cross-plan visibility for solo devs running multiple plans in parallel. Replaces the v1 "direct mode" target types from earlier drafts.

    Reference: `docs/architecture-next.md` §`ravel-lite sync <plan> --from <other-plan>`, §What this replaces or removes.

    Scope:
    - `ravel-lite sync <plan> --from <other-plan>`.
    - For each shared target between the two plans: run `git merge <other>'s plan branch` in `<plan>`'s worktree on `<plan>`'s branch.
    - Targets unique to `<other>` are mounted into `<plan>` first.
    - Conflicts surface in the worktree for the user to resolve manually.
    - Worktree isolation is preserved by default; visibility is on-demand and audited via merge commits.
    - Remove the "direct mode" target types entirely from the v1 codebase.

    Out of scope: any auto-sync or rebase-on-main semantics — plan branches stay isolated against main per design.
- id: update-tutorial-and-reference-docs-for-repos-yaml-cutover
  title: Update tutorial and reference docs for repos.yaml cutover
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Re-record and update the published tutorial and reference docs to replace retired `state projects` verbs with the new `repo add/list/remove` CLI shape.

    **Problem being solved:** `docs/tutorial/01-install-and-config.adoc`, `docs/tutorial/02-the-project.adoc`, `docs/reference/cli-state.adoc`, `docs/reference/cross-plan-files.adoc`, and capture transcripts under `docs/captures/ravel-lite-tutorial/transcripts/` all reference the retired `state projects` verbs and `projects.yaml`. Anyone following the published tutorial hits the deprecation alias and bounces.

    **Settled decisions from session 89:**
    - The deprecation alias (`state projects <anything>` → prints migration message, exits non-zero) is intentional and permanent. Don't remove it; just stop documenting the old verbs.
    - The new CLI shape is `ravel-lite repo {add,list,remove}` (top-level, singular, not `state repos`). Reference: `src/main.rs` — the `Repo` top-level subcommand.
    - `projects.yaml` is fully retired. The resolver is now `<config-dir>/repos.yaml` managed via `ravel-lite repo`. Reference: `src/repos.rs`.
    - Capture transcripts at `docs/captures/ravel-lite-tutorial/transcripts/{01-projects-list-empty,02-projects-add,02-projects-list-populated}.txt` must be re-recorded (not hand-edited) to stay coherent with the prose. The re-capture script is `scripts/capture/ravel-lite-tutorial.sh` run against a TestAnyware VM.

    **Dependencies:** Defer until further architecture-next tasks stabilise (especially `targets-and-worktrees` and `ravel-lite create v2`) to avoid double-recapturing the tutorial once more changes land. Only block on this if the tutorial is being actively promoted to new users.

    **Scope:**
    1. Update prose in `docs/tutorial/` and `docs/reference/` to use `repo add/list/remove` vocabulary.
    2. Re-run `scripts/capture/ravel-lite-tutorial.sh` against a VM and replace the three stale transcript files.
    3. Verify no remaining references to `state projects` in docs (grep: `state projects`).
- id: state-intents-render-overview-regenerate-phase-md-from-intents-task-counts
  title: 'state intents render-overview: regenerate phase.md from intents + task counts'
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  description: |
    Add `state intents render-overview` verb that reads `intents.yaml` + active task counts from `backlog.yaml` and writes a structured overview to `phase.md`. Wire into `run_set_phase` so phase.md regenerates on every phase transition.

    **Why this is its own task:** The done `introduce-intents-yaml-and-state-intents-crud-verbs` task deferred this explicitly with the rationale: the render-overview verb separates "compute the overview" from "write the phase file", and reading `backlog.yaml` for task counts during `set-phase` would fail on the current plan (legacy v1 wire shape). The verb should land after the migrator ships and a new binary deploys.

    **Settled design (from intents task results):**
    - `state intents render-overview <plan-dir>` reads `intents.yaml` (active intents) + `backlog.yaml` (active/blocked task counts) and writes a structured `phase.md` overview: intent summary, active counts, housekeeping metadata.
    - `run_set_phase` calls this verb (or its equivalent logic) on every LLM phase transition so `phase.md` is always coherent with current intents + backlog state.
    - `phase.md` transitions from a hand-authored intent-source document (v1) to a machine-generated overview (v2). It is never the canonical intent source; that role moves to `intents.yaml`.
    - The factoring mirrors `compose_prompt` layering: compute separately, write separately.

    **Scope:**
    1. Add `StateCommands::Intents` → `IntentsCommands::RenderOverview` verb in `src/main.rs`.
    2. Implementation reads `read_intents`, `read_backlog`, injects active intent claims + task counts into a Markdown template, writes to `phase.md`.
    3. Update `run_set_phase` to call the render logic after phase file write.
    4. Tests: rendered output includes intent claims, task counts match backlog, phase transitions leave `phase.md` non-empty and structured.

    **Gating constraint:** Must wait until the v1→v2 migrator ships and a new binary deploys — `read_backlog` on `LLM_STATE/core/backlog.yaml` today hits the legacy v1 wire shape and would fail. See `LLM_STATE-shape-frozen` memory entry.
- id: rename-phase-baselines-to-per-worktree-yaml-map-shape-prompts-phase-loop-rs
  title: Rename phase baselines to per-worktree YAML map shape (prompts + phase_loop.rs)
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  description: |
    When per-worktree YAML baseline maps land as part of the v2 architecture, sweep
    `defaults/phases/*.md` and `src/phase_loop.rs` together to rename the flat phase
    baseline files.

    ## Why

    The completed `phase-prompt-updates-for-triage-first-cycle-shape` task explicitly
    deferred this: `defaults/phases/triage.md` et al. contain shell-out patterns like
    `cat {{PLAN}}/<phase>-baseline 2>/dev/null` that must rename in lockstep with the
    runner-side `git_save_baseline` calls in `phase_loop.rs`. If either side moves
    alone, the renderer's shell-out fails silently (`2>/dev/null` swallows it).

    ## Scope

    1. Update the four `git_save_baseline` call sites in `src/phase_loop.rs` to use the
       new per-worktree YAML map shape (exact API TBD when the v2 baseline spec lands).
    2. Update the corresponding `cat {{PLAN}}/<phase>-baseline` shell fragments in
       `defaults/phases/triage.md` and the renderer call in
       `ravel-lite state phase-summary render`.
    3. Confirm `every_file_under_defaults_is_registered_in_embedded_files` and
       `shipped_pi_prompts_have_no_dangling_tokens` still pass.

    ## Gating constraint

    Blocked on `migrate-ravel-lite-migrate-for-v1-to-v2-cutover` shipping a new binary
    and the per-worktree YAML baseline spec being settled in `docs/architecture-next.md`.
    Do not rename ahead of the spec or the renderer call will break silently.
- id: add-pty-capture-debug-path-to-pi-rs-invoke-interactive-parity-with-claude-code-rs
  title: Add PTY-capture debug path to pi.rs::invoke_interactive (parity with claude_code.rs)
  category: infra
  status: blocked
  blocked_reason: Not needed yet; defer until pi-side TUI debugging actually requires it
  dependencies: []
  description: |
    Add the same PTY-capture path to `pi.rs::invoke_interactive` that was
    built for `claude_code.rs` in the PTY-capture task. The mechanism is
    already implemented in `src/agent/pty_capture.rs`; this task is a
    small scope wiring job.

    ## Why

    When debug logging is enabled, `claude_code.rs::invoke_interactive` now
    routes through `pty_capture::run_pty_session`, capturing every byte
    exchanged with the claude subprocess in the debug log. The `pi.rs`
    equivalent still uses inherited stdio (`stdio: inherited (no transcript
    available)` per the Results from the PTY-capture task). A pi TUI hang
    would have the same diagnostic blind spot the claude hang had before the
    PTY work shipped.

    ## Scope

    - In `src/agent/pi.rs::invoke_interactive`, add an early branch:
      when `debug_log::is_enabled()`, call
      `pty_capture::run_pty_session("pi", &args, &cwd, "pi")` via
      `spawn_blocking`, matching the pattern in `claude_code.rs`.
    - Existing argv construction is shared; only the spawn mechanism differs.
    - Update the log entry text to read `stdio: pty (full byte transcript
      follows)` on the debug path, matching the claude path.

    ## Verification

    - `cargo test` passes (all PTY-capture unit/integration tests still
      pass; the pi tests are unaffected because none exercise the debug path).
    - Non-debug pi invocation: TUI renders identically, no behaviour change.
    - Debug-enabled pi invocation: TUI renders identically AND debug log
      captures the pi byte stream.
- id: cli-stable-error-codes-and-json-error-envelope
  title: 'CLI: stable error codes and JSON error envelope'
  category: architecture-next
  status: done
  dependencies: []
  description: |
    CLI audit scope item #4 (cli-tool-design.md §3): every error names a
    remediation, and in `--format json` mode errors carry a stable `code`
    field that agents can branch on without parsing the message.

    ## Required pieces

    1. Define a stable error-code vocabulary as a typed enum (e.g.
       `AUTH_REQUIRED`, `NOT_FOUND`, `INVALID_INPUT`, `CONFLICT`,
       `IO_ERROR`, `RATE_LIMITED`). Aligned with the `ExitCategory`
       work — same enum can drive both the JSON `code` field and the
       process exit code if convenient.
    2. JSON-mode error envelope: when the user passed `--format json`,
       serialise errors as `{"error": {"code": "...", "message": "...",
       "remediation": "..."}}` to stdout (or stderr — pick one and
       document) with a non-zero exit. No mixing of prose stderr with
       structured stdout.
    3. Audit current bail!/anyhow! call sites and tag each with a code.
       Ones without an obvious remediation should say so explicitly so
       agents stop retrying.

    ## Why typed-not-stringly

    Per the project's "Prefer typed APIs over stringly-typed" rule, the
    error code vocabulary must be a Rust enum with `as_str()`/`Display`,
    not free-form strings sprinkled through bail! call sites. Otherwise
    a typo silently breaks agent branching.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §3 and §"Anti-patterns
      to flag" (Vague errors).
  results: |
    ## What shipped

    Three new `src/cli/` modules:

    - `cli/error_code.rs`: `ErrorCode` enum with seven variants
      (`AuthRequired`, `InvalidInput`, `NotFound`, `Conflict`, `IoError`,
      `RateLimited`, `Internal`), `as_str()` → wire-form
      `"AUTH_REQUIRED"` etc., `parse_opt(&str)` round-trip, and `all()` for
      enumerating the vocabulary. Typed-not-stringly per the
      "Prefer typed APIs over stringly-typed" memory entry.
    - `cli/error_envelope.rs`: `JsonErrorEnvelope { error: { code, message,
      remediation } }` with optional remediation skipped when absent
      (`#[serde(skip_serializing_if = "Option::is_none")]`). `Display` impl
      emits pretty JSON with a trailing newline, matching every other
      JSON-emitting verb.
    - `cli/exit_category.rs`: see the sibling `cli-exit-code-categories`
      task results.

    `main()` was refactored from `async fn main() -> Result<()>` to a
    thin wrapper that calls `dispatch()` (the original body), classifies
    any error against `ExitCategory`, and:

    - Detects `--format json` / `--format=json` in argv (heuristic but
      robust enough; documented in the helper comment).
    - In JSON mode, emits a `JsonErrorEnvelope` to stderr.
    - In non-JSON mode, emits `Error: {err:#}` to stderr (preserving the
      prior anyhow rendering).
    - Exits with the categorised code.

    Default category for un-tagged errors is `ErrorCode::Internal` →
    `ExitCategory::GenericFailure` → exit 1, identical to the prior
    anyhow default. The typed surface is in place; tagging is opt-in
    incremental.

    ## Deferred (per task description "Audit current bail!/anyhow! call
    sites and tag each with a code")

    - The mechanical sweep across every `bail!`/`anyhow!` call site to
      attach an `ErrorCode` is a follow-up. Until that lands, the typed
      enum is exposed via `capabilities` and `JsonErrorEnvelope` only.
    - A possible vehicle for the sweep: introduce a `RavelError` wrapper
      with `kind: ErrorCode` and a `bail_with!(code, fmt)` macro that
      attaches the code via a downcast marker. Then per-bail tagging is
      string-replace-friendly.

    ## Verification

    - `cargo test --lib cli::` → 23 tests pass (ErrorCode round-trip,
      unique-codes invariant, JsonErrorEnvelope JSON well-formedness for
      every code, escaping of double-quoted user input).
    - `./scripts/check.sh` clippy clean.
    - End-to-end smoke: `repo list --format markdown` (unsupported)
      exits 1 with an actionable error message. Clap's own usage errors
      (e.g. unknown flag) exit 2 unchanged because clap handles its own
      surface before our wrapper sees the result — that's the contract,
      not a bug.

    ## Suggests next

    - Tag each `bail!` site (sweep referenced above).
    - Wire the JSON-error-envelope path through state verbs that already
      honour `--format json`, so failures during `state backlog list
      --format json` (e.g. plan dir missing) are JSON instead of plain
      prose. Currently the wrapper handles top-level `Err`; per-verb
      `bail!` calls inside the dispatch path also benefit when each is
      tagged.
- id: cli-format-json-parity-for-repo-and-atlas-verbs
  title: 'CLI: --format json parity for repo and atlas verbs'
  category: architecture-next
  status: done
  dependencies: []
  description: |
    CLI audit scope item #1 (cli-tool-design.md §1, §4): every data-producing
    verb supports `--format yaml|json`. Current gaps surfaced during the
    shared-`OutputFormat` consolidation:

    - `ravel-lite repo list` — YAML-only (no `--format` flag).
    - `ravel-lite atlas list-components` — text-only.
    - `ravel-lite atlas summary` — text-only.

    For each: add `--format <yaml|json>` (default yaml to preserve
    backwards compatibility), wire to the shared
    `ravel_lite::cli::OutputFormat`, and emit a stable JSON shape with a
    top-level `schema_version` (mirrors every other state verb).

    Out of scope: schema documentation (separate task) and the optional
    `ravel-lite schema <command>` verb (also separate).
  results: |
    ## What shipped

    - `ravel-lite repo list` now takes `--format <yaml|json>` (default
      `yaml`, preserving prior behaviour). Both shapes carry the existing
      `schema_version` (`repos.rs::SCHEMA_VERSION = 1`); JSON is
      pretty-printed with a trailing newline matching every other
      JSON-emitting state verb. `OutputFormat::Markdown` errors with
      "format `markdown` is not supported on `repo list`; supported: yaml,
      json".
    - `ravel-lite atlas list-repos` mirrors `repo list` — same flag, same
      shape, same delegation to `repos::run_list`.
    - `ravel-lite atlas list-components` and `ravel-lite atlas summary` now
      take `--format <yaml|json>` as **opt-in**: when omitted, the
      documented text shape is preserved; when supplied, a versioned
      envelope is emitted.
    - New schema_version constants: `ATLAS_COMPONENTS_LIST_SCHEMA_VERSION`
      and `ATLAS_SUMMARY_SCHEMA_VERSION` (both `1`).

    ## Deviation from task description

    The task body says "default yaml to preserve backwards compatibility"
    for all three verbs. For `repo list` that is the correct read (it
    already defaulted to yaml). For `atlas list-components` and
    `atlas summary` the existing default was a documented text shape
    (`<repo_slug>/<component_id>  <kind>`, etc.), so a default-yaml change
    would have been an *incompatible* output break for any caller piping
    the text into a downstream tool.

    I kept the text shape as the no-flag default and made `--format` opt-
    in (via `Option<String>`). Effect: agents that want structured output
    opt in explicitly; humans piping the existing `atlas list-components`
    into `awk`/`grep`-style tooling are unaffected. If the original intent
    was to deprecate the text shape entirely, this can be tightened in a
    follow-up by making `--format` required-with-default-yaml.

    ## Verification

    - `cargo test` — 992 lib tests + every integration suite green.
    - `./scripts/check.sh` — clippy `-D warnings` clean.
    - Smoke run on an empty registry:
      - `repo list --format yaml` → `schema_version: 1\nrepos: {}`.
      - `repo list --format json` → `{"schema_version":1,"repos":{}}`
        pretty-printed.
      - `repo list --format markdown` → exits 1 with the actionable
        "supported: yaml, json" message.
      - `atlas list-components` (no --format) → empty output (existing
        behaviour preserved).

    ## Suggests next

    - The "tag every bail!/anyhow! with an ErrorCode" sweep called out by
      `cli-stable-error-codes-and-json-error-envelope` — at present, the
      unsupported-format error returns the default `Internal` ErrorCode →
      exit 1, when `InvalidInput` → exit 2 would be more accurate. The
      typed enum is already in place; per-call-site tagging is mechanical.
    - Schema documentation for the new `atlas list-components` /
      `atlas summary` envelopes via the deferred
      `cli-json-schema-versioning-policy-and-documentation` task (gated on
      the v1→v2 migrator) or via the partly-done `capabilities` /
      `schema` discoverability work.
- id: cli-help-text-examples-on-every-verb
  title: 'CLI: help-text examples on every verb'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    CLI audit scope item #3 (cli-tool-design.md §2): every subcommand's
    `--help` output includes ≥2 concrete invocation examples at the
    bottom. LLMs pattern-match on examples far more reliably than on
    flag listings.

    ## Scope

    Walk every `#[derive(Parser)]` / `#[derive(Subcommand)]` and every
    subcommand variant in `src/main.rs`. For each leaf verb, add
    `#[command(after_help = "...")]` with at least two real-world
    invocations, ideally three. Existing top-level `AFTER_HELP`
    (repository / docs links) stays in place — leaf verbs get their own
    example block layered on top.

    ## Pattern to follow

    ```rust
    const BACKLOG_LIST_AFTER_HELP: &str = "\
    Examples:
      # default markdown render of all tasks, grouped by category
      ravel-lite state backlog list LLM_STATE/core --format markdown

      # only ready tasks, in JSON
      ravel-lite state backlog list LLM_STATE/core --ready --format json
    ";
    ```

    ## Why deferred

    This is mechanical and large-surface (~50 verb leaves). Best done
    after the OutputFormat consolidation lands so examples reference the
    canonical `--format` vocabulary.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §2 ("Help text
      structure, top to bottom").
    - `defaults/fixed-memory/cli-tool-design.md` §"Audit checklist" →
      "Help" → "Every subcommand `--help` includes at least two
      concrete examples."
- id: cli-exitcategory-enum-and-documented-exit-codes
  title: 'CLI: ExitCategory enum and documented exit codes'
  category: architecture-next
  status: done
  dependencies:
  - cli-stable-error-codes-and-json-error-envelope
  description: |
    CLI audit scope item #5 (cli-tool-design.md §8): move from anyhow's
    implicit 0/1 exit code to documented categories — `0` success, `1`
    generic failure, `2` usage error, `3` not found, `4` auth/forbidden,
    `5` conflict/precondition, `6` rate-limited.

    ## Required pieces

    1. Define `ExitCategory` enum (typed, not stringly) with `as_code() ->
       i32`. Lives in `src/cli/exit_category.rs` next to
       `output_format.rs`.
    2. Plumb the category through the error path. anyhow errors that
       bubble up to `main()` get a category — either via a typed
       `RavelError` outer wrapper, or via a downcast against a known
       marker type, or via a side-channel set on a context object.
    3. `main()` exits with the categorised code instead of letting
       anyhow's default `Result<(), anyhow::Error>` use exit code 1
       for everything.
    4. Document the exit codes in the top-level `--help` after_help
       block, alongside the source/docs links already there.

    ## Coupling with error-codes-json

    The same enum (or a parallel pair) should drive both the process
    exit code and the `code` field in JSON-mode error output — agents
    get the same signal whether they branch on stdout JSON or on
    `$?`. Recommended: do the typed `ErrorCode` enum first
    (error-codes-json task) and have `ExitCategory::from(&ErrorCode)`
    read off it.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §8.
    - Memory: "Prefer typed APIs over stringly-typed" — categories must
      be a Rust enum, not free integers passed around.
  results: |
    ## What shipped

    - `src/cli/exit_category.rs`: `ExitCategory` enum with seven
      variants (`Success`/`GenericFailure`/`UsageError`/`NotFound`/
      `AuthRequired`/`Conflict`/`RateLimited`), `as_code() -> i32` per
      cli-tool-design.md §8, `label() -> &'static str` for help-text
      rendering, and `documented()` returning the dense `0..=6` table for
      the help-text builder.
    - `From<&ErrorCode> for ExitCategory` with the canonical mapping:
      `AuthRequired → AuthRequired (4)`, `InvalidInput → UsageError (2)`,
      `NotFound → NotFound (3)`, `Conflict → Conflict (5)`, `RateLimited
      → RateLimited (6)`, `IoError | Internal → GenericFailure (1)`.
    - `main()` now exits with the categorised code instead of letting
      anyhow's default `Result<(), anyhow::Error>` collapse everything to
      exit 1. See the sibling `cli-error-codes-and-json-error-envelope`
      results for the wrapper architecture.
    - Top-level `--help` after_help block now lists the exit-code table
      with one-line labels, plus a pointer to `ravel-lite capabilities`
      for the same vocabulary as JSON.

    ## Verification

    - `cargo test --lib cli::exit_category::` — 4 tests pass: stable
      integers (0..=6), every `ErrorCode` maps to a non-Success category,
      specific-mapping table matches the documented contract,
      `documented()` is dense from 0 (so the help-text table is
      contiguous).
    - `./scripts/check.sh` clippy clean.
    - `ravel-lite --help | tail` shows the "Exit codes:" block.
    - Clap's built-in usage errors (unknown flag, missing arg) exit 2
      unchanged — clap exits before our wrapper sees the error, which
      matches the documented `UsageError → 2` mapping by coincidence-
      but-also-design.

    ## Coupling honoured

    The task body called out: "do the typed `ErrorCode` enum first
    (error-codes-json task) and have `ExitCategory::from(&ErrorCode)`
    read off it." Done — the From impl is the single source of truth
    for the code mapping. Adding a new ErrorCode requires extending the
    match, which keeps the typed coverage honest.

    ## Suggests next

    - Per-bail-site tagging (sweep deferred from the sibling
      error-codes-json task) is what unlocks the user-facing benefit:
      agents see exit 2/3/4/5/6 distinctions on real failures instead of
      the default exit 1 for everything except clap parse errors.
- id: cli-discoverability-verbs-capabilities-schema-llm-instructions
  title: 'CLI: discoverability verbs (capabilities, schema, llm-instructions)'
  category: architecture-next
  status: done
  dependencies: []
  description: |
    CLI audit scope item #7 (cli-tool-design.md §"Optional but
    valuable"): add discoverability surfaces so agents can probe
    capabilities without parsing help text.

    ## Verbs to ship

    1. `ravel-lite capabilities` — JSON object with `version`,
       `subcommands`, `output_formats`, and a feature-flags object
       (e.g. `{"json_output": true, "markdown_output": true,
       "stable_error_codes": true}`). Cheap; landable independently.
    2. `ravel-lite schema <command>` — emits the JSON schema for the
       named command's `--format json` output. Especially valuable for
       `state backlog list`, `state memory list`, `state intents list`
       — every kind that ships a typed YAML/JSON shape via the
       `Per-kind structs wrap Item<K>` pattern.
    3. `ravel-lite llm-instructions` — optional. Single-shot manual
       covering things `--help` cannot: workflow recipes, common
       mistakes ("don't grep `state backlog list`, use `--filter`"),
       authentication and state assumptions. Skip if the project's
       tutorials/reference cover the same ground.

    ## Order of attack

    `capabilities` first (smallest, broad signal). Then `schema`
    (harder — needs each verb to declare a schema; the simplest path
    is `schemars` derives on the typed YAML structs). Then evaluate
    whether `llm-instructions` adds enough to justify maintenance.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §"Optional but
      valuable" (full templates and examples).
  results: |
    ## What shipped (`capabilities` only)

    `ravel-lite capabilities` emits a JSON document on stdout describing
    what this binary supports:

    ```json
    {
      "schema_version": 1,
      "version": "<git describe + build timestamp>",
      "subcommands": ["init","run","create","survey","survey-format",
                      "version","capabilities","state","repo","plan",
                      "findings","atlas","fixed-memory"],
      "output_formats": ["yaml","json","markdown"],
      "error_codes": ["AUTH_REQUIRED","INVALID_INPUT","NOT_FOUND",
                      "CONFLICT","IO_ERROR","RATE_LIMITED","INTERNAL"],
      "exit_categories": [{"code":0,"label":"success"}, ...],
      "features": {
        "json_output": true, "yaml_output": true, "markdown_output": true,
        "stable_error_codes": true, "documented_exit_codes": true,
        "schema_versioning": true
      }
    }
    ```

    - `error_codes` and `exit_categories` are sourced from the typed
      `ErrorCode::all()` and `ExitCategory::documented()` so the document
      cannot drift from the runtime — extending either enum auto-extends
      the document.
    - `schema_version` on the document itself is `CAPABILITIES_SCHEMA_VERSION = 1`.

    ## Deferred (per task's explicit "Order of attack")

    The task body spells out: `capabilities` first; *then* `schema <command>`;
    *then* evaluate `llm-instructions`. Both deferred pieces remain.

    - **`schema <command>`**: documented path is "the simplest path is
      `schemars` derives on the typed YAML structs." Deferring this is
      defensible because it touches every typed envelope struct
      (`BacklogFile`, `MemoryFile`, `IntentsFile`, `TargetsFile`,
      `FindingsFile`, plus the new `AtlasComponentsList`,
      `AtlasSummary`, `Capabilities`) — a separate focused task.
    - **`llm-instructions`**: per the task body, this is conditional on
      whether existing tutorials/reference cover the same ground. Project
      has both `docs/tutorial/` and `docs/reference/`; the answer may be
      "no, not worth maintaining a third surface." Recommended: triage
      this as its own micro-task with a 1-hour box on "decide and either
      ship or close as wontfix."

    ## Verification

    - `cargo test --lib cli::capabilities::` — 4 tests pass, including
      invariants that "every error_code from `ErrorCode::all()` appears
      in capabilities.error_codes" and "every documented exit category
      appears in capabilities.exit_categories" (catches drift
      automatically).
    - `./scripts/check.sh` clippy clean.
    - `ravel-lite capabilities | jq .` parses cleanly; `subcommands` array
      contains every top-level Commands variant by hand-mirror.

    ## Hand-mirror caveat

    `top_level_subcommands()` is hand-maintained against `Commands` in
    `src/main.rs`. Adding a top-level subcommand requires extending both.
    Acceptable because:

    1. The list changes rarely (top-level surface is mostly stable).
    2. A clap derive macro to enumerate variants by name would couple
       `cli/capabilities.rs` to clap internals that may shift between
       versions.
    3. The capabilities-test gives us a smoke check the mirror is
       non-empty and contains expected anchors (`state`, `json`).

    If the surface starts churning, a `strum::EnumIter` derive on
    `Commands` would automate the mirror — deferred until the cost of
    hand-maintenance exceeds the cost of the dependency.

    ## Suggests next

    - File a sub-task for the `schema <command>` work (touches every
      typed envelope; pairs naturally with the
      `cli-json-schema-versioning-policy-and-documentation` task once
      the migrator unfreezes the wire shapes).
    - Decide-and-close on `llm-instructions` — short investigation,
      binary outcome.
- id: cli-json-schema-versioning-policy-and-documentation
  title: 'CLI: JSON schema versioning policy and documentation'
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  description: |
    CLI audit scope item #2 (cli-tool-design.md §1): every
    `--format json` output carries a top-level `schema_version`, and
    each verb's schema is documented and stable.

    ## Status of `schema_version`

    Already present on the typed YAML/JSON envelope structs that
    underlie state verbs:

    - `BACKLOG_SCHEMA_VERSION`, `MEMORY_SCHEMA_VERSION`,
      `INTENTS_SCHEMA_VERSION`, `FINDINGS_SCHEMA_VERSION`,
      `TARGETS_SCHEMA_VERSION`, `TARGET_REQUESTS_SCHEMA_VERSION`,
      `THIS_CYCLE_FOCUS_SCHEMA_VERSION`,
      `FOCUS_OBJECTIONS_SCHEMA_VERSION`, `COMMITS_SCHEMA_VERSION`.
    - `LIST_SCHEMA_VERSION` for `fixed-memory list`.

    What is missing:

    1. Verbs that don't yet emit JSON (atlas, repos — see
       `cli-fmt-json-parity-for-repo-and-atlas-verbs`) need the same
       versioned wrapper when they gain JSON.
    2. `schema_version` needs documentation surfaces — preferably the
       `ravel-lite schema <command>` verb in `cli-discoverability-verbs`,
       not freestanding markdown that rots.
    3. Bump policy must be written down. Cli-tool-design.md §1
       says "Schema must be stable across patch versions. Breaking
       changes go in major versions and are documented." — reflect
       this in the project README or a short ADR-style note.

    ## Why deferred

    The on-disk wire shape is frozen until the v1→v2 migrator exists
    (see `migrate-ravel-lite-migrate-for-v1-to-v2-cutover`). Writing a
    formal schema doc now risks codifying a shape that the migration
    will reshape. Wait until the v2 cutover lands, then snapshot what
    ships.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §1, §"Anti-patterns"
      ("Unstable JSON").
    - Memory: "LLM_STATE shape frozen until v1→v2 migrator exists" —
      pins schema-doc work behind that migrator.
