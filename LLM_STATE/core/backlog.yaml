- id: filter-rogue-horizontal-rule-in-headless-phase-output-and-permit-reasoning-preamble
  title: Filter rogue horizontal-rule in headless-phase output and permit reasoning preamble
  category: core
  status: done
  dependencies: []
  description: |
    Filter markdown horizontal-rule lines (`---`) from headless-phase result rendering, and align the reflect/dream/triage prompts to explicitly permit a reasoning preamble.

    ## Problem

    `src/format.rs::format_result_text` filters code-fence lines (`line.trim() == "```"`) but not markdown horizontal rules. The reflect/dream/triage prompts each end with "Do not include any other commentary" — but in practice the LLM writes a short reasoning preamble, separates it with `---`, and then emits the labelled summary. The `---` survives the filter and renders as a dim stray line above the action list (see `src/format.rs:341-346` "regular text" fallback).

    The reasoning preamble is a desired feature — it is the LLM's narrative context for why the mutations happened. The current prompt wording suppresses it on paper and the formatter mangles it in practice. Both need to move.

    ## Settled design

    ### Filter fix (src/format.rs)

    Add `line.trim() == "---"` (and optionally any run of 3+ dashes) to the filter list alongside the existing fence filter near `src/format.rs:255-256`:

    ```rust
    if line.trim() == "```" { continue; }
    if line.trim_start_matches('-').is_empty() && line.trim().len() >= 3 { continue; }
    ```

    The second form guards against `----` / `-----` variants. Keep it conservative — don't filter lines that contain any non-dash characters.

    ### Prompt alignment (reflect / dream / triage)

    Replace the "Do not include any other commentary" wording in:

    - `defaults/phases/reflect.md` output-format block (lines ~68-71)
    - `defaults/phases/dream.md` output-format block (lines ~66-67)
    - `defaults/phases/triage.md` output-format block (lines ~135-137)

    Replace with explicit permission, e.g.:

    > You may precede the action list with a brief paragraph of reasoning — what you noticed, what trade-offs drove the mutation set. Separate the preamble from the action list with a blank line. Do not introduce other sections.

    This makes the reasoning an official part of the output contract so downstream code (and the next prompt revision) doesn't regress it.

    ## Reference examples

    - `src/format.rs:224-255` — `format_result_text` and the existing code-fence filter.
    - `src/format.rs:341-346` — the generic "regular text" fallback where the `---` currently lands.
    - `defaults/phases/{reflect,dream,triage}.md` — the three prompts whose output-format sections need the wording change.

    ## Dependencies

    None.

    ## Verification

    - New unit test in `src/format.rs`: a line of exactly `---` (and one with `-----`) produces no output. A line of `--- something ---` renders as regular text (non-match).
    - Manual: run one triage cycle post-change; confirm the terminal output shows no stray dim `---` line between the reasoning preamble and the action list.
    - `cargo test --workspace` green.

    ## Related

    - Existing backlog task `add-phase-summary-render-cli-verb-…` (now expanded to cover dream) will later extract the label portion to Rust. The reasoning preamble stays LLM-owned after that extraction — this task's prompt change establishes that split explicitly.
  results: |
    ## What was done

    1. **Filter added in `src/format.rs::format_result_text`.** A new guard next to the existing code-fence filter drops any line that trims to a pure run of 3 or more dashes. `---`, `----`, `-----` etc. are now filtered; lines that contain dashes alongside content (`--- foo`, `foo --- bar`, `-- two-dashes`) are preserved.

    2. **Prompt wording aligned.** The "Do not include any other commentary" wording in `defaults/phases/{reflect,dream,triage}.md` was replaced with an explicit permission for a brief reasoning preamble separated from the action list by a blank line. Each phase's preamble hint is tailored to the phase ("what you noticed in the session" for reflect; "what patterns you noticed across the memory" for dream; "what drove reprioritisations or hand-off decisions" for triage).

    3. **Four new unit tests** in `src/format.rs::tests`:
       - `format_result_text_filters_markdown_horizontal_rule` — the canonical scenario: preamble + `---` + labels.
       - `format_result_text_filters_longer_dash_runs` — `----`, `-----` variants.
       - `format_result_text_preserves_lines_mixing_dashes_and_text` — regression guard for dashes-as-content.
       - (Plus confirmation that the existing preamble-as-dim-text rendering still works.)

    ## What worked

    - TDD produced a clean evidence trail: both new filter tests failed before the one-line addition (`trimmed.chars().all(|c| c == '-') && trimmed.len() >= 3`), both passed after. The mixed-dashes preservation test passed unchanged — confirming the guard is tight.
    - All 581 workspace tests pass with the change in place. No regressions in the init.rs drift detection, the pi-prompt dangling-tokens guard, or any other prompt-sensitive test.

    ## What didn't / scope I chose not to expand

    - I did NOT filter `***` or `___` (other markdown HR syntaxes). The reported issue was `---` only; LLMs in these phases don't produce the other forms. YAGNI.
    - I did NOT add a test that asserts preamble text renders as dim. The existing `format_result_text` "regular text" fallthrough at `src/format.rs:341-346` handles that and is covered by neighbouring tests; explicitly re-asserting it would be belt-and-braces.

    ## What this suggests next

    - The companion backlog task `add-phase-summary-render-cli-verb-for-deterministic-triage-reflect-summaries` (now expanded to also cover dream) can now proceed on a clean footing: the prompts already permit a preamble, so when that task replaces the LLM-authored label lists with CLI-rendered output, the LLM's preamble contract is preserved unchanged.
    - The companion backlog task `pre-seed-plan-directory-in-rust-before-create-plan-llm-spawn` is unrelated but was added in the same cycle; it is independent and ready for a future work phase.
    - Standing memory entry "LLM reasoning preamble in reflect/dream/triage is a preserved feature" was added to durably bind future prompt edits against regressing the preamble.
