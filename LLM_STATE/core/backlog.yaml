    - **Idempotency / `--dry-run` documentation** on mutating verbs.
    - **Identifier conventions** — most ids are `b-…`/`m-…`/`i-…`
      style (typed prefix). Audit for stragglers.
    - **Hidden state**. `RAVEL_LITE_CONFIG` env var — confirm `--help`
      surfaces it everywhere it's consulted (init, run, …).

