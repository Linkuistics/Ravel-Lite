tasks:
- id: extract-component-ontology-to-workspace-crate-phase-b
  title: Extract component-ontology to workspace crate (Phase B)
  category: refactor
  status: not_started
  dependencies: []
  description: |
    **Priority: LOW (deferred).** Phase B of the extraction plan. Do not start until entry criteria below are met.

    **Depends on:** the CLI + Stage 1 hints task.

    ## Entry criteria (from `docs/component-ontology.md` §11.2)

    - Phase A (the v2 ontology in `src/ontology/`) has been stable for ≥1 release.
    - A second consumer inside Ravel-Lite is on the near horizon (e.g., a phase prompt renderer that walks the graph to inject context about a plan's component neighbours). If no second consumer is imminent, do not extract — the single-consumer crate is unjustified churn.

    ## Scope

    - Move `src/ontology/` → `crates/component-ontology/` in a Cargo workspace.
    - Convert the root `Cargo.toml` to a workspace manifest if it isn't already.
    - Update Ravel-Lite's `Cargo.toml` to depend on `component-ontology` via `path = "crates/component-ontology"`.
    - Verify zero Ravel-Lite-specific concepts in the extracted crate: no `LLM_STATE`, no phases, no plans, no backlog, no subagents. The crate's universe is edges, kinds, lifecycles, components, evidence.
    - Verify the dependency list is minimal (§11.4): `serde`, `serde_yaml`, `anyhow`, `thiserror` only.
    - Publish `defaults/ontology.yaml` as a crate-vendored file (include via `include_str!` or ship in the crate root and have Ravel-Lite copy at install).
    - Ship crate at `0.1.0` with a short README describing the standalone use case.
    - Verify `cargo build -p component-ontology` succeeds independently.
    - Verify all Ravel-Lite tests still pass.

    ## Out of scope

    - Publication to crates.io (Phase C; deferred until a second out-of-repo consumer exists).
    - Renaming the crate. `component-ontology` is intentionally the final name.
    - Introducing a trait registry for edge kinds — the flat enum suffices; premature.

    ## Exit criteria

    - Workspace builds and tests cleanly.
    - `component-ontology` crate has a standalone README documenting its public API.
    - No Ravel-Lite code imports `ravel_lite::ontology::…`; all imports route through `component_ontology::…`.
    - Semver policy documented in the crate README.
- id: audit-docs-architecture-md-for-stale-v1-edge-kind-vocabulary
  title: Audit docs/architecture.md for stale v1 edge-kind vocabulary
  category: docs
  status: done
  dependencies: []
  description: |
    **Priority: LOW.** `docs/architecture.md` was not audited during the post-ontology-v2 docs pass (2026-04-23) and may carry stale v1 edge-kind vocabulary (`sibling`, `parent-of`) or `related-projects` references.

    ## Scope

    - Read `docs/architecture.md` in full.
    - Identify any v1 edge-kind vocabulary (`sibling`, `parent-of`), `related-projects` references, or prose that contradicts the v2 ontology in `docs/component-ontology.md`.
    - For each stale reference: either prune (if identical to v2 content) or add a cross-reference pointer, or mark as historical using the `> _Historical note._` convention.
    - No code changes; documentation only.

    ## Exit criteria

    - `docs/architecture.md` does not contradict `docs/component-ontology.md` on any vocabulary point.
    - Any remaining `related-projects` references are clearly marked as historical or replaced with `related-components`.
    - v1 edge-kind terms (`sibling`, `parent-of`) either removed or clearly framed as superseded.
  results: |
    **Outcome:** No-op audit. `docs/architecture.md` required inspection but no edits.

    ## Method

    Grepped for the target vocabulary (`sibling`, `parent-of`, `parent`, `child`, `peer`, `related-projects`, `related_projects`, `related-plans`, `related_plans`) and read the document end-to-end.

    ## Findings against exit criteria

    1. **No v1 edge-kind vocabulary.** All surface matches for `sibling` / `parent` / `child` are filesystem- or process-context English, not ontology edge kinds:
       - lines 99, 128 — "child" refers to the agent subprocess's stdio output
       - line 491 — `related-plans.md` is a still-live per-plan prose file (referenced by `src/related_components.rs:85`, `src/survey/discover.rs:110,149,245`, `defaults/create-plan.md`), not v1 vocabulary
       - lines 539, 549 — "parent" refers to a filesystem parent directory / `--add-dir <parent>` CLI flag
       - line 613 — "sibling `*.local.yaml` overlay" refers to a sibling file on disk

    2. **No `related-projects` references.** Zero hits in `docs/architecture.md`. The term survives only in `docs/r7-related-projects-discovery-plan.md` and `docs/r7-related-projects-discovery-design.md`, which are historical R7 planning docs (intentionally preserved — out of scope here).

    3. **No prose contradicting `docs/component-ontology.md`.** The two documents occupy orthogonal domains: `architecture.md` describes runtime architecture (TUI, phase loop, agent trait, subagent dispatch); `component-ontology.md` specifies cross-component edge schema. Their vocabularies do not overlap, so there is no axis on which they can contradict.

    ## Root cause for the no-op

    The 2026-04-23 post-ontology-v2 docs pass skipped `docs/architecture.md` because it simply doesn't discuss cross-project/component relationships. The file never carried v1 vocabulary to begin with; it had no attack surface for the migration.

    ## Orthogonal observation (not actioned)

    `docs/architecture.md` source-tree section (lines 407–435) is stale in a non-v1 way: the actual `src/` has `ontology/`, `state/`, `discover/`, `related_components.rs`, `multi_plan.rs`, `projects.rs`, and a `survey/` subdirectory (vs a single file) — none of which appear. Similarly, the defaults directory layout (lines 440–473) omits `ontology.yaml`, `discover-stage1.md`, `discover-stage2.md`, `survey-incremental.md`. This is generic doc drift unrelated to the v1 vocabulary concern this task targets; it could be a separate backlog entry if anyone wants the source-tree section kept in sync.

    ## Suggests next

    - If the audit pattern is worth formalising, a one-shot `grep` CI check for v1 vocabulary (`sibling`, `parent-of`, `related-projects`) in `docs/**` would prevent silent reintroduction. Low-value unless someone is actively editing the R7 historical docs.
    - Leaving this task closed and not creating follow-ups: the `architecture.md` source-tree drift is well-known and wasn't the audit's job to catch.
