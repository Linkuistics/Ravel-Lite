- id: reference-phase-cycle-page-per-phase-contracts-dream-trigger-triage-dispatch-git-commit-audit-trail
  title: 'Reference: phase cycle page (per-phase contracts, dream trigger, triage dispatch, git-commit-* audit trail)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the phase cycle reference page: every phase in the work → analyse-work → git-commit-work → reflect → git-commit-reflect → [dream?] → dream → git-commit-dream → triage → git-commit-triage cycle, with each phase's input/output contract, the dream-trigger condition, the triage subagent dispatch mechanism, and the per-phase git-commit audit trail.

    ## Scope

    - File: `docs/reference/phase-cycle.adoc`
    - Per phase, document: what files it reads, what files it writes, what decisions it makes, when it transitions, and how it's invoked (interactive vs headless).
    - **Dream trigger**: word-count threshold (baseline + headroom), where the baseline is captured (`save-work-baseline` etc.), what happens on trigger.
    - **Triage dispatch**: how cross-plan propagation works (peer-project relationships from `related-components.yaml`, subagent dispatch via `subagent-dispatch.yaml`).
    - **Git-commit-* phases**: per-phase audit trail commits, what each commit captures, the `commits.yaml` mechanism that drives them.
    - AsciiDoc art diagram of the cycle (the README's diagram is a starting point but should be expanded with file-level read/write annotations).

    ## Style

    Friendly prose, minimal lists, no emoji. Each phase entry follows the same shape so readers can scan.

    ## Out of scope

    File schemas — those live on the file-format pages. Cross-link rather than duplicate.

    ## Verification

    - Page builds and renders.
    - Each phase claim cross-checked against `src/orchestrator/`, `src/state/phase.rs`, and the on-disk per-phase prompt files under `defaults/agents/.../*.md`.
    - Dream-trigger threshold value cross-checked against the actual constant in source.
- id: reference-state-file-formats-backlog-yaml-memory-yaml-session-log-yaml-latest-session-phase-md-commits-yaml
  title: 'Reference: state-file formats (backlog.yaml, memory.yaml, session-log.yaml, latest-session, phase.md, commits.yaml)'
  category: docs
  status: not_started
  dependencies: []
  description: |
    Write the state-file formats reference page: schema, examples, and read/write call sites for the durable plan-state files.

    ## Scope

    - File: `docs/reference/state-files.adoc`
    - Per file: full schema (every field with type, semantics, allowed values), a worked example, the phase that writes it, the phases that read it, and the gotchas a hand-editor needs to know.

    ### Files covered

    - **`backlog.yaml`** — tasks list, status enum, dependencies (must be ids; cycles and self-reference rejected by `set-dependencies`), results block, handoff block, category, description, blocked_reason.
    - **`memory.yaml`** — entries list, the four entry types (user, feedback, project, reference), description vs body, distillation rules.
    - **`session-log.yaml`** — per-cycle entries, what analyse-work writes here, append-only semantics.
    - **`latest-session.*`** — the per-cycle summary. **Verify whether the actual file is `.md` or `.yaml`** — the existing format.rs highlight rule says `.md` but memory notes mention `.yaml`. Document whichever is current and flag any inconsistency.
    - **`phase.md`** — the single-line current-phase indicator. Validation rules. Why it's a separate file rather than embedded in another.
    - **`commits.yaml`** — the commit spec written by analyse-work, consumed by git-commit-* phases. Per-commit structure (paths, message file).

    ## Style

    Friendly prose between schema blocks. Each file gets a short prose introduction, the schema as a code block (`[source,yaml]` with field-level comments), then prose on gotchas and editing rules.

    ## Verification

    - Page builds and renders.
    - Every schema cross-checked against `src/state/<file>/schema.rs` (or wherever the serde struct lives).
    - At least one example per file is realistic — lifted from a real plan, anonymised if needed.
    - The `.md` vs `.yaml` question for `latest-session.*` is resolved by reading the actual write path in `src/state/`.
