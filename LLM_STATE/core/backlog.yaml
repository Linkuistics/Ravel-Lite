tasks:
- id: extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  title: Extend CLI for ontology v2 and add Stage 1 interaction_role_hints
  category: feature
  status: done
  dependencies: []
  description: |
    **Priority: MEDIUM.** Brings the interactive CLI and Stage 1 surface-extraction up to v2 parity. After this task the CLI is fully v2-capable for humans, and Stage 2 gains Stage-1-sourced priors.

    **Depends on:** the Stage 2 prompt-rewrite task.

    ## Scope

    ### CLI extensions (`ravel-lite state related-components …`)

    Per `docs/component-ontology.md` §7.1–§7.4 (on-disk schema; CLI mirrors it):

    - **`add-edge`** signature extended:
      ```
      add-edge <kind> <lifecycle> <a> <b> \
        --evidence-grade <strong|medium|weak> \
        --evidence-field <string> [--evidence-field …] \
        --rationale <string>
      ```
      Validates `kind` against `EdgeKind::parse`, `lifecycle` against `LifecycleScope::parse`, `evidence-fields` non-empty unless `evidence-grade=weak`.
    - **`remove-edge`**: accepts `kind + lifecycle + a + b`. A v1-style remove without `lifecycle` is an error (not a silent "remove any matching").
    - **`list`** gains `--kind <K>` and `--lifecycle <L>` filters in addition to the existing `--plan <PLAN_DIR>` filter.
    - Deprecated alias `state related-projects` is kept through this release and removed at the end of it.

    ### Stage 1 optional hint field

    Per `docs/component-ontology-migration.md` §5.1:

    - `SurfaceRecord` gains optional `interaction_role_hints: Vec<String>`. Closed vocabulary (enum strings: `generator`, `orchestrator`, `test-harness`, `spec-document`, `spawner`, `documented-by`, `client`, `server`, `library`, `tool`); unknowns rejected.
    - `defaults/discover-stage1.md` gains a "Role hints (optional)" section describing the vocabulary and when to emit each hint. Hints are advisory — Stage 2 still picks edges from cross-referenced evidence.
    - Stage 2 prompt updated to include the hint field in each component's surface dump, and the decision tree given a note that hints are priors, not verdicts.

    ### Tests

    - CLI integration tests for all extended subcommands, plus the deprecated-alias warning path.
    - Stage 1 drift test already exists for `SurfaceRecord` fields — extend to cover the new field.
    - Stage 2 prompt drift test: the rendered hint vocabulary matches the `SurfaceRecord` enum.

    ## Out of scope

    - Workspace-crate extraction (separate task).
    - Removing the deprecated `state related-projects` alias — that happens in the release after this one.

    ## Exit criteria

    - Manual smoke test: `add-edge generates codegen Ravel-Lite Ravel --evidence-grade strong --evidence-field Ravel-Lite.produces_files --evidence-field Ravel.consumes_files --rationale "…"` round-trips through YAML.
    - `list --kind generates --lifecycle codegen` filters correctly.
    - `state related-projects list` still works with a stderr deprecation banner.
    - A fresh discover run populates `interaction_role_hints` for at least one catalog project whose README clearly declares a role (e.g., Ravel-Lite declares itself as an orchestrator).
  results: |
    ## What landed

    ### CLI extensions (`ravel-lite state related-components …`)

    - **`add-edge`** takes the full ontology v2 field set:
      `add-edge <kind> <lifecycle> <a> <b> --evidence-grade <strong|medium|weak> --evidence-field <field> [--evidence-field …] --rationale <string>`.
      `kind` is validated via `EdgeKind::parse`, `lifecycle` via
      `LifecycleScope::parse` (new helper `parse_lifecycle_scope` in
      `main.rs`), and the non-empty-rationale / non-empty-evidence-unless-
      weak invariants are enforced inside `Edge::validate` — the CLI layer
      just plumbs values through.
    - **`remove-edge`** now takes `<kind> <lifecycle> <a> <b>` (lifecycle
      required). v1-style invocations omitting lifecycle fail at clap's
      required-arg check — no silent match-across-lifecycles.
    - **`list`** gains `--kind` and `--lifecycle` filters that AND-compose
      with the existing `--plan` filter.
    - Deprecated `state related-projects` alias retained with the same
      stderr warning (removal is a separate task in a later release).
    - The transitional `default_lifecycle_for_kind` helper is deleted —
      every CLI caller now supplies `lifecycle` explicitly.
    - Introduced `ListFilter<'a>` and `AddEdgeRequest<'a>` structs in
      `related_components.rs` to keep the public signatures short rather
      than sliding toward the 20-arg ceiling.

    ### Stage 1 interaction_role_hints

    - New `InteractionRoleHint` enum in `src/discover/schema.rs` with the
      closed kebab-case vocabulary (`generator`, `orchestrator`,
      `test-harness`, `spec-document`, `spawner`, `documented-by`,
      `client`, `server`, `library`, `tool`). Serde rejects unknowns —
      confirmed by the new `interaction_role_hint_rejects_unknown_value`
      test.
    - `SurfaceRecord` gains `interaction_role_hints: Vec<InteractionRoleHint>`
      with `#[serde(default)]`. Cache files predating this field parse
      cleanly with an empty list.
    - `defaults/discover-stage1.md` documents the field + vocabulary in a
      new `## Role hints (optional)` section.
    - `defaults/discover-stage2.md` gains a `### Role hints are priors,
      not verdicts` subsection inside the decision tree. Surface dumps
      continue to serialise the new field automatically via
      `{{SURFACE_RECORDS_YAML}}`.

    ### Tests

    - 3 new integration tests for the new CLI shape (weak-grade omission,
      strong-grade evidence requirement, v1-style-lifecycle rejection).
    - 4 new filter integration tests (`--kind`, `--lifecycle`, filter
      composition, lifecycle-targeted remove).
    - Unit-level drift tests: Stage 1 prompt lists every
      `InteractionRoleHint` variant as a vocabulary bullet (bidirectional
      bijection); Stage 2 prompt keeps the priors-not-verdicts note.
    - All existing unit tests updated for the new `run_add_edge` /
      `run_remove_edge` / `run_list` signatures, plus two additions:
      `add_edge_accepts_same_pair_at_distinct_lifecycles`,
      `remove_edge_matches_only_specified_lifecycle`.
    - Full suite: 528 tests pass (466 unit + 62 integration across 7 test
      binaries).

    ### Unrelated fix (user-requested alongside task 1)

    Added a blank line separator between consecutive `[ACTION]` items in
    `src/format.rs::format_result_text` — the `last_action_intent` state
    was already tracking "inside action block," so the rule is "push a
    blank before a new action when the previous line was part of the
    previous action." Three new tests lock the behaviour (blank inserted,
    no blank before the first action, no doubling when the user already
    put a blank).

    ## Exit criteria verified

    1. Smoke test round-trips through YAML:
       `add-edge generates codegen Ravel-Lite Ravel --evidence-grade strong --evidence-field Ravel-Lite.produces_files --evidence-field Ravel.consumes_files --rationale "Ravel-Lite emits schemas Ravel consumes"`
       → emits the expected 5-field edge. ✓
    2. `list --kind generates --lifecycle codegen` returns only matching
       edges; empty-intersection filters return an edge-less file
       (covered by `list_kind_and_lifecycle_filters_compose`). ✓
    3. `state related-projects list` still works with the deprecation
       banner on stderr (covered by
       `deprecated_related_projects_alias_warns_and_forwards`). ✓
    4. Stage 1 populating `interaction_role_hints` cannot be verified
       without a real claude run, but the schema + prompt changes are in
       place and a drift test ensures the vocabulary stays aligned with
       the enum.

    ## What this suggests next

    - Phase B (workspace extraction) remains gated on "stable for ≥1
      release + second consumer imminent." The single-consumer justification
      hasn't changed. Defer.
    - The r7 docs audit task (low priority) depended on this task's
      completion; it's now unblocked.
    - The Stage 2 priors-not-verdicts note is prose; if we later observe
      Stage 2 output weighting hints too aggressively, we may want a
      harder per-edge assertion (e.g. "evidence_fields must include at
      least one non-hint field for `strong`"). Hold off until we have
      real discover output to judge.
- id: extract-component-ontology-to-workspace-crate-phase-b
  title: Extract component-ontology to workspace crate (Phase B)
  category: refactor
  status: not_started
  dependencies:
  - extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  description: |
    **Priority: LOW (deferred).** Phase B of the extraction plan. Do not start until entry criteria below are met.

    **Depends on:** the CLI + Stage 1 hints task.

    ## Entry criteria (from `docs/component-ontology.md` §11.2)

    - Phase A (the v2 ontology in `src/ontology/`) has been stable for ≥1 release.
    - A second consumer inside Ravel-Lite is on the near horizon (e.g., a phase prompt renderer that walks the graph to inject context about a plan's component neighbours). If no second consumer is imminent, do not extract — the single-consumer crate is unjustified churn.

    ## Scope

    - Move `src/ontology/` → `crates/component-ontology/` in a Cargo workspace.
    - Convert the root `Cargo.toml` to a workspace manifest if it isn't already.
    - Update Ravel-Lite's `Cargo.toml` to depend on `component-ontology` via `path = "crates/component-ontology"`.
    - Verify zero Ravel-Lite-specific concepts in the extracted crate: no `LLM_STATE`, no phases, no plans, no backlog, no subagents. The crate's universe is edges, kinds, lifecycles, components, evidence.
    - Verify the dependency list is minimal (§11.4): `serde`, `serde_yaml`, `anyhow`, `thiserror` only.
    - Publish `defaults/ontology.yaml` as a crate-vendored file (include via `include_str!` or ship in the crate root and have Ravel-Lite copy at install).
    - Ship crate at `0.1.0` with a short README describing the standalone use case.
    - Verify `cargo build -p component-ontology` succeeds independently.
    - Verify all Ravel-Lite tests still pass.

    ## Out of scope

    - Publication to crates.io (Phase C; deferred until a second out-of-repo consumer exists).
    - Renaming the crate. `component-ontology` is intentionally the final name.
    - Introducing a trait registry for edge kinds — the flat enum suffices; premature.

    ## Exit criteria

    - Workspace builds and tests cleanly.
    - `component-ontology` crate has a standalone README documenting its public API.
    - No Ravel-Lite code imports `ravel_lite::ontology::…`; all imports route through `component_ontology::…`.
    - Semver policy documented in the crate README.
- id: audit-docs-r7-related-projects-discovery-design-md-post-ontology-v2
  title: Audit docs/r7-related-projects-discovery-design.md post-ontology-v2
  category: docs
  status: not_started
  dependencies:
  - extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints
  description: |
    **Priority: LOW.** `docs/r7-related-projects-discovery-design.md` predates the ontology v2 spec split and may contain prose now redundant with `docs/component-ontology.md` or that belongs in `docs/component-ontology-migration.md`.

    **Depends on:** all four ontology-v2 implementation tasks completing (`extend-cli-for-ontology-v2-and-add-stage-1-interaction-role-hints` is the final one).

    ## Background

    The r7 design doc covers the LLM-driven discovery pipeline architecture and edge-proposal rationale. The ontology v2 split (2026-04-23) rewrote the canonical home for relationship-schema design. There is likely overlap in motivation and vocabulary between the r7 doc and the new ontology docs. It was not audited during the split; flagged as low-priority follow-up.

    ## Scope

    - Read `docs/r7-related-projects-discovery-design.md` in full.
    - Identify sections that are now redundant with `docs/component-ontology.md` or `docs/component-ontology-migration.md`.
    - For each redundant section: either prune it (if identical) or add a cross-reference pointer (if it provides context the ontology docs lack).
    - Ensure the discovery pipeline architecture sections (Stage 1 / Stage 2 / apply flow, cache key, etc.) remain accurate against the post-v2 implementation.
    - No code changes; documentation only.

    ## Exit criteria

    - `docs/r7-related-projects-discovery-design.md` does not contradict `docs/component-ontology.md` on any point.
    - Sections describing the v1 vocabulary (`sibling`, `parent-of`) either removed or clearly marked as historical.
    - Cross-references to the ontology docs added where appropriate.
