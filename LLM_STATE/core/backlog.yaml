  description: |
    Create `defaults/discover-stage1.md` and `src/discover/stage1.rs`. Given config root + catalog, determine cache misses, spawn bounded-parallel subagents (semaphore, default 4), inject identity fields, write caches, return full surface set for Stage 2. Register prompt in `src/init.rs`. See `docs/r7-related-projects-discovery-plan.md` § Task 6.
