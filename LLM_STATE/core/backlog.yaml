- id: add-ravel-lite-rb-homebrew-formula-to-linkuistics-homebrew-taps
  title: Ship bottled Homebrew install via cargo-dist (no cargo build on user's machine)
  category: infra
  status: not_started
  dependencies: []
  description: |
    Ship `brew install linkuistics/taps/ravel-lite` as a **bottled install** — no Rust toolchain required on the user's machine. Mirrors the approach being adopted in the sibling project at `/Users/antony/Development/mdformat/`, which is solving the same problem at the same time with the same tooling; whichever lands first sets the concrete pattern.

    ## Approach

    Use [cargo-dist](https://opensource.axo.dev/cargo-dist/) to drive a release pipeline that produces pre-built binaries on version tags and publishes a Homebrew formula that installs those binaries directly.

    ### Concrete pieces

    - **`cargo-dist` config** in `Cargo.toml` (or `dist-workspace.toml`) declaring the release targets — at minimum `aarch64-apple-darwin` and `x86_64-apple-darwin`; Linux targets (`x86_64-unknown-linux-gnu`, `aarch64-unknown-linux-gnu`) if the formula should also serve Linux brew users.
    - **GitHub Actions workflow** (generated by `cargo dist init`) that fires on `v*` tags: builds per-target binaries, creates a GitHub release with the tarballs + checksums, and produces a Homebrew formula artifact.
    - **Homebrew formula** at `linkuistics/homebrew-taps/Formula/ravel-lite.rb` — a *bottle-style* formula whose `url` points at the GitHub release tarball for the user's platform, declares SHA256s, and has NO `depends_on "rust"`. Installation is a tarball extract into `#{prefix}/bin`, not a cargo build. cargo-dist can generate this formula as part of the release pipeline and the pipeline can open a PR (or direct commit) to the homebrew-taps repo.
    - **Release cadence**: continue using `cargo-release` to cut versions and push tags; the tag push triggers the cargo-dist workflow which handles everything downstream.

    ## Out of scope / non-goals

    - No from-source fallback in the formula. If a user needs a custom build they can `cargo install --path .` from a clone — the formula is specifically the bottled path.
    - No cross-compilation gymnastics beyond what cargo-dist provides out of the box. If a target is hard, drop it.

    ## Verification

    1. Tag a test release (e.g. `v0.0.0-test1`) and confirm the workflow produces per-target tarballs and an updated `ravel-lite.rb`.
    2. On a clean macOS machine (or fresh Homebrew prefix), run `brew install linkuistics/taps/ravel-lite` and confirm it installs without invoking a cargo build — verify install time is on the order of seconds, not minutes.
    3. `ravel-lite --version` on the installed binary prints the crate version and matches the git tag.

    ## Coordination note

    `/Users/antony/Development/mdformat/` is solving this same problem concurrently. Before starting, check mdformat's state — if cargo-dist is already wired up there, copy its shape. If not, coordinate design choices (target list, formula generation strategy, taps repo workflow) with the mdformat task so both projects converge on one pattern.

    ## Depends on

    Nothing blocking, but the dependent task `integrate-testanyware-vm-for-capturing-interactive-ravel-lite-commands` assumes a clean `brew install` inside a VM — landing a bottled install makes VM provisioning near-instant, which matters for that task's viability.
