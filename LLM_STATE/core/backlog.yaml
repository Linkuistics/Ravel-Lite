- id: reference-mini-site-skeleton-directory-layout-manifest-entries-index-page-asciidoc-template
  title: 'Reference mini-site skeleton: directory layout, manifest entries, index page, AsciiDoc template'
  category: docs
  status: done
  dependencies: []
  description: |
    Establish the reference mini-site that all subsequent reference pages plug into: directory layout under `docs/reference/`, manifest entries in `docs/manifest.txt`, a navigable landing `index.adoc`, and an AsciiDoc style template that every other page copies.

    ## Why this is foundational

    Every other reference task in this split assumes the skeleton, manifest entries, and AsciiDoc template are in place. Without this, each per-page task would have to re-decide the structural questions, producing inconsistent pages and forcing rework later.

    ## Scope

    - Directory layout: `docs/reference/<topic>.adoc`. The existing build pipeline flattens these into `projects/ravel-lite/reference-<topic>.html` per `scripts/build-docs.sh`.
    - Manifest entries in `docs/manifest.txt` for the index plus placeholder entries for every planned page (so the manifest is honest about what's coming, even if pages are stub-only initially). Decide a sensible chapter ordering: index → concepts → phase-cycle → file-format pages → CLI pages.
    - `docs/reference/index.adoc`: short orientation paragraph framing the reference as the spec (vs the tutorial as the narrative), then a navigable TOC organised by the three pillars — Workflow, File Formats, CLI — with one-sentence descriptions per page.
    - AsciiDoc style template that all subsequent pages copy: heading levels, `:doctype:`/`:toc:` attribute block at the top of each file, conventions for command examples (literal blocks vs `[source,bash]`), schema examples (`[source,yaml]` with field comments), and prose voice (friendly, second-person, present-tense).
    - Verify `scripts/build-docs.sh` produces valid HTML for the new entries and that the prev/next chapter navigation behaves sensibly with the expanded manifest.

    ## Style guidance (applies to every reference page in this mini-site)

    Friendly prose, minimal lists, no emoji. Each command/format entry covers: invocation/schema, flags/fields, what it does, side effects, gotchas. The reference is the spec; the tutorial is the narrative — cross-link to the tutorial rather than re-narrating worked examples here.

    ## Verification

    - `scripts/build-docs.sh` succeeds and emits `projects/ravel-lite/reference-index.html` into the configured `OUTPUT_DIR`.
    - Index page renders cleanly in the linkuistics chrome with a TOC that lists every planned reference page (even stubs).
    - AsciiDoc compiles without warnings.
    - Manifest order produces sensible prev/next chrome links between reference pages.

    ## Out of scope

    Writing the actual content of the per-pillar pages — those are separate tasks (concepts, phase cycle, four file-format pages, three CLI pages) that depend on this skeleton.
  results: |
    Established the reference mini-site scaffolding: directory layout under `docs/reference/`, expanded manifest with 9 new entries, real index page with a 3-pillar TOC, 8 stub pages so the manifest is honest about what's coming, and an AsciiDoc style/conventions block in `docs/manifest.txt` that all future page tasks copy from.

    ## What landed

    - **`docs/manifest.txt`** rewritten: kept the original `tutorial/00-overview.adoc` entry, added the 9 reference entries (index first, then concepts, phase-cycle, the three file-format pages, then the three CLI pages). Added a comment header documenting AsciiDoc conventions (heading levels, code-block syntax, link syntax for built-page-to-built-page references, "no `:doctype:` block needed because chrome comes from `page-shell.html`"). Style guidance ("friendly prose, minimal lists, no emoji") is captured in the same comment block.
    - **`docs/reference/index.adoc`** — real content, ~30 lines: orientation paragraph framing the reference as the spec (vs the tutorial as the narrative), then a navigable TOC organised by the three pillars (Workflow, File Formats, CLI) with one-sentence descriptions per page. Cross-links to `tutorial-00-overview.html` and to every other reference page.
    - **8 stub pages** (`docs/reference/{concepts,phase-cycle,state-files,cross-plan-files,config-and-prompts,cli-lifecycle,cli-state,cli-survey}.adoc`) — each has the `= Title` first line, a 1-paragraph description of what the finished page will cover, and a pointer to the corresponding backlog task id. Cross-links to the tutorial overview where it provides interim coverage. Stubs are intentionally minimal (~5 lines each) so future writers replace them rather than editing around them.

    ## Decisions made (template/convention choices)

    - **Stub strategy chosen over manifest-only placeholders.** The build script requires every manifest entry to point at a real file with a `= Title` first line, so "stubs in the manifest" had to mean stub `.adoc` files exist. Side benefit: the index page's TOC links work today, and prev/next chrome composes through the whole reference.
    - **AsciiDoc conventions documented in the manifest header**, not in every stub file. Single source of truth — a future page-rewrite pulls conventions from the manifest comment block, not from a half-stale stub.
    - **Manifest order**: tutorial first (front door for new users), then reference index, then reference pages in the order Concepts → Phase cycle → File formats (3 pages) → CLI (3 pages). This matches the index TOC's pillar ordering, so prev/next walks the reference in the same order a reader scans the TOC.
    - **No `:doctype:`/`:toc:` attribute block in any page.** The page-shell template provides the chrome and supplies the H1; AsciiDoc with `--no-header-footer` strips the doctitle from the body cleanly. Adding attribute blocks would have been duplicate scaffolding.

    ## Verification

    - `scripts/build-docs.sh` exits 0 and emits all 10 pages into `../www.linkuistics.com/projects/ravel-lite/`.
    - `asciidoctor --no-header-footer --failure-level=WARN` passes on every `docs/**/*.adoc` file (clean compile, no warnings).
    - Prev/next nav verified at three boundary positions:
      - First page (`tutorial-00-overview.html`): no prev, next = "Reference →".
      - Index page (`reference-index.html`): prev = "← Overview", next = "Concepts →".
      - Last page (`reference-cli-survey.html`): prev = "← CLI: state commands", no next.
    - File sizes sane: index 5.6 kB (TOC content), stubs 2.1–2.4 kB (chrome footprint + 1 paragraph), tutorial unchanged at 5.0 kB.

    ## Suggests next

    - The 8 child reference tasks are now structurally unblocked. Any of them can be picked up in parallel — they don't depend on each other, only on this skeleton.
    - The `publish-new-docs` task (depends on tutorial + this skeleton) is also one step closer to unblocked: still gated on the tutorial walkthrough, but the reference half of "what we're publishing" is at minimum a navigable site rather than a single empty page.
    - No `.gitignore` changes needed: the build script writes HTML into the sibling `www.linkuistics.com` repo, which is outside this repo's tree.
- id: reference-concepts-page-project-plan-agent-backends-principles-glossary
  title: 'Reference: concepts page (project, plan, agent backends, principles, glossary)'
  category: docs
  status: done
  dependencies:
  - reference-mini-site-skeleton-directory-layout-manifest-entries-index-page-asciidoc-template
  description: |
    Write the foundational concepts page that grounds every other reference page. Covers the mental model a reader needs before any other reference page makes sense.

    ## Scope

    - File: `docs/reference/concepts.adoc`
    - Topics:
      - **Project**: derivation from plan path (`<plan_dir>/../..`), independent of `.git` location.
      - **Plan**: the `LLM_STATE/<plan>` directory, what it contains, why it's plural-friendly (multiple plans per project).
      - **Monorepo subtree behaviour**: pathspec-scoped git operations, sibling-subtree invisibility, baseline SHAs vs query scope.
      - **Agent backends**: Claude Code vs Pi as selectable subprocesses; how the orchestrator picks; what each one needs from the host.
      - **The "no magic / visible, auditable, adjustable" principle**: how it manifests in practice (every state file is on disk and editable; every transition writes to the filesystem).
    - Glossary: phase, cycle, dispatch, baseline, plan-state files, durable memory, hand-off, related component, evidence grade.

    ## Style

    Friendly prose, minimal lists, no emoji. Aim for a reader who has installed ravel-lite and run it once but not yet read source. Cross-link to the relevant detail pages for each concept rather than restating their content.

    ## Verification

    - Page builds via `scripts/build-docs.sh` and renders cleanly in the linkuistics chrome.
    - Each claim cross-checked against the README and source (project derivation in `src/cli.rs`/orchestrator code; agent backend dispatch in `src/agents/`).
    - No content overlap with phase-cycle or file-format pages — concepts page introduces, detail pages specify.
  results: |
    Wrote `docs/reference/concepts.adoc` (~1100 words, 12 kB rendered HTML) covering project, plan, agent backends, the three principles, and a 9-term glossary cross-linked into the rest of the reference mini-site.

    ## Structure

    - **Project** — derivation from plan path (`<plan_dir>/../..`), independence from `.git` location, monorepo-subtree behaviour with pathspec-scoped git operations, the multi-subtree consequence.
    - **Plan** — directory layout under `LLM_STATE/<plan>/` with the six expected files in a code block, multi-plan-per-project semantics, cross-link to the state-files reference page for schema detail.
    - **Agent backends** — Claude Code vs Pi as the two shipped backends, selection via `agent:` in `config.yaml`, the `agents/<name>/` config-dir convention, Pi's additional `subagents/` for brainstorming/TDD/writing-plans.
    - **The principles** — three numbered items quoted verbatim from the README (no magic / visible-auditable-adjustable / agents are subprocesses), followed by two paragraphs on how the principles play out in practice (no opaque state, complete cycle history in git log).
    - **Glossary** — 9 terms in a definition list (`Term::` syntax → `<dt class="hdlist1">/<dd>` HTML): phase, cycle, dispatch, baseline, plan-state files, durable memory, hand-off, related component, evidence grade. Each cross-links to its specifying detail page.

    ## Source-grounded claims

    Every factual claim was checked against source before writing:

    - Project derivation: `src/git.rs:321 project_root_for_plan` walks `canonicalize → parent → parent`. Errors on too-shallow paths.
    - Agent selection: `src/main.rs:1300` matches `shared_config.agent.as_str()` on `"claude-code"` and `"pi"`; anything else bails.
    - Pathspec scoping: `src/git.rs` comments confirm `git status --porcelain -- <project_dir>` syntax to keep sibling subtrees out of warnings.
    - Dream trigger: `src/dream.rs::should_dream` uses `count > baseline + headroom` over `memory_content_word_count` (sum of `entry.title + entry.body` whitespace-split). The baseline file is `<plan_dir>/dream-word-count`. (I deliberately deferred the dream-mechanics detail to the phase-cycle page — concepts page just notes "headroom threshold" and links out.)
    - Three principles: quoted verbatim from `README.md`. The "visible, auditable, adjustable" wording is preserved exactly.

    ## Style decisions

    - **Glossary in conceptual order, not alphabetical.** The `[horizontal]` AsciiDoc list style would have rendered as a two-column layout, but I went with a plain `Term::` definition list — simpler markup, and the asciidoctor-generated `<dt class="hdlist1">` class lets the linkuistics CSS choose the visual style later without requiring a source-side change.
    - **Cross-links over restatement.** Every place where a detail belongs on another page (state-file schemas, dream-trigger mechanics, related-components edge schema, agent config layout) gets a `link:reference-<page>.html[…]` pointer rather than a duplicated paragraph. This is the contract from the task description: "concepts page introduces, detail pages specify."
    - **No emoji, friendly second-person prose**, matching the manifest comment block's style guidance.

    ## Verification

    - `scripts/build-docs.sh` exits 0; all 10 pages rebuild.
    - `asciidoctor --no-header-footer --failure-level=WARN` clean on the new file.
    - HTML inspection confirms `<dt class="hdlist1">` glossary structure, working `<a href="reference-*.html">` cross-links to phase-cycle / state-files / cross-plan-files / config-and-prompts pages, and prev/next chrome with `← Reference` and `Phase cycle →`.
    - Page size: 12 kB rendered (vs 2.3 kB stub), representing ~5× content growth.
    - No content overlap with other (still-stub) reference pages — concepts introduces, the linked detail pages will specify.

    ## Suggests next

    - The concepts page is the natural reference for cross-linking from later pages — the glossary entries lock in vocabulary, so phase-cycle / state-files / cross-plan-files / cli-* pages can use terms like "baseline", "dispatch", "hand-off", "evidence grade" without re-defining them.
    - Phase-cycle is a strong pick for the next reference task: it's the second pillar of the workflow half, and the dream-trigger detail I deferred from the concepts page wants a home.
    - The glossary's "Hand-off" entry is the only one that doesn't currently cross-link out, because hand-off semantics aren't on any planned page. Consider whether the state-files page (under backlog.yaml's hand-off block) should pick that up, or whether it warrants a one-paragraph mention on the phase-cycle page where triage acts on it. Worth a triage decision later.
- id: reference-phase-cycle-page-per-phase-contracts-dream-trigger-triage-dispatch-git-commit-audit-trail
  title: 'Reference: phase cycle page (per-phase contracts, dream trigger, triage dispatch, git-commit-* audit trail)'
  category: docs
  status: not_started
  dependencies:
  - reference-mini-site-skeleton-directory-layout-manifest-entries-index-page-asciidoc-template
  description: |
    Write the phase cycle reference page: every phase in the work → analyse-work → git-commit-work → reflect → git-commit-reflect → [dream?] → dream → git-commit-dream → triage → git-commit-triage cycle, with each phase's input/output contract, the dream-trigger condition, the triage subagent dispatch mechanism, and the per-phase git-commit audit trail.

    ## Scope

    - File: `docs/reference/phase-cycle.adoc`
    - Per phase, document: what files it reads, what files it writes, what decisions it makes, when it transitions, and how it's invoked (interactive vs headless).
    - **Dream trigger**: word-count threshold (baseline + headroom), where the baseline is captured (`save-work-baseline` etc.), what happens on trigger.
    - **Triage dispatch**: how cross-plan propagation works (peer-project relationships from `related-components.yaml`, subagent dispatch via `subagent-dispatch.yaml`).
    - **Git-commit-* phases**: per-phase audit trail commits, what each commit captures, the `commits.yaml` mechanism that drives them.
    - AsciiDoc art diagram of the cycle (the README's diagram is a starting point but should be expanded with file-level read/write annotations).

    ## Style

