- id: state-intents-render-overview-regenerate-phase-md-from-intents-task-counts
  title: 'state intents render-overview: regenerate phase.md from intents + task counts'
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-ravel-lite-migrate-for-v1-to-v2-cutover
  description: |
    Add `state intents render-overview` verb that reads `intents.yaml` + active task counts from `backlog.yaml` and writes a structured overview to `phase.md`. Wire into `run_set_phase` so phase.md regenerates on every phase transition.

    **Why this is its own task:** The done `introduce-intents-yaml-and-state-intents-crud-verbs` task deferred this explicitly with the rationale: the render-overview verb separates "compute the overview" from "write the phase file", and reading `backlog.yaml` for task counts during `set-phase` would fail on the current plan (legacy v1 wire shape). The verb should land after the migrator ships and a new binary deploys.

    **Settled design (from intents task results):**
    - `state intents render-overview <plan-dir>` reads `intents.yaml` (active intents) + `backlog.yaml` (active/blocked task counts) and writes a structured `phase.md` overview: intent summary, active counts, housekeeping metadata.
    - `run_set_phase` calls this verb (or its equivalent logic) on every LLM phase transition so `phase.md` is always coherent with current intents + backlog state.
    - `phase.md` transitions from a hand-authored intent-source document (v1) to a machine-generated overview (v2). It is never the canonical intent source; that role moves to `intents.yaml`.
    - The factoring mirrors `compose_prompt` layering: compute separately, write separately.

    **Scope:**
    1. Add `StateCommands::Intents` → `IntentsCommands::RenderOverview` verb in `src/main.rs`.
    2. Implementation reads `read_intents`, `read_backlog`, injects active intent claims + task counts into a Markdown template, writes to `phase.md`.
    3. Update `run_set_phase` to call the render logic after phase file write.
    4. Tests: rendered output includes intent claims, task counts match backlog, phase transitions leave `phase.md` non-empty and structured.

    **Gating constraint:** Must wait until the v1→v2 migrator ships and a new binary deploys — `read_backlog` on `LLM_STATE/core/backlog.yaml` today hits the legacy v1 wire shape and would fail. See `LLM_STATE-shape-frozen` memory entry.
- id: survey-surface-findings-inbox-in-survey-output
  title: 'Survey: surface findings inbox in survey output'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Surface `findings.yaml` inbox content in `ravel-lite survey` output.

    Problem: `src/state/findings/` was added in session 104 and the inbox is now writable, but `ravel-lite survey` does not yet read `findings.yaml`. The survey output is the user's primary "what is going on in this context" view; an inbox that doesn't appear there is effectively invisible.

    Decision: emit a `## Findings` section in survey output, after the existing sections, listing each finding in summary form (id, status, claim). Use the same pattern as other survey sections — read via `state::findings::read_findings`, skip the section entirely when the inbox is empty or missing (lazy-create semantics already in yaml_io.rs mean absence == empty).

    Reference examples:
    - `src/state/findings/yaml_io.rs` — `read_findings(context_root)` already returns an empty default when the file is missing; the survey reader can call it unconditionally.
    - `src/survey/` — existing section rendering for reference.
    - `src/state/findings/schema.rs` — `FindingEntry` has `id`, `status`, `component`, `raised_in`; `item.tms.claim` is the one-liner.

    Dependencies: none. `src/state/findings/` is already merged; survey can just call it.

    Estimated scope: ~30 LOC in `src/survey/`.
- id: list-items-include-finding-kind-in-cross-kind-queries
  title: 'list-items: include finding kind in cross-kind queries'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Extend `ravel-lite state plan list-items` (and related cross-kind queries) to include `finding` as a queryable kind.

    Problem: `state plan list-items`, `state plan query-by-status`, and similar cross-kind introspection commands enumerate `intent`, `backlog-item`, and `memory-entry`. The `finding` kind introduced in session 104 is not yet included, so cross-kind status queries miss findings.

    Decision: add `finding` to the set of kinds iterated in the cross-kind scan. The scan reads `findings.yaml` via `state::findings::read_findings` and folds its entries into the common output stream alongside the other kinds. Wire-type enforcement is already done at schema level (`FindingEntry` carries `kind: finding`), so no extra validation is needed — just include the file in the enumeration.

    Reference examples:
    - `src/state/findings/schema.rs` — `FindingEntry` wraps `Item<FindingKind>`; same shape as `MemoryEntry`, `IntentEntry`.
    - `src/state/findings/yaml_io.rs` — `read_findings` for the read path.
    - The existing multi-kind enumeration in `src/state/` — follow the same pattern as `memory`/`intents` inclusions.

    Dependencies: none. `src/state/findings/` is already merged.

    Estimated scope: small addition to the cross-kind scan loop, plus tests.
