- id: wire-orchestrator-baseline-capture-for-reflect-dream-triage-phases
  title: Wire orchestrator baseline capture for reflect/dream/triage phases
  category: core
  status: not_started
  dependencies: []
  description: |
    Wire orchestrator baseline capture for reflect, dream, and triage phases so `state phase-summary render` can be called with a meaningful `--baseline` SHA.

    ## What

    Today the orchestrator writes `work-baseline` (used by analyse-work) and `dream-baseline` (for compaction-trigger tracking). There is no `reflect-baseline` or `triage-baseline`. Each `git-commit-<phase>` script phase should write `<next-phase>-baseline` with the HEAD SHA it just committed, so the following LLM phase can call:

        ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline)

    and emit the result verbatim instead of re-transcribing its own edits.

    ## Settled design

    - Pattern: each `git-commit-<phase>` script already runs `git_save_work_baseline` at the tail end; add analogous `write_baseline(plan_dir, "<next-phase>-baseline", new_head_sha)` calls in:
      - `git-commit-work` → writes `triage-baseline`
      - `git-commit-triage` → writes `reflect-baseline`
      - `git-commit-reflect` → writes `dream-baseline` (already exists — just check it matches the pattern)
      - `git-commit-dream` → writes `work-baseline` (already exists as `git_save_work_baseline`)
    - File format: plain text, one SHA, no trailing newline, same as `work-baseline` today.
    - `src/git.rs` already has `git_save_work_baseline`; generalise to `git_save_baseline(plan_dir, filename, sha)` or duplicate the tiny function — up to implementer.

    ## Reference examples

    - `src/git.rs`: `git_save_work_baseline` (current baseline-write pattern, ~5 lines)
    - `scripts/git-commit-work` (or wherever `git_save_work_baseline` is called)
    - `LLM_STATE/core/work-baseline` (file format)
    - Phase-summary task results: "Wire orchestrator baselines for reflect/dream/triage" section

    ## Dependencies

    None blocking. Should land before the prompt-update task below, though prompt updates can work with `--baseline ""` (first-cycle-safe) while this is pending.

    ## Next task after this one

    Update triage/reflect/dream `## Output format` prompt blocks to invoke `state phase-summary render` verbatim (subsumes `triage-should-not-emit-the-no-dispatch-label-in-its-output`).
- id: update-triage-reflect-dream-prompts-to-invoke-state-phase-summary-render
  title: Update triage/reflect/dream prompts to invoke state phase-summary render
  category: core
  status: not_started
  dependencies: []
  description: |
    Replace the `## Output format` blocks in triage, reflect, and dream prompts with a single directive to run `state phase-summary render` and emit its output verbatim.

    ## What

    Each of `defaults/phases/triage.md`, `defaults/phases/reflect.md`, and `defaults/phases/dream.md` currently contains an `## Output format` block instructing the LLM to transcribe its own edits into labelled summary lines. This is mechanical re-transcription — precisely the anti-pattern that `state phase-summary render` was built to replace.

    Replacement text (exact wording, adjust `{{PLAN}}` template vars):

        After your narrative preamble, run:

            ravel-lite state phase-summary render {{PLAN}} --phase <phase> \
                --baseline $(cat {{PLAN}}/<phase>-baseline 2>/dev/null || echo "")

        and emit its output verbatim. Do not add, remove, or reorder lines.

    ## Settled design

    - The `--baseline ""` fallback (via `|| echo ""`) is first-cycle-safe: phase-summary render treats empty baseline as "no prior state" and reports only additions.
    - Intent-required labels (`[PROMOTED]`, `[IMPRECISE]`, `[OVERLAPPING]`, etc.) are deliberately NOT emitted by the CLI; the LLM's narrative preamble (which every phase prompt already preserves) is the right home for those. The replacement does not change the preamble instructions.
    - Subsumes the sibling task `triage-should-not-emit-the-no-dispatch-label-in-its-output` — once the `## Output format` block is replaced, `[NO DISPATCH]` simply won't appear.

    ## Reference examples

    - `defaults/phases/triage.md`: locate the `## Output format` block (approx lines 120–137 per the task brief)
    - `defaults/phases/reflect.md`: locate `## Output format` (approx lines 58–71)
    - `defaults/phases/dream.md`: locate `## Output format` (approx lines 47–67)
    - `defaults/phases/work.md` step 1: the already-landed pattern for backlog render — mirrors exactly what this task does for phase-summary

    ## Dependencies

    - `wire-orchestrator-baseline-capture-for-reflect-dream-triage-phases` — baseline files must exist before prompts can reliably `cat` them. Prompts still work without baselines (empty fallback), but landing baseline wiring first produces cleaner output from day one.
