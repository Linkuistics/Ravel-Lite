tasks:
- id: support-relative-paths-in-projects-yaml-for-git-shared-catalogs
  title: Support relative paths in projects.yaml for git-shared catalogs
  category: architecture
  status: done
  dependencies: []
  description: |
    Support paths in `projects.yaml` being either absolute or relative to
    the location of `projects.yaml` itself. This enables the catalog file
    to be committed to git and shared between users whose home directories
    and project checkouts live at different absolute paths.

    ## Current state

    `src/projects.rs` stores every `ProjectEntry.path` as an absolute
    `PathBuf`:

    - `run_add` (line 195) forces the input through `std::path::absolute`
      before storing.
    - `auto_add` / `try_add_named` accept whatever the caller passes but
      all current callers hand them absolute paths.
    - The `save_then_load_round_trips` and `run_add_canonicalises_*`
      tests assert on absolute-path storage.

    Consumers downstream (discovery pipeline, orchestrator directory
    resolution, edge participant lookup) read `ProjectEntry.path` and use
    it as-is to open files on disk.

    ## Problem

    An absolute-paths-only catalog cannot be checked into a shared
    repository. Two users collaborating on the same cross-project ontology
    necessarily have different home/project roots, so the YAML diverges
    per machine. This blocks using git to share catalog state.

    ## Proposed shape

    The on-disk schema accepts either absolute paths **or** paths
    relative to the directory containing `projects.yaml`. At load time,
    relative paths are resolved against `<config_root>` (which is already
    passed to `load_or_empty`) to yield the absolute path the rest of the
    code currently expects.

    On write, preserve the form the user supplied: if a `ProjectEntry`
    was loaded with a relative path, save it back relative; if it was
    added via `run_add` with an absolute path, save it absolute. Don't
    silently rewrite users' paths.

    Design questions to resolve during execution:

    1. **Representation in the in-memory struct.** Two options:
       - Keep `path: PathBuf` as absolute (the post-resolve form) and
         carry a sibling `original_form: Option<PathBuf>` for round-trip
         fidelity.
       - Change `path` to an enum `{ Absolute(PathBuf), Relative(PathBuf) }`
         and resolve at each consumer. More invasive.

       The first is less churn but risks losing the original on
       re-serialize; decide based on how many downstream sites care.

    2. **`run_add` CLI surface.** Today `run_add` always canonicalises
       input to absolute. Add a `--relative` flag (or make relative the
       default when the path is already inside `<config_root>`'s project
       tree) so users can opt into committable entries. Default behaviour
       should not change silently.

    3. **Validation.** Reject `..` segments that escape `<config_root>`'s
       intended scope? Or allow them (the point is relative-from-yaml,
       which naturally implies `..` is fine)? Lean: allow, since a shared
       monorepo checkout may need `../sibling-repo`.

    4. **Portability of `projects.yaml` itself.** If the file is committed
       to the repo and all listed paths are relative to its directory,
       the catalog is portable. Document this invariant in the module
       docstring at `src/projects.rs:1-11` (which currently asserts
       "paths are absolute").

    ## Exit criteria

    - `projects.yaml` accepts both absolute and relative `path:` values.
    - Relative paths resolve against the directory containing
      `projects.yaml` at load time.
    - `run_add` grows an explicit way to store a relative form (exact
      flag name TBD at implementation time).
    - Round-trip: a catalog with a mix of absolute and relative entries
      preserves the original form across save/load.
    - Existing all-absolute catalogs continue to load and behave
      identically (backwards compatible on-disk).
    - Module docstring updated to reflect the dual-form semantics.
    - New tests cover: relative-path load resolution, relative-path
      round-trip preservation, mixed catalog, and a committed-catalog
      scenario where the same YAML loads correctly from two different
      `<config_root>` absolute paths.

    ## Scope boundary

    This task is scoped to the catalog format and its loader/writer. It
    does NOT cover:

    - Migration tooling to bulk-convert existing absolute entries to
      relative form (deferred — add as a follow-up task if there's
      demand).
    - Any schema version bump: the change is additive (relative paths
      are a new valid input form), so `SCHEMA_VERSION` stays at 1.
  results: |
    ## What was done

    `projects.yaml` now stores every `path:` entry **relative to the
    directory containing the catalog file**, making the file portable
    across machines with different absolute home/project roots. Legacy
    all-absolute catalogs load unchanged and are silently migrated to the
    relative form the first time any state-mutating verb (`add` / `remove`
    / `rename`) rewrites the file. The in-memory contract is untouched:
    `ProjectEntry.path` remains an absolute, cleaned `PathBuf` that
    consumers use directly for filesystem operations.

    ## Design decisions (made during brainstorm)

    The task description listed several open design questions; the user
    resolved them during brainstorm as follows:

    - **Representation:** no sidecar `original_form` field. A single
      canonical on-disk form (always-relative on save) eliminates the need
      to preserve per-entry input form.
    - **CLI surface:** no `--relative` flag. `run_add` canonicalises input
      via `std::path::absolute` then `.clean()`, and serialisation always
      emits the relative form.
    - **`..` validation:** allowed (necessary — the natural form for
      projects living as siblings of `<config_root>` starts with `../`).
    - **Silent legacy migration:** accepted. The one edge case the user
      flagged — moving `projects.yaml` relative to the project dirs it
      references — is rare enough to be designated as requiring manual
      intervention.

    ## Implementation

    Two new tiny deps added:
    - `pathdiff = "0.2"` — computes the relative form on save.
    - `path-clean = "1"` — collapses `.` / `..` segments so in-memory
      paths are consistently cleaned.

    Code changes in `src/projects.rs`:
    - Module docstring rewritten to document dual-form load / always-relative
      save semantics.
    - `ProjectsCatalog` / `ProjectEntry` no longer derive `Serialize` /
      `Deserialize`; a private `RawProjectsCatalog` / `RawProjectEntry`
      DTO carries the on-disk shape through serde.
    - `load_or_empty` translates via `resolve_against_catalog_dir`:
      absolute → cleaned; relative → `config_root.join(stored).clean()`.
    - `save_atomic` translates via `relativise_against_catalog_dir`
      (wrapping `pathdiff::diff_paths`).
    - `serialise_catalog` helper extracted so both `save_atomic` and
      `run_list` route through the same form-conversion path. `state
      projects list` now prints the on-disk (relative) shape, which is
      arguably more useful for humans inspecting a committed catalog.
    - `run_add` cleans after `std::path::absolute` so in-memory paths are
      always canonical.
    - `find_by_path` cleans its search argument so lookups succeed
      regardless of `..` / `.` in caller input.
    - `auto_add` / `try_add_named` clean the inserted path.

    ## Verification

    - All 26 pre-existing `projects::` unit tests pass unmodified.
    - 7 new acceptance tests added per the design's test plan:
      1. `save_writes_path_relative_to_catalog_dir_when_project_under_root`
      2. `save_writes_path_with_parent_segments_when_project_outside_root`
      3. `load_resolves_relative_stored_path_against_catalog_dir`
      4. `load_accepts_legacy_absolute_stored_paths`
      5. `save_after_load_migrates_legacy_absolute_entries_to_relative`
      6. `same_yaml_loaded_from_two_locations_yields_distinct_absolute_paths`
         (the portability proof)
      7. `find_by_path_matches_unclean_search_argument`
    - One integration test updated: `state_projects_add_canonicalises_relative_path_via_binary`
      → renamed to `state_projects_add_relative_path_resolves_against_cwd_via_binary`.
      Its original intent (relative CLI input resolves against child CWD,
      not `<config_root>`) is preserved; the assertion is now expressed in
      terms of the new stored shape (resolved-against-cfg yields the
      CWD-relative project).
    - Full suite: `cargo test` → 480 lib tests + 13 state_projects +
      associated integration tests all pass. `cargo clippy --all-targets`
      clean. `rustfmt` on `tests/state_projects.rs` clean; `rustfmt` on
      `src/projects.rs` shows only pre-existing diffs (unrelated to this
      change).

    ## What this suggests next

    - **Migration tooling was explicitly out of scope** and is now largely
      moot: a user with a legacy absolute catalog gets automatic migration
      on the next `add` / `remove` / `rename`. If there is demand to
      migrate without a mutating command, a trivial `state projects
      canonicalise` verb would do it (load-then-save). Defer until asked.
    - **Discover pipeline / orchestrator** don't need any change — they
      read `ProjectEntry.path` and the absolute contract is preserved.
    - **Documentation**: the module docstring at `src/projects.rs:1-31`
      now documents the dual-form / always-relative-on-save semantics. No
      need for user-facing docs right now; if `projects.yaml` gets its own
      documented schema page later, cross-link from there.
    - **`schema_version`** stays at 1 (the change is additive on-disk —
      absolute and relative are both valid inputs). No migration-window
      concerns.
