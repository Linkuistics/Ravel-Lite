tasks:
- id: check-dev-machine-for-stray-v1-related-projects-yaml-files
  title: Check dev machine for stray v1 related-projects.yaml files
  category: maintenance
  status: not_started
  dependencies: []
  description: |
    Run the one-shot maintainer check from the retired migration doc §9 condition 2: confirm no v1 `related-projects.yaml` files remain in user config directories.

    ## Background

    `docs/component-ontology-migration.md` §9 listed three conditions for sunset. Conditions 1 and 3 were satisfied by the code changes. Condition 2 — "No remaining v1 `related-projects.yaml` files are known to exist in any user config directory the maintainer can reach" — is a filesystem check, not a code change.

    The v1 loader in `src/related_components.rs` now hard-errors on any `related-projects.yaml` it encounters, so stragglers are a nuisance (hard error on load) rather than a silent data risk. But clearing them is still the right cleanup.

    ## Scope

    Run on the main dev machine:

    ```
    find ~ -name 'related-projects.yaml' \
      -not -path '*/target/*' \
      -not -path '*/.git/*' \
      -not -path '*/node_modules/*'
    ```

    Delete any hits (or rename/archive if uncertain).

    ## Exit criteria

    - The find command returns zero matches (other than any intentional test fixtures under source-controlled paths, which are not user config files).
