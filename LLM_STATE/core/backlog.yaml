tasks:
- id: migrate-v1-v2-cutover-deploy-binary-and-migrate-llm-state-core
  title: 'migrate-v1-v2 cutover: deploy binary and migrate LLM_STATE/core'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Deploy the new binary and migrate `LLM_STATE/core` to v2 layout.

    ## Why

    The migrate-v1-v2 command is feature-complete (P2–P7 all done). The migrator exists and the `LLM_STATE-shape-frozen-until-migrator-exists` constraint can now be lifted. The local `LLM_STATE/core/` is still a v1 layout; once the new binary is on PATH, any cycle-shaped verb against this dir will trip the v2 gate.

    ## Scope

    1. `cargo install --path .` (or equivalent local install) to put the new binary on PATH.
    2. Verify `ravel-lite --version` reflects the current build.
    3. Run `ravel-lite migrate-v1-v2 LLM_STATE/core --as core --yes` from the project root. Validate the new layout: `repos.yaml` present in parent, `plans/core/` exists, state YAML files present.
    4. Confirm `ravel-lite state backlog list plans/core` succeeds with the v2 binary.
    5. Update any scripts or drive-by references to `LLM_STATE/core` that need updating (e.g. triage-baseline path if it moves).

    ## Verification

    `ravel-lite run plans/core` enters a cycle without hitting the v2-gate error. `./scripts/check.sh` passes.

    ## Note

    After this task lands, P8 (cross-repo .md sibling cleanup) becomes unblocked and is purely cosmetic.
- id: migrate-v1-v2-p8-cross-repo-md-sibling-cleanup
  title: 'migrate-v1-v2 P8: cross-repo md sibling cleanup'
  category: architecture-next
  status: not_started
  dependencies:
  - migrate-v1-v2-cutover-deploy-binary-and-migrate-llm-state-core
  description: |
    Implement Phase 8 of the `migrate-v1-v2` plan: cross-repo cleanup of stale `.md` siblings in 5 sibling repos.

    ## Reference

    - Plan: `docs/superpowers/plans/2026-05-04-migrate-v1-v2.md` §Phase 8 (Task 21).
    - Spec: `docs/superpowers/specs/2026-05-04-migrate-v1-v2-design.md` §Companion scope: cross-repo cleanup of stale .md siblings.

    ## Why

    Once Phase 7 deletes the `state migrate` verb, the `.md` siblings in each project's LLM_STATE are pure noise — they were leftover artefacts of the keep-originals migration policy. Removing them keeps each project tidy.

    ## Scope

    For each of these 5 sibling repos:

    - `/Users/antony/Development/AppSpec`
    - `/Users/antony/Development/Ravel`
    - `/Users/antony/Development/APIAnyware-MacOS`
    - `/Users/antony/Development/TestAnyware`
    - `/Users/antony/Development/IDEs/RacketPro`

    The procedure per repo:

    1. `cd` into the repo.
    2. `git status --short`. If non-empty: STOP for this repo, add it to a "skipped" report, move to the next repo.
    3. Find files matching `LLM_STATE/**/{backlog,memory,session-log,latest-session}.md` AND where a `.yaml` sibling exists in the same dir.
    4. `git rm <files>`; `git commit -m "chore: remove stale legacy .md state siblings"`.
    5. Do NOT push — leave that to the user.

    After all five repos: report which were cleaned vs skipped (with each skipped repo's dirty-tree contents).

    ## Files explicitly NOT to delete

    - `phase.md` (universal, hand-authored)
    - `prompt-*.md` (per-plan agent overrides)
    - `decisions.md`, `research-notes.md`, `related-plans.md`, `new-language-guide.md`, `overview.md`, `project-workflow.md`, `targets/template.md` (user-authored content)

    ## Dependencies

    None — independent of all other phases.

    ## Use the subagent-driven-development skill

    One subagent per repo (5 dispatches). Each subagent operates strictly within its assigned repo and reports back.

    ## Verification

    After each repo's commit, `git status --short` in that repo is empty. After all five, no repo has untracked or partially-staged content.
- id: state-intents-render-overview-regenerate-phase-md-from-intents-task-counts
  title: 'state intents render-overview: regenerate phase.md from intents + task counts'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Add `state intents render-overview` verb that reads `intents.yaml` + active task counts from `backlog.yaml` and writes a structured overview to `phase.md`. Wire into `run_set_phase` so phase.md regenerates on every phase transition.

    **Why this is its own task:** The done `introduce-intents-yaml-and-state-intents-crud-verbs` task deferred this explicitly with the rationale: the render-overview verb separates "compute the overview" from "write the phase file", and reading `backlog.yaml` for task counts during `set-phase` would fail on the current plan (legacy v1 wire shape). The verb should land after the migrator ships and a new binary deploys.

    **Settled design (from intents task results):**
    - `state intents render-overview <plan-dir>` reads `intents.yaml` (active intents) + `backlog.yaml` (active/blocked task counts) and writes a structured `phase.md` overview: intent summary, active counts, housekeeping metadata.
    - `run_set_phase` calls this verb (or its equivalent logic) on every LLM phase transition so `phase.md` is always coherent with current intents + backlog state.
    - `phase.md` transitions from a hand-authored intent-source document (v1) to a machine-generated overview (v2). It is never the canonical intent source; that role moves to `intents.yaml`.
    - The factoring mirrors `compose_prompt` layering: compute separately, write separately.

    **Scope:**
    1. Add `StateCommands::Intents` → `IntentsCommands::RenderOverview` verb in `src/main.rs`.
    2. Implementation reads `read_intents`, `read_backlog`, injects active intent claims + task counts into a Markdown template, writes to `phase.md`.
    3. Update `run_set_phase` to call the render logic after phase file write.
    4. Tests: rendered output includes intent claims, task counts match backlog, phase transitions leave `phase.md` non-empty and structured.

    **Gating constraint:** Must wait until the v1→v2 migrator ships and a new binary deploys — `read_backlog` on `LLM_STATE/core/backlog.yaml` today hits the legacy v1 wire shape and would fail. See `LLM_STATE-shape-frozen` memory entry.
- id: rename-phase-baselines-to-per-worktree-yaml-map-shape-prompts-phase-loop-rs
  title: Rename phase baselines to per-worktree YAML map shape (prompts + phase_loop.rs)
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    When per-worktree YAML baseline maps land as part of the v2 architecture, sweep
    `defaults/phases/*.md` and `src/phase_loop.rs` together to rename the flat phase
    baseline files.

    ## Why

    The completed `phase-prompt-updates-for-triage-first-cycle-shape` task explicitly
    deferred this: `defaults/phases/triage.md` et al. contain shell-out patterns like
    `cat {{PLAN}}/<phase>-baseline 2>/dev/null` that must rename in lockstep with the
    runner-side `git_save_baseline` calls in `phase_loop.rs`. If either side moves
    alone, the renderer's shell-out fails silently (`2>/dev/null` swallows it).

    ## Scope

    1. Update the four `git_save_baseline` call sites in `src/phase_loop.rs` to use the
       new per-worktree YAML map shape (exact API TBD when the v2 baseline spec lands).
    2. Update the corresponding `cat {{PLAN}}/<phase>-baseline` shell fragments in
       `defaults/phases/triage.md` and the renderer call in
       `ravel-lite state phase-summary render`.
    3. Confirm `every_file_under_defaults_is_registered_in_embedded_files` and
       `shipped_pi_prompts_have_no_dangling_tokens` still pass.

    ## Gating constraint

    Blocked on `migrate-ravel-lite-migrate-for-v1-to-v2-cutover` shipping a new binary
    and the per-worktree YAML baseline spec being settled in `docs/architecture-next.md`.
    Do not rename ahead of the spec or the renderer call will break silently.
- id: cli-json-schema-versioning-policy-and-documentation
  title: 'CLI: JSON schema versioning policy and documentation'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    CLI audit scope item #2 (cli-tool-design.md §1): every
    `--format json` output carries a top-level `schema_version`, and
    each verb's schema is documented and stable.

    ## Status of `schema_version`

    Already present on the typed YAML/JSON envelope structs that
    underlie state verbs:

    - `BACKLOG_SCHEMA_VERSION`, `MEMORY_SCHEMA_VERSION`,
      `INTENTS_SCHEMA_VERSION`, `FINDINGS_SCHEMA_VERSION`,
      `TARGETS_SCHEMA_VERSION`, `TARGET_REQUESTS_SCHEMA_VERSION`,
      `THIS_CYCLE_FOCUS_SCHEMA_VERSION`,
      `FOCUS_OBJECTIONS_SCHEMA_VERSION`, `COMMITS_SCHEMA_VERSION`.
    - `LIST_SCHEMA_VERSION` for `fixed-memory list`.

    What is missing:

    1. Verbs that don't yet emit JSON (atlas, repos — see
       `cli-fmt-json-parity-for-repo-and-atlas-verbs`) need the same
       versioned wrapper when they gain JSON.
    2. `schema_version` needs documentation surfaces — preferably the
       `ravel-lite schema <command>` verb in `cli-discoverability-verbs`,
       not freestanding markdown that rots.
    3. Bump policy must be written down. Cli-tool-design.md §1
       says "Schema must be stable across patch versions. Breaking
       changes go in major versions and are documented." — reflect
       this in the project README or a short ADR-style note.

    ## Why deferred

    The on-disk wire shape is frozen until the v1→v2 migrator exists
    (see `migrate-ravel-lite-migrate-for-v1-to-v2-cutover`). Writing a
    formal schema doc now risks codifying a shape that the migration
    will reshape. Wait until the v2 cutover lands, then snapshot what
    ships.

    ## Reference

    - `defaults/fixed-memory/cli-tool-design.md` §1, §"Anti-patterns"
      ("Unstable JSON").
    - Memory: "LLM_STATE shape frozen until v1→v2 migrator exists" —
      pins schema-doc work behind that migrator.
- id: state-session-log-list-add-all-flag-and-truncation-envelope
  title: 'state session-log list: add --all flag and truncation envelope'
  category: architecture-next
  status: done
  dependencies: []
  description: |
    Add `--all` flag and truncation envelope to `state session-log list`.

    ## Why

    The `cli-add-limit-n-and-all-flags-to-list-verbs` task explicitly deferred
    `state session-log list` because it already carries a `--limit N` flag with
    "keep newest N" semantics — semantically different from the new "first N"
    pattern. The truncation envelope (`truncated: true`, `total: N`, `returned: M`)
    and `--all` flag were not added, leaving session-log list as the one list verb
    without parity.

    ## Scope

    1. Add `--all` flag to `state session-log list` (`conflicts_with = "limit"`).
    2. Clarify the semantics: `--limit N` keeps the newest N entries (current
       behaviour); `--all` returns all entries. The "first N" vs "newest N"
       distinction needs a brief `--help` explanation.
    3. Add truncation metadata to YAML/JSON envelope output (same `ListEnvelope<T>`
       infrastructure as the other verbs).
    4. Extend `state session-log list --format` help with `--all` example.

    ## Verification

    - `cargo test --workspace` passes.
    - `state session-log list --limit 5` returns newest 5 with truncation metadata
      when total > 5.
    - `state session-log list --all` returns all with no truncation metadata.
    - `--limit` and `--all` are mutually exclusive at clap layer.
  results: |
    Added `--all` flag and truncation envelope to `state session-log list`, bringing it to parity with `memory list`, `backlog list`, `intents list`, and `findings list` while preserving its distinctive *newest-N* (tail) `--limit` semantics.

    ## What changed

    ### `src/state/session_log/schema.rs`
    - Added `pub const SESSION_LOG_SCHEMA_VERSION: u32 = 1;` constant. The on-disk `SessionLogFile` shape continues to use `#[serde(flatten)] extra: IndexMap` to round-trip `schema_version:` softly; the new constant pins the version emitted by the list verb's `ListEnvelope`.

    ### `src/state/session_log/verbs.rs`
    - `run_list` signature changed from `(plan_dir, limit: Option<usize>, format)` to `(plan_dir, limits: ListLimits, format)`.
    - Extracted pure helper `select_records(records, limits) -> ListEnvelope<SessionRecord>`. Tail-keep semantics: when `--limit N < total`, returns `records[total-N..]` and sets `truncated: Some(true) / total / returned`.
    - `untruncated_envelope(items)` builds the no-metadata variant.
    - `emit_envelope(envelope, format)` is the new emitter — prints YAML/JSON to stdout, writes the human truncation summary to stderr via `list_limits::truncation_summary_line` (same format as memory/backlog/etc.: `"Showing N of M results. Use --limit N or --all to see more."`).

    ### `src/main.rs`
    - `SessionLogCommands::List` gained `all: bool` field with `#[arg(long, conflicts_with = "limit")]`.
    - `--limit` doc-comment rewritten to explicitly call out the *newest-N (tail)* semantic difference vs the head-keeping verbs.
    - `SESSION_LOG_LIST_AFTER_HELP` extended with the `--all` example and a "Note:" paragraph clarifying the head-vs-tail distinction.
    - `dispatch_session_log` constructs `ListLimits { limit, all }` and forwards.

    ### Tests added (in `verbs.rs::tests`)
    1. `select_records_default_returns_all_with_no_metadata`
    2. `select_records_all_flag_returns_all_with_no_metadata`
    3. `select_records_limit_keeps_newest_and_records_truncation` — explicitly asserts `s-2, s-3, s-4` returned for input `[s-0..s-4]` with `--limit 3`.
    4. `select_records_limit_at_or_above_total_emits_no_truncation` (covers both `==` and `>` boundary)
    5. `select_records_empty_input_returns_empty_with_no_metadata`
    6. `untruncated_envelope_yaml_uses_items_key_and_omits_truncation_fields` — guards backward compatibility of the no-truncation YAML shape.
    7. `truncated_envelope_yaml_carries_truncation_metadata` — guards the truncated YAML shape.

    The pre-existing `run_list_limit_truncates_to_newest_n` test was replaced by the more comprehensive `select_records_limit_keeps_newest_and_records_truncation` (same intent, exercises the new pure helper directly).

    ## Verification

    - `cargo test --workspace` → 1019 + 23 + others pass; 0 failures.
    - `./scripts/check.sh` → exit 0 (clippy gate clean).
    - `ravel-lite state session-log list LLM_STATE/core --limit 2`:
      - stdout: YAML envelope `{ schema_version: 1, items: [s-146, s-147], truncated: true, total: 147, returned: 2 }`.
      - stderr: `Showing 2 of 147 results. Use --limit N or --all to see more.`
    - `ravel-lite state session-log list LLM_STATE/core --all`:
      - stdout: YAML envelope without truncation fields, all 147 sessions.
      - stderr: empty.
    - `ravel-lite state session-log list /tmp/x --limit 1 --all` → exit 2, error `the argument '--limit <LIMIT>' cannot be used with '--all'` (clap's mutual-exclusion).
    - `--format json` produces the same envelope shape as YAML (verified via real-plan smoke).

    ## Output shape change (deliberate)

    Pre-this-change YAML output: `{ sessions: [...] }` (matching the on-disk file shape).
    Post-this-change YAML output: `{ schema_version: 1, items: [...] [, truncated, total, returned] }` (matching the `ListEnvelope<T>` pattern used by every other state list verb).

    The on-disk `session-log.yaml` shape is unchanged — only the CLI list output moves to the envelope shape. Consumers that round-trip CLI output through `SessionLogFile` will need to switch to `ListEnvelope<SessionRecord>` (or just deserialise items directly). I checked the in-tree consumers:
    - `defaults/phases/analyse-work.md:102` calls `state session-log list {{PLAN}}` and instructs the LLM to "count records returned". The LLM will continue to count list items regardless of the wrapper key — no breakage.
    - `src/survey/discover.rs:652` writes the on-disk file shape (`sessions: []`), not the CLI output shape — unaffected.

    No external consumers are known.

    ## What this suggests next

    - The `analyse-work.md` "count records returned" step is mechanical work that violates the memory entry "Never do in an LLM what you can do in code". A follow-up could expose `state session-log count` (or include a count in the envelope) and replace the LLM-side counting with a deterministic Rust call. Out of scope for this task.
    - Now that all five list verbs (memory, backlog, intents, findings, session-log) use `ListEnvelope`, the doc-comment on `list_limits.rs:20` claiming "Inherently large listings (atlas list-components, state session-log list) can pass a real default to opt their callers into safe-by-default truncation" is potentially worth revisiting: should `state session-log list` adopt a default cap (e.g., 50) so `list` without flags doesn't dump all 147 entries? I left the default as unbounded for backwards compatibility, but the comment hints at a future judgment call.
- id: update-tutorial-and-reference-docs-for-repos-yaml-cutover
  title: Update tutorial and reference docs for repos.yaml cutover
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Re-record and update the published tutorial and reference docs to replace retired `state projects` verbs with the new `repo add/list/remove` CLI shape.

    **Problem being solved:** `docs/tutorial/01-install-and-config.adoc`, `docs/tutorial/02-the-project.adoc`, `docs/reference/cli-state.adoc`, `docs/reference/cross-plan-files.adoc`, and capture transcripts under `docs/captures/ravel-lite-tutorial/transcripts/` all reference the retired `state projects` verbs and `projects.yaml`. Anyone following the published tutorial hits the deprecation alias and bounces.

    **Settled decisions from session 89:**
    - The deprecation alias (`state projects <anything>` → prints migration message, exits non-zero) is intentional and permanent. Don't remove it; just stop documenting the old verbs.
    - The new CLI shape is `ravel-lite repo {add,list,remove}` (top-level, singular, not `state repos`). Reference: `src/main.rs` — the `Repo` top-level subcommand.
    - `projects.yaml` is fully retired. The resolver is now `<config-dir>/repos.yaml` managed via `ravel-lite repo`. Reference: `src/repos.rs`.
    - Capture transcripts at `docs/captures/ravel-lite-tutorial/transcripts/{01-projects-list-empty,02-projects-add,02-projects-list-populated}.txt` must be re-recorded (not hand-edited) to stay coherent with the prose. The re-capture script is `scripts/capture/ravel-lite-tutorial.sh` run against a TestAnyware VM.

    **Dependencies:** Defer until further architecture-next tasks stabilise (especially `targets-and-worktrees` and `ravel-lite create v2`) to avoid double-recapturing the tutorial once more changes land. Only block on this if the tutorial is being actively promoted to new users.

    **Scope:**
    1. Update prose in `docs/tutorial/` and `docs/reference/` to use `repo add/list/remove` vocabulary.
    2. Re-run `scripts/capture/ravel-lite-tutorial.sh` against a VM and replace the three stale transcript files.
    3. Verify no remaining references to `state projects` in docs (grep: `state projects`).
- id: fix-dream-phase-drift-in-docs-reference-phase-cycle-adoc
  title: Fix dream-phase drift in docs/reference/phase-cycle.adoc
  category: architecture-next
  status: done
  dependencies: []
  description: |
    Fix dream-phase drift in `docs/reference/phase-cycle.adoc`.

    ## Why

    `docs/reference/phase-cycle.adoc` still describes an in-cycle `dream` phase
    with a `git-commit-dream` audit step and a "dream is conditional" trigger.
    Memory entry `cycle-closes-at-reflect-dream-is-out-of-cycle` records that the
    cycle now closes at reflect; `dream` is out-of-cycle, with `curate` planned as
    the cross-context replacement. This was explicitly called out as "substantial
    prose drift that warrants its own task" in the `update-reference-docs` session
    results; fixing it was out of scope there.

    ## Scope

    1. Update `docs/reference/phase-cycle.adoc` to remove `dream` from the
       in-cycle phase list. The cycle closes at reflect/git-commit-reflect.
    2. Add a brief note that truth-maintenance (formerly `dream`) is now an
       out-of-cycle operation (`ravel-lite curate`, not yet shipped — describe
       as planned/future).
    3. Remove the `git-commit-dream` audit step from the phase-cycle diagram or
       table.
    4. Regenerate the HTML fragment via `./scripts/render-docs.sh`.

    ## Verification

    - `grep -n dream docs/reference/phase-cycle.adoc` returns only historical or
      future-tense mentions, no present-tense in-cycle descriptions.
    - Rendered HTML fragment at `website/docs/phase-cycle.html` is coherent.
    - `./scripts/check.sh` passes (no Rust changes; just a docs guard).
  results: |
    Updated `docs/reference/phase-cycle.adoc` to remove `dream` from the in-cycle phase list and reflect the new cycle anchor (closes at `reflect/git-commit-reflect`). Regenerated `website/docs/phase-cycle.html` via `./scripts/render-docs.sh`.

    ## What changed

    - Cycle diagram (top of page) now shows: `triage → git-commit-triage → work → analyse-work → git-commit-work → reflect → git-commit-reflect → [continue?] → triage`. The `[dream?]` gate, the `dream → git-commit-dream →` row, and the prior `[continue?]` checkpoint after `git-commit-triage` are gone.
    - Removed `=== Dream` reasoning-phase subsection.
    - Replaced `[[dream-trigger]] == The dream trigger` section with a concise `== Out-of-cycle truth maintenance` section pointing to the planned (not-yet-shipped) `ravel-lite curate` command.
    - Removed `=== git-commit-dream` audit-trail subsection.
    - Rewrote `=== git-commit-reflect`: now described as the phase that *closes* the cycle (returns `false` to the inner phase loop, exits). Previously described the dream/triage decision logic.
    - Rewrote `=== git-commit-triage`: now described as the phase that *opens* the cycle (writes `phase.md ← work`, returns `true`, continues). Previously described as exiting the inner loop.
    - Updated Reflect's transition prose: dropped the "dream or triage" decision sentence; now says reflect always names `git-commit-reflect` and that handler closes the cycle.
    - Updated Triage opener: "The end-of-cycle phase" → "The cycle-opening phase".
    - Removed `dream-baseline` from the Baselines section; updated "Four `<phase>-baseline` files" → "Three"; tightened `triage-baseline` description (no longer conditional).
    - Updated Recovery section's `git log --oneline` example: dropped "optionally the dream commit"; anchor changed from `save-work-baseline ↔ save-work-baseline` to `save-triage-baseline ↔ save-triage-baseline` (since the cycle now opens at triage).
    - Dropped count claims from intro and audit-trail intro paragraphs ("interleaved with audit-trail commit phases" / "The `git-commit-*` phases") to avoid encoding a number that the doc may need to revise once `git-commit-analyse-work` is documented.

    ## Verification

    - `grep -i dream docs/reference/phase-cycle.adoc`: only two matches remain, both explicitly past-tense ("The earlier `dream` phase ... has been removed entirely"). Satisfies the task's spec ("only historical or future-tense mentions, no present-tense in-cycle descriptions").
    - `git status --short` after rendering shows only `docs/reference/phase-cycle.adoc` and `website/docs/phase-cycle.html` modified — no churn in other rendered fragments because asciidoctor output is deterministic for unchanged input.
    - `./scripts/check.sh` passes (clippy gate, exit 0).

    ## Residual drift (deferred — not in this task's scope)

    The phase-cycle.adoc still has unrelated drift that I deliberately left alone:

    1. **Audit-trail section is missing `git-commit-analyse-work`.** Code (`src/phase_loop.rs:334`) has 4 audit-trail handlers; the doc lists 3 (`git-commit-work`, `git-commit-reflect`, `git-commit-triage`). The `git-commit-work` subsection's prose ("Applies `commits.yaml` to the project subtree, then captures `reflect-baseline`") describes what `git-commit-analyse-work` actually does in code; `git-commit-work` now commits work's plan-state mutations and captures `analyse-work-baseline`. I dropped the explicit "four" count in the intro to avoid actively lying, but a follow-up task should add the missing subsection and split the prose correctly.
    2. **Reasoning-phase section ordering.** Subsections still go Work → Analyse-work → Reflect → Triage. Code's cycle order (after this fix's reframing) is Triage → Work → Analyse-work → Reflect. Internal coherence is preserved (Triage's prose is self-contained either way), but a reorder would match the diagram and aid first-time readers.
    3. **`reflect-baseline` capture attribution.** Doc says "captured by `git-commit-work`"; code captures it in `git-commit-analyse-work`. Tied to issue 1.
    4. **Triage subsection prose** ("Reviews the backlog, mines completed tasks for hand-offs, reprioritises…") doesn't mention v2 responsibilities described in `docs/architecture-next.md` §TRIAGE: intent hygiene, defeat cascade, gap detection, focus selection, this-cycle-focus.yaml output, mount requests. Pure intent-system drift, separate from dream removal.

    These should be a single follow-up task: "Update phase-cycle.adoc audit-trail section + reasoning-phase ordering for v2". I did not file it as a backlog item — leaving that judgment to triage.

    ## What this suggests next

    - The audit-trail-section drift is a clear next docs task. Worth filing once the v2 cutover lands and the per-worktree YAML baseline shape settles, since baselines section also needs revising for that.
    - The doc-render pipeline behaved well: deterministic asciidoctor output meant only the touched fragment changed in `website/docs/`. No need to manually filter `git status` after rendering.
- id: plan-finish-pr-merge-with-memory-promotion-and-archive
  title: 'Plan finish: pr/merge with memory promotion and archive'
  category: architecture-next
  status: not_started
  dependencies: []
  description: |
    Implement plan completion: promote plan memory into component memory, ship code + memory together via PR or local fast-forward, archive the plan dir.

    Reference: `docs/architecture-next.md` §`ravel-lite finish <plan>`, §Promotion at plan finish, §Archive, §Continuous attribution.

    Scope:
    - `ravel-lite finish <plan> [--pr | --merge] [--yes]`. Default `--pr`.
    - Completion criterion: every intent has `status: satisfied | defeated | superseded`. Backlog drainage alone does not qualify.
    - `promote` headless phase reads plan memory + intents + targets + catalog (via atlas CLI); emits `promotion-spec.yaml` grouping promotions by satisfied/defeated intent: `{ intent_id, entries: [{ entry_id, target_component }] }`.
    - Runner applies spec mechanically: append entries to `<component-path>/.atlas/memory.yaml`. `cross-root` entries go to `<context>/cross-root-memory.yaml` (or edge-attached when atlas-contracts provides slot — open question).
    - "Highest-level component within a git root" rule: walk the `parent` chain in `components.yaml`, land at lowest common ancestor for entries spanning multiple components in one repo.
    - Confirm-before-commit on promotion-spec by default; `--yes` skips for non-interactive workflows.
    - `--pr`: push each target's plan branch and open a PR per target repo; plan dir stays in `plans/` until all PRs land then moves to `archive/`.
    - `--merge`: fast-forward each target's main onto plan branch locally, delete plan branches, remove worktrees, archive.
    - Archive: `<context>/archive/<plan>/` retains `phase.md`, `intents.yaml`, `backlog.yaml`, post-promotion `memory.yaml`. Worktrees are removed.

    Continuous attribution is enforced upstream in reflect (entries carry target component when authored). Promotion at finish only groups; no fresh attribution reasoning.
