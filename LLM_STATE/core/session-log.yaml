    - **Attempted:** Three tasks from the backlog: (1) fix double-slash paths from trailing-slash config dirs, (2) remove redundant `--add-dir <plan_dir>` from interactive work-phase spawn, (3) implement v1→v2 migration that rewrites legacy materialised YAML defaults to the Lua surface and prunes dead files/dirs.
    - **What worked:**
      - Path normalisation fix landed in `src/config.rs::select_config_dir` — `candidate.components().collect::<PathBuf>()` strips trailing separators at the single normalisation point before any path reaches the rest of the system. Regression test added (`trailing_slash_in_candidate_is_normalised_away`). All 614 existing tests passed.
