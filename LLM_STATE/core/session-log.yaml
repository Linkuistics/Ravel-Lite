    - TDD cycle followed: a RED test (`apply_rejects_reversed_parent_of_as_conflict`) reproduced the bug first try (reported `added == 1`, expected 0); a negative-control test (`apply_treats_duplicate_parent_of_as_already_present`) confirmed exact-duplicate ParentOf is still routed as `already_present` not a conflict. Full suite: 406 lib tests + all integration suites pass, 0 failures, clippy clean.
