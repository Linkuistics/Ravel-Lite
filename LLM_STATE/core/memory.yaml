entries:
- id: phase-prompt-label-drift-after-memory-yaml-migration
  title: Phase prompt label drift after memory.yaml migration
  body: |
    `state memory list` renders `claim:` and `justifications:` field names. Phase prompts referencing `title:`/`body:` are stale but still function — the phase-loop does not parse these labels, only the LLM reads them. Low-priority: scan phase prompt prose for `title:`/`body:` references and update to `claim:`/`justifications:`.
- id: serde-flatten-per-kind-wrapper-is-the-confirmed-tms-migration-pattern
  title: 'Per-kind structs wrap Item<K> via #[serde(flatten)]'
  body: |
    `BacklogEntry`, `MemoryEntry`, and similar per-kind structs wrap `Item<K>` via `#[serde(flatten)]`, with kind-specific extension fields as typed struct fields. `KindMarker<K>` gives type-level wire-kind verification: YAML labelled with the wrong `kind:` cannot deserialise as the wrong type. Applied in `src/state/memory/schema.rs`, `src/state/backlog/schema.rs`, and `src/state/intents/schema.rs`.
- id: backlog-yaml-entries-are-backlogentry-wrapping-item-backlogitemkind
  title: backlog.yaml entries are BacklogEntry wrapping Item<BacklogItemKind>
  body: |
    `BacklogEntry` in `src/state/backlog/schema.rs` wraps `Item<BacklogItemKind>` via `#[serde(flatten)]`. Extension fields: `category`, `dependencies`, `results`, `handoff`, `blocked_reason`. `description` moved into `item.justifications[0]` as `Rationale`. `schema_version: 1` guard in `yaml_io::read_backlog` hard-fails on mismatch. `create.rs` scaffold seeds `schema_version: 1\nitems: []\n`. Mirrors `MemoryEntry`; see: `Per-kind structs wrap Item<K> via #[serde(flatten)]`.
- id: backlogstatus-has-5-states-in-progress-eliminated
  title: 'BacklogStatus: 5 states; active subsumes in_progress'
  body: |
    `BacklogStatus` enum in `crates/knowledge-graph/src/plan_kg.rs`: `active`, `done`, `blocked`, `defeated`, `superseded`. `active` covers both "not yet started" and "work staged but not flipped done"; no `in_progress` variant exists. `parse_md.rs` maps legacy `not_started` → `active` and `in_progress` → `active` at migration time. `BacklogStatus::transitions()` defines the allowed-move table.
- id: rationale-text-collects-all-rationale-bodies-for-prose-scan
  title: rationale_text() collects all Rationale bodies for prose scan
  body: |
    `rationale_text()` on a `BacklogEntry` (or any TMS item wrapper) collects all `Justification::Rationale` bodies into a single string. The idiomatic pattern for prose scanning — `lint_dependencies.rs` uses it to scan task prose for dependency id mentions. Do not iterate `justifications` directly.
- id: memory-yaml-entries-are-item-memoryentrykind-with-attribution
  title: memory.yaml entries are Item<MemoryEntryKind> with attribution
  body: |
    On-disk `MemoryEntry` wraps `Item<MemoryEntryKind>`: fields `claim`, `justifications` (one `Rationale`), `status`, `authored_at`, `authored_in`. Optional `attribution` field extends the base type for component-promotion at plan finish. `memory add` CLI accepts `--authored-at`, `--authored-in`, `--attribution`.
- id: memory-yaml-schema-version-required-read-rejects-mismatch
  title: memory.yaml schema_version required; read rejects mismatch
  body: |
    `schema_version` is a required top-level field in `memory.yaml`. `read_memory` (via `yaml_io.rs`) returns an error if the field is absent or does not match the expected version. Prevents silent schema drift across binary upgrades.
- id: all-prompt-loading-routes-through-substitute-tokens
  title: All prompt loading routes through `substitute_tokens`
  body: |
    Ad-hoc `str::replace` bypasses the hard-error guard regex. Any prompt-loading path that does not delegate to `substitute_tokens` silently passes unresolved tokens through. Drift guards require one canonical substitution path.
- id: shipped-pi-prompts-have-no-dangling-tokens-test-guards-pi-prompts
  title: '`shipped_pi_prompts_have_no_dangling_tokens` test guards pi prompts'
  body: |
    The test iterates every on-disk pi prompt file and asserts no unresolved tokens remain. Enforcement mechanism for the canonical-substitution-path rule.
- id: pi-subagent-definitions-live-at-agents-pi-subagents
  title: Pi subagent definitions live at `agents/pi/subagents/`
  body: |
    `defaults/agents/pi/subagents/` holds pi subagent definitions (brainstorming, tdd, writing-plans); `init.rs` embed paths and `pi.rs` reads reference this location.
- id: init-rs-drift-detection-test-guards-coding-style-registration
  title: init.rs drift test guards all defaults/ file registration
  body: |
    `every_file_under_defaults_is_registered_in_embedded_files` recursively walks the entire `defaults/` tree and asserts every file has a matching `EmbeddedFile` entry in `src/init.rs`. Adding any file under `defaults/` without registering it fails the test.
- id: embedded-defaults-are-valid-asserts-non-empty-model-and-provider
  title: '`embedded_defaults_are_valid` asserts non-empty model and provider'
  body: |
    Every (agent, phase) pair in `defaults/agents/claude-code/config.yaml` must have a non-empty model string and non-empty provider. The test catches omissions that would silently delegate model/provider selection to the spawn context.
- id: work-phase-must-not-commit-source-files
  title: Work phase must not commit source files
  body: |
    The work phase leaves non-plan paths dirty; source-commit authority belongs to `analyse-work`.
- id: analyse-work-commits-all-non-plan-paths
  title: Analyse-work commits all non-plan paths
  body: |
    Analyse-work stages and commits every path outside the plan dir, or justifies each skipped path in the session log. Mechanism: `commits.yaml` spec authored in step 9; see `Analyse-work writes commits.yaml; git-commit-analyse-work applies it`.
- id: analyse-work-receives-dirty-tree-snapshot-as-work-tree-status
  title: Analyse-work receives dirty-tree snapshot as `{{WORK_TREE_STATUS}}`
  body: |
    `phase_loop.rs` calls `git::work_tree_snapshot(project_dir, baseline_sha)` when entering `LlmPhase::AnalyseWork` and inserts the result under `{{WORK_TREE_STATUS}}`. Captured at prompt-compose time so hand-edits made after work exits are included.
- id: streamlineoutcome-enum-distinguishes-ignored-vs-malformed-stream-lines
  title: '`StreamLineOutcome` enum distinguishes ignored vs malformed stream lines'
  body: |
    `StreamLineOutcome` distinguishes `valid-but-no-display` from parse failure; an `Option` return collapses both into `None`. Apply this enum pattern wherever an `Option` conflates two semantically distinct outcomes.
- id: survey-stdout-read-has-300s-timeout
  title: Survey stdout read has 300s timeout
  body: |
    `src/survey/invoke.rs` wraps the stdout read in `tokio::time::timeout` (`DEFAULT_SURVEY_TIMEOUT_SECS = 300`); on expiry the child is killed and the error includes elapsed time, captured bytes, partial stdout, and remediations. Override via `--timeout-secs`.
- id: phase-contract-test-validates-per-phase-file-writes
  title: Phase contract test validates per-phase file writes
  body: |
    `phase_contract_round_trip_writes_expected_files` runs `phase_loop` twice via `ContractMockAgent`; assertions cover latest-session.md, memory.md updated, backlog.md updated, phase.md ends at `triage`, and git log subjects. `ContractMockAgent` writes `git-commit-analyse-work` after analyse-work to trigger the `GitCommitAnalyseWork` handler. `commit-message.md` is absent from the flow; analyse-work authors `commits.yaml` instead. See: `Analyse-work writes commits.yaml; git-commit-analyse-work applies it`.
- id: tool-read-token-scoped-to-work-md-only
  title: '`{{TOOL_READ}}` token scoped to `work.md` only'
  body: |
    Headless phases (analyse-work, reflect, dream) must not include `{{TOOL_READ}}`; an unresolved token in a headless phase fails integration tests. A universal "all tokens substitute cleanly" drift guard produces false negatives for the same reason: `{{TOOL_READ}}` is intentionally absent from headless-phase prompts.
- id: substitute-tokens-expands-content-macros-before-path-tokens
  title: '`substitute_tokens` expands content macros before path tokens'
  body: |
    RELATED_PLANS and custom tokens expand first; atomic path tokens ({{DEV_ROOT}} etc.) expand second. Reversing the order causes fatal errors when RELATED_PLANS content itself contains path tokens.
- id: pi-stderr-captured-in-4096-byte-rolling-buffer
  title: Pi stderr captured in 4096-byte rolling buffer
  body: |
    `PiAgent::invoke_headless` pipes stderr into a fixed-size rolling buffer (`STDERR_BUFFER_CAP = 4096`). Tail surfaces in error messages on failure; eliminates TUI bleed-through during headless invocation.
- id: pi-phase-cycle-test-guards-runtime-token-substitution
  title: '`pi_phase_cycle` test guards runtime token substitution'
  body: |
    `pi_phase_cycle_substitutes_tokens_and_streams_events` runs a full `phase_loop` cycle with a real `PiAgent` and a fake `pi` shell script; asserts zero unresolved `{{…}}` tokens in the captured prompt, correct `UIMessage` variant fan-out (`Progress`, `Persist`, `AgentDone`), and audit commit via `commits.yaml`.
- id: pi-invoke-headless-test-guards-stderr-tail-surfacing
  title: '`pi_invoke_headless` test guards stderr-tail surfacing'
  body: |
    `pi_invoke_headless_surfaces_stderr_tail_on_failure` asserts a non-zero `pi` exit (code 17) surfaces the stderr tail in the returned error. Enforces the buffered-stderr invariant. See: `Pi stderr captured in 4096-byte rolling buffer`.
- id: envoverride-serialises-env-mutation-in-integration-tests
  title: '`EnvOverride` serialises env mutation in integration tests'
  body: |
    `EnvOverride` holds a process-wide `OnceLock<Mutex<()>>`; struct-field drop order keeps the lock held until `PATH`/`HOME` restoration completes, preventing fake-pi `PATH` from leaking into concurrent test runners.
- id: gitcommitwork-appends-latest-session-yaml-to-session-log-yaml
  title: '`GitCommitWork` appends `latest-session.yaml` to `session-log.yaml`'
  body: |
    `append_session_log` in `phase_loop.rs` delegates to `session_log::append_latest_to_log`. Idempotent by session id; missing `latest-session.yaml` is a graceful no-op.
- id: write-phase-precedes-git-commit-plan-in-all-commit-handlers
  title: '`write_phase` precedes `git_commit_plan` in all commit handlers'
  body: |
    All four `ScriptPhase::GitCommit*` handlers in `phase_loop.rs` call `write_phase(next)` before `git_commit_plan`. Phase.md is captured in the same commit as other plan-state writes; the plan tree is clean at every user-prompt point. The four handlers are: `GitCommitWork`, `GitCommitAnalyseWork`, `GitCommitTriage`, `GitCommitReflect`.
- id: work-baseline-seeded-atomically-in-the-triage-commit
  title: Work-baseline seeded atomically in the triage commit
  body: |
    `GitCommitTriage` calls `git_commit_plan` first, then `git_save_baseline(plan_dir, "work-baseline")`, so `work-baseline` records the triage commit SHA (not the reflect commit). A follow-on save-baseline commit lands the file; plan tree is dirty-free at user prompt. `LlmPhase::Work` seeds work-baseline only when the file is absent (first-run fallback). `git_save_baseline(plan_dir, filename)` is the generalized helper used by all four `GitCommit*` handlers.
- id: llmphase-work-does-not-delete-latest-session-yaml
  title: '`LlmPhase::Work` does not delete `latest-session.yaml`'
  body: |
    Analyse-work overwrites `latest-session.yaml` unconditionally on entry; the Work handler does not delete it.
- id: plan-tree-cleanliness-asserted-via-git-status-porcelain
  title: Plan-tree cleanliness asserted via `git status --porcelain`
  body: |
    `git_commit_triage_leaves_plan_tree_clean_at_user_prompt` and `git_commit_work_leaves_plan_tree_clean_at_user_prompt` assert `git status --porcelain -- <plan_dir>` is empty after `phase_loop` returns from a user-declined exit.
- id: spawn-blocking-does-not-cancel-cleanly-in-tokio-select
  title: '`spawn_blocking` does not cancel cleanly in `tokio::select!`'
  body: |
    Use `tokio::time::sleep` for tty event polling. A `spawn_blocking` thread is not dropped when the select arm is cancelled; it races the spawned child for the tty. `tokio::time::sleep` is properly cancellable and eliminates the race.
- id: phase-prompts-use-ravel-lite-state-cli-verbs
  title: Phase prompts use `ravel-lite state` CLI verbs
  body: |
    All `defaults/phases/*.md` and `create-plan.md` use `ravel-lite state <verb>` for plan-state operations. Direct writes to plan-state files bypass `Phase::parse` validation; LLM phases must use the CLI. `run_set_phase` refuses to create a plan dir that does not already exist.
- id: cli-integration-tests-use-cargo-bin-exe-ravel-lite
  title: CLI integration tests use `CARGO_BIN_EXE_ravel-lite`
  body: |
    CLI integration tests shell out via `CARGO_BIN_EXE_ravel-lite` and assert on-disk effects; the Cargo-idiomatic pattern for end-to-end CLI testing.
- id: build-rs-emits-timestamp-git-describe-and-sha
  title: '`build.rs` emits timestamp, git-describe, and SHA'
  body: |
    `build.rs` emits `BUILD_TIMESTAMP`, `GIT_DESCRIBE`, and `GIT_SHA` as compile-time env vars; `main.rs` concatenates them into a `VERSION` constant used by both `--version` and the `version` subcommand.
- id: release-toml-disables-publish-and-push
  title: '`release.toml` disables publish and push'
  body: |
    `release.toml` sets `publish=false` and `push=false`; `cargo release patch --execute` bumps the version and tags locally without touching crates.io or the remote.
- id: term-title-rs-sets-phase-title-via-osc-escape
  title: '`term_title.rs` sets phase title via OSC escape'
  body: |
    `src/term_title.rs` exposes `set_title(project, plan, phase)` (side-effecting) and `format_title_escape` (testable helper). Writes to stdout; clean side-channel because Ratatui uses stderr backend. Includes tmux passthrough (doubled inner ESCs). Called at `LlmPhase` entry in `phase_loop` and `run_single_plan`. Phase labels uppercased to match the phase-header banner convention.
- id: reflect-phase-runs-automatically-after-git-commit-work
  title: Reflect phase runs automatically after git-commit-analyse-work
  body: |
    The runner proceeds from `GitCommitAnalyseWork` to reflect without user confirmation; no pre-reflect gate exists.
- id: fake-pi-script-must-be-phase-aware
  title: Fake-pi script must be phase-aware
  body: |
    The fake-pi script in `pi_phase_cycle` uses a case statement on the current phase to emit distinct next-phase values. Writing `git-commit-work` unconditionally causes an infinite loop; each phase must map to a different output.
- id: contractmockagent-for-triage-appends-not-overwrites
  title: '`ContractMockAgent` for Triage appends, not overwrites'
  body: |
    `ContractMockAgent::invoke_headless` uses append mode for `Triage` so the safety-net test can observe analyse-work's status flips written earlier in the same cycle.
- id: hand-off-fields-are-live-in-analyse-work-and-triage-prompts
  title: Hand-off fields are live in analyse-work and triage prompts
  body: |
    `defaults/phases/analyse-work.md` and `defaults/phases/triage.md` include the hand-off convention. Analyse-work writes a hand-off block; triage reads it on entry. See: `[HANDOFF] integration tests guard promote-vs-archive cycle`.
- id: handoff-integration-tests-guard-promote-vs-archive-cycle
  title: '`[HANDOFF]` integration tests guard promote-vs-archive cycle'
  body: |
    `handoff_marker_in_analyse_work_is_promoted_by_triage` and `handoff_marker_in_analyse_work_is_archived_by_triage` in `tests/phase_loop.rs` run the full analyse-work → git-commit-work → reflect → git-commit-reflect → triage → git-commit-triage cycle. See: `ContractMockAgent has opt-in handoff injection`.
- id: contractmockagent-has-opt-in-handoff-injection
  title: '`ContractMockAgent` has opt-in handoff injection'
  body: |
    `handoff_injection: Option<HandoffInjection>` field with `with_handoff_injection()` builder. `HandoffDisposition` inside `HandoffInjection` pins promote-vs-archive without hardcoding LLM reasoning, keeping hand-off tests deterministic.
- id: task-blocks-delimited-by-n-separator
  title: Task blocks delimited by `\n---` separator
  body: |
    `inject_handoff_into_task_block` and `extract_handoff_from_block` both split on `\n---`. Protocol for separating the main task block from an appended hand-off block.
- id: warn-if-project-tree-dirty-is-advisory-only
  title: '`warn_if_project_tree_dirty` is advisory-only'
  body: |
    `warn_if_project_tree_dirty` at `GitCommitWork` entry has no user-facing gate; the warning fires but the phase proceeds unconditionally. If this becomes unacceptable, promote to a hard error rather than re-adding a gate.
- id: phase-loop-is-single-cycle-run-single-plan-holds-the-inter-cycle-prompt
  title: '`phase_loop` is single-cycle; `run_single_plan` holds inter-cycle prompt'
  body: |
    `phase_loop` is a single-cycle function. The inter-cycle user prompt ("continue / switch plan / exit") lives in `run_single_plan`, which wraps `phase_loop` in a loop. Multi-plan dispatch calls `phase_loop` directly via `dispatch_one_cycle` in `src/multi_plan.rs`.
- id: src-multi-plan-rs-owns-survey-driven-multi-plan-routing
  title: '`src/multi_plan.rs` owns survey-driven multi-plan routing'
  body: |
    `src/multi_plan.rs` implements `build_plan_dir_map`, `options_from_response`, `select_plan_interactive`, and `run_multi_plan`. `ravel-lite run` accepts 1..N plan dirs; `--survey-state` is required when N > 1. Routes to the next plan via `dispatch_one_cycle`.
- id: ravel-lite-survey-emits-structured-yaml
  title: '`ravel-lite survey` emits structured YAML'
  body: |
    `src/survey/schema.rs` defines the output schema with `Serialize` derives and a `schema_version` marker. `input_hash` is seeded in Rust post-parse. `task_counts` is injected by Rust via `inject_task_counts` / `collect_task_counts`; `unblocked`, `blocked`, and `received` are injected via `inject_plan_row_counts` / `plan_row_counts`; findings are injected via `inject_findings`. Survey prompts forbid the LLM from emitting any of these injected fields. `survey-format` subcommand renders YAML output to human-readable form. See: `PlanRowCounts injects unblocked/blocked/received into survey`; `survey inject_findings adds Findings section; omitted when empty`.
- id: survey-compose-wraps-content-in-yaml-fences
  title: Survey compose wraps content in YAML fences
  body: |
    `src/survey/compose.rs` wraps backlog and memory content in ` ```yaml ` fences, labeling sections `backlog.yaml` and `memory.yaml`. `survey.md` and `survey-incremental.md` reference these labels. `PlanSnapshot::backlog` and `.memory` carry re-serialised YAML strings.
- id: incremental-survey-splits-invoke-rs-into-two-functions
  title: Incremental survey splits `invoke.rs` into two functions
  body: |
    `compute_survey_response` is the in-memory core; `run_survey` is the CLI wrapper. `src/survey/delta.rs` owns hash-comparison and delta-merge. `--prior` names the baseline state; `--force` skips the hash guard. `defaults/survey-incremental.md` is the prompt template for the delta path.
- id: push-plan-stack-yaml-and-src-pivot-rs-removed
  title: '`push-plan`, `stack.yaml`, and `src/pivot.rs` removed'
  body: |
    `push-plan` CLI verb, `run_stack`, `stack.yaml`, and `src/pivot.rs` are deleted. `src/state.rs` reduced from ~230 to ~80 lines; `src/phase_loop.rs` de-pivoted. Multi-plan routing is exclusively in `src/multi_plan.rs`.
- id: project-root-for-plan-derives-project-root-as-plan
  title: '`project_root_for_plan` derives project root as `<plan>/../..`'
  body: |
    Pure path math; no disk walk, no `.git` requirement. Contract: `<plan>` must be at least three path components deep.
- id: git-query-functions-scope-to-project-dir-via-pathspec
  title: Git query functions scope to project dir via pathspec
  body: |
    `working_tree_status`, `paths_changed_since_baseline`, and `work_tree_snapshot` append `-- <project_dir>` pathspec. `git_commit_plan` is intentionally unscoped; it runs from `plan_dir` CWD, already limiting `git add .` to plan-state files.
- id: integration-tests-use-three-level-project-llm-state-plan-layout
  title: Integration tests use three-level `<project>/LLM_STATE/<plan>` layout
  body: |
    Integration tests and `src/multi_plan.rs` tests construct `<project>/LLM_STATE/<plan>` directory trees matching ravel-lite convention. New integration tests must follow this layout.
- id: format-result-text-renders-as-continuation-lines
  title: '`format_result_text` renders `→` as continuation lines'
  body: |
    Lines matching `^\s*→\s*(.*)` immediately after an action marker are re-indented to the detail column and styled with the preceding action's intent. Blank lines, insight blocks, and non-continuation lines break the chain. `last_action_intent: Option<Option<Intent>>` encodes "no prior action" (outer None) vs "prior action with no intent" (Some(None)).
- id: promoted-and-archived-are-valid-action-tags
  title: '`PROMOTED` and `ARCHIVED` are valid action tags'
  body: |
    `ACTION_INTENTS` in `src/format.rs` includes `PROMOTED` and `ARCHIVED` as triage hand-off markers; they emit new backlog tasks or memory entries.
- id: work-phase-allows-multiple-tasks-when-requested
  title: Work phase allows multiple tasks when requested
  body: |
    `work.md` step 10 allows multiple tasks per session when the user explicitly requests them; the default remains single-task-per-phase.
- id: dream-output-uses-label-continuation-format
  title: Dream output uses label + `→` continuation format
  body: |
    `defaults/phases/dream.md` specifies a two-line entry layout (label line + `→ detail` continuation) matching the continuation-line renderer in `format_result_text`.
- id: read-related-plans-markdown-centralises-related-plans-md-access
  title: '`read_related_plans_markdown` centralises `related-plans.md` access'
  body: |
    `read_related_plans_markdown(plan_dir)` is the single access point for plan-local `related-plans.md` prose. Returns `""` gracefully on absent file; `{{RELATED_PLANS}}` token substitutes to an empty block. Both `src/main.rs` and `src/multi_plan.rs` route through it.
- id: related-plans-stored-as-global-name-indexed-edge-list
  title: '`related-components.yaml` stores global name-indexed edge list'
  body: |
    `related-components.yaml` stores project-level (not plan-level) edges keyed by component name, shareable across all plans in a project. Schema version 2; uses v2 `EdgeKind` vocabulary. Full CRUD with `Edge::validate` (rejects self-loops, unsorted symmetric participants). See: `run_rename needs a Trait registry before fourth cascade`.
- id: sibling-edges-dedup-by-sorted-participants-parent-of-by-order
  title: Sibling edges dedup by sorted participants; parent-of by order
  body: |
    In `src/related_components.rs` and `src/discover/apply.rs`, symmetric edge kinds use sorted participants for identity (order-insensitive dedup); directed edge kinds preserve participant order. Reversing this rule silently creates duplicate or missing edges. See: `Edge::validate must enforce participant sort order`.
- id: plan-state-md-readers-fully-migrated
  title: LLM_STATE/core plan-state migrated to typed YAML
  body: |
    `src/dream.rs` and `src/survey/discover.rs` use the typed YAML API; `.md` originals deleted from `LLM_STATE/core`. `src/multi_plan.rs` and `src/main.rs` tolerate absent `.md` files.
- id: state-migrate-takes-plan-dir-as-positional-argument
  title: '`state migrate` takes `PLAN_DIR` as positional argument'
  body: |
    `--plan-dir` is not a valid flag; the CLI expects `PLAN_DIR` positionally. Correct usage: `ravel-lite state migrate <PLAN_DIR>`.
- id: plan-state-migration-requires-atomicity-idempotency-dry-run-validation
  title: Plan-state migration requires atomicity, idempotency, dry-run, validation
  body: |
    Any plan-state migration tool must apply changes atomically, be safe to re-run (idempotent), support `--dry-run` preview, and validate round-trip fidelity.
- id: migrate-rs-uses-parse-all-then-write-all-planner
  title: '`migrate.rs` uses parse-all-then-write-all planner'
  body: |
    `plan_backlog_migration`, `plan_memory_migration`, `plan_session_log_migration`, and `plan_latest_session_migration` each return `Option<PendingMigration>`; `run_migrate` errors if set is empty, then writes all only after all parses succeed.
- id: state-memory-parses-headings-empty-body-is-an-error
  title: '`state::memory` parses `^## ` headings; empty body is an error'
  body: |
    `parse_md.rs` in `state::memory` splits on `^## ` (not `### ` as backlog uses). An entry with an empty body after the heading is a parse error, not silently skipped. See: `split_into_task_blocks splits on ### headings`.
- id: src-state-module-structure
  title: '`src/state/` uses module-per-area layout'
  body: |
    `src/state.rs` restructured into `src/state/` with `phase.rs`, `backlog/` (schema, yaml_io, parse_md, verbs, mod), `memory/` (schema, yaml_io, parse_md, verbs, mod), `session_log/` (schema, yaml_io, parse_md, verbs, mod), `intents/` (schema, yaml_io, verbs, mod), `findings/` (schema, yaml_io, verbs, mod), `targets/` (schema, yaml_io, verbs, mount, mod), `target_requests/` (schema, yaml_io, verbs, drain, mod), `this_cycle_focus/` (schema, yaml_io, verbs, mod), `focus_objections/` (schema, yaml_io, verbs, mod), `commits/` (schema, yaml_io, verbs, mod), and `migrate.rs`. New state areas follow this layout.
- id: find-task-centralises-backlog-id-lookup
  title: '`find_task` centralises backlog id-lookup'
  body: |
    `find_task` in `src/state/backlog/verbs.rs` is the single resolution point for task-id lookup; all mutation verbs call it. Do not duplicate id-lookup logic.
- id: backlogfile-task-counts-injects-counts-into-survey
  title: '`BacklogFile::task_counts` injects counts into survey'
  body: |
    `TaskCounts { total, not_started, in_progress, done, blocked }` lives in `state::backlog::schema`. `collect_task_counts` gathers per-plan counts; `inject_task_counts` in `survey/schema.rs` writes them onto `PlanRow`. Survey prompts (`survey.md`, `survey-incremental.md`) explicitly forbid the LLM from emitting `task_counts`. See: `PlanRowCounts injects unblocked/blocked/received into survey` for the analogous dep-traversal-based injection.
- id: state-session-log-provides-full-verb-surface
  title: '`state session-log` provides full verb surface'
  body: |
    `src/state/session_log/` holds `SessionRecord` / `SessionLogFile` types. CLI verbs: `list`, `show`, `append`, `set-latest`, `show-latest`. `append_record` is idempotent by session id; duplicate appends are silently skipped.
- id: split-into-task-blocks-splits-on-headings
  title: '`split_into_task_blocks` splits on `### ` headings'
  body: |
    `split_into_task_blocks` uses `### ` heading boundaries, not `\n---`; `\n---` incorrectly fragments `[HANDOFF]` blocks appended to task bodies. See: `Task blocks delimited by \n--- separator`.
- id: dispatch-state-routes-state-subcommands
  title: '`dispatch_state` routes state subcommands'
  body: |
    `main.rs` routes `ravel-lite state` via `dispatch_state`, which delegates to `dispatch_backlog`, `dispatch_memory`, `dispatch_session_log`, `dispatch_intents`, `dispatch_related_components`, `dispatch_findings`, `dispatch_targets`, `dispatch_target_requests`, `dispatch_this_cycle_focus`, or `dispatch_focus_objections`. New state areas extend `dispatch_state`; new area verbs extend their own dispatcher.
- id: r7-design-llm-driven-related-projects-discovery
  title: '`discover` runs two-stage fan-out pipeline to `discover-proposals.yaml`'
  body: |
    `state related-components discover` fans out one subagent per project (two-stage pipeline: per-project interaction-surface extraction then global edge proposal) and writes `discover-proposals.yaml`; `discover-apply` merges after human review. Cache key is `(tree_sha, dirty_hash)` pair; see `Discover cache key is tree_sha + dirty_hash pair`.
- id: state-migrate-force-required-when-yaml-predates-md
  title: state migrate --force required when .yaml predates .md
  body: |
    When pre-existing `.yaml` files are stale relative to the authoritative `.md` originals, `state migrate` aborts without `--force`. `--force` re-derives from `.md` and overwrites `.yaml`. `.md` is the authoritative source; `.yaml` is a derived cache.
- id: std-path-absolute-does-pure-path-math-anchored-to-cwd
  title: std::path::absolute does pure path math anchored to CWD
  body: |
    `std::path::absolute` performs pure path math anchored to the process CWD without touching the filesystem or resolving symlinks; use when recording a user-stated path without requiring the directory to exist.
- id: src-discover-schema-surfacefile-and-surfacerecord-r7-1
  title: '`SurfaceFile` and `SurfaceRecord` schema in `src/discover/`'
  body: |
    `src/discover/schema.rs` defines `SurfaceFile` (identity fields: `plan_name`, `tree_sha`) and `SurfaceRecord` (data fields). Two round-trip YAML tests guard the schema. Module wired at `src/lib.rs` as `pub mod discover`.
- id: discover-schema-serde-default-on-data-fields-only
  title: 'Discover schema: serde(default) on data fields only'
  body: |
    In `SurfaceRecord`, data fields carry `#[serde(default)]` to tolerate partial LLM emission; identity fields on `SurfaceFile` deliberately omit `default` so a missing identity field hard-fails on deserialise.
- id: macos-tempdir-path-needs-canonicalize-before-strip-prefix
  title: macOS TempDir path needs canonicalize before strip_prefix
  body: |
    `git rev-parse --show-toplevel` resolves through macOS's `/var → /private/var` symlink; `TempDir` paths do not. Call `std::fs::canonicalize` on both sides before `strip_prefix` or the prefix check silently fails.
- id: display-only-timestamps-avoid-chrono-dep
  title: Display-only timestamps avoid chrono dep
  body: |
    `format_unix_utc` in `src/discover/stage1.rs` hand-rolls proleptic-Gregorian formatting for the `analysed_at` field. When a timestamp is display-only (never parsed back), a small tested helper avoids the `chrono` dependency entirely.
- id: multi-stage-llm-pipeline-uses-run-config-outcome-submodule-shape
  title: Multi-stage LLM pipeline uses run/Config/Outcome submodule shape
  body: |
    Each stage in `src/discover/` exposes `run_<stage>`, `<Stage>Config`, and `<Stage>Outcome`. Internal shape: `Config` → `pub async run` fn → helper `spawn` fn → unit tests. Stages mirror each other; reuse this template for new stages.
- id: rename-cascade-registry-design-consideration
  title: '''repo rename'' needs RenameHook registry before third cascade'
  body: |
    `rename_component_in_edges` in `src/related_components.rs` is implemented but unused; its only caller (`projects::run_rename`) was deleted with `src/projects.rs`. Wire it for repo-rename in `src/repos.rs`; before the cascade reaches three points, extract a `RenameHook` trait registry rather than threading in ad-hoc.
- id: find-conflicting-kind-misses-parent-of-direction-reversals
  title: '`find_directional_conflict` requires same-lifecycle for reversed-pair conflicts'
  body: |
    `src/discover/apply.rs::find_directional_conflict` flags a conflict when a directed-kind edge with the same lifecycle and reversed participants already exists. Cross-lifecycle reversals are not flagged; whether they should be is an open design question. See: `Sibling edges dedup by sorted participants; parent-of by order`.
- id: discover-e2e-uses-a-fake-claude-bash-shim-per-stage
  title: Discover e2e uses a fake-claude bash shim per stage
  body: |
    Discover e2e tests use a fake-claude bash shim that distinguishes Stage 1 vs Stage 2 by grepping the prompt header. Stage 1: extracts the YAML surface-file path from the prompt body and writes a canned YAML surface response. Stage 2: issues `ravel-lite state discover-proposals add-proposal` CLI calls for each canned proposal edge; no YAML path extraction.
- id: discover-cache-key-is-tree-sha-dirty-hash-pair
  title: Discover cache key is tree_sha + dirty_hash pair
  body: |
    `compute_project_state` returns `{ tree_sha, dirty_hash }`. `dirty_hash` is SHA-1 (via `git hash-object --stdin`) over `git diff HEAD -- <rel>` plus untracked file paths and contents (subtree-scoped via `git ls-files --others -- <rel>`). Clean working trees use `dirty_hash = ""`. Cache hit requires both fields to match.
- id: stage-1-injects-catalog-projects-to-scope-edge-evidence
  title: Stage 1 injects CATALOG_PROJECTS to scope edge evidence
  body: |
    `{{CATALOG_PROJECTS}}` (catalog minus the current project) is injected into the Stage 1 prompt. Rules forbid non-catalog entries in `explicit_cross_project_mentions`. Without scoping, third-party projects appear as sibling evidence (e.g. Raycast, swift-lispkit).
- id: stage-2-must-not-propose-edges-from-weak-signals-alone
  title: Stage 2 must not propose edges from weak signals alone
  body: |
    `defaults/discover-stage2.md` forbids proposals based solely on: shared upstream dependencies, same ecosystem, trivial glob overlap, or shared generic tools. These signals in combination can still contribute; any one alone is insufficient.
- id: stage-1-yaml-list-items-forbid-parenthetical-colon-annotations
  title: Stage 1 YAML list items forbid parenthetical colon annotations
  body: |
    Parenthetical annotations with colons inside YAML list items (e.g., `- foo (format: bar)`) cause `data_formats[n]: invalid type: map` deserialization failures. Disambiguation belongs in the `notes` field, not inline in the list item.
- id: stage-2-skips-when-all-stage-1-outcomes-are-cached
  title: Stage 2 skips when all Stage 1 outcomes are Cached
  body: |
    When every Stage 1 outcome is `Cached` and no failures occurred, `discover` skips Stage 2 and preserves the existing `discover-proposals.yaml`. Prevents non-deterministic LLM output from overwriting user-curated proposals on incremental re-runs.
- id: stage-2-skips-when-all-stage-1-attempts-failed
  title: Stage 2 skips when all Stage 1 attempts failed
  body: |
    When every Stage 1 attempt produces `Stage1Outcome::Failed`, Stage 2 is skipped and a failure-only proposals file is written. Each failure surfaces via `eprintln!`. Inferring edges from zero surfaces is meaningless.
- id: discover-stage-spawns-need-allowed-tools-and-add-dir
  title: Discover stage spawns need --allowed-tools and --add-dir
  body: |
    `--setting-sources project,local` excludes the user's allowlist; writes to dirs outside cwd are silently blocked. Stage 1 spawns require `--allowed-tools "Read,Grep,Glob,Bash,Write,Task"` and `--add-dir <cache-dir>`. Stage 2 spawns require only `--allowed-tools Bash` and `--add-dir <config_root>`; Stage 2 issues CLI calls rather than writing files directly.
- id: opportunistic-discover-on-catalog-changes-deferred-idea
  title: Opportunistic discover on catalog changes is a deferred idea
  body: |
    Analyse-work or triage could run `discover` opportunistically on catalog membership changes, keeping `related-projects.yaml` fresher without manual invocation. Deferred: trigger conditions not yet defined.
- id: proposalsfile-source-project-states-stores-full-projectstate
  title: ProposalsFile.source_project_states stores full ProjectState
  body: |
    `ProposalsFile.source_project_states` is `BTreeMap<String, ProjectState>` (tree_sha + dirty_hash per surface), not `BTreeMap<String, String>`. The proposals file cache-state is identical to the in-memory cache key. Legacy `source_tree_shas` key is silently dropped on read; `proposals_file_reads_legacy_source_tree_shas_as_empty_states` pins this behaviour. See: `Discover cache key is tree_sha + dirty_hash pair`.
- id: serde-default-on-added-fields-avoids-schema-version-bump
  title: serde(default) on added fields avoids schema version bump
  body: |
    Adding `#[serde(default)]` to a newly introduced field on an existing serialised struct maintains read-compat with pre-existing files. No schema_version bump needed when the field is informational (not identity-determining). `ProjectState.dirty_hash` demonstrates this pattern.
- id: component-ontology-v2-spec-at-docs-component-ontology-md
  title: Component ontology v2 spec at docs/component-ontology.md
  body: |
    `docs/component-ontology.md` is the canonical v2 ontology spec (reference section only); migration guidance is in a separate companion doc. Implementation pending. See: `Component ontology v2 uses kind × lifecycle × direction axes`.
- id: component-ontology-v2-uses-kind-lifecycle-direction-axes
  title: Component ontology v2 uses kind × lifecycle × direction axes
  body: |
    Three orthogonal axes (kind, lifecycle, direction) give sufficient expressiveness without hyperedges or numeric confidence. Vocabulary anchored in SPDX 3.0.1's `RelationshipType × LifecycleScopeType` factoring. See: `Component ontology v2 spec at docs/component-ontology.md`.
- id: generated-derived-artifacts-need-no-migrators-delete-and-regenerate
  title: Generated derived artifacts need no migrators; delete-and-regenerate
  body: |
    `related-projects.yaml` is a generated artifact; delete-and-regenerate is the upgrade path when the schema changes. No v1→v2 migrator is needed. Generalises: generated derived files never need forward-migration tools.
- id: unquoted-paths-in-error-messages-hide-empty-path-bugs
  title: Unquoted paths in error messages hide empty-path bugs
  body: |
    Quote all path values in user-facing error messages so an empty path appears as `""` rather than a silent double-space gap. Applies anywhere a path is interpolated into a string literal. An unquoted empty path is indistinguishable from surrounding whitespace, delaying diagnosis.
- id: project-root-for-plan-uses-canonicalize-latent-catalog-path-mismatch-risk
  title: project_root_for_plan uses canonicalize; latent catalog-path mismatch risk
  body: |
    `project_root_for_plan` in `src/git.rs:153` uses `canonicalize` with a raw-path fallback; `plan_project_path` and `projects::run_add` both use `std::path::absolute`. On macOS with symlinks in `/Users` or `/Development`, `canonicalize` introduces `/private/...` prefixes that desynchronise lookup from catalog-stored paths. No current consumer cross-compares the two outputs. Fix `project_root_for_plan` to use `std::path::absolute` only if a comparison against a catalog-stored path is introduced.
- id: edgekind-has-17-variants-task-briefs-may-cite-16
  title: EdgeKind has 17 variants; task briefs may cite 16
  body: |
    `EdgeKind::all()` in the `component_ontology` crate defines 17 kebab-case variants. The `conforms-to` family has three members, not two. Prose references (including task briefs) that cite 16 are wrong. Authoritative count: `EdgeKind::all()` in the crate.
- id: edge-validate-must-enforce-participant-sort-order
  title: Edge::validate must enforce participant sort order
  body: |
    Distinctness checks alone do not catch reversed symmetric-participant pairs; canonical-key dedup silently fails for `[A, B]` vs `[B, A]`. `Edge::validate` must sort participants and reject unsorted input, not merely check uniqueness. See: `Sibling edges dedup by sorted participants; parent-of by order`.
- id: ontology-and-related-components-schema-versions-are-orthogonal
  title: Ontology and related-components schema versions are orthogonal
  body: |
    `related-components.yaml` uses `SCHEMA_VERSION=2`; the `component_ontology` crate's YAML format uses `ONTOLOGY_FILE_SCHEMA_VERSION=1`. Separate version fields keep the two evolutions independent; a bump in one does not imply a bump in the other.
- id: action-lines-split-title-reason-into-two-row-layout
  title: Action lines split title/reason into two-row layout
  body: |
    \`format_result_text\` in \`src/format.rs\` splits action-line detail text on \`" — "\` (em-dash with spaces) via \`str::split_once\`; the title row keeps the intent colour, the reason row is indented to the detail column and rendered dim. A \`trim().is_empty()\` guard suppresses the second row when the separator is trailing. The \` — \` separator is now load-bearing protocol in phase prompts: using \`-\` or \`–\` instead silently collapses back to single-row output.
- id: render-embedded-kinds-for-prompt-injects-edgekind-vocabulary-into-stage-2
  title: render_embedded_kinds_for_prompt injects EdgeKind vocabulary into Stage 2
  body: |
    The `component_ontology` crate exposes `render_kinds_for_prompt(&OntologyYaml) -> String` and `render_embedded_kinds_for_prompt() -> Result<String>`. `src/discover/stage2.rs` calls `render_embedded_kinds_for_prompt()` to substitute `{{ONTOLOGY_KINDS}}` in the Stage 2 prompt. This is the sole injection point for the EdgeKind vocabulary into LLM prompts.
- id: interaction-role-hints-spec-is-in-migration-doc-5-2-not-ontology-doc
  title: \`interaction_role_hints\` spec is in migration doc §5.2
  body: |
    `docs/component-ontology.md` has no §13.2 or §14.1. The `interaction_role_hints` design lives in `docs/component-ontology-migration.md §5.2`. Task briefs that cite the former section numbers are wrong; use the migration companion doc.
- id: prompt-vocab-enum-variant-bijection-tests-guard-llm-code-alignment
  title: Prompt vocab ↔ enum variant bijection tests guard LLM/code alignment
  body: |
    A test asserting bijection between an enum's variants and a prompt's listed vocabulary (e.g. `InteractionRoleHint` vs `defaults/discover-stage1.md`) catches prompt-vocabulary drift before any production run. Adding a new enum variant without updating the prompt fails the test; adding a new prompt term without a matching variant also fails. Apply for any closed-vocabulary enum whose terms appear in an LLM prompt.
- id: format-result-text-inserts-blank-line-between-consecutive-action-blocks
  title: '`format_result_text` inserts blank line between consecutive ACTION blocks'
  body: |
    `src/format.rs::format_result_text` inserts a blank line when an `[ACTION]` marker immediately follows a previous `[ACTION]` block (including its continuation lines). Keeps multi-action output visually scannable; phase prompts do not need manual blank lines between action outputs.
- id: remove-edge-requires-lifecycle-v1-style-calls-fail-at-clap
  title: '`remove-edge` requires --lifecycle; v1-style calls fail at clap'
  body: |
    `ravel-lite state related-components remove-edge` requires `--lifecycle`; omitting it is a clap parse error. v1-style two-argument invocations (without lifecycle) are not accepted. See: `related-components.yaml stores global name-indexed edge list`.
- id: stage-2-hints-as-priors-enforcement-is-prose-only-hard-assertion-deferred
  title: Stage 2 hints-as-priors enforcement is prose-only; hard assertion deferred
  body: |
    Stage 2 `priors-not-verdicts` section is prose only. If real discover runs show Stage 2 over-weighting `interaction_role_hints` (e.g., proposing `strong` edges where the only evidence is a hint), consider adding a per-edge hard assertion: `evidence_fields must include at least one non-hint field for strong-grade proposals`. The prompt change alone may be sufficient.
- id: docs-architecture-md-not-audited-for-v1-vocabulary
  title: docs/architecture.md has no v1 edge-kind vocabulary
  body: |
    `docs/architecture.md` carries no v1 edge-kind vocabulary or `related-projects` references. Matches for `sibling`/`parent`/`child` are filesystem or process-context English, not ontology edge kinds.
- id: stage-2-writes-proposals-via-per-edge-add-proposal-cli
  title: Stage 2 writes proposals via per-edge add-proposal CLI
  body: |
    `run_stage2` spawns claude with `--allowed-tools Bash`; the LLM issues `ravel-lite state discover-proposals add-proposal` for each edge. Validation in `src/state/discover_proposals/` enforces: clap enum parsing, participant count, catalog-membership, `Edge::validate()`, and exact-duplicate rejection. Post-spawn, `run_stage2` loads the accumulated `discover-proposals.yaml`. The prior `RawStage2Output` YAML-parse approach is removed. Mirrors the main phase-loop CLI pattern.
- id: pre-initialise-output-file-before-cli-driven-spawn
  title: Pre-initialise output file before CLI-driven spawn
  body: |
    Pre-initialise the output file before spawning an LLM with CLI write tools: the zero-calls case produces a valid empty file (load succeeds) rather than a missing-file error. Seed prior-phase failures into the initial file so they survive the round-trip regardless of LLM output. `run_stage2` demonstrates this: creates `discover-proposals.yaml` with Stage 1 failures before spawning Stage 2.
- id: create-spawn-binds-purpose-via-invariant-in-prompt-and-template
  title: \`create\` spawn binds purpose via INVARIANT block
  body: |
    `compose_create_prompt` in `src/create.rs` appends an INVARIANT paragraph after the path instruction. `defaults/create-plan.md` §0 leads with the invariant heading before the §1 clarification dialogue. Without both, the agent interprets a concrete problem description (bug report, feature request) as a pivot signal and skips plan creation. Single-task plans are explicitly named as valid to prevent "only one thing to do" being treated as a non-plan.
- id: compose-prompt-asserts-plan-only-output-invariant-guards-the-create-invariant
  title: '`compose_prompt_asserts_plan_only_output_invariant` guards the create INVARIANT'
  body: |
    `compose_prompt_asserts_plan_only_output_invariant` in `src/create.rs` tests asserts both key phrases are present in the composed prompt. Guards the INVARIANT binding against drift. See: `create` spawn binds purpose via INVARIANT in prompt and template.
- id: bash-var-pat-repl-treats-in-replacement-as-matched-text
  title: Bash ${var//pat/repl} treats & as matched text
  body: |
    In bash 5.2+, `&` in the replacement side of `${var//pat/repl}` expands to the matched pattern, not a literal ampersand. HTML entities like `&lt;` in replacement content become the matched text, silently corrupting output. Escape `&` → `\&` before using content as a replacement string.
- id: build-docs-sh-esc-must-wrap-every-substitution-replacement
  title: build-docs.sh esc() must wrap every substitution replacement
  body: |
    The `esc()` helper in `scripts/build-docs.sh` escapes `&` → `\&` before every bash string substitution call. Omitting it on any substitution silently corrupts HTML entities. This is a mandatory pipeline invariant; the comment block above the substitution calls documents it. See: `Bash ${var//pat/repl} treats & in replacement as matched text`.
- id: clap-empty-string-normalisation-belongs-at-dispatch-boundary
  title: Clap empty-string normalisation belongs at dispatch boundary
  body: |
    Clap `value_delimiter` + `--arg ""` hands back `[""]`, not `[]`. Unit tests miss this (they receive `&[String]` directly and never exercise the clap parse path); only CLI integration tests surface it. Normalise empty strings at dispatch in `main.rs`, not inside the library verb, to keep the library contract clean.
- id: triage-prose-dep-reconciliation-is-a-mechanical-scan
  title: '`backlog lint-dependencies` detects prose-dep drift'
  body: |
    `state backlog lint-dependencies <PLAN_DIR>` reports drift between prose task-id mentions in task descriptions and structured `dependencies:` fields. Byte-scan whole-word matching; `[a-zA-Z0-9_-]` chars are id-body, any other byte is a boundary. Output is `LintReport`/`TaskDrift` serde types (YAML/JSON). Linter output is advisory, not authoritative; triage uses `set-dependencies` to reconcile. Triage prompt leads with a **Preflight** directive instructing the LLM to run the linter before triage work.
- id: analyse-work-stale-status-repair-is-a-mechanical-scan
  title: '`repair-stale-statuses` exits 1 on drift, 0 on clean'
  body: |
    `src/state/backlog/repair_stale_statuses.rs` exposes `analyse_repairs` and `run_repair_stale_statuses`; types `Repair`, `RepairReport`, `RepairReason`. Flips stale in-progress/blocked statuses. Exit 1 when repairs apply, 0 when no drift.
- id: datalog-evaluator-deferred-imperative-verbs-sufficient
  title: Datalog evaluator deferred; imperative verbs sufficient
  body: |
    A Datalog query evaluator for backlog queries was considered and explicitly deferred. All current LLM query needs (dep-traversal, count derivation) are satisfiable by purpose-built imperative Rust verbs; Datalog adds complexity without corresponding expressiveness gain.
- id: lint-dependencies-id-slug-collision-risk
  title: lint-dependencies id-slug collision risk
  body: |
    `lint_dependencies` word-boundary matching will false-match any task id that coincides with a common English word; every occurrence of that word in any task description is reported as drift. Risk is low with current slug generation (ids are long title-derived strings), but audit `allocate_id` if very short ids appear in practice.
- id: backlog-transitions-token-computed-by-src-backlog-transitions-rs
  title: '{{BACKLOG_TRANSITIONS}} token computed by src/backlog_transitions.rs'
  body: |
    `src/backlog_transitions.rs` diffs `backlog.yaml` at the work-baseline SHA against the current state. Covers status flips, result additions/modifications, added/deleted tasks, dependency changes, and handoff changes. Soft-fails to a human-readable placeholder on any error. Wired into `phase_loop.rs` `AnalyseWork` branch alongside `{{WORK_TREE_STATUS}}`; `analyse-work.md` presents the block as context for understanding what moved — the commit title must describe the shape of the changes (e.g., "Extract auth module", "Remove deprecated sync path"), not cite task ids. The commits.yaml authoring step in `analyse-work.md` explicitly forbids task ids in commit titles or bodies.
- id: work-baseline-is-prior-triage-commit-triage-additions-bleed-into-backlog-transitions
  title: Triage additions bleed into {{BACKLOG_TRANSITIONS}} from work-baseline
  body: |
    The work-baseline SHA is captured at the triage commit (end of the previous cycle), not at session start. Triage additions from the prior cycle therefore appear in the `{{BACKLOG_TRANSITIONS}}` diff alongside this cycle's work changes. `analyse-work.md` includes a caveat about this. A cleaner fix requires a separate session-start baseline snapshot. See: `Work-baseline seeded atomically in the triage commit`.
- id: llm-reasoning-preamble-in-reflect-dream-triage-is-a-preserved-feature
  title: Headless-phase LLM preamble carries reasoning; preserve it
  body: |
    The LLM-authored prose preamble above the label list in reflect, dream, and triage is intentional — it carries the LLM's reasoning, not just the action list. Preserve it across prompt and renderer changes: label-rendering code replaces only the label block, not the whole output; `format_result_text` must not filter paragraph text, only structural noise (`---` separators, stray code fences). Output-format sections in `defaults/phases/{reflect,dream,triage}.md` must explicitly list every intent label the LLM is expected to emit in the preamble — omitting the list causes the LLM to silently drop them. `format_result_text` handles all intent labels; a missing label in output is always a prompt omission, not a renderer gap.
- id: run-create-pre-seeds-plan-dir-in-rust-before-llm-spawn
  title: run_create scaffolds plan dir before LLM spawn
  body: |
    `run_create` takes `plan_name: &str`; `validate_plan_name` replaces `validate_target`; `resolve_plan_dir` enforces `<context_root>/plans/<name>/` placement. Callers must pass a bare plan name, not a path. `src/create.rs` scaffolds the plan directory — `backlog.yaml`, `memory.yaml`, `intents.yaml`, and related plan-state files — via CLI calls before the create-plan LLM spawn; initial `phase.md` is seeded to `triage`. Eliminates format drift; `defaults/create-plan.md` carries no scaffolding instructions. See: `Pre-initialise output file before CLI-driven spawn`.
- id: headless-output-filters-hr-lines-in-rust
  title: Headless output filters `---` HR lines in Rust
  body: |
    `src/format.rs` strips bare `---` horizontal-rule lines from headless phase output (reflect, dream, triage). Only `---` is filtered; `***` and `___` variants are not.
- id: planrowcounts-injects-unblocked-blocked-received-into-survey
  title: PlanRowCounts injects unblocked/blocked/received into survey
  body: |
    `PlanRowCounts { unblocked, blocked, received }` lives in `state::backlog::schema`. `BacklogFile::plan_row_counts()` computes all three in one dep-traversal pass. `inject_plan_row_counts()` in `survey/schema.rs` writes them onto `PlanRow` across cold, incremental, and `is_noop` fast paths. Survey prompts forbid the LLM from emitting these fields. See: `survey blocked count is status-blocked-or-dep-unmet union`; `survey received count is handoff-based not session-diff`.
- id: survey-received-count-is-handoff-based-not-session-diff
  title: survey received count is handoff-based not session-diff
  body: |
    `PlanRow.received` counts tasks in the current backlog that carry handoff data (a `[HANDOFF]` block). It is NOT the count of tasks that transitioned to in_progress/done this cycle. `SessionRecord` carries only id/timestamp/phase/body — no structured backlog snapshot — making a cycle-diff computation impossible. See: `PlanRowCounts injects unblocked/blocked/received into survey`.
- id: survey-blocked-count-is-status-blocked-or-dep-unmet-union
  title: survey blocked count is status-blocked-or-dep-unmet union
  body: |
    `PlanRow.blocked` (computed by `plan_row_counts()`) counts tasks with `status=blocked` OR `status=not_started` with at least one unmet dependency. Matches the `blocked` column key in `src/survey/render.rs:20`. Narrow `status==blocked`-only definitions undercount. See: `PlanRowCounts injects unblocked/blocked/received into survey`.
- id: analyse-work-writes-commits-yaml-git-commit-work-applies-it
  title: Analyse-work writes commits.yaml; git-commit-analyse-work applies it
  body: |
    `CommitSpec` in `src/state/commits/schema.rs`: ordered `{paths, message}` list with an optional `target: ComponentRef` field. `apply_commits_spec` in `src/git.rs` routes each entry's `target` to its mounted worktree via `targets.yaml`; entries without `target` fall back to `project_dir` (v1 compatibility preserved). `apply_parsed_spec` accepts `plan_dir` alongside `project_dir`; cwd is selected per entry before `unstage_subtree`, `git add`, `diff --cached`, and `git commit`. On partial failure the function bails immediately, leaving context unchanged. Read-only `list`/`show` CLI verbs wired in `src/main.rs`. `GitCommitAnalyseWork` calls `apply_commits_spec`, removes the spec file before staging to prevent self-inclusion. Fallback on missing/malformed/empty spec: single catch-all commit of the whole subtree. Plan-state is folded into the first/only source commit by default; no separate plan-state commit is produced. See: `Analyse-work commits all non-plan paths`.
- id: phase-summary-render-computes-structural-labels-only
  title: phase-summary render computes structural labels only
  body: |
    `state phase-summary render` computes structural labels only. Intent-required labels (e.g., a purposeful `[REPRIORITISED]`) are excluded because a diff alone cannot distinguish a deliberate reorder from an accidental one; the LLM preamble carries that reasoning. Structural label sets: `[DONE]`, `[NEW]`, `[OBSOLETE]`, `[REPRIORITISED]` (triage); `[NEW]`, `[OBSOLETE]`, `[STALE]` (reflect/dream); `[STATS]` (dream). Implementation in `src/phase_summary.rs`. See: `LLM reasoning preamble in reflect/dream/triage is a preserved feature`.
- id: phase-summary-render-prompt-wiring-needs-orchestrator-baseline
  title: Phase prompts invoke `phase-summary render` via CLI directive
  body: |
    `defaults/phases/{reflect,dream,triage}.md` `## Output format` sections each contain a single CLI directive: `ravel-lite state phase-summary render {{PLAN}} --phase <phase> --baseline $(cat {{PLAN}}/<phase>-baseline 2>/dev/null || echo "")`. Emitting that directive's output verbatim is the LLM's only structural obligation; the narrative preamble and intent-required labels remain the LLM's authoring responsibility. Baseline wiring: `GitCommitWork` → `analyse-work-baseline`; `GitCommitAnalyseWork` → `reflect-baseline`; `GitCommitReflect` → `triage-baseline`; `GitCommitTriage` → `work-baseline`.
- id: each-phase-baseline-holds-the-sha-from-the-preceding-commit
  title: Each <phase>-baseline holds the SHA from the preceding commit
  body: |
    Each `<phase>-baseline` file holds the commit SHA from just before that phase started — written by the preceding `git-commit-*` step, not by the phase itself. Mapping: `analyse-work-baseline` ← `GitCommitWork`; `reflect-baseline` ← `GitCommitAnalyseWork`; `triage-baseline` ← `GitCommitReflect`; `work-baseline` ← `GitCommitTriage`. Enables `state phase-summary render --baseline $(cat <phase>-baseline)` calls from phase prompts.
- id: init-rs-drift-sentinel-checks-phase-prompts-for-state-phase-summary-render
  title: '`init.rs` drift sentinel checks for `phase-summary render`'
  body: |
    `src/init.rs` contains a drift-guard sentinel asserting phase prompt templates include the substring `state phase-summary render`. Any change to how phase prompts emit their output requires updating this sentinel.
- id: ops-log-yaml-mechanism-for-intent-label-capture-deferred
  title: ops.log.yaml intent-label-capture mechanism is deferred
  body: |
    `src/phase_summary.rs:21-23` describes an `ops.log.yaml` mechanism: mutating verbs record `--intent <label>` and `--reason "<text>"` at mutation time; the renderer merges structural diff with intent records, removing the LLM's responsibility for emitting intent labels. Deferred: intent is currently LLM reasoning, not mechanical — the verb caller does not yet hold the intent value before invoking the verb. Only worth pursuing when intent becomes mechanical enough that LLM authorship is redundant.
- id: triage-reprioritised-requires-an-llm-authored-reason
  title: Triage `[REPRIORITISED]` requires an LLM-authored reason
  body: |
    `defaults/phases/triage.md` requires a ` — <reason>` suffix on every `[REPRIORITISED]` action line. The renderer at `src/format.rs:134` classifies `REPRIORITISED` as `Intent::Changed`; a missing reason collapses to single-row output with no dim reason row. See: `action-lines-split-title-reason-into-two-row-layout`.
- id: dead-code-grep-must-include-tests-scope
  title: Dead-code grep must include tests/ scope
  body: |
    A code path that writes no production output may remain live through test fixture side-effects. Precondition greps for dead-code tasks must include `tests/`; production-source-only searches produce false negatives.
- id: latest-session-md-highlight-rule-targets-wrong-filename
  title: PHASE_HIGHLIGHTS detection is unit-tested but TUI-unverified
  body: |
    `PHASE_HIGHLIGHTS` regexes target `.yaml` extensions; `format_tool_call` detects both `Write`/`Edit` tool paths and `ravel-lite state <subcommand>` Bash invocations and maps them to canonical filenames. Four unit tests cover session-log, memory, and backlog state-CLI paths. Whether labels fire in live TUI runs remains unverified — end-to-end verification is still a follow-up.
- id: tests-mirroring-stale-impl-values-cannot-detect-drift
  title: Tests mirroring stale impl values cannot detect drift
  body: |
    When a test hardcodes the same incorrect string as the implementation (e.g., a stale filename extension), both pass and the bug is invisible. The test only exposes the bug when the implementation is corrected — it then fails, revealing its own co-contamination. Test inputs must not copy internal implementation strings; prefer on-disk golden paths or independently-authored constants.
- id: state-filename-constants-live-in-src-state-filenames-rs
  title: State filename constants live in src/state/filenames.rs
  body: |
    Fourteen `pub const` items in `src/state/filenames.rs`: `BACKLOG_FILENAME`, `INTENTS_FILENAME`, `MEMORY_FILENAME`, `SESSION_LOG_FILENAME`, `LATEST_SESSION_FILENAME`, `FINDINGS_FILENAME`, `COMMITS_FILENAME`, `PHASE_FILENAME`, `RELATED_COMPONENTS_FILENAME`, `TARGETS_FILENAME`, `TARGET_REQUESTS_FILENAME`, `THIS_CYCLE_FOCUS_FILENAME`, `FOCUS_OBJECTIONS_FILENAME`, `DREAM_WORD_COUNT_FILENAME`. All state filename string literals across `src/` use these constants — do not introduce raw string literals. `PHASE_HIGHLIGHTS` regexes use `filename_suffix_regex(CONSTANT)` (wraps `regex::escape`) so a constant rename cascades into highlight detection automatically. `SUBAGENT_DISPATCH_FILENAME` was removed when `src/subagent.rs` was deleted.
- id: defaults-md-prompt-files-keep-literal-filenames-by-design
  title: defaults/*.md prompt files keep literal filenames by design
  body: |
    Prompt files under `defaults/` use literal filenames (e.g., `backlog.yaml`, `memory.yaml`) rather than referencing constants from `src/state/filenames.rs`. Converting them would require token substitution or build-time replacement; complexity without proportional benefit. Only `src/` code uses the filename constants — prompts are deliberately out-of-scope.
- id: cargo-dist-wired-homebrew-pipeline-needs-operator-provisioning
  title: Release pipeline uses manual scripts, not cargo-dist
  body: |
    Cargo-dist CI removed; releases use manual scripts: `cargo release patch --execute && git push --follow-tags && ./scripts/release-build.sh && ./scripts/release-publish.sh`. `release-build.sh` builds 4 tarballs (native `cargo build` for Darwin; `cargo zigbuild` glibc-2.17 for Linux). `release-publish.sh` creates the GitHub Release and updates the sibling `homebrew-taps` formula from `scripts/templates/ravel-lite.rb.tmpl`. `release-doctor.sh` runs as the first step in `release-build.sh`; verifies zig, cargo-zigbuild, four rustup targets, and gh auth — exits non-zero with a complete punch-list and remediation commands if anything is missing. The TARGETS array is intentionally duplicated between `release-doctor.sh` and `release-build.sh`; no shared sourced file (two duplicates beats the indirection of a third file). Pipeline validated; end-user smoke test (`brew install linkuistics/taps/ravel-lite && ravel-lite --version`) passes.
- id: capture-scripts-template-documentation-with-real-system-runs
  title: Capture scripts template documentation with real system runs
  body: |
    `scripts/capture/ravel-lite-tutorial.sh` drives a TestAnyware macOS VM: installs via Homebrew, runs the tutorial, takes screenshots, pulls `LLM_STATE` transcripts. Sections use `[STEP-NAME]` log markers; VM identity via deterministic `VM_ID` (`vm start --id`). `--from <step>`, `--vm-id <id>`, and `--keep-vm` flags enable resumable partial runs; `maybe_run <step> <fn>` gates each chapter via a STARTED sentinel. `--from` beyond `chapter01` requires `--vm-id`. Chapter 03 interactive flow uses `install_claude_code`, `transfer_claude_auth`, `pretrust_project`, and `setup_shell_env`. Chapter 04 `scenario_run` drives `ravel-lite run` and captures mid-cycle screenshots. See: `Hybrid capture splits screenshot vs transcript_at by content stability`.
- id: after-help-const-avoids-dead-code-warnings-no-intermediate-url-consts
  title: after_help const avoids dead-code warnings; no intermediate URL consts
  body: |
    `src/main.rs` exposes repo and docs URLs via clap's `after_help` field. Defined as a single `AFTER_HELP: &str` string literal rather than separate `REPO_URL`/`WEBSITE_URL` constants; intermediate named string constants with no other consumers trigger dead-code warnings under `[lints.rust] warnings = "deny"`.
- id: config-model-is-layered-lua-config-lua-rs-owns-it
  title: Config model is layered Lua; `config_lua.rs` owns it
  body: |
    `src/config_lua.rs` implements the `ravel` Lua global table (`set_agent`, `set_headroom`, `set_model_for`, `set_token`, `append_prompt`, `config`). Backed by `mlua` (vendored Lua 5.4). Global + plan layers apply in order; setter functions use last-write-wins; `append_prompt` is append-only and accumulates across both layers in registration order — prompts cannot be replaced via config. All config loaders delegate to `config_lua::resolve`; `src/config.rs` does not contain `merge_yaml` or overlay machinery.
- id: shipped-defaults-read-from-embedded-binary-not-disk
  title: Shipped defaults read from embedded binary, not disk
  body: |
    All call sites for shipped prompts and agent-definitions use `init::require_embedded` / `init::embedded_entries_with_prefix`; disk reads of embedded-path files are prohibited. `run_init` writes only a commented-out `config.lua` stub and prunes `RETIRED_PATHS` — no shipped defaults are written to disk. `tests/embedded_defaults_drift.rs` enforces that no source file reads an embedded path from disk.
- id: debug-log-rs-uses-oncelock-singleton-paths-are-constants
  title: '`debug_log.rs` uses OnceLock singleton; paths are constants'
  body: |
    `OnceLock<DebugLog>` singleton with `enable`, `is_enabled`, `log`, `log_stream_line`, and `format_argv`. Constants `CLAUDE_DEBUG_FILE` and `EMBEDDING_DEBUG_FILE` centralise `/tmp/` paths so spawn sites and the CLI handler share one source of truth. Singleton chosen over threading `Option<Arc<DebugLog>>` through the call graph because debug-on/off is process-wide state.
- id: debug-instruments-run-spawn-sites-only
  title: '`--debug` instruments `run` spawn sites only'
  body: |
    `--debug` is a `run` flag; `create::run_create` and `discover::stage1` are intentionally uninstrumented because they are unreachable from `ravel-lite run`. Four instrumented spawn sites: `src/agent/claude_code.rs` (interactive + headless), `src/agent/pi.rs` (interactive + headless), `src/agent/common.rs` (`pump_stdout_to_ui`, `spawn_stderr_drain`, exit in `run_streaming_child`), and `src/survey/invoke.rs` (`spawn_claude_and_read`).
- id: interactive-tui-paths-log-stdio-inherited-not-transcript
  title: Pi `--debug` logs 'inherited'; claude_code uses PTY
  body: |
    `pi` interactive spawn paths: stdio is inherited and not capturable; `--debug` records "stdio: inherited (no transcript available)" to avoid silent lossiness. `claude_code` interactive paths: `--debug` routes through `spawn_claude_via_pty` in `src/agent/claude_code.rs`, enabling PTY byte-stream capture via `log_pty_chunk`/`render_pty_bytes` in `debug_log.rs`. The "inherited" log message is pi-only. Headless paths capture full output in both cases.
- id: select-config-dir-strips-trailing-slashes-via-components-collect
  title: select_config_dir strips trailing slashes via components().collect
  body: |
    `src/config.rs::select_config_dir` normalises all candidate paths with `candidate.components().collect::<PathBuf>()` before any downstream use. This is the single normalisation point; trailing slashes on user-supplied config dirs do not propagate. Regression test: `trailing_slash_in_candidate_is_normalised_away`.
- id: interactive-work-phase-spawn-omits-add-dir-for-plan-dir
  title: Claude spawns inject `--add-dir` for external worktrees
  body: |
    `invoke_interactive` and `build_headless_args` in `src/agent/claude_code.rs` inject `--add-dir <path>` for each mounted worktree path not already under `cwd`, via `mounted_worktree_add_dirs(plan_dir, cwd)` in `src/state/targets/yaml_io.rs`. Plan dir itself is never emitted: in v1 layout it is always a descendant of cwd. The cwd-descendant filter makes v1/v2 layout transparent with no flag-day cutover: v1 emits no extra flags; v2 (plan dir outside project dir) emits real grants. An unnecessary `--add-dir` on a fresh machine triggers a trust-grant modal that hangs the spawn. Pi has no `--add-dir` equivalent and no filesystem permission model; worktree paths are reachable without grants. See: `Discover stage spawns need --allowed-tools and --add-dir` for headless stage spawns.
- id: v1-v2-config-migration-wired-into-config-lua-resolve
  title: v1→v2 config migration wired into config_lua::resolve
  body: |
    `src/migrate_v1_to_v2.rs` migrates legacy materialised YAML config (global `config.yaml`, `config.local.yaml`, per-agent `config.yaml`/`tokens.yaml`) to a `config.lua` with version marker. Detects legacy layout by intersecting embedded-default paths with disk. Crash-safe: file writes precede deletes; a mid-run crash leaves legacy files on disk for the next call to complete. Wired in `config_lua::resolve` as the first-touch call before any config layer is read. See: `Config model is layered Lua; config_lua.rs owns it`.
- id: pty-capture-rs-is-the-pty-orchestrator-for-claude-code-debug-capture
  title: \`pty_capture.rs\` is the PTY orchestrator for claude_code
  body: |
    `src/agent/pty_capture.rs` exposes `run_pty_session` (production entry, called via `spawn_blocking`), `drive_pty_io` (three-thread orchestrator: stdout pump, stdin pump, SIGWINCH forwarder), `pump_stdin_with_shutdown` (`libc::poll`-based with `AtomicBool` shutdown to avoid `spawn_blocking` cancellation), `tee_to` (byte-copy with tap closure), and `current_terminal_size` (TIOCGWINSZ, 24×80 fallback). Dependencies: `portable-pty = "0.9"`, `libc = "0.2"`. See: `Pi interactive logs "inherited"; claude_code uses PTY under --debug`.
- id: masterpty-send-not-sync-take-reader-writer-before-moving-master
  title: 'MasterPty Send-not-Sync: take reader/writer before moving master'
  body: |
    `portable-pty`'s `MasterPty` is `Send` but not `Sync`. Pattern: call `take_writer()` and `take_reader()` on the master before moving it into the resize thread (which calls `resize_pty`). The main thread retains the reader/writer; the resize thread owns the master exclusively. Attempting to share across threads without this ownership split is a compile error.
- id: render-docs-sh-produces-html-fragments-via-asciidoctor-embedded
  title: render-docs.sh produces HTML fragments via asciidoctor --embedded
  body: |
    No custom template needed; `asciidoctor --embedded` strips the document shell and emits a clean fragment. Script loops `docs/reference/*.adoc` and `docs/tutorial/*.adoc`; outputs land in `website/docs/` and `website/tutorials/` for the eleventy pipeline to consume.
- id: asciidoctor-table-cells-bare-pipe-is-a-column-delimiter
  title: 'Asciidoctor table cells: bare pipe is a column delimiter'
  body: |
    `before|after` inside a table cell is parsed as two cells, not one. Escape as `before\|after` or restructure. Applies to all `.adoc` files under `docs/`.
- id: config-dir-resolves-config-ravel-lite-config-dirs-config-dir-ravel-lite
  title: 'Config-dir resolves: --config → RAVEL_LITE_CONFIG → dirs::config_dir()/ravel-lite'
  body: |
    `config_lua::resolve` tries in order: `--config` CLI flag, `RAVEL_LITE_CONFIG` env var, `dirs::config_dir()/ravel-lite`. First match wins. See: `Config model is layered Lua; config_lua.rs owns it`.
- id: doc-publish-pipeline-reads-website-via-git-archive
  title: Doc publish pipeline reads `website/` via git archive
  body: |
    Doc publish pipeline reads `website/` via git archive. `projects/ravel-lite.html` and `SYNC.yml` do not exist in the current pipeline; no intermediate artifact files are needed. The pipeline consumes the `website/` subtree directly.
- id: transcript-at-captures-per-command-stdout-stderr-for-asciidoc
  title: transcript_at captures per-command stdout+stderr for AsciiDoc
  body: |
    `transcript_at <label> <command>` helper in capture scripts writes stdout+stderr to `transcripts/<label>.txt` as paste-ready `[source,console]` AsciiDoc blocks. This is the mechanism for folding live VM output into tutorial chapters.
- id: hybrid-capture-splits-screenshot-vs-transcript-at-by-content-stability
  title: Hybrid capture splits screenshot vs transcript_at by content stability
  body: |
    For interactive CLI phases where the agent paraphrases questions, use screenshot-per-prompt for the volatile conversation and `transcript_at` for any deterministic post-command state. Maps capture fidelity to content stability: screenshots tolerate paraphrase variance; `transcript_at` is reproducible text. A marker-echo (`echo CHAPTER_03_CREATE_DONE`) after the interactive command provides a deterministic `find-text` sync point. Chapter 03 `ravel-lite create` demonstrates the pattern.
- id: capture-response-files-are-authored-source-live-outside-docs-captures
  title: Capture response files are authored source outside docs/captures/
  body: |
    `scripts/capture/responses/` holds authored verbatim responses for interactive capture scenarios (e.g. `03-purpose.txt`, `03-project.txt`). Located outside `docs/captures/` so `.gitignore`'s `docs/captures/` rule does not silently exclude them; they are authored source content, not captured output.
- id: capture-harness-bypasses-three-claude-security-gates
  title: Capture harness bypasses three Claude security gates
  body: |
    Per-project JSON settings must be configured before any harness-driven `claude` invocation: `hasTrustDialogAccepted` (project trust dialog), `defaultMode: bypassPermissions` (tool permission prompts), `skipDangerousModePermissionPrompt` (bypass-mode confirmation modal). All three are required; omitting any one will hang or block an automated run. Implemented via `pretrust_project` and `setup_shell_env` in `scripts/capture/ravel-lite-tutorial.sh`.
- id: create-plan-capture-uses-single-shot-comprehensive-response
  title: create-plan capture uses single-shot comprehensive response
  body: |
    `scripts/capture/responses/03-comprehensive.txt` provides the full plan description as a single message. Per-question response files misalign with the `create-plan` template because question paraphrasing varies between runs; a single comprehensive description sidesteps alignment issues entirely. See: `Hybrid capture splits screenshot vs transcript_at by content stability`.
- id: tui-banner-text-differs-from-yaml-phase-field
  title: TUI banner text differs from YAML `phase:` field
  body: |
    `find-text "phase: work"` will never match in a capture run: the string `phase: work` lives in YAML state files only; the TUI renders the phase name via `term_title.rs` OSC escapes and banner text, not the raw YAML field. Use a screenshot or a banner-text string for phase-change sync points.
- id: testanyware-download-cannot-pull-a-directory-use-per-file-exec-workaround
  title: testanyware download can't pull a directory; use exec
  body: |
    `testanyware download` cannot pull a directory (`LLM_STATE/`); fails with HTTP 400. Workaround: capture individual transcripts via `testanyware exec`. Full-directory options: (a) recursive walk + per-file download; (b) tar roundtrip (`testanyware exec -- tar czf /tmp/llm_state.tar.gz LLM_STATE && testanyware download /tmp/llm_state.tar.gz`). Low priority: per-file exec covers prose-fold tasks.
- id: capture-chapter-transitions-use-exit-sentinel-echo-before-next-chapter
  title: End capture chapters with /exit then sentinel echo
  body: |
    At the end of a capture chapter that may leave Claude running: send `/exit` + Return into the GUI Terminal, then `echo <SENTINEL>` + Return, then wait with `testanyware find-text "<SENTINEL>" --timeout 30`. `/exit` is harmless if Claude already exited (becomes command-not-found; sentinel still renders). Prevents the next chapter from sending keystrokes into a Claude TUI. See: `Hybrid capture splits screenshot vs transcript_at by content stability`.
- id: config-lua-rs-doc-comment-can-drift-from-registered-api
  title: config_lua.rs doc comment can drift from registered API
  body: |
    Grep `set_function`/`set` registration calls in `src/config_lua.rs` to audit the live Lua API surface; the module-level doc comment listing exported names is not guaranteed to match. See: `Config model is layered Lua; config_lua.rs owns it`.
- id: knowledge-graph-crate-is-in-tree-extraction-deferred-post-v2-0
  title: knowledge-graph crate is in-tree; extraction deferred post-v2.0
  body: |
    `knowledge-graph` is the TMS substrate crate name; in-tree Cargo workspace member. Extraction to a standalone crate is deferred until after v2.0 ships. See: `docs/architecture-next.md` Settled decisions §crate name.
- id: ascent-chosen-as-datalog-engine-differential-dataflow-rejected
  title: Ascent chosen as Datalog engine; differential-dataflow rejected
  body: |
    `ascent` 0.8 (recompute-based) is the chosen Datalog engine for the knowledge-graph crate. Recompute is fast enough at ravel-lite scale; differential-dataflow's incremental complexity is not warranted. Settled in Phase A of architecture-next. BYODS and lattice features are available in 0.8 but unused; the stable surface (relation declarations, tuple-pattern heads, stratified negation, if-guard predicates) is unchanged from 0.6.
- id: v1-v2-cutover-is-hard-v2-binary-refuses-unmigrated-plans
  title: v2 binary refuses unmigrated plans; no migration window
  body: |
    No migration window: the v2 binary hard-fails on unmigrated plans. Users must run `ravel-lite state migrate` before switching to v2. Settled in Phase A of architecture-next.
- id: legacy-backfill-uses-one-shot-llm-extraction-at-migrate-time
  title: Legacy backfill uses one-shot LLM extraction at migrate time
  body: |
    One-shot LLM-driven extraction at `migrate` time backfills the knowledge graph from existing plan history. Entries with no attributable session land with `status: legacy`. No incremental or post-hoc repair path. Settled in Phase A of architecture-next.
- id: petgraph-0-6-lacks-articulation-points-api-hand-rolled-dfs-needed
  title: petgraph 0.6 lacks articulation-points API; hand-rolled DFS needed
  body: |
    `petgraph` 0.6 does not expose articulation points on its stable surface. The knowledge-graph `algorithms` module uses a hand-rolled low-link DFS (~50 lines) instead. Audit algorithm crate APIs for missing stable-surface functions before committing to a dependency at crate-scaffold time.
- id: knowledge-graph-consumers-each-author-their-own-ascent-program
  title: knowledge-graph consumers each author their own ascent! program
  body: |
    No shared runtime rule-registry exists in the knowledge-graph crate. Each consumer authors its own `ascent!` Datalog program with the rules it needs. Centralising rules would couple the generic substrate to consumer-specific vocabulary.
- id: blocked-by-is-kind-specific-extension-data-not-a-justification-edge
  title: '`blocked_by` belongs in extension data, not justification edge'
  body: |
    `blocked_by` relationships belong in kind-specific extension data, not in the generic `justification` edge enum. Threading `blocked_by` through the substrate `store` would re-couple the generic substrate to ravel-lite plan vocabulary. The wiring task handles it as a domain wrapper.
- id: src-repos-rs-holds-reposregistry-on-disk-is-name-keyed-map
  title: '`src/repos.rs` holds `ReposRegistry`; on-disk is name-keyed map'
  body: |
    `ReposRegistry` in `src/repos.rs` owns `repos.yaml`; on-disk shape is a name-keyed `IndexMap<String, RepoEntry>` (per architecture-next §The repo registry). `local_path` is stored absolute; omitted from YAML when absent. `try_add` rejects duplicate slugs. CLI verbs: `repo add`, `repo list`, `repo remove`.
- id: componentref-canonical-string-is-repo-component
  title: '`ComponentRef` canonical string is `<repo>:<component>`'
  body: |
    `ComponentRef { repo_slug, component_id }` in `src/component_ref.rs`. `Display`/`FromStr`/serde all produce the `<repo>:<component>` form. Validation rejects empty halves and extra colons (exactly one colon required).
- id: git-subrepo-in-test-tree-requires-initial-commit
  title: Git subrepo in test tree requires initial commit
  body: |
    `git init` alone in a test's project subtree triggers `does not have a commit checked out` errors from outer `git add`. Issue `git commit --allow-empty` after init. When no global git identity is configured, supply fallback identity using an RFC 2606-reserved domain such as `.invalid.local` (e.g. `ravel-lite-test@test.invalid.local`) to prevent accidental attribution on mis-published commits.
- id: architecture-next-md-config-yaml-layout-entries-are-stale
  title: architecture-next.md config.yaml layout entries are stale
  body: |
    `docs/architecture-next.md` lists `config.yaml` and `config.local.yaml` as `<ravel-context>/` layout artefacts. Implementation uses `config.lua` (layered Lua model); those doc sections do not reflect the current config model. See: `Config model is layered Lua; config_lua.rs owns it`.
- id: src-ontology-removed-import-from-component-ontology-crate
  title: '`src/ontology/` removed; import from `component_ontology` crate'
  body: |
    `src/ontology/` is removed; import from the `component_ontology` crate (`atlas-contracts` workspace). `ontology.yaml` is in `RETIRED_PATHS` in `src/init.rs` — existing config dirs are swept clean on next `ravel-lite init`.
- id: state-projects-is-a-migration-error-alias
  title: '''state projects'' is a migration-error alias'
  body: |
    `state projects <subcommand>` is retained as a clap `Vec<String>` catch-all that unconditionally returns `migrate_projects_yaml_error()`. No functional path survives from the old `projects.yaml` CLI. Any code or test that invokes `state projects add|remove|list|rename` receives this error.
- id: discovertarget-resolves-working-tree-from-repos-or-cache
  title: DiscoverTarget resolves working tree from repos or cache
  body: |
    `discover::DiscoverTarget { slug, working_tree }` and `working_tree_for` in `discover/mod.rs` resolve a repo's on-disk path: `entry.local_path` when present, otherwise `<context>/.cache/repos/<slug>/` (the architecture-next cache fallback). All discover consumers use this abstraction; direct `RepoEntry` path access is not used in discover paths.
- id: tutorial-docs-stale-for-repos-yaml-needs-vm-capture-re-run
  title: Tutorial docs stale for repos.yaml; needs VM capture re-run
  body: |
    `docs/tutorial/`, `docs/reference/`, and `docs/captures/` still reference retired `state projects` verbs. Updating requires re-running `scripts/capture/ravel-lite-tutorial.sh` against a TestAnyware VM. Tracked as backlog task `tutorial-update-for-repos-yaml-cutover`.
- id: repos-yaml-requires-clone-url-auto-add-is-retired
  title: repos.yaml requires clone URL; auto-add is retired
  body: |
    `ensure_in_catalog_interactive` and `register_projects_from_plan_dirs` were removed from `main.rs`. Interactive auto-add is not viable for `repos.yaml` because a clone URL is required on entry. Users must invoke `ravel-lite repo add <slug> <url>` explicitly.
- id: store-k-is-per-kind-cascade-serves-intent-is-the-cross-store-join
  title: Store<K> is per-kind; cascade_serves_intent is the cross-store join
  body: |
    Multi-kind plan KG requires one `Store<K>` per kind, not a heterogeneous store. `cascade_serves_intent::<P, C>(parents, dependents, status)` in `store.rs` is the join point: reads terminal statuses from a parent store, writes defeat markers into a child store. Shape is the same for all cross-kind cascades (intent→backlog, intent→memory, intent→finding).
- id: itemkind-uses-unit-struct-tags-itemstatus-enums-encode-transitions
  title: ItemKind uses unit-struct tags; ItemStatus enums encode transitions
  body: |
    `ItemKind` is implemented on zero-sized unit structs (`KIND_STR: &'static str`, `type Status: ItemStatus`). Status vocabularies are enums implementing `ItemStatus` with `transitions()`, `is_terminal()`, `as_str()`, and `parse()`. `KindMarker<K>` handles YAML serde: serialises as `K::KIND_STR`, rejects kind mismatches on deserialise. `Store<K>::set_status` enforces `K::Status::transitions()` before committing.
- id: plan-kg-rs-registers-four-plan-vocabularies-in-knowledge-graph-crate
  title: plan_kg.rs registers four plan vocabularies in knowledge-graph crate
  body: |
    `crates/knowledge-graph/src/plan_kg.rs` defines `IntentKind`, `BacklogItemKind`, `MemoryEntryKind`, and `FindingKind`, each with its own status enum and transition table. Type aliases (`IntentItem`, `BacklogStore`, etc.) and the intent→backlog cross-store cascade live here. See: `Store<K> is per-kind; cascade_serves_intent is the cross-store join`.
- id: datalog-rs-smoke-tests-are-the-canary-for-ascent-upgrades
  title: \`datalog.rs\` smoke tests are the ascent upgrade canary
  body: |
    Three smoke tests in `crates/knowledge-graph/src/datalog.rs` (`orphaned_rule_finds_backlog_items_without_active_intent`, `suspect_rule_finds_memory_entries_with_changed_sha`, `empty_program_runs_clean`) verify the stable ascent surface (relation declarations, tuple-pattern heads, stratified negation, if-guard predicates). Run these first on any ascent version bump; they are the primary canary for macro-generated code breakage.
- id: llm-state-core-backlog-yaml-is-in-legacy-format-pending-v1-v2-migrator
  title: LLM_STATE/core backlog.yaml is legacy; awaits v1→v2 migrator
  body: |
    `LLM_STATE/core/backlog.yaml` still uses the legacy `tasks: [...]` shape; the deployed binary (v1.0.2) reads only that shape and hard-fails on the TMS `items:` format. The source migration (`BacklogEntry` wrapping `Item<BacklogItemKind>`) is complete in `main`. File-level cutover belongs to the `migrate-ravel-lite-migrate-for-v1-to-v2-cutover` task. Do not schedule LLM_STATE file-shape changes until the v1→v2 migrator ships. See: `v1→v2 cutover is hard; v2 binary refuses unmigrated plans`.
- id: intents-yaml-has-list-show-add-set-status-verb-surface
  title: intents.yaml has list/show/add/set-status verb surface
  body: |
    `src/state/intents/` (schema.rs, yaml_io.rs, verbs.rs, mod.rs) is the plan-intent state layer. CLI verbs: `list`, `show`, `add`, `set-status`. Status transitions validated via `IntentStatus::transitions()` from `plan_kg.rs`. `scaffold_plan_dir` seeds `intents.yaml` alongside `backlog.yaml` and `memory.yaml`. Editing verbs (`set-claim`, `set-rationale`, `delete`, `supersede`) deferred until a consumer surfaces; the TMS model favours supersession over in-place edit. See: `plan_kg.rs registers four plan vocabularies in knowledge-graph crate`.
- id: ravel-lite-plan-provides-four-read-only-cross-kind-query-verbs
  title: ravel-lite plan provides four read-only cross-kind query verbs
  body: |
    `list-items`, `show-item`, `query-by-status`, and `query-by-justification` live in `src/plan_inspect.rs`. All four verbs cover all four plan kinds: intents, backlog items, memory entries, and findings. Dispatched from `main.rs` as a top-level subcommand, not via `dispatch_state`. Per-kind mutations remain in `ravel-lite state <kind>`. `PlanItemKind` and `JustificationKindFilter` encode closed vocabularies in the type system.
- id: anyentry-with-serde-untagged-serialises-cross-kind-output
  title: 'AnyEntry with #[serde(untagged)] serialises cross-kind output'
  body: |
    In `src/plan_inspect.rs`, `AnyEntry` is a serde-untagged enum; each variant carries its own kind-marker field, so no wrapper discriminant is emitted. Use this pattern for cross-kind query output that must remain kind-labelled. Contrast with `#[serde(flatten)]`, which is a struct-inlining pattern, not an enum-variant pattern.
- id: plan-cascade-extension-defeat-supersede-visibility-verb
  title: plan cascade extension — defeat/supersede visibility verb
  body: |
    `plan cascade <plan-dir> <id>` (not yet implemented) would show backlog items that `cascade_serves_intent` would defeat or supersede if `<id>` reaches a terminal status. Uses primitives in `crates/knowledge-graph/src/plan_kg.rs`. Blocked on `migrate` task only. Implementation: add `run_cascade` arm to `src/plan_inspect.rs`; no existing verbs change.
- id: plan-query-by-status-cross-kind-union-design-stance-deferred
  title: plan query-by-status cross-kind union — design stance deferred
  body: |
    `plan query-by-status` without `--kind` walks all known kinds and unions matches on the status string. Currently correct — no status string is shared across kinds with conflicting semantics. If v2 introduces conflicting cross-kind status names, add an error, disambiguation flag, or kind-scoped union with explicit labels.
- id: no-ci-clippy-gate-lint-errors-accumulate-silently
  title: scripts/check.sh gates clippy; CI and hook not wired
  body: |
    scripts/check.sh runs clippy workspace-wide with -D warnings. Git pre-push hook recipe is documented in the script header but not installed — opt-in by design. CI has no clippy gate; drift between sessions is possible if check.sh is not run manually.
- id: atlas-cli-routes-via-dispatch-atlas-in-src-atlas-rs
  title: Atlas CLI routes via dispatch_atlas in src/atlas.rs
  body: |
    `src/atlas.rs` implements `dispatch_atlas`; `src/main.rs` routes `Commands::Atlas` via `AtlasCommands`. `atlas-index` is a workspace path dep.

    Verbs:
    - `list-repos`: delegates to `repos::run_list`
    - `freshness [--require-fresh]`: four outcomes — `fresh`, `missing`, `no_local_path`, `unparseable`
    - `list-components [--repo <slug>] [--format yaml|json]`
    - `summary [--repo <slug>] [--format yaml|json]`: JSON paths emit `AtlasComponentsList`/`AtlasSummary` with `schema_version: 1`
    - `describe`, `memory`, `edges`, `neighbors`, `roots`, `path`, `scc`: see dedicated entries

    `--repo` validates against the fresh-repo set; unknown slug → named-repos error rather than silent empty output. See: `atlas edges/neighbors/roots traverse EdgeGraph from catalog`; `atlas path (BFS) and scc (Tarjan) verbs`.
- id: catalog-projects-token-is-not-in-phase-prompts-strip-task-is-no-op
  title: '`CATALOG_PROJECTS` absent from phase prompts'
  body: |
    `defaults/phases/*.md` contains no `{{CATALOG_PROJECTS}}` token; grepping returns zero hits. The token lives only in `src/discover/stage1.rs` for repos-list scoping. "Strip atlas catalog from prompts" is a no-op task — triage should drop it.
- id: catalog-in-src-atlas-rs-union-loads-fresh-repos-components
  title: Catalog in src/atlas.rs union-loads fresh repos' components
  body: |
    `Catalog` in `src/atlas.rs` loads all fresh repos' `.atlas/components.yaml` via one registry walk per CLI invocation. `RepoCatalog` is the per-repo parsed entry; `Catalog` is the registry-wide `IndexMap`-keyed union (deterministic output order). `iter_components()` yields `(repo_slug, &ComponentEntry)` pairs; `deleted: true` tombstone components are silently filtered. `compute_freshness_full` replaces `compute_freshness` to thread `Option<LoadedComponents>` alongside freshness data, eliminating double-parsing when both freshness and component data are needed. See: `Atlas CLI routes via dispatch_atlas; four verbs in src/atlas.rs`.
- id: atlas-describe-resolves-qualified-or-bare-component-ref
  title: atlas describe resolves qualified or bare component ref
  body: |
    `atlas describe <ref>` accepts qualified `<repo>/<id>` or bare `<id>`. Bare refs error on ambiguity (multiple repos contain `<id>`) or deletion (`deleted: true`). `compute_children` derives the children list from catalog edges. `ResolvedComponent<'a>` borrows lifetime-parameterised over `Catalog` to avoid cloning per lookup. See: `Atlas CLI routes via dispatch_atlas; six verbs in src/atlas.rs`.
- id: atlas-memory-reads-atlas-memory-yaml-schema-mismatch-errors
  title: atlas memory reads .atlas/memory.yaml; schema mismatch errors
  body: |
    `atlas memory <ref> [--search <term>]` reads `.atlas/memory.yaml`. `--search` filters `MemoryEntry` items case-insensitively across `claim`, `attribution`, and all string fields in `Justification` variants. `read_component_memory` errors on schema-version mismatch; absent file is a graceful empty. Needle lowercasing occurs at the call site so `entry_matches` / `justification_matches` stay allocation-free inside the filter loop.
- id: atlas-edges-neighbors-roots-traverse-edgegraph-from-catalog
  title: atlas edges/neighbors/roots traverse EdgeGraph from catalog
  body: |
    `atlas edges` lists all edges (formatted as `A → B (kind:lifecycle)`); `atlas neighbors` does depth-limited BFS with `--in`/`--out`/`--both` direction filtering (mutually exclusive via `conflicts_with_all`); `atlas roots` returns zero-in-degree nodes. All three load via `EdgeGraph::from_catalog`, which unions all known `related-components.yaml` files. `atlas path` and `atlas scc` route through `build_directed_component_graph` (in `src/atlas.rs`), which projects the catalog into `DirectedGraph<String>` — not via `EdgeGraph::adjacency()` directly. See: `build_directed_component_graph projects Catalog into DirectedGraph<String>`.
- id: pre-push-gating-policy-fmt-and-test-expansion-pending
  title: 'Pre-push gating policy: fmt and test expansion pending'
  body: |
    `scripts/check.sh` gates `cargo clippy --all-targets --workspace -- -D warnings`. Two gate-expansion candidates:
    - `cargo fmt --check` — low runtime cost, catches formatting drift between sessions.
    - `cargo test` — high runtime cost; may warrant a separate `scripts/test.sh` guarded by an opt-in env flag.

    `shellcheck` as a gate is deferred, contingent on it becoming a project-wide expected dependency.
- id: findings-yaml-has-list-show-add-set-status-verb-surface
  title: findings.yaml has list/show/add/set-status verb surface
  body: |
    `src/state/findings/` (schema.rs, yaml_io.rs, verbs.rs, mod.rs) implements the findings TMS module. CLI verbs: `list`, `show`, `add`, `set-status`. `FINDINGS_FILENAME = "findings.yaml"` in `src/state/filenames.rs`; wired in `src/main.rs` as `Commands::Findings`. Status transitions validated via `FindingKind::Status::transitions()` from `plan_kg.rs`. `survey` integration and `plan list-items` kind extension to include findings are unblocked follow-ups. See: `plan_kg.rs registers four plan vocabularies in knowledge-graph crate`.
- id: survey-inject-findings-adds-findings-section-omitted-when-empty
  title: survey inject_findings adds Findings section; omitted when empty
  body: |
    `inject_findings` in `src/survey/schema.rs` loads `findings.yaml` and injects a `FindingSummary` list into `SurveyResponse`. Rendered as `## Findings` at the end of `ravel-lite survey` output across cold, incremental-merge, and incremental-noop paths. The section is omitted entirely when the inbox is empty — unlike other survey sections which emit "None..." — because the findings inbox is user-mediated. Survey prompts forbid the LLM from emitting findings fields. See: `ravel-lite survey emits structured YAML`.
- id: directedgraph-n-uses-dual-btreemap-adjacency-lists
  title: DirectedGraph<N> uses dual BTreeMap adjacency lists
  body: |
    `src/directed_graph.rs`: generic `DirectedGraph<N: Ord + Clone>` maintains dual adjacency lists (`BTreeMap` out-edges + in-edges) and a `BTreeSet<N>` node universe. `add_edge` is idempotent; isolated nodes require `add_node`. `N: Ord` enforces deterministic iteration order. Used as the substrate for `atlas path` (BFS shortest path via `shortest_path`) and `atlas scc` (Tarjan SCC via `strongly_connected_components`). See: `build_directed_component_graph projects Catalog into DirectedGraph<String>`.
- id: build-directed-component-graph-projects-catalog-into-directedgraph-string
  title: build_directed_component_graph projects Catalog into DirectedGraph<String>
  body: |
    `build_directed_component_graph` in `src/atlas.rs` projects a loaded `Catalog` through `EdgeGraph` into `DirectedGraph<String>` keyed on bare component IDs. Symmetric edge kinds (`co-implements`, `communicates-with`) are excluded: bidirectional projection makes every peer-pair a 2-node SCC, drowning real circular-dependency findings. Peer relationships remain accessible via `atlas neighbors` (undirected BFS over `EdgeGraph`). All catalog components are added as nodes even without incident edges — mirrors the `EdgeGraph::roots` universe pattern. Design decision documented in the `build_directed_component_graph` docstring in `src/atlas.rs`. Applies to any future graph algorithm verb built on `DirectedGraph<String>`.
- id: atlas-path-bfs-and-scc-tarjan-verbs-in-src-atlas-rs
  title: '`atlas path` (BFS) and `scc` (Tarjan) verbs'
  body: |
    `atlas path <from> <to> [--max-hops N]` — BFS shortest path; `--max-hops` bounds search depth; returns `None` when no path exists or hop limit exceeded. `atlas scc [--all]` — Tarjan SCC; by default only non-singleton SCCs are shown; `--all` includes singletons. Both implemented as `run_path`/`run_scc` in `src/atlas.rs`; resolve component refs via `resolve_ref` and delegate to `build_directed_component_graph`. Algorithms live on `DirectedGraph<N>` as `shortest_path` (BFS, parent-map reconstruction) and `strongly_connected_components` (recursive Tarjan, sorted within-SCC and across SCCs for determinism). See: `build_directed_component_graph projects Catalog into DirectedGraph<String>`.
- id: create-post-hoc-verification-checks-intents-yaml-emptiness
  title: create post-hoc verification checks intents.yaml emptiness
  body: |
    `create` post-hoc verification in `src/create.rs` asserts `intents.yaml` is non-empty after the create-plan LLM spawn. An empty `intents.yaml` signals the session failed to anchor a plan intent. Backlog-emptiness was the v1 signal; `intents.yaml`-emptiness is correct under the v2 intent-anchored model.
- id: plancontext-project-dir-is-a-v1-coloured-fudge-in-v2-create
  title: PlanContext.project_dir is a v1-coloured fudge in v2 create
  body: |
    `compose_create_prompt` populates both `project_dir` and `config_root` as `context_root` because v2 plans have no per-project root. The current `PlanContext` shape is v1-coloured: `project_dir` is a required field that has no clean meaning in a v2 create context.

    **Why:** v2 `ravel-lite create` operates on `<context>/plans/<plan>/` with no per-project dir; forcing a value into `project_dir` is a fudge to satisfy the struct.

    **How to apply:** When the v2 phase cycle lands, revisit `PlanContext` in `src/prompt.rs` — either split into `CreateContext` + `CycleContext`, or make `project_dir: Option<String>`. Do not propagate the fudge into new v2 code paths.
- id: targets-yaml-uses-missing-equals-empty-not-missing-equals-error
  title: targets.yaml uses missing-equals-empty not missing-equals-error
  body: |
    `targets.yaml` is created at first worktree mount, not at plan-creation time. `yaml_io.rs` returns an empty `TargetsFile` when the path is absent (`missing = empty` policy), unlike `intents.yaml` which errors on missing (`missing = error`). Rule: apply `missing = empty` for state files born lazily at runtime; `missing = error` for files seeded at `create`.
- id: target-struct-is-not-a-tms-item-runtime-cache-table-not-knowledge-graph-node
  title: Target is a runtime table, not a TMS item
  body: |
    `Target` in `src/state/targets/schema.rs` is deliberately NOT a TMS item (`Item<K>` + `Justification` + `KindMarker`). Using `serde-flatten Item<K>` would force-fit empty `claim`/`status`/`justifications` fields onto what is a runtime cache table — targets are mutable operational state (mount path, branch ref), not knowledge-graph nodes where provenance and supersession matter. The `serde-flatten` pattern applies only to intents, backlog, memory, and findings; runtime config files like `targets.yaml` and `repos.yaml` use plain structs.
- id: targets-mount-persists-target-row-to-targets-yaml
  title: targets mount persists Target row to targets.yaml
  body: |
    `targets mount` creates `.worktrees/<repo>/` and persists a `Target` row to `targets.yaml`. Worktree branch is `ravel-lite/<plan>/main`, rooted at the default-branch starting point. Component `path_segments` sourced from `.atlas/components.yaml`. `.worktrees/` is gitignored via `scaffold_plan_dir` in `src/create.rs`.
- id: targets-mount-falls-back-to-head-for-repos-without-a-remote
  title: targets mount falls back to HEAD without remote
  body: |
    `mount_target` in `src/state/targets/mount.rs` detects the starting-point branch via `git symbolic-ref --short refs/remotes/origin/HEAD`. Falls back to `HEAD` when no remote exists (fixture repos in tests have no remote).
- id: targets-mount-is-two-level-idempotent
  title: targets mount is two-level idempotent
  body: |
    `targets mount` is two-level idempotent: same `(repo, component)` pair returns the existing `Target` row unchanged; a second component in the same repo reuses the existing worktree (skips `git worktree add`) and appends a new `Target` row.
- id: clone-on-demand-for-mount-target-is-deferred-until-real-use-case
  title: Clone-on-demand for mount_target is deferred until real use case
  body: |
    When `local_path` is absent for a `repo_slug` in `repos.yaml`, `mount_target` (in `src/state/targets/mount.rs`) currently errors with an actionable message citing the slug and showing the `repo add` migration command. The settled design for clone-on-demand is: clone into `<context>/.cache/repos/<slug>/` when `local_path` is absent. This is deferred until a real use case lands — the error path is clear and intentional for now. Implement as a small follow-up task once a concrete need arises.
- id: worktree-branch-mismatch-recovery-in-mount-target-is-a-deferred-ergonomic-improvement
  title: mount_target errors on branch mismatch; manual cleanup
  body: |
    If `<plan>/.worktrees/<repo>/` already exists on a different branch than the expected `ravel-lite/<plan-name>/main`, `mount_target` currently errors and asks the user to remove the directory manually. A future ergonomic improvement could detect a clean worktree and offer to re-create it automatically. Deferred until the manual removal UX becomes a recurring pain point.
- id: atlas-freshness-coupling-in-mount-target-is-an-open-design-question
  title: mount_target freshness coupling is an open design question
  body: |
    `mount_target` in `src/state/targets/mount.rs` reads `.atlas/components.yaml` unconditionally to resolve component `path_segments`. A stale Atlas catalog produces stale `path_segments` in `targets.yaml`. Open design question: whether mount should call `atlas freshness` and warn when the catalog is older than some threshold. Deferred — the freshness coupling is acknowledged but the right threshold and remediation UX are not yet settled. Consider when Atlas freshness tooling matures.
- id: target-requests-yaml-is-a-drain-queue-phase-loop-empties-per-cycle
  title: target_requests.yaml is a drain queue; phase_loop empties per-cycle
  body: |
    `src/state/target_requests/` (schema, yaml_io, verbs, drain, mod) implements a write-queue pattern: external callers (e.g. `ravel-lite-create`) append mount requests to `target_requests.yaml`; `phase_loop` calls `drain_target_requests(plan_dir, config_root)` at the top of each iteration before `read_phase`, atomically consumes all entries (returns `Result<usize>` count mounted), and surfaces non-zero drains to the UI. `TargetRequest.component` is typed `ComponentRef`; serde emits the `<repo>:<id>` string scalar, so wire shape is preserved. CLI: `state target-requests {list,show,add,remove,drain}`. Missing file = empty queue (matches `targets.yaml` policy). See: `targets.yaml uses missing-equals-empty not missing-equals-error`.
- id: check-anchors-walks-codeanchor-justifications-emits-suspectreport-yaml
  title: check-anchors walks CodeAnchor justifications; emits SuspectReport YAML
  body: |
    `state memory check-anchors <plan> [--project-root <path>]` in `src/state/memory/check_anchors.rs`. Walks active (non-defeated, non-superseded) entries' `CodeAnchor` justifications; emits a `SuspectReport` YAML with `path-missing | sha-mismatch` reasons per failing anchor. Multi-anchor entries are checked independently. Cannot run against LLM_STATE/core until v1→v2 migrator ships (v1 schema lacks `schema_version`).
- id: reflect-v2-adds-bounded-tms-check-and-intent-trajectory-review
  title: Reflect v2 adds bounded TMS check and intent-trajectory review
  body: |
    `defaults/phases/reflect.md` v2 adds two steps before distilling session learnings: (1) bounded TMS check via `state memory check-anchors` with `still-true | refined | defeated` decision protocol; (2) intent-trajectory check via `state intents list`. Hand-off mechanics unchanged. The check-anchors step is a no-op against LLM_STATE/core until v1→v2 migrator ships. See: `check-anchors walks CodeAnchor justifications; emits SuspectReport YAML`.
- id: state-memory-add-code-anchor-not-yet-implemented
  title: state memory add --code-anchor implemented; set-body anchor editing deferred
  body: |
    `state memory add` accepts `--code-anchor key=value` (repeatable). Keys: `component`, `path`, `sha`, `lines`; all fields required except `lines`. `AddRequest.code_anchors: Vec<Justification>` carries pre-parsed typed values; `parse_code_anchor` lives in `src/state/memory/verbs.rs`, re-exported from `src/state/memory/mod.rs` for future reuse (e.g. `state intents add`). `defaults/phases/reflect.md` updated to use `--code-anchor` directly — the "name paths inline" workaround paragraph is removed. `state memory set-body` does not support anchor add/replace; defer until a real edit workflow demands it.
- id: check-anchors-bounded-scoping-defer-limit-k-touched-since-until-entry-count-warrants-it
  title: check-anchors is unbounded; add --limit-k when count grows
  body: |
    `state memory check-anchors` currently walks every active entry. At LLM_STATE/core's entry count (low tens), this is microseconds — no bound needed now. If entry count grows to where the full pass is painful, add `--limit-k <int>` (check only the K most recently modified entries) or `--touched-since <baseline-sha>` (check only entries whose code-anchored paths appear in the diff since that baseline).
- id: intent-trajectory-rust-pre-pass-defer-until-a-real-trajectory-entry-is-produced
  title: Intent-trajectory Rust pre-pass deferred until [TRAJECTORY] entries exist
  body: |
    The intent-trajectory check in the v2 reflect prompt is fully prompt-driven. A mechanical pre-pass (compare active intents to session-log entries by id-coverage) could surface candidate drift at lower cost. Deferred: heuristics for "substantial activity" and "drift worth flagging" are LLM-judgement-bearing and need examples before a Rust pre-pass adds value. Open question per `docs/architecture-next.md`: whether trajectory grows into its own phase.
- id: per-kind-add-verbs-are-the-pattern-for-closed-vocabulary-queues
  title: Per-kind add-* verbs are the pattern for closed-vocabulary queues
  body: |
    One verb per kind (`add-wrong-target`, `add-skip-item`, `add-premature`), with clap enum parsing at the dispatch boundary. Invalid kind values fail at clap before any YAML is written, enforcing the type constraint at the system boundary rather than inside the module. First established in `state discover-proposals add-proposal`; now the standard for any queue state area with a closed kind vocabulary. Contrast with a single `add --kind <value>` verb, which defers validation to runtime YAML parsing.
- id: this-cycle-focus-yaml-has-set-show-clear-verb-surface
  title: this-cycle-focus.yaml has set/show/clear verb surface
  body: |
    `src/state/this_cycle_focus/` (schema.rs, yaml_io.rs, verbs.rs, mod.rs) is a single-document singleton state area for the triage-first phase cycle's declared focus. `ThisCycleFocus.target` is typed `ComponentRef`; serde emits the `<repo>:<id>` string scalar, preserving wire shape. CLI verbs: `set`, `show`, `clear`. Follows the `state target-requests` / `state intents` module layout. See: `src/state/ uses module-per-area layout`.
- id: focus-objections-yaml-has-per-kind-add-verb-surface
  title: focus-objections.yaml has per-kind add verb surface
  body: |
    `src/state/focus_objections/` (schema.rs, yaml_io.rs, verbs.rs, mod.rs) is a closed-vocabulary queue for the triage-first phase cycle. CLI verbs: `add-wrong-target`, `add-skip-item`, `add-premature`, `list`, `clear`. Kind vocabulary encoded as a tagged enum; clap rejects invalid kind values before any YAML is written. `Objection::suggested_target` remains `String` — the last `validate_reference` outlier in the v2 scratch-file family; lifting it to `ComponentRef` is the outstanding follow-up. See: `Per-kind add-* verbs are the pattern for closed-vocabulary queues`; `src/state/ uses module-per-area layout`.
- id: componentref-serialises-as-its-string-wire-form-lifts-need-no-migration
  title: ComponentRef lifts need no migration; wire form unchanged
  body: |
    `ComponentRef`'s `Serialize`/`Deserialize` impls round-trip through the canonical `<repo_slug>:<component_id>` string. Lifting a `String` field that holds this format to `ComponentRef` requires no YAML migration and no schema-version bump. Clap uses `FromStr` for argument parsing, so the same lift gates malformed values at the CLI boundary automatically — no separate validator needed.
- id: objection-skipitem-item-id-is-a-candidate-for-a-backlogid-newtype
  title: Objection::SkipItem::item_id is a candidate for a BacklogId newtype
  body: |
    After lifting `Objection::WrongTarget.suggested_target` onto `ComponentRef`, the remaining stringly-typed field on `Objection` variants is `SkipItem::item_id: String` (a backlog row id). The newtype-with-stringly-Serialize/Deserialize pattern is the cheapest way to lift any `<x>:<y>` string field without changing the wire shape, but a `BacklogId` newtype does not exist yet and creating it would be a larger lift than the `ComponentRef` work. This is a future candidate — defer until the architecture-next schema stabilises.
- id: scratch-file-reads-absent-empty-malformed-error-citing-filename
  title: 'Scratch-file reads: absent=empty, malformed=error citing filename'
  body: |
    `commits.yaml`, `target-requests.yaml`, `focus-objections.yaml`, and `this-cycle-focus.yaml` read paths follow: absent file → safe empty default; malformed YAML → hard error citing the filename. `commits.yaml` falls back silently at the caller level (safe for cycle restart); the other three surface the error loudly to preserve LLM-authored data. Unit tests `read_bails_on_malformed_yaml` in each file's `yaml_io.rs` enforce this contract. When `phase-boundary-mechanics` wires `read_focus_objections` / `read_this_cycle_focus` into triage, these semantics are the prescription for those callers.
- id: focus-objections-yaml-drained-at-gitcommittriage-entry
  title: focus-objections.yaml drained at GitCommitTriage entry
  body: |
    `consume_focus_objections` drains `focus-objections.yaml` at `GitCommitTriage` entry, before `write_phase`/`git_commit_plan`. Idempotent: absent file is a no-op.
- id: defeat-cascade-rs-wires-cascade-serves-intent-into-triage-commit
  title: defeat_cascade.rs wires cascade_serves_intent into triage commit
  body: |
    `src/defeat_cascade.rs::run_defeat_cascade` reads `intents.yaml` and `backlog.yaml`, runs `knowledge_graph::cascade_serves_intent`, and writes `status`/`defeated_by` flips back to disk preserving `BacklogEntry` extension fields (`category`, `dependencies`, `results`, etc.). Disk write is conditional on at least one cascade hit. `cascade_defeated_items` gates on `intents_path(plan_dir).exists()`: v1 plans (no `intents.yaml`) are pure no-ops; v2 plans get the cascade in the same triage commit.
- id: create-target-seeds-target-requests-yaml-empty-list-is-no-op
  title: create --target seeds target-requests.yaml; empty list is no-op
  body: |
    `seed_target_requests` in `src/create.rs` writes a valid `TargetRequestsFile` (schema_version: 1) via `write_target_requests`. Called from `run_create` when `--target` args are supplied; empty arg list is a no-op (no file written). Uses `ComponentRef::FromStr` at the clap boundary — same derivation already used for `suggested_target` at `src/main.rs:1087`. See: `target_requests.yaml is a drain queue; phase_loop empties per-cycle`.
- id: fixed-memory-show-uses-embedded-plus-user-layered-overlay
  title: fixed-memory show uses embedded-plus-user layered overlay
  body: |
    `ravel-lite fixed-memory show <slug>` resolves from two sources: an embedded baseline (compiled into the binary) and an optional user file at `<config-dir>/fixed-memory/<slug>.md`. When both exist, output is embedded content followed by an addendum delimiter then the user file. `list` supports `--format yaml|json|markdown`. Unknown slugs error with the available-slug list as remediation. Spec: `docs/superpowers/specs/2026-05-02-fixed-memory-cli.md`.
- id: cli-tool-design-md-is-the-cli-audit-reference
  title: cli-tool-design.md is the CLI audit reference
  body: |
    `defaults/fixed-memory/cli-tool-design.md` is an embedded fixed-memory entry providing LLM-agent CLI design guidance: structured output, help examples, actionable errors, flag vocabulary, exit codes, audit checklist, anti-patterns. Accessible at slug `cli-tool-design` via `ravel-lite fixed-memory show`. Drives the `cli-audit-and-refactor-against-cli-tool-design-md` backlog task.
- id: create-allowed-tools-must-track-create-plan-md-state-verb-usage
  title: CREATE_ALLOWED_TOOLS must track create-plan.md state verb usage
  body: |
    `src/create.rs::CREATE_ALLOWED_TOOLS` must include `Bash(ravel-lite state <area>:*)` for every `ravel-lite state <area>` subcommand invoked from `defaults/create-plan.md`. The create spawn uses `--setting-sources project,local`; omitting a verb glob silently blocks that call during the create dialogue. Extend the constant (and its regression test in `src/create.rs`) when adding new state verb invocations to `create-plan.md`. The session that fixed `target-requests` also notes this pattern will recur when `fixed-memory` verbs are added to create-plan.md.
- id: anchors-yaml-verb-surface-deferred-until-anchors-yaml-is-consumed
  title: anchors.yaml verb surface deferred until anchors.yaml is consumed
  body: |
    §3 of `defaults/create-plan.md` still uses a raw `Write` to `anchors.yaml`. A follow-up could mirror the target-requests fix: introduce `state anchors {list,add,remove}` verbs, update §3 to call them, and allowlist `Bash(ravel-lite state anchors:*)` in `CREATE_ALLOWED_TOOLS`. Defer until `anchors.yaml` is actually consumed by something other than a passive read — today nothing reads it, so a schema-enforcing verb adds safety without unblocking any downstream work.
- id: phase-prompts-use-ravel-lite-fixed-memory-show-for-content
  title: Phase prompts use ravel-lite fixed-memory show for content
  body: |
    `defaults/phases/reflect.md` and `dream.md` call `Bash(ravel-lite fixed-memory show memory-style)` to load style rules. `defaults/phases/work.md` calls `ravel-lite fixed-memory list` then `ravel-lite fixed-memory show <slug>` to discover and read fixed-memory content. Direct reads to `{{ORCHESTRATOR}}/fixed-memory/*.md` file paths are removed; the CLI verb handles embedded-plus-user overlay.
- id: per-phase-allowlist-architecture-headless-uses-dangerously-skip-permissions
  title: 'Per-phase allowlist architecture: headless uses --dangerously-skip-permissions'
  body: |
    Headless phases (analyse-work, reflect, triage, dream) run with `--dangerously-skip-permissions` — set via the `dangerous: true` param and `force_dangerous` in `src/main.rs:24-35`. The interactive work phase does not pass `--allowed-tools`; it inherits the user's machine-level `settings.json`. There are no per-phase allowlist constants to update for work/reflect/dream in the current architecture. `CREATE_ALLOWED_TOOLS` in `src/create.rs` governs the create-plan flow only — it is not a template for the main phase loop. If a future shipped `settings.json` overlay or a per-phase allowlist constant for headless phases lands via architecture-next work, add `Bash(ravel-lite fixed-memory:*)` at the same time — phase prompts authored after the fixed-memory CLI task assume those verbs are reachable.
- id: check-dep-free-architecture-next-tasks-against-code-before-executing
  title: Verify dep-free arch-next tasks against code before queueing
  body: |
    Dep-free `architecture-next` tasks were written speculatively before implementation; they drift out of sync as work accumulates. Before queueing any dep-free `architecture-next` task at `not_started` status for work, verify via `git log -- <referenced files>` or a grep of named tests that the work hasn't already shipped. One confirmation round typically settles it.
- id: resolve-target-worktree-translates-componentref-to-worktree-path
  title: resolve_target_worktree translates ComponentRef to worktree path
  body: |
    `resolve_target_worktree(plan_dir: &Path, target: &ComponentRef) -> Result<PathBuf>` in `src/state/targets/yaml_io.rs`, exported from `state::targets`. Reads `targets.yaml`, matches on `(repo_slug, component_id)`, returns `plan_dir.join(working_root)`. Error message names the missing ref and cites `target-requests.yaml` as remediation. Unblocks two-stream commit routing; `apply_commits_spec` will call this to chdir before staging each commit group. See: `CommitSpec target reserved for two-stream routing`.
- id: cargo-test-workspace-quiet-truncates-to-4-summaries
  title: '`cargo test --workspace --quiet` truncates to ~4 summaries'
  body: |
    `cargo test --workspace --quiet` emits only ~4 binary-level summaries and suppresses the workspace-wide total. Use `cargo test --workspace` (without `--quiet`) for an authoritative pass/fail count.
- id: drain-target-requests-fires-at-every-phase-boundary-not-just-triage-work
  title: drain_target_requests fires at every phase boundary
  body: |
    `drain_target_requests` fires at every phase boundary — loop-top in `phase_loop::phase_loop` (line ~399), before `read_phase`. Despite the triage-focused wording in the architecture-next doc ("triage→work boundary"), drain is not gated to a single transition. This is intentional per §Phase boundaries ("between phases"), but task descriptions that say "at the triage→work boundary" are technically imprecise. When writing phase-boundary logic, assume drain may have already run before any phase is read; avoid reasoning as if drain is triage-exclusive.
- id: triage-reads-focus-objections-at-step-3-writes-this-cycle-focus-at-step-8
  title: Triage reads focus-objections and writes this-cycle-focus
  body: |
    `defaults/phases/triage.md`: step 3 reads prior-cycle `focus-objections.yaml` (`wrong-target`, `skip-item`, `premature` objections); step 7 acts on them; step 8 writes `this-cycle-focus.yaml` via `state this-cycle-focus set`. `defaults/phases/work.md`: step 5 reads `state this-cycle-focus show` (advisory; v1 fallback: proceed without focus if absent). See: `this-cycle-focus.yaml has set/show/clear verb surface`; `focus-objections.yaml has per-kind add verb surface`.
- id: cycle-closes-at-reflect-dream-is-out-of-cycle
  title: Cycle closes at reflect; dream is out-of-cycle
  body: |
    The automated phase cycle is `triage → work → analyse-work → reflect`. Reflect always sets `git-commit-reflect` as next phase; post-reflect routing (including dream invocation) belongs to the run script. `dream.md` is an out-of-cycle phase; `ravel-lite curate` is the planned out-of-cycle mechanism for compaction runs — the CLI verb does not yet exist. Phase prompt prose references "the planned `curate` phase" to avoid false CLI implications caught by the phase prompt CLI verb resolution test. See: `Reflect phase runs automatically after git-commit-analyse-work`.
- id: phase-baseline-filename-rename-requires-runner-prompt-to-ship-together
  title: Phase-baseline filename rename requires runner+prompt to ship together
  body: |
    `<phase>-baseline` filenames appear in both phase prompts (as `$(cat {{PLAN}}/<phase>-baseline ...)` in `phase-summary render` directives) and runner scripts (written files). Renaming to per-worktree YAML maps requires both sides to change atomically; renaming the prompt side before the runner-side rename ships silently breaks `phase-summary render` in all three output-format sections. Deferred. See: `Phase prompts invoke phase-summary render via CLI directive`; `Each <phase>-baseline holds the SHA from the preceding commit`.
- id: phase-prompt-cli-verb-test-validates-all-chains
  title: Phase prompt CLI verb test validates all embedded prompts
  body: |
    `tests/phase_prompts_cli_resolution.rs` iterates `embedded_entries_with_prefix("")` — all embedded prompt files, not just `defaults/phases/*.md` — via a MAX_CHAIN_DEPTH=3 kebab-case parser, validates each `ravel-lite <chain...>` invocation with `--help` against `CARGO_BIN_EXE_ravel-lite`, failing on `unrecognized subcommand`. Covers phases, `create-plan.md`, `survey.md`, `discover-stage2.md`, and pi prompt files. Pi prompt files contain zero `ravel-lite` invocations; they pass trivially. MAX_CHAIN_DEPTH=3 is the first breakage point when a fourth-level verb ships; flagged in a test comment. Includes an anchor test asserting the six focus/objections verbs remain present in the prompt set.
- id: max-chain-depth-3-cap-in-phase-prompts-cli-resolution-tests
  title: MAX_CHAIN_DEPTH = 3 cap in phase_prompts_cli_resolution tests
  body: |
    `MAX_CHAIN_DEPTH = 3` in `tests/phase_prompts_cli_resolution.rs` is the cap on verb-chain length parsed from phase prompts. It matches the deepest current chain (`state focus-objections add-wrong-target`). If a fourth-level verb ships, the parser silently truncates longer chains without failing — a false pass. When a fourth-level verb is added to the CLI, bump `MAX_CHAIN_DEPTH` to 4 in the test and verify the test catches chains of that depth.
- id: forward-references-convention-for-planned-cli-verbs-in-phase-prompts
  title: Forward-references convention for planned CLI verbs in phase prompts
  body: |
    Phase prompts sometimes carry forward references to planned-but-not-yet-shipped CLI verbs. Convention established in the `integration-smoke-test-phase-prompts-reference-live-cli-verbs` task: use prose form "the planned `<verb>` phase/command" rather than backtick-CLI form `` `ravel-lite <verb>` `` for any verb not yet callable. When the verb ships, revert to the backtick-CLI form. Affected files at establishment: `defaults/phases/reflect.md` and `defaults/phases/dream.md` (both reference the planned `curate` command).
- id: outputformat-lives-in-src-cli-one-canonical-enum
  title: OutputFormat lives in src/cli/; one canonical enum
  body: |
    `crate::cli::OutputFormat` (variants: Yaml, Json, Markdown) is the single canonical format type; all per-module copies deleted. New verbs import `crate::cli::OutputFormat` and call `OutputFormat::parse()`. Verbs that lack Markdown support compile against the full three-variant enum and return a runtime error naming supported values — they do not reject at parse time.
- id: kebab-case-verb-parser-false-positives-on-prose-phrases
  title: Kebab-case verb parser false-positives on prose phrases
  body: |
    The `phase_prompts_cli_resolution.rs` parser treats any run of `ravel-lite <k> <k> <k>` (where each `<k>` is a kebab-case token) as a verb chain. Prose phrases of that shape trigger false positives — e.g., "ravel-lite v2 plan at" parsed as a chain. Fix: rephrase prose so the tool name is not followed by three consecutive kebab-case tokens. One confirmed incident fixed in `create-plan.md` line 4. Not frequent enough yet to redesign the parser; note each occurrence if more appear.
- id: cli-verb-drift-guard-kebab-case-heuristic-false-positive-risk
  title: 'CLI verb drift guard: kebab-case heuristic false-positive risk'
  body: |
    The CLI verb drift guard (`phase_prompts_reference_only_live_cli_verbs`) uses a
    kebab-case heuristic to detect verb chains. The heuristic will false-positive on
    any prose pattern of the form `ravel-lite <kebab> <kebab> <kebab>`. One false
    positive was hit during the broadened scan (session that extended the guard to all
    embedded prompt files): `"populate a new ravel-lite v2 plan at {{PLAN}}"` tripped
    the parser. Fixed by rephrasing rather than tightening the parser.

    Tightening approach (e.g. requiring backtick context, blacklisting common
    prepositions like `at`, `in`, `for`) is worth considering only after a second
    occurrence. The corpus is small enough that prose rephrasing remains the cheaper
    fix for now.
- id: errorcode-and-exitcategory-are-the-typed-cli-error-vocabulary
  title: ErrorCode and ExitCategory are the typed CLI error vocabulary
  body: |
    `ErrorCode` (7 variants: `AuthRequired`, `InvalidInput`, `NotFound`, `Conflict`, `IoError`, `RateLimited`, `Internal`) in `src/cli/error_code.rs` with `as_str()`, `parse_opt()`, and `all()`. `ExitCategory` (7 variants, codes 0–6) in `src/cli/exit_category.rs` with `as_code()`, `label()`, `documented()`, and `From<&ErrorCode>` mapping. `ErrorCode::all()` and `ExitCategory::documented()` enumerate both sets at runtime; `capabilities` sources from them to prevent drift. Exit-code table injected into `--help` via `AFTER_HELP`. See: `capabilities verb sources from ErrorCode::all() and ExitCategory::documented()`.
- id: capabilities-verb-sources-from-errorcode-all-and-exitcategory-documented
  title: capabilities verb sources from ErrorCode::all() and ExitCategory::documented()
  body: |
    `ravel-lite capabilities` in `src/cli/capabilities.rs` emits a schema_version:1 JSON document with `subcommands`, `output_formats`, `error_codes`, `exit_categories`, and `features`. `error_codes` and `exit_categories` are sourced at runtime from `ErrorCode::all()` and `ExitCategory::documented()` — the capabilities document cannot drift from the runtime vocabulary for these fields. See: `ErrorCode and ExitCategory are the typed CLI error vocabulary`.
- id: main-run-dispatch-stack-classifies-errors-via-exitcategory
  title: main→run→dispatch stack classifies errors via ExitCategory
  body: |
    `main()` calls `run()` calls `dispatch()`. `run()` classifies `anyhow::Error` via `ExitCategory`, detects `--format json` in raw argv, and routes error output: `JsonErrorEnvelope` (pretty JSON with optional `remediation` field) to stderr for JSON mode, or `Error: {err:#}` for plain mode. `JsonErrorEnvelope` is in `src/cli/error_envelope.rs`; `Display` emits JSON with trailing newline. Replaces the previous `async fn main() -> Result<()>` all-or-nothing exit path.
- id: error-context-rs-tags-call-sites-with-typed-errorcode
  title: error_context.rs tags call sites with typed ErrorCode
  body: |
    `CodedError`, `error_code_of()`, `ResultExt::with_code()`, and `bail_with!` live in `src/cli/error_context.rs`. `error_code_of(&err)` at the `run()` boundary in `src/main.rs` recovers typed codes from anyhow errors; `ErrorCode::Internal` is the fallback only for truly unclassified sites. `error_code_of` walks the full anyhow chain through `with_context` wraps — confirmed by unit test in `cli/error_context.rs`. Tag every leaf-verb `bail!` site with `bail_with!(code, …)` or `.with_code(code)` to propagate the right exit category and JSON envelope `code` field end-to-end. Where 3+ identical `not_found` bail sites exist in one file, extract a private `not_found_in_<file>(id)` helper rather than repeating the `bail_with!`. See: `bail_with! for statement sites; .with_code() for closure contexts`; `check.sh regex guard rejects untagged bail!/anyhow!/ensure! macros`.
- id: after-help-examples-cover-every-leaf-verb-llm-state-core-is-the-placeholder
  title: After-help examples cover every leaf verb; LLM_STATE/core is the placeholder
  body: |
    `after_help` constants in `src/main.rs` cover every leaf verb family: init, run, survey, capabilities, repo, fixed-memory, atlas, state/backlog, state/memory, state/intents, state/targets, state/target-requests, state/commits, state/this-cycle-focus, state/focus-objections, findings, plan, state/session-log, related-components, discover-proposals, and sync. All examples use `LLM_STATE/core` as the canonical plan-dir placeholder. Integration test `example_blocks_present_across_representative_verbs` checks 14 representative verbs. See: `after_help const avoids dead-code warnings; no intermediate URL consts`.
- id: verb-aliases-follow-ls-rm-get-create-compound-names-use-qualified-form
  title: Verb aliases follow ls/rm/get/create; compound names use qualified form
  body: |
    36 verbs in `src/main.rs` carry `visible_alias`/`visible_aliases` clap attributes. Standard aliases: `ls` (list), `rm`/`delete` (remove), `get`/`cat` (show), `create`/`add` (add). Compound-name verb collisions (e.g. `ListRepos`, `ListComponents`) receive qualified aliases (`ls-repos`, `ls-components`) to avoid clap enum-level ambiguity — do not use the bare `ls` alias for these. `visible_aliases_dispatch_to_canonical_verbs` in `tests/cli.rs` verifies one alias per category. When adding a new list/show/remove/add verb, follow this pattern and check for compound-name conflicts.
- id: stage1outcome-failed-swallows-typed-errorcode-stage1failure-unblocks-it
  title: Stage1Outcome::Failed swallows typed ErrorCode; Stage1Failure unblocks it
  body: |
    `Stage1Outcome::Failed { error: format!("{e:#}") }` captures per-project errors as a plain string, discarding the typed `ErrorCode`. Agents cannot branch on per-project failure categories; only human-readable text survives into `discover-proposals.yaml`. Fix: introduce a `Stage1Failure { code: ErrorCode, message: String }` variant and thread it through `run_stage2`. Deferred until a consumer needs per-project failure-category branching.
- id: bail-with-for-statement-sites-with-code-for-closure-contexts
  title: bail_with! for statement sites; .with_code() for closure contexts
  body: |
    `bail!`-at-statement-position is replaced with `bail_with!(ErrorCode::X, …)`. `anyhow!` inside `.ok_or_else`/`.map_err` closures keeps the original macro and chains `.with_code(ErrorCode::X)` afterwards. For functions returning a bare `anyhow::Error` (no `Result` chain to attach `.with_code()` to), use `anyhow::Error::new(CodedError { code, message })` — the same internal shape that `bail_with!` builds. All three patterns applied uniformly across all `ErrorCode`-tagged sites in the codebase.
- id: with-context-chains-excluded-from-errorcode-tagging-scope
  title: with_context chains tagged; check.sh regression guard unimplemented
  body: |
    272 production `with_context`/`.context(` chains in 45 source files carry `.with_code(ErrorCode::X)`. The `bail!/anyhow!/ensure!` guard in `check.sh` does not cover `with_context` sites; a peer task (`cli-add-errorcode-regression-guard-to-check-sh`) tracks adding that guard. Until the guard lands, new `with_context` wraps around IO operations can silently miss a code tag. See: `check.sh regex guard rejects untagged bail!/anyhow!/ensure! macros`.
- id: check-sh-regex-guard-rejects-untagged-bail-anyhow-ensure-macros
  title: check.sh regex guard rejects untagged bail!/anyhow!/ensure! macros
  body: |
    `scripts/check.sh` contains an `rg --pcre2` guard (pattern `\b(anyhow|bail|ensure)!\(`) that fails if any matching line in `src/**` lacks the `// errorcode-exempt: <reason>` exemption marker. `bail_with!(` is safe — the `_` breaks the word boundary. Exemption marker format: `// errorcode-exempt: <reason>` on the offending line; use for closure `.map_err`/`.ok_or_else` sites and test assertions of the untagged-fallback path that cannot be converted to `bail_with!`. See: `bail_with! for statement sites; .with_code() for closure contexts`.
- id: sweep-completion-claims-require-mechanical-guards-not-social-declarations
  title: Sweep completion claims require mechanical guards, not social declarations
  body: |
    The `cli-add-errorcode-regression-guard-to-scripts-check-sh` task surfaced 22 untagged sites the prior three-cycle "complete" sweep had missed — the guard found them in seconds. The pattern: "sweep declared complete" is a social claim, not a mechanical one. Mechanical guards (ripgrep patterns, Rust integration tests, drift sentinels) are the only reliable enforcement.

    **Why:** Three consecutive task cycles each declared the ErrorCode tagging sweep complete with zero exceptions noted; none ran a mechanical check. The guard disproved all three claims on first run.

    **How to apply:** When a "sweep task" is marked done without a mechanical guard, treat the completion claim as advisory. Where feasible, add a guard that would fail on regression before declaring the sweep done.
- id: check-sh-enforces-with-code-on-every-with-context-chain
  title: check.sh enforces with_code on every with_context chain
  body: |
    scripts/check_errorcode_chains.py (invoked from check.sh) forbids any .with_context(...) or .context(...) chain in src/**/*.rs that lacks .with_code(ErrorCode::X). Guards the invariant established when all 272 production sites were tagged. Sanitises string literals and block comments before pattern matching to avoid false positives.
- id: errorcode-exempt-opts-out-of-the-with-context-chain-guard
  title: '// errorcode-exempt: opts out of the with_context chain guard'
  body: |
    // errorcode-exempt: comment on a line opts it out of the chain guard in check_errorcode_chains.py. Three sites in src/cli/error_context.rs use it: lines 138, 144 (pre-existing), and 177 (mod tests, asserts CodedError codes survive the anyhow chain). Any future test or intentional untagged chain must add this annotation.
- id: sync-merges-plan-branches-same-context-guard-blocks-cross-repo
  title: '''sync'' merges plan branches; same-context guard blocks cross-repo'
  body: |
    `src/sync.rs` (~631 LoC, 13 unit tests). `ravel-lite sync <plan> --from <other-plan>` merges each shared target's plan branch from `--from` into the destination plan's worktrees; targets unique to `--from` are auto-mounted first. Branch visibility is automatic: both plans' worktrees share the source repo's `.git`, so `ravel-lite/<other-plan>/main` is reachable with no special lookup machinery. Same-context guard rejects merges across plans whose source repos resolve differently — cross-context merges that "happen to work" via coincidence would be silent coupling that's hard to audit.
- id: sync-format-json-output-deferred-until-concrete-consumer-exists
  title: 'sync --format json output: deferred until concrete consumer exists'
  body: |
    `ravel-lite sync` currently outputs a markdown report. A `--format json` flag (producing a `SyncReport` JSON/YAML envelope with `schema_version`) would let agents consume sync outcomes programmatically without parsing markdown.

    Estimated scope: ~50 LoC. The `SyncReport` struct already exists in `src/sync.rs`; it carries mounts, per-target merge labels, and conflict details. Adding `--format json` follows the same envelope pattern as other state verbs.

    Defer until: a concrete agent consumer of sync output exists, or the `cli-json-schema-versioning-policy-and-documentation` task lands and establishes the standard envelope shape. Don't add speculatively.
- id: triage-reflect-write-cross-plan-findings-via-findings-add
  title: Triage/reflect write cross-plan findings via findings add
  body: |
    `triage.md` §4 "Cross-plan findings" and `reflect.md` §4 "Cross-plan findings" instruct the LLM to record observations about other plans by running `ravel-lite findings add --context-dir <ctx> --plan <target-plan> ...`. Findings land in the context-level inbox; triage on the target plan processes them next cycle. Replaces the deleted `subagent-dispatch.yaml` / `src/subagent.rs` mechanism. The `[FINDING]` action label captures these writes in phase output. Both phases previously used `[DISPATCH]` with a YAML file as the cross-plan channel; the findings TMS module is now the sole mechanism.
